<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useCallback}=React;
const CAT={
  lab:{label:"Hands-On Lab",color:"#3B82F6"},
  study:{label:"Course / Study",color:"#8B5CF6"},
  cert:{label:"Credential",color:"#10B981"},
  interview:{label:"Interview Prep",color:"#F59E0B"},
  career:{label:"Career Action",color:"#EF4444"},
  review:{label:"Review / Document",color:"#6366F1"},
  infra:{label:"Infrastructure",color:"#06B6D4"},
};
const HABITS=[
  {id:"h1",text:"30 min hands-on lab (VM + tenant)",icon:"⌨️"},
  {id:"h2",text:"Watch 1 section of MD-102 or SC-300 course",icon:"🎓"},
  {id:"h3",text:"Practice explaining one concept out loud",icon:"🎤"},
];
const PHASES=[
  {days:[1,5],title:"Infrastructure & Lab Foundation",icon:"🔧",color:"#06B6D4"},
  {days:[6,30],title:"Device Mgmt & Endpoint Security (MD-102)",icon:"📱",color:"#8B5CF6"},
  {days:[31,50],title:"Identity, Access & Zero Trust (SC-300)",icon:"🛡️",color:"#10B981"},
  {days:[51,60],title:"Enterprise Scenarios & Interview Prep",icon:"🎯",color:"#F59E0B"},
];
const DAYS=[
  // ═══ PHASE 1: INFRASTRUCTURE (Days 1-5) ═══
  {day:1,label:"Provision Your Tenant",tasks:[
    {id:"d1t1",text:"Sign up for Microsoft 365 Business Premium 30-day free trial",cat:"infra",steps:[
      "Go to microsoft.com/en-us/microsoft-365/business/microsoft-365-business-premium — click 'Try free for 1 month'",
      "Use a PERSONAL email (Gmail, Outlook.com) to sign up — this bypasses any restrictions from using a work/school account",
      "When prompted, create your .onmicrosoft.com domain (e.g., smokkelabs.onmicrosoft.com)",
      "Create your Global Admin account — write down the username and password in a password manager immediately",
      "Complete the setup wizard — skip adding other users for now, skip domain verification",
      "Business Premium includes: Entra ID P1, Intune, Defender for Business, Autopilot — everything you need"
    ]},
    {id:"d1t2",text:"Log into all admin portals and bookmark them",cat:"infra",steps:[
      "Open an Incognito/InPrivate window — always use this for your lab tenant to keep it separate from personal accounts",
      "admin.microsoft.com — M365 Admin Center (users, licenses, billing)",
      "entra.microsoft.com — Entra ID (identity, groups, CA policies, app registrations, PIM)",
      "intune.microsoft.com — Intune (device management, compliance, apps, Autopilot)",
      "security.microsoft.com — Microsoft Defender (security alerts, incidents, Secure Score)",
      "Bookmark all four. Spend 10 minutes clicking through the left nav of each portal to get oriented"
    ]},
    {id:"d1t3",text:"Purchase MD-102 and SC-300 Udemy courses",cat:"study",steps:[
      "Go to udemy.com — search for 'MD-102 Endpoint Administrator' — pick the highest-rated, most recent course (look for 2025/2026 updated versions)",
      "Search for 'SC-300 Identity and Access Administrator' — same criteria",
      "Udemy courses regularly go on sale for $10-15. If they're full price, wait a day — Udemy cycles sales constantly, or use an incognito window to see the 'new user' price",
      "These are your primary curriculum. MS Learn is backup/supplemental, not the main driver",
      "Expense both through your LLC — they're legitimate business education expenses for Schedule C"
    ]},
  ]},
  {day:2,label:"Build Your VM Lab",tasks:[
    {id:"d2t1",text:"Install hypervisor on MacBook Pro (UTM, VMware Fusion, or Parallels)",cat:"infra",steps:[
      "OPTION A — UTM (free, open source): Download from mac.getutm.app. Best if you want $0 cost. Works on both Intel and Apple Silicon Macs",
      "OPTION B — VMware Fusion (free personal license): Download from vmware.com. More polished, better performance on Intel Macs",
      "OPTION C — Parallels (paid, ~$100/year): Best performance on Apple Silicon Macs, but costs money. Skip unless you already have it",
      "For Apple Silicon Macs (M1/M2/M3): UTM is your best free option. You'll need the Windows 11 ARM ISO",
      "For Intel Macs: VMware Fusion is the most stable free option. Use the standard Windows 11 x64 ISO"
    ]},
    {id:"d2t2",text:"Download Windows 11 ISO and create the VM",cat:"infra",steps:[
      "Go to microsoft.com/en-us/software-download/windows11 — download the ISO",
      "For ARM Macs: download the Windows 11 ARM Insider Preview ISO from uupdump.net or Microsoft's Insider page",
      "Create a new VM in your hypervisor: allocate 4GB+ RAM, 60GB+ disk, 2+ CPU cores",
      "Install Windows 11 — when it asks for a product key, click 'I don't have a product key' — it will install as unactivated, which is fine for lab use",
      "Complete the Windows setup — use a LOCAL account during OOBE (not a Microsoft account). Click 'Sign-in options' → 'Offline account' → 'Limited experience'",
      "This VM is your 'dummy corporate endpoint' — you'll be enrolling it in Intune, joining it to Entra, wiping it with Autopilot, and testing every policy against it"
    ]},
    {id:"d2t3",text:"Take a VM snapshot — this is your clean baseline",cat:"infra",steps:[
      "In your hypervisor, create a snapshot of the VM RIGHT NOW before making any changes",
      "Name it 'Clean Windows 11 - Pre-Enrollment'",
      "You'll revert to this snapshot multiple times throughout the sprint when you need a fresh device to test enrollment flows, Autopilot, or wipe-and-reprovision scenarios",
      "This saves you hours vs reinstalling Windows 11 from scratch each time"
    ]},
  ]},
  {day:3,label:"Populate Your Directory",tasks:[
    {id:"d3t1",text:"Write PowerShell script to create 15-25 dummy users in Entra ID",cat:"lab",steps:[
      "Open PowerShell on your Mac (or inside the VM) — install the Microsoft.Graph module:",
      "Install-Module Microsoft.Graph -Scope CurrentUser",
      "Connect-MgGraph -Scopes 'User.ReadWrite.All' -TenantId 'YOUR-TENANT-ID'",
      "Create a CSV file (users.csv) with columns: DisplayName, UPN, Department, JobTitle, Password",
      "Include users across departments: IT (5), Legal (5), Sales (5), Marketing (3), Executives (2)",
      "Write the script:",
      "$users = Import-Csv './users.csv'",
      "foreach ($u in $users) {",
      "  New-MgUser -DisplayName $u.DisplayName -UserPrincipalName $u.UPN -Department $u.Department -JobTitle $u.JobTitle -MailNickname ($u.UPN.Split('@')[0]) -AccountEnabled -PasswordProfile @{Password=$u.Password; ForceChangePasswordNextSignIn=$false} -UsageLocation 'US'",
      "}",
      "Run it → verify at entra.microsoft.com → Users that all accounts appear",
      "Assign each user a Business Premium license: Get-MgSubscribedSku to find your SKU ID, then Set-MgUserLicense for each user"
    ]},
    {id:"d3t2",text:"Create security groups and dynamic groups",cat:"lab",steps:[
      "Create ASSIGNED groups via PowerShell or portal:",
      "SG-IT-Staff, SG-Legal-Team, SG-Sales-Team, SG-Executives, SG-AllEmployees",
      "Add appropriate users to each group",
      "Create one DYNAMIC group to test the concept:",
      "Name: DG-Marketing-Auto | Rule: user.department -eq 'Marketing'",
      "Wait 5-15 min for dynamic membership to evaluate",
      "Create a DEVICE group (you'll use this later for Intune policies):",
      "Name: SG-Managed-Devices | Type: Security | Membership: Assigned (you'll add devices after enrollment)"
    ]},
    {id:"d3t3",text:"Begin MD-102 course — Section 1 (Endpoint Management overview)",cat:"study",steps:[
      "Start your Udemy MD-102 course — watch Section 1 (typically covers what Intune does, co-management with SCCM, cloud-native vs hybrid management)",
      "Take notes on key concepts: MDM vs MAM, enrollment types, Intune service architecture",
      "Don't just watch — pause and look at your actual Intune portal (intune.microsoft.com) as each concept is discussed"
    ]},
  ]},
  {day:4,label:"Directory Deep-Dive + Course",tasks:[
    {id:"d4t1",text:"Create Administrative Units and test delegated administration",cat:"lab",steps:[
      "Go to entra.microsoft.com → Roles & admins → Admin units → '+ Add'",
      "Create 'Legal Department AU' — add all Legal department users as members",
      "Assign one of your IT users as 'User Administrator' scoped to only this AU",
      "Test: log in as that IT user → they should be able to manage Legal users but NOT Sales or Marketing users",
      "This is scoped delegation — critical for enterprise environments and a favorite interview topic"
    ]},
    {id:"d4t2",text:"Register a test app in Entra + understand app permissions",cat:"lab",steps:[
      "Go to entra.microsoft.com → Applications → App registrations → '+ New registration'",
      "Name: 'Lab SaaS App' | Supported accounts: 'This org only'",
      "After registration: note the Application (client) ID and Directory (tenant) ID",
      "Go to 'API permissions' → '+ Add permission' → 'Microsoft Graph' → add: User.Read, User.ReadWrite.All (delegated), and Directory.Read.All (application)",
      "Go to 'Certificates & secrets' → create a client secret → COPY IT NOW (you can never see it again)",
      "This is the foundation of every SaaS app integration — understanding client IDs, secrets, and permission scopes"
    ]},
    {id:"d4t3",text:"MD-102 course — Section 2 (Device enrollment methods)",cat:"study",steps:[
      "Continue your Udemy MD-102 course — enrollment methods section",
      "Key enrollment types to understand: Automatic enrollment (for corporate devices), User-driven (BYOD), Autopilot (zero-touch), Bulk enrollment (provisioning packages)",
      "As you watch, go to intune.microsoft.com → Devices → Enrollment and find each option mentioned in the course"
    ]},
  ]},
  {day:5,label:"First Enrollment + Course",tasks:[
    {id:"d5t1",text:"Entra Join your Windows 11 VM to your tenant",cat:"lab",steps:[
      "In your Windows 11 VM → Settings → Accounts → Access work or school → '+ Connect'",
      "Click 'Join this device to Microsoft Entra ID' (NOT 'Connect' — that's a different flow)",
      "Sign in with one of your test user accounts (e.g., it.admin@yourdomain.onmicrosoft.com)",
      "Accept the prompts → the VM is now Entra Joined",
      "Verify: go to entra.microsoft.com → Devices → you should see the VM listed as a 'Microsoft Entra joined' device",
      "Also check intune.microsoft.com → Devices → the VM should appear as enrolled (if automatic MDM enrollment is enabled, which it is by default in Business Premium)",
      "TAKE A SECOND SNAPSHOT: name it 'Entra Joined + Enrolled — Baseline'"
    ]},
    {id:"d5t2",text:"Verify Intune enrollment and explore device details",cat:"lab",steps:[
      "Go to intune.microsoft.com → Devices → find your VM → click on it",
      "Explore all tabs: Overview (compliance status, last check-in), Properties (OS version, serial, manufacturer), Hardware, Detected apps",
      "Try a remote action: click 'Sync' to force a policy refresh",
      "Note: your VM is now a managed device. Every compliance policy, configuration profile, and app deployment you create from Day 6 onwards will target this device"
    ]},
    {id:"d5t3",text:"MD-102 course — Section 3 (Entra Join vs Hybrid Join)",cat:"study",steps:[
      "Continue the MD-102 course — Entra Join vs Hybrid Entra Join section",
      "Entra Joined: device only talks to the cloud. No on-prem AD needed. Best for cloud-native orgs",
      "Hybrid Entra Joined: device is joined to BOTH on-prem AD and Entra ID. For orgs still running on-prem AD DS",
      "Your lab is cloud-native (Entra Joined). Know both concepts for interviews — many orgs are migrating from hybrid to cloud-native"
    ]},
  ]},

  // ═══ PHASE 2: DEVICE MANAGEMENT & ENDPOINT SECURITY — MD-102 (Days 6-30) ═══
  {day:6,label:"Compliance Policies",tasks:[
    {id:"d6t1",text:"Build your first compliance policy: require BitLocker, min OS, passwords",cat:"lab",steps:[
      "Go to intune.microsoft.com → Devices → Compliance → '+ Create policy' → Windows 10 and later",
      "Name: 'COMP-Win-Standard'",
      "Device Health: Require BitLocker: Yes | Require Secure Boot: Yes",
      "Device Properties: Minimum OS version: set to your VM's current version (check Settings → System → About)",
      "System Security: Require password: Yes | Min length: 8 | Password type: Alphanumeric",
      "Actions for noncompliance: Mark device noncompliant: immediately (0 days) | Send email: after 1 day",
      "Assign to: SG-Managed-Devices or All devices",
      "Wait 15-30 min → check your VM's compliance status in Intune. It may show noncompliant if BitLocker isn't on yet — that's expected and a learning moment"
    ]},
    {id:"d6t2",text:"Fix compliance — enable BitLocker on the VM",cat:"lab",steps:[
      "If your VM shows noncompliant due to BitLocker: in the VM, open Control Panel → BitLocker Drive Encryption → Turn on BitLocker",
      "Note: BitLocker on a VM may require specific hypervisor settings (TPM passthrough). If it won't enable, remove the BitLocker requirement from the policy and use a different compliance check — this is a real-world troubleshooting scenario",
      "Force a sync: on the VM, Settings → Accounts → Access work or school → click your connected account → Info → Sync",
      "Check Intune again after 15 min — device should now show 'Compliant'"
    ]},
    {id:"d6t3",text:"MD-102 course — Compliance policies section",cat:"study",steps:["Watch the compliance policies section of your MD-102 course","Key concepts: compliance vs configuration (compliance = evaluation, configuration = enforcement), noncompliance actions, grace periods","Understand: compliance status feeds into Conditional Access — a noncompliant device can be BLOCKED from accessing M365 resources"]}
  ]},
  {day:7,label:"Configuration Profiles — Settings Catalog",tasks:[
    {id:"d7t1",text:"Build a configuration profile using Settings Catalog",cat:"lab",steps:[
      "Go to intune.microsoft.com → Devices → Configuration → '+ Create' → Windows 10+ → Settings catalog",
      "Name: 'CFG-Security-Baseline'",
      "Click '+ Add settings' and configure these:",
      "• Search 'Control Panel' → Administrative Templates > Control Panel: Prohibit access to Control Panel and PC Settings → Enabled (blocks regular users from changing settings)",
      "• Search 'Camera' → Camera > Allow Camera → Block (disables webcam — common in secure environments)",
      "• Search 'USB' → System > Removable Storage Access > Removable Disk Deny Write Access → Enabled (blocks USB write — prevents data exfiltration)",
      "Assign to: All devices or SG-Managed-Devices",
      "Force sync on VM → verify: try opening Control Panel — it should be blocked. Try writing to a USB — blocked",
      "Settings Catalog is the MODERN approach Microsoft recommends over legacy Templates"
    ]},
    {id:"d7t2",text:"Build a second profile: lock screen + wallpaper",cat:"lab",steps:[
      "Create another Settings catalog profile: 'CFG-Branding'",
      "Search 'Lock screen' → Personalization > Lock Screen Image URL → set a URL to any image (corporate branding scenario)",
      "Search 'Desktop wallpaper' → set a custom wallpaper URL",
      "These seem cosmetic but demonstrate centralized device management — interviewers often ask 'how do you push settings to devices without touching them?'"
    ]},
    {id:"d7t3",text:"MD-102 course — Configuration profiles section",cat:"study",steps:["Watch the configuration profiles section","Understand: Settings Catalog vs Templates vs ADMX Import","Templates: legacy, pre-grouped (Device Restrictions, Wi-Fi, VPN, etc.)","ADMX: for migrating GPO settings — upload .admx files, apply through Intune","Settings Catalog: modern, granular, searchable — Microsoft's recommended path forward"]}
  ]},
  {day:8,label:"App Deployment",tasks:[
    {id:"d8t1",text:"Deploy Microsoft 365 Apps to your VM via Intune",cat:"lab",steps:[
      "Go to intune.microsoft.com → Apps → All apps → '+ Add' → App type: 'Microsoft 365 Apps (Windows 10 and later)'",
      "App suite: select Word, Excel, PowerPoint, Outlook, Teams",
      "Update channel: Monthly Enterprise Channel (standard for most orgs)",
      "Assignment: Required → assign to All devices",
      "Force sync on VM → the M365 apps will install silently in the background. This can take 20-40 minutes",
      "When done, open Word or Outlook on the VM to verify the install"
    ]},
    {id:"d8t2",text:"Deploy a Win32 app (learn the .intunewin packaging process)",cat:"lab",steps:[
      "Download the Microsoft Win32 Content Prep Tool from GitHub (search 'IntuneWinAppUtil')",
      "Pick any free small app — 7-Zip, Notepad++, or VLC",
      "Download the installer (.msi or .exe) → run IntuneWinAppUtil.exe → select the installer → it creates a .intunewin file",
      "In Intune: Apps → '+ Add' → 'Windows app (Win32)' → upload the .intunewin file",
      "Set: Install command (e.g., 'msiexec /i 7z.msi /quiet'), detection rule (file exists or registry key), requirements (min OS)",
      "Assign as Required → force sync → verify the app installs silently on the VM",
      "Win32 app deployment is a common interview topic — knowing the packaging and detection process is important"
    ]},
    {id:"d8t3",text:"MD-102 course — App management section",cat:"study",steps:["Watch the app management/deployment section","Types: Store apps, M365 Apps suite, Win32 apps, LOB apps, web links","Assignment types: Required (auto-install), Available (user chooses in Company Portal), Uninstall","App protection policies (MAM) — coming in a few days"]}
  ]},
  {day:9,label:"Windows Update Management",tasks:[
    {id:"d9t1",text:"Configure a Windows Update Ring",cat:"lab",steps:[
      "Go to intune.microsoft.com → Devices → Windows → Update rings → '+ Create'",
      "Name: 'Update-Ring-Standard'",
      "Quality update deferral: 7 days (security/monthly updates delayed 7 days — lets early adopters catch bugs)",
      "Feature update deferral: 30 days (major Windows updates delayed 30 days)",
      "Automatic update behavior: Auto install at maintenance time",
      "Active hours: 8 AM - 6 PM (no forced restarts during work hours)",
      "Delivery optimization: HTTP blended with Internet and peering (reduces bandwidth)",
      "Assign to: All devices"
    ]},
    {id:"d9t2",text:"Configure a Feature Update policy to pin a Windows version",cat:"lab",steps:[
      "Go to Update rings page → 'Feature updates' tab → '+ Create'",
      "Select a specific Windows 11 version to deploy/pin (e.g., 24H2)",
      "This CONTROLS which major Windows version your fleet runs — critical for enterprise stability",
      "Assign to: All devices"
    ]},
    {id:"d9t3",text:"MD-102 course — Windows updates + delivery optimization",cat:"study",steps:["Watch the update management section","Key concepts: Update Rings, Feature Update policies, Expedited updates (emergency patches), Delivery Optimization (peer-to-peer updates)","Understand WHY you defer updates: test compatibility, prevent broken installs hitting your whole fleet at once"]}
  ]},
  {day:10,label:"App Protection (MAM/BYOD)",tasks:[
    {id:"d10t1",text:"Create an App Protection Policy for iOS/Android",cat:"lab",steps:[
      "Go to intune.microsoft.com → Apps → App protection policies → '+ Create' → iOS/iPadOS (or Android)",
      "Name: 'MAM-BYOD-Protection'",
      "Target: All Microsoft Apps (Outlook, Teams, OneDrive, etc.)",
      "Data protection: Send org data to other apps → Policy managed apps only | Save copies → Block | Cut/copy/paste → Policy managed apps with paste in",
      "Access requirements: PIN for access → Yes | Type: Numeric | Min length: 6",
      "Conditional launch: Jailbroken/rooted → Block access | Min OS version → set to recent",
      "Assign to: All users",
      "This is MAM WITHOUT enrollment — personal devices are untouched but corporate data inside managed apps is encrypted and controlled"
    ]},
    {id:"d10t2",text:"Understand MDM vs MAM and when to use each",cat:"study",steps:[
      "MDM (Mobile Device Management): full device control. You manage the DEVICE. For corporate-owned hardware",
      "MAM (Mobile App Management): app-level control only. You manage APPS, not the device. For BYOD/personal devices",
      "The split: corporate laptops → MDM (compliance + configuration + apps). Personal phones → MAM only (app protection, no full enrollment)",
      "This is THE most common interview question for endpoint management roles. Practice explaining it out loud"
    ]},
    {id:"d10t3",text:"MD-102 course — MAM and app protection policies",cat:"study",steps:["Watch the MAM/app protection section","Focus on: data protection settings, conditional launch rules, PIN vs biometric requirements","Understand the user experience: user installs Outlook → signs in → gets prompted to set a managed app PIN → corporate data is now contained"]}
  ]},
  {day:11,label:"Windows Autopilot — Setup",tasks:[
    {id:"d11t1",text:"Register your VM for Windows Autopilot",cat:"lab",steps:[
      "In your Windows 11 VM, open PowerShell as Administrator and run:",
      "Install-Script -Name Get-WindowsAutopilotInfo",
      "Get-WindowsAutopilotInfo -Online",
      "This collects the VM's hardware hash and uploads it directly to your Intune tenant",
      "Sign in with your Global Admin when prompted",
      "Go to intune.microsoft.com → Devices → Enrollment → Windows → Devices (under Autopilot) — your VM should appear after a few minutes",
      "If it doesn't show up: try the manual method — run Get-WindowsAutopilotInfo -OutputFile autopilot.csv → then import the CSV via the portal"
    ]},
    {id:"d11t2",text:"Create an Autopilot deployment profile (User-Driven)",cat:"lab",steps:[
      "Go to intune.microsoft.com → Devices → Enrollment → Windows → Deployment profiles → '+ Create profile' → Windows PC",
      "Name: 'AP-Standard-UserDriven'",
      "Deployment mode: User-driven | Join type: Microsoft Entra joined",
      "OOBE settings: Hide privacy settings → Yes | Hide EULA → Yes | Hide change account options → Yes | User account type → Standard (NOT admin)",
      "Apply device name template: e.g., 'LAB-%SERIAL%' (auto-names devices)",
      "Assign to: All devices (or a group containing your Autopilot devices)"
    ]},
    {id:"d11t3",text:"MD-102 course — Autopilot section",cat:"study",steps:["Watch the Windows Autopilot section carefully — this is a major exam topic and interview favorite","Deployment modes: User-driven (user signs in during OOBE), Self-deploying (no user interaction, for kiosks/shared devices), Pre-provisioned (White Glove — IT or vendor pre-stages, user finishes)","Know the whole flow: OEM/IT registers hardware hash → device connects to internet during OOBE → downloads Autopilot profile → applies Entra join + Intune enrollment + policies + apps → user is productive"]}
  ]},
  {day:12,label:"Autopilot — The Wipe & Reprovision Test",tasks:[
    {id:"d12t1",text:"Configure Enrollment Status Page (ESP)",cat:"lab",steps:[
      "Go to intune.microsoft.com → Devices → Enrollment → Windows → Enrollment Status Page",
      "Edit the default profile or create a new one:",
      "Show app and profile configuration progress: Yes",
      "Block device use until all required apps and profiles are installed: Yes",
      "Allow users to reset device if installation error occurs: Yes",
      "Show error when installation exceeds 60 minutes",
      "ESP prevents users from using the device before Intune finishes configuring it — closing the security gap between enrollment and policy application"
    ]},
    {id:"d12t2",text:"MILESTONE: Wipe the VM and reprovision via Autopilot",cat:"lab",steps:[
      "THIS IS THE BIG TEST. From Intune: Devices → find your VM → click 'Wipe' (or 'Fresh Start')",
      "Alternatively: revert the VM to your 'Clean Windows 11 - Pre-Enrollment' snapshot",
      "Boot the VM → connect to internet → it should AUTOMATICALLY detect the Autopilot profile",
      "The OOBE will show your org's branding, skip the privacy screens, and prompt the user to sign in",
      "After sign-in, the ESP shows → apps and policies install automatically → device is fully configured without you touching it",
      "If this works: congratulations — you've just demonstrated zero-touch provisioning. This is resume gold",
      "If it doesn't: troubleshoot — check Autopilot device registration, profile assignment, ESP settings. Troubleshooting is equally valuable learning",
      "TAKE NOTES on every step and outcome — you'll write this up as a case study in Phase 4"
    ]},
    {id:"d12t3",text:"Document the Autopilot experience",cat:"review",steps:["Write up what happened: what worked, what didn't, how long it took, what appeared on the ESP","Screenshot each stage if possible — these go into your portfolio and interview answers","Frame it: 'I designed and tested a zero-touch Autopilot deployment that enrolled, configured, and delivered a compliant device with no manual IT intervention'"]}
  ]},
  {day:13,label:"Endpoint Security Policies",tasks:[
    {id:"d13t1",text:"Configure Endpoint Security — Antivirus policy",cat:"lab",steps:[
      "Go to intune.microsoft.com → Endpoint security → Antivirus → '+ Create policy'",
      "Platform: Windows 10+, Profile: Microsoft Defender Antivirus",
      "Cloud-delivered protection level: High | Real-time protection: Enable | Network protection: Enable in block mode",
      "Assign to: All devices",
      "This is SEPARATE from configuration profiles — Endpoint Security policies are specifically for security settings and are managed by security teams in larger orgs"
    ]},
    {id:"d13t2",text:"Configure Endpoint Security — Firewall policy",cat:"lab",steps:[
      "Endpoint security → Firewall → '+ Create policy'",
      "Platform: Windows 10+ | Profile: Microsoft Defender Firewall",
      "Enable Firewall for Domain, Private, and Public profiles",
      "Block all inbound connections: No (too restrictive for lab) but understand when you'd use this",
      "Assign to: All devices"
    ]},
    {id:"d13t3",text:"MD-102 course — Endpoint security and Defender",cat:"study",steps:["Watch the endpoint security section","Covers: Defender Antivirus, Defender Firewall, Attack Surface Reduction (ASR) rules, Endpoint Detection and Response (EDR)","Key concept: ASR rules — these block specific attack techniques (e.g., block Office macros from creating child processes, block credential stealing from LSASS). Know 3-4 ASR rules by name for interviews"]}
  ]},
  {day:14,label:"Proactive Remediations + Review",tasks:[
    {id:"d14t1",text:"Create a Proactive Remediation script pair",cat:"lab",steps:[
      "Go to intune.microsoft.com → Devices → Remediations → '+ Create script package'",
      "Detection script (PowerShell): checks if a condition exists. Example — detect if temp folder is over 1GB:",
      "$tempSize = (Get-ChildItem $env:TEMP -Recurse -ErrorAction SilentlyContinue | Measure-Object Length -Sum).Sum / 1GB",
      "if ($tempSize -gt 1) { Write-Output 'Temp folder exceeds 1GB'; exit 1 } else { exit 0 }",
      "Remediation script: fixes the issue if detection fails:",
      "Remove-Item $env:TEMP\\* -Recurse -Force -ErrorAction SilentlyContinue",
      "Set schedule: run daily | Assign to: All devices",
      "Proactive remediations fix issues BEFORE users report them — this is proactive vs reactive, which is the whole theme of your career transition"
    ]},
    {id:"d14t2",text:"Week 2 review — can you explain compliance, config, apps, Autopilot?",cat:"review",steps:["Quiz yourself out loud on these:","1. What's the difference between a compliance policy and a configuration profile?","2. How does Autopilot work end-to-end?","3. What's the difference between MDM and MAM?","4. How do you deploy a Win32 app via Intune?","5. What is a proactive remediation?","If you stumble on any answer, go back to that section of the course and your lab"]}
  ]},
  // Days 15-30: Continue MD-102 deep-dive
  {day:15,label:"Device Groups & Targeting",tasks:[
    {id:"d15t1",text:"Create dynamic device groups for policy targeting",cat:"lab",steps:["Go to entra.microsoft.com → Groups → New group → Security → Dynamic Device","Name: 'DG-Windows-Devices' | Rule: device.deviceOSType -eq 'Windows'","Create another: 'DG-Autopilot-Devices' | Rule: device.devicePhysicalIds -any _ -startsWith '[OrderID]:'","Retarget your compliance and configuration policies to use these dynamic groups instead of 'All devices'","This is how real enterprises target policies — by device type, enrollment method, or department"]},
    {id:"d15t2",text:"MD-102 course — device grouping and assignment filters",cat:"study",steps:["Watch the section on device groups, assignment filters, and scope tags","Assignment filters: refine who gets a policy WITHIN an assigned group (e.g., assign to All Devices but filter to only Windows 11 24H2)","Scope tags: delegate admin visibility — IT admins see only devices/policies tagged for their region"]}
  ]},
  {day:16,label:"PowerShell + Graph API for Intune",tasks:[
    {id:"d16t1",text:"Write PowerShell scripts to query Intune device data via Graph",cat:"lab",steps:["Connect-MgGraph -Scopes 'DeviceManagementManagedDevices.Read.All'","Get-MgDeviceManagementManagedDevice | Select DeviceName, ComplianceState, OperatingSystem, LastSyncDateTime | Format-Table","Export to CSV: | Export-Csv './device-report.csv' -NoTypeInformation","This is your automation skill — pulling compliance reports on demand instead of clicking through the portal"]},
    {id:"d16t2",text:"Write a script to export all compliance and config policies to JSON",cat:"lab",steps:["Connect-MgGraph -Scopes 'DeviceManagementConfiguration.Read.All'","Get-MgDeviceManagementDeviceCompliancePolicy | ConvertTo-Json -Depth 10 | Out-File './compliance-policies.json'","Get-MgDeviceManagementDeviceConfiguration | ConvertTo-Json -Depth 10 | Out-File './config-profiles.json'","These JSON exports = documentation and change tracking. In interviews: 'I script policy exports for version control and audit trails'"]},
    {id:"d16t3",text:"MD-102 course — scripting and automation section",cat:"study",steps:["Watch any PowerShell/Graph API sections in the course","Focus on: how to use Graph Explorer (developer.microsoft.com/graph/graph-explorer) to test API calls before scripting them"]}
  ]},
  {day:17,label:"Defender for Business",tasks:[
    {id:"d17t1",text:"Explore Defender for Business in your tenant",cat:"lab",steps:["Go to security.microsoft.com → sign in with your tenant admin","Explore: Incidents & alerts, Device inventory, Secure Score","Click on Secure Score → review the recommended actions — each one improves your tenant's security posture","In Device inventory → find your VM → review its security status, any alerts, installed security software"]},
    {id:"d17t2",text:"Configure Attack Surface Reduction (ASR) rules",cat:"lab",steps:["Go to intune.microsoft.com → Endpoint security → Attack surface reduction → '+ Create policy'","Platform: Windows 10+ | Profile: Attack Surface Reduction Rules","Enable these rules in AUDIT mode first (not Block — you want to see what would be blocked before enforcing):","• Block executable content from email client and webmail","• Block Office applications from creating child processes","• Block credential stealing from Windows LSASS","Assign to: All devices | Change to Block mode after 1 week of audit data"]},
    {id:"d17t3",text:"MD-102 course — security baselines and ASR",cat:"study",steps:["Watch the Defender / security baselines section","Security baselines: pre-configured sets of security settings Microsoft recommends — you can deploy them as-is or customize","ASR rules: block specific attack techniques before they execute — memorize 3-4 rule names for interviews"]}
  ]},
  {day:18,label:"BitLocker + Disk Encryption",tasks:[
    {id:"d18t1",text:"Configure BitLocker encryption policy through Intune",cat:"lab",steps:["Go to intune.microsoft.com → Endpoint security → Disk encryption → '+ Create policy'","Platform: Windows 10+ | Profile: BitLocker","Require device encryption: Yes | Encryption method: XTS-AES 256-bit","Recovery key rotation: Enable for both Entra joined and hybrid devices","Silent encryption: Enable (encrypts without user interaction)","Assign to: All devices","BitLocker recovery keys are escrowed to Entra ID — you can view them at entra.microsoft.com → Devices → device → BitLocker keys"]},
    {id:"d18t2",text:"Verify BitLocker key escrow in Entra",cat:"lab",steps:["After BitLocker enables on the VM: go to entra.microsoft.com → Devices → find your VM → 'BitLocker keys'","You should see the recovery key stored there — this is how helpdesk retrieves keys when users get locked out","Also check: intune.microsoft.com → Devices → your VM → Recovery keys tab"]},
    {id:"d18t3",text:"MD-102 course — disk encryption and BitLocker",cat:"study",steps:["Watch the BitLocker management section","Key concepts: silent encryption, recovery key escrow to Entra, BitLocker compliance requirements, key rotation","Know: how to retrieve a recovery key (Entra portal or Intune) — this is a common helpdesk scenario"]}
  ]},
  {day:19,label:"Endpoint Analytics",tasks:[
    {id:"d19t1",text:"Enable and explore Endpoint Analytics",cat:"lab",steps:["Go to intune.microsoft.com → Reports → Endpoint Analytics → Settings → enable for your tenant","After data collection (may take 24-48 hours): review Startup performance scores, Application reliability, Work from anywhere score","Even with one device, understand what each metric measures and why it matters","Endpoint Analytics = proactive monitoring. You identify slow devices BEFORE users complain"]},
    {id:"d19t2",text:"MD-102 course — monitoring, reporting, and analytics",cat:"study",steps:["Watch the reporting and analytics section","Covers: Intune reports, Endpoint Analytics, Log Analytics integration","Focus on: what reports you'd run regularly as an admin (compliance status, failed deployments, noncompliant devices)"]}
  ]},
  {day:20,label:"Review & Practice — Halfway Through Phase 2",tasks:[
    {id:"d20t1",text:"Review all Intune policies and document them",cat:"review",steps:["Go through every policy you've created: compliance, configuration profiles, app deployments, update rings, endpoint security, ASR, BitLocker","Write a one-line summary of each: what it does, why, who/what it targets","This becomes your 'policy portfolio' — reference it during interviews when asked 'give me an example of a policy you built'"]},
    {id:"d20t2",text:"Practice the Autopilot demo explanation",cat:"interview",steps:["Practice saying out loud (2-3 min):","'I built a zero-touch provisioning workflow using Windows Autopilot. I registered the device hash in Intune, created a User-Driven deployment profile with custom OOBE branding, configured the Enrollment Status Page to block access until all required apps and compliance policies were applied, then wiped the device and let Autopilot fully provision it without any manual IT intervention. The device was Entra Joined, Intune enrolled, compliant with BitLocker and password policies, and had M365 apps installed — all automatically.'","This is your strongest interview answer right now. Polish it."]}
  ]},
  // Days 21-30: Continue MD-102, deeper Intune topics
  {day:21,label:"RBAC in Intune",tasks:[
    {id:"d21t1",text:"Configure role-based access control in Intune",cat:"lab",steps:["Go to intune.microsoft.com → Tenant administration → Roles","Review built-in roles: Intune Administrator, Helpdesk Operator, Application Manager, Endpoint Security Manager, Read Only Operator","Create a custom role: '+ Create' → Name: 'Tier-1 Support' → Permissions: Read devices, sync devices, remote lock, reset passcode (but NOT wipe, retire, or delete)","Assign the role to your SG-IT-Staff group → scope to All devices","Test: log in as one of the IT staff users → they should see devices but be limited in what actions they can take","RBAC = least privilege. Helpdesk can lock/sync devices but can't wipe them. Senior admins can do everything. This is enterprise-standard security"]},
    {id:"d21t2",text:"MD-102 course — RBAC and tenant administration",cat:"study",steps:["Watch the RBAC and delegation section","Understand the hierarchy: Built-in roles → Custom roles → Scope groups (which admins) → Scope tags (which devices/users they can manage)"]}
  ]},
  {day:22,label:"Device Actions & Remote Management",tasks:[
    {id:"d22t1",text:"Test all remote device actions on your VM",cat:"lab",steps:["In Intune → Devices → your VM → try each action:","• Sync — forces immediate policy check-in","• Restart — schedules a remote restart","• Fresh Start — removes pre-installed bloatware (keeps user data, removes apps not from Intune)","• Autopilot Reset — wipes and reprovisions using Autopilot (keeps Entra join)","• Wipe — full device wipe (nuclear option)","• Retire — removes corporate data but leaves personal files","Know when to use each: Wipe for decommissioning/lost device, Retire for BYOD leaving company, Fresh Start for cleaning up a device, Autopilot Reset for reprovisioning","After testing a wipe or reset, revert to your snapshot to continue working"]},
    {id:"d22t2",text:"MD-102 course — device lifecycle and remote actions",cat:"study",steps:["Watch the device lifecycle section","Covers: enrollment → compliance → management → retirement","Focus on: the decision tree for which wipe action to use in which scenario — interviewers love asking this"]}
  ]},
  {day:23,label:"Windows 365 / Virtual Desktops Concepts",tasks:[
    {id:"d23t1",text:"Study: Windows 365 Cloud PC and Azure Virtual Desktop concepts",cat:"study",steps:["You don't need to deploy these (they cost $$$) but you NEED to know what they are for interviews","Windows 365: cloud-hosted Windows desktops managed through Intune. Each user gets a persistent Cloud PC. Good for remote workers, contractors, BYOD","Azure Virtual Desktop (AVD): more customizable, multi-session Windows, better for call centers and shared workstations","Know the positioning: Windows 365 = simple/per-user | AVD = complex/per-session | Citrix/VMware Horizon = third-party alternatives","Your Carnival Cruise + Quarles experience with Citrix gives you context here — you can compare"]},
    {id:"d23t2",text:"MD-102 course — cloud desktops and VDI section",cat:"study",steps:["Watch the Windows 365 / AVD section if your course covers it","Focus on: when to recommend cloud PC vs traditional endpoint vs VDI"]}
  ]},
  {day:24,label:"Co-Management & Hybrid Scenarios",tasks:[
    {id:"d24t1",text:"Study: SCCM/MECM co-management with Intune",cat:"study",steps:["Co-management: devices managed by BOTH SCCM (on-prem) and Intune (cloud) simultaneously","Workloads can be shifted one at a time: compliance policies → Intune, app deployment → still SCCM, OS updates → Intune","This is how most large enterprises are MIGRATING from SCCM to Intune — not a hard cutover","Since you have SCCM experience at Quarles, you can speak to this directly in interviews: 'I understand the co-management migration path because I've worked with SCCM in production'"]},
    {id:"d24t2",text:"MD-102 course — co-management and SCCM migration",cat:"study",steps:["Watch the co-management section","Key concept: co-management authority slider — each workload has a toggle between SCCM and Intune","Understand: this is a TRANSITION strategy, not a permanent state. The goal is eventually full cloud-native management via Intune"]}
  ]},
  {day:25,label:"Applied Skills: Intune Credential",tasks:[
    {id:"d25t1",text:"Take Applied Skills: 'Deploy and manage devices with Microsoft Intune'",cat:"cert",steps:["Go to learn.microsoft.com/en-us/credentials/applied-skills/deploy-and-manage-devices-by-using-microsoft-intune/","This is a FREE lab-based assessment — no multiple choice, you DO the work in a live environment","You've been doing all of this for 3 weeks — compliance policies, config profiles, app deployment, Autopilot","Click Start → complete the 12-16 tasks → Submit → pass/fail in 60 seconds","If you pass: add to LinkedIn immediately (it's a verified Microsoft credential)"]},
    {id:"d25t2",text:"If passed, add to LinkedIn and resume",cat:"career",steps:["Microsoft Learn profile → Credentials → Share → copy the URL","LinkedIn → Add certification → paste URL → issuer: Microsoft","Update your resume DOCX with the credential","This is proof you can do the work, not just talk about it"]}
  ]},
  {day:26,label:"MD-102 Course Completion Push",tasks:[
    {id:"d26t1",text:"Complete remaining MD-102 course sections",cat:"study",steps:["Watch any remaining sections of your Udemy MD-102 course","Focus on any topics not yet covered: Windows Hello for Business, certificate deployment, VPN profiles, Wi-Fi profiles","Take notes on anything that didn't come up in your hands-on labs"]},
    {id:"d26t2",text:"Run the MD-102 practice assessment on MS Learn",cat:"cert",steps:["Go to learn.microsoft.com → search 'MD-102 practice assessment'","Take the full practice exam — see how you score","This tells you what you know vs what you still need to study","You don't need to take the paid exam right now (it's $165) but knowing you COULD pass it builds confidence"]}
  ]},
  {day:27,label:"PowerShell Automation Day",tasks:[
    {id:"d27t1",text:"Write an end-to-end onboarding automation script",cat:"lab",steps:["Create a script that: reads from CSV → creates Entra user → assigns license → adds to correct department group → generates a Temporary Access Pass → outputs a 'new hire packet' with login info","This is your SHOWPIECE automation — document it thoroughly","Save it as a GitHub gist at gist.github.com → add the link to your resume"]},
    {id:"d27t2",text:"Write a stale device cleanup script",cat:"lab",steps:["Script that queries Intune for devices that haven't synced in 90+ days → exports a report → optionally retires them","Connect-MgGraph -Scopes 'DeviceManagementManagedDevices.ReadWrite.All'","$staleDate = (Get-Date).AddDays(-90)","Get-MgDeviceManagementManagedDevice -Filter \"lastSyncDateTime lt $($staleDate.ToString('yyyy-MM-ddTHH:mm:ssZ'))\"","This is a real-world admin task every org needs"]}
  ]},
  {day:28,label:"Resume & Career Update",tasks:[
    {id:"d28t1",text:"Update resume with all Phase 2 achievements",cat:"career",steps:["Add your Applied Skills credential","Update the Intune bullet with specific examples: 'Designed Windows Autopilot deployment profiles enabling zero-touch device provisioning...'","Add: compliance policies, configuration profiles via Settings Catalog, ASR rules, BitLocker encryption, proactive remediations","Add your PowerShell scripts to the Automation bullet"]},
    {id:"d28t2",text:"Start applying to jobs — don't wait for Phase 3",cat:"career",steps:["Search: 'Intune Administrator', 'Endpoint Management Engineer', 'IT Security Engineer', 'M365 Administrator'","Apply to 3+ jobs this week — tailor resume keywords to each posting","You now have real hands-on experience to discuss, not just theory"]}
  ]},
  {day:29,label:"Community + Networking",tasks:[
    {id:"d29t1",text:"Join sysadmin communities and answer questions",cat:"career",steps:["reddit.com/r/Intune — subscribe, answer questions about topics you've just learned","reddit.com/r/sysadmin — largest IT community","discord.gg/winadmins — very active, helpful community","Answering questions solidifies YOUR knowledge and builds professional reputation"]},
    {id:"d29t2",text:"LinkedIn: write a post about your Autopilot lab experience",cat:"career",steps:["Write a short post: what you built, what you learned, what surprised you","Tag: #Intune #Autopilot #EndpointManagement #ZeroTrust","Pin it to your Featured section"]}
  ]},
  {day:30,label:"Phase 2 Complete — Transition Day",tasks:[
    {id:"d30t1",text:"Cancel the free trial and purchase the $22/month Business Premium license",cat:"infra",steps:["Your 30-day trial is ending. Go to admin.microsoft.com → Billing → Your products","Cancel the trial (if it would auto-convert to a full-price multi-user plan)","Purchase a SINGLE Microsoft 365 Business Premium license at $22/month","This maintains your tenant, all your Entra ID P1 features, Intune, Defender, and Autopilot","Expense it through your LLC — it's a legitimate business education/lab cost"]},
    {id:"d30t2",text:"Review: you now have a full endpoint management portfolio",cat:"review",steps:["In 25 days you've: provisioned a cloud tenant, built a VM lab, created 20+ users via PowerShell, enrolled a device in Intune, built compliance policies, config profiles, deployed apps silently, configured Autopilot and WIPED AND REPROVISIONED a device from scratch, set up security baselines and ASR rules, encrypted drives with BitLocker, built proactive remediations, and earned a Microsoft Applied Skills credential","That's not a lab exercise — that's a real environment. You can talk about all of this in interviews with confidence"]}
  ]},

  // ═══ PHASE 3: IDENTITY, ACCESS & ZERO TRUST — SC-300 (Days 31-50) ═══
  {day:31,label:"SC-300 Course Begins + Conditional Access Foundations",tasks:[
    {id:"d31t1",text:"Start SC-300 Udemy course — Section 1 (Identity fundamentals)",cat:"study",steps:["Begin your SC-300 course. Section 1 typically covers: Microsoft Entra ID architecture, identity types (cloud-only, synchronized, guest), authentication protocols (SAML, OIDC, OAuth)","Pay attention to HOW Entra ID fits into the broader Microsoft security stack"]},
    {id:"d31t2",text:"Create Named Locations in Entra",cat:"lab",steps:["Go to entra.microsoft.com → Protection → Conditional Access → Named locations","Create 'Trusted Office IP' → IP ranges → your home public IP (whatismyip.com) as x.x.x.x/32 → Mark as trusted","Create 'Blocked Countries' → Countries → select 2-3 countries you'd never expect legitimate logins from","These Named Locations are referenced by Conditional Access policies"]}
  ]},
  {day:32,label:"Conditional Access — First Policies",tasks:[
    {id:"d32t1",text:"Build CA Policy: Require MFA for all users",cat:"lab",steps:["Go to Conditional Access → Policies → '+ New policy'","Name: 'CA001-Require-MFA-AllUsers' | Users: All users | Target resources: All cloud apps | Grant: Require multifactor authentication","CRITICAL: set to 'Report-only' first — check sign-in logs after 24 hours before switching to 'On'","Report-only lets you see who WOULD be blocked without actually blocking them"]},
    {id:"d32t2",text:"Build CA Policy: Block sign-ins from outside the US",cat:"lab",steps:["Name: 'CA002-Block-Outside-US' | Users: All users | Target resources: All cloud apps","Conditions → Locations → Include: Any location → Exclude: your trusted location + 'United States'","Grant: Block access","Set to Report-only → check logs → then enable","TEST IT: try signing into the portal from inside the VM (should work since you're in the US) and check the sign-in log to see the CA evaluation result"]},
    {id:"d32t3",text:"SC-300 course — Conditional Access section",cat:"study",steps:["Watch the CA section — this is the CORE of identity security","Understand the formula: IF [assignments: users + apps + conditions] THEN [controls: grant/block + session]","The best CA admins think in terms of policies that WORK TOGETHER, not individual rules"]}
  ]},
  {day:33,label:"Conditional Access — Advanced",tasks:[
    {id:"d33t1",text:"Build CA Policy: Require compliant device for desktop access",cat:"lab",steps:["Name: 'CA003-Require-Compliant-Desktop'","Users: All users | Apps: All cloud apps | Conditions → Device platforms: Windows, macOS","Grant: Require device to be marked as compliant","This connects Intune (compliance) to Entra (access). A noncompliant device = blocked from M365","Your VM should pass since you set up compliance policies in Phase 2"]},
    {id:"d33t2",text:"Build CA Policy: Require phishing-resistant MFA for admins",cat:"lab",steps:["Name: 'CA004-Admin-PhishResistant-MFA'","Users → Include: Directory roles → Global Admin, User Admin, Security Admin, Intune Admin","Apps: All cloud apps","Grant: Require authentication strength → Phishing-resistant MFA","Set to Report-only (you may not have FIDO2 keys to actually authenticate)","This demonstrates zero-trust for admin accounts — interview gold"]},
    {id:"d33t3",text:"Test CA policies by logging in as different dummy users",cat:"lab",steps:["Open your VM or a new browser → sign in as a dummy user → watch the CA policies trigger","Check: entra.microsoft.com → Sign-in logs → find the login → 'Conditional Access' tab → see which policies evaluated, which applied, which were skipped","This is how you PROVE your policies work. Document the results"]}
  ]},
  {day:34,label:"MFA & Authentication Methods",tasks:[
    {id:"d34t1",text:"Configure Authentication Methods policy",cat:"lab",steps:["Go to entra.microsoft.com → Protection → Authentication methods → Policies","Review and configure each method:","Microsoft Authenticator: Enable for All users, require number matching","FIDO2 security keys: Enable for SG-IT-Staff","Temporary Access Pass: Enable for All users (for onboarding)","SMS: consider DISABLING for admins (it's the weakest MFA method)","These settings control which MFA methods your users can register"]},
    {id:"d34t2",text:"Generate a Temporary Access Pass for a dummy user",cat:"lab",steps:["Go to Users → select a dummy user → Authentication methods → '+ Add' → Temporary Access Pass","Configure: one-time use, 24-hour lifetime","A TAP code is generated — in production, you'd give this to a new hire on Day 1 so they can set up passwordless auth (Authenticator app or FIDO2 key) without needing a traditional password","This is the modern onboarding flow"]},
    {id:"d34t3",text:"SC-300 course — authentication methods deep-dive",cat:"study",steps:["Watch the authentication methods section","Understand the hierarchy: SMS (weakest) → Authenticator push → Number matching → FIDO2/WHfB (strongest, phishing-resistant)","Key concept: 'Authentication Strength' in CA policies lets you REQUIRE specific MFA methods"]}
  ]},
  {day:35,label:"Privileged Identity Management (PIM)",tasks:[
    {id:"d35t1",text:"Enable PIM and configure just-in-time admin access",cat:"lab",steps:["Go to entra.microsoft.com → Identity Governance → Privileged Identity Management","Click 'Microsoft Entra roles' → Roles → 'User Administrator' → '+ Add assignments'","Select a dummy IT user → Assignment type: 'Eligible' (NOT Active)","'Eligible' = they must REQUEST and ACTIVATE the role each time they need it","Configure role settings: click Settings → User Administrator → Edit:","• Max activation duration: 4 hours","• Require justification: Yes","• Require MFA on activation: Yes","• Require approval: Yes → set yourself as approver"]},
    {id:"d35t2",text:"Test the PIM flow end-to-end",cat:"lab",steps:["Sign in as the dummy IT user → PIM → My roles → Activate 'User Administrator' → provide justification","Switch to your admin account → PIM → Approve requests → approve it","Back as the dummy user → they now have User Admin for 4 hours → verify by editing another user","After 4 hours (or manual deactivation) the role is automatically removed","THIS FLOW is the definition of 'just-in-time access' and 'least privilege'. Practice explaining it"]},
    {id:"d35t3",text:"SC-300 course — PIM section",cat:"study",steps:["Watch the PIM section","Understand: eligible vs active, activation workflow, approval chains, PIM for Azure resources (not just Entra roles)","PIM requires Entra ID P2 — if Business Premium only gives you P1, some PIM features may be limited. Note any restrictions you encounter"]}
  ]},
  {day:36,label:"Identity Protection",tasks:[
    {id:"d36t1",text:"Explore Entra ID Protection dashboard and risk policies",cat:"lab",steps:["Go to entra.microsoft.com → Protection → Identity Protection","Review: Risky users, Risky sign-ins, Risk detections","You may not have real risk events in your lab — that's OK. Understand what TYPES of risks are detected:","• Impossible travel: user signs in from New York then Tokyo 10 minutes later","• Anonymous IP: sign-in from Tor/VPN exit nodes","• Leaked credentials: Microsoft found user's password in a dark web dump","• Malware-linked IP: sign-in from known botnet infrastructure","Configure a User Risk Policy: if user risk = High → require password change","Configure a Sign-in Risk Policy: if sign-in risk = High → block (you built this as a CA policy on Day 32 — but it can also be done here)"]},
    {id:"d36t2",text:"SC-300 course — Identity Protection section",cat:"study",steps:["Watch the Identity Protection section","Focus on: risk levels (low/medium/high), risk-based CA policies vs Identity Protection policies (they overlap), investigation and remediation workflows"]}
  ]},
  {day:37,label:"App Registrations & Enterprise Apps Deep-Dive",tasks:[
    {id:"d37t1",text:"Configure a SAML SSO app integration",cat:"lab",steps:["Go to entra.microsoft.com → Applications → Enterprise applications → '+ New application'","Search the gallery for a common app (e.g., 'Salesforce', 'Box', 'ServiceNow') — pick one with a SAML tutorial","Follow the setup wizard: configure Entity ID, Reply URL, attribute mappings (UPN, email, display name)","Assign the app to a group (e.g., SG-Sales-Team)","You don't need an actual subscription to the SaaS app — just configuring the Entra side teaches the process","This is the SAML SSO integration walkthrough that interview Q1 is all about"]},
    {id:"d37t2",text:"Configure SCIM provisioning for the app",cat:"lab",steps:["On the Enterprise App page → Provisioning → Get started → Automatic","The app will ask for a Tenant URL and Secret Token (from the SaaS app's admin portal) — since you may not have a real subscription, just understand the FIELDS and FLOW","Map attributes: which Entra user fields map to which app fields","Set scope: 'Sync only assigned users and groups' → link to your SG-Sales-Team group","Provisioning = automatic user creation in the SaaS app when you assign them in Entra. No manual account creation in 50 different apps"]},
    {id:"d37t3",text:"SC-300 course — application management section",cat:"study",steps:["Watch the app management section","Covers: app registrations vs enterprise apps, SAML vs OIDC, consent framework, app permissions (delegated vs application)","Key interview concept: 'pre-consented' admin consent vs user consent — how do you control which apps users can authorize?"]}
  ]},
  {day:38,label:"B2B External Identities",tasks:[
    {id:"d38t1",text:"Configure B2B guest access and cross-tenant settings",cat:"lab",steps:["Go to entra.microsoft.com → External Identities → External collaboration settings","Configure: who can invite guests, allow/block specific domains","Invite a guest user: Users → '+ Invite external user' → use a personal email","The guest authenticates with their OWN identity provider but accesses YOUR resources","Create a CA policy scoped to 'Guest or external users' — e.g., always require MFA for guests"]},
    {id:"d38t2",text:"SC-300 course — external identities and B2B",cat:"study",steps:["Watch the B2B/external identities section","B2B: invite partners/vendors as guests. They use their own IdP. You control what they can access","B2C: customer-facing identity. Users create accounts in YOUR directory. Used for customer apps","Cross-tenant access settings: control which external orgs can collaborate and how"]}
  ]},
  {day:39,label:"Entitlement Management & Access Reviews",tasks:[
    {id:"d39t1",text:"Create an Access Package in Entitlement Management",cat:"lab",steps:["Go to entra.microsoft.com → Identity Governance → Entitlement management → Access packages → '+ New'","Name: 'Sales Team Access Bundle'","Resources: add SG-Sales-Team group + a SharePoint site or app","Policy: who can request → All members | Require approval → Yes | Approver: a manager user","This creates a self-service portal where users can REQUEST access bundles, managers approve, and it's automatically provisioned. Much better than ad-hoc 'add me to this group' emails"]},
    {id:"d39t2",text:"Create an Access Review",cat:"lab",steps:["Identity Governance → Access reviews → '+ New'","Review: members of SG-Sales-Team | Reviewers: managers | Duration: 7 days | Recurrence: quarterly","When triggered: each manager reviews their team's access and confirms/revokes","This is identity GOVERNANCE — ensuring people only have access they still need. Critical for compliance-heavy environments like law firms"]},
    {id:"d39t3",text:"SC-300 course — identity governance section",cat:"study",steps:["Watch the governance section","Covers: entitlement management, access reviews, lifecycle workflows, terms of use","This is the 'identity hygiene' layer — the proactive cleanup that prevents access sprawl"]}
  ]},
  {day:40,label:"Lifecycle Workflows",tasks:[
    {id:"d40t1",text:"Configure Lifecycle Workflows for onboarding and offboarding",cat:"lab",steps:["Go to Identity Governance → Lifecycle workflows","Create an ONBOARDING workflow: Trigger: employeeHireDate | Tasks: generate TAP, add to department group, enable account, send welcome email to manager","Create an OFFBOARDING workflow: Trigger: employeeLeaveDateTime | Tasks: revoke all sign-in sessions, remove from all groups, disable account","Note: these require the employeeHireDate/LeaveDateTime attributes to be populated on users","Set these on a few dummy users via PowerShell and watch the workflows trigger"]},
    {id:"d40t2",text:"SC-300 course — lifecycle workflows section",cat:"study",steps:["Watch the lifecycle workflows section","These AUTOMATE the joiner/mover/leaver process — the most tedious and error-prone admin task","Know the trigger events and available tasks — this is a strong interview answer for 'how would you handle identity lifecycle at scale?'"]}
  ]},
  {day:41,label:"Sign-In Logs & Audit Investigation",tasks:[
    {id:"d41t1",text:"Deep-dive into sign-in logs and audit logs",cat:"lab",steps:["Go to entra.microsoft.com → Monitoring → Sign-in logs","Filter by: a specific dummy user, a date range, a specific app","Click on a sign-in entry → examine: Location, Device info, CA policies evaluated, MFA details, Risk level","Now go to Audit logs → filter by activity type (e.g., 'Add user', 'Update user', 'Delete group')","Practice: 'A user reports their account was compromised at 2 PM yesterday. Walk me through how you'd investigate.'","Answer: Sign-in logs → filter by user + time → check IP/location → check risk level → check CA evaluation → check if MFA was used → Audit logs for any changes made under that identity"]},
    {id:"d41t2",text:"SC-300 course — monitoring and reporting",cat:"study",steps:["Watch the monitoring section","Covers: sign-in logs, audit logs, provisioning logs, workbook reports, Log Analytics integration","Focus on the INVESTIGATION flow — this is security engineering in practice"]}
  ]},
  {day:42,label:"Applied Skills: Entra Credentials",tasks:[
    {id:"d42t1",text:"Take Applied Skills: 'Get started with identities and access using Microsoft Entra'",cat:"cert",steps:["Go to learn.microsoft.com and take the assessment","Covers: user management, group management, authentication configuration, access management","You've been doing all of this — this should be straightforward"]},
    {id:"d42t2",text:"Take Applied Skills: 'Configure secure access by using Microsoft Entra'",cat:"cert",steps:["Take the second Entra assessment","Covers: Conditional Access, MFA, Identity Protection","Add both to LinkedIn immediately upon passing"]}
  ]},
  // Days 43-50: SC-300 completion + advanced topics
  {day:43,label:"Hybrid Identity",tasks:[
    {id:"d43t1",text:"Study: Azure AD Connect / Cloud Sync",cat:"study",steps:["You can't deploy this in your lab (no on-prem AD) but you MUST know it for interviews","Azure AD Connect: syncs on-prem AD to Entra. Supports: password hash sync, pass-through auth, federation with ADFS","Cloud Sync: lighter agent-based alternative, easier for multi-forest, Microsoft's preferred future direction","Know: when to recommend each, and how they relate to GCDS (Google Cloud Directory Sync) in hybrid Google+Microsoft environments"]},
    {id:"d43t2",text:"SC-300 course — hybrid identity section",cat:"study",steps:["Watch the hybrid identity section","Focus on: PHS vs PTA vs Federation — what each does, when to use each, pros/cons"]}
  ]},
  {day:44,label:"SC-300 Practice + Gap Study",tasks:[
    {id:"d44t1",text:"Run SC-300 practice assessment on MS Learn",cat:"cert",steps:["Go to learn.microsoft.com → search 'SC-300 practice assessment'","Take the full practice exam → note areas below 70%","Common weak spots: B2B/B2C, identity governance, hybrid identity, and monitoring"]},
    {id:"d44t2",text:"Deep-study weak areas from practice exam",cat:"study",steps:["For each weak area: re-watch the course section + do hands-on lab work if possible","SC-300 is a $165 exam — you can schedule it when ready, or just use the practice scores as proof of knowledge"]}
  ]},
  {day:45,label:"Google Workspace Crash Course",tasks:[
    {id:"d45t1",text:"Study the MS ↔ Google translation table",cat:"study",steps:["Even though this sprint focuses on Microsoft, many jobs want cross-platform knowledge","Key translations: Entra ID = Google Cloud Identity | Conditional Access = Context-Aware Access | GPO = OU-based Chrome policies | Intune = Google Endpoint Management | Graph API = Admin SDK / GAM CLI","You can honestly say: 'My primary depth is in Microsoft Entra and Intune, and I understand the Google Workspace equivalents conceptually, including how the two platforms can be federated together'"]},
    {id:"d45t2",text:"Study GCDS and federation between Google and Microsoft",cat:"study",steps:["GCDS syncs AD to Google (one-way) — used when AD is source of truth for both platforms","Federation: Google as SAML IdP serving Entra as SP, or vice versa","Know: which direction the trust goes and which directory is authoritative"]}
  ]},
  {day:46,label:"Secure Score + Microsoft Defender Deep-Dive",tasks:[
    {id:"d46t1",text:"Review and improve your tenant's Secure Score",cat:"lab",steps:["Go to security.microsoft.com → Secure Score","Review each recommended action — try to implement as many as possible in your lab tenant","Example actions: enable self-service password reset, require MFA for all admins, block legacy authentication, enable sign-in risk policy","Each action you complete raises your score — document the before/after in your notes","In interviews: 'I improved the tenant's Secure Score from X to Y by implementing these specific policies'"]},
    {id:"d46t2",text:"SC-300 course — remaining sections",cat:"study",steps:["Finish any remaining SC-300 course sections","You should be through the full curriculum by Day 48"]}
  ]},
  {day:47,label:"Apply + Community Building",tasks:[
    {id:"d47t1",text:"Apply to 5 more jobs",cat:"career",steps:["Search for: 'Identity and Access Administrator', 'IT Security Engineer', 'Endpoint Management Engineer', 'M365 Security Administrator'","Tailor resume per posting — match their keywords","Track everything in a spreadsheet: company, role, date, status"]},
    {id:"d47t2",text:"LinkedIn outreach — connect with 3 people in target roles",cat:"career",steps:["Find people with titles you're targeting → send a brief connection note","Ask for a 15-min informational chat about their role and what skills matter most"]}
  ]},
  {day:48,label:"SC-300 Course Completion",tasks:[
    {id:"d48t1",text:"Complete all remaining SC-300 course material",cat:"study",steps:["Finish the full curriculum. You should now have covered all SC-300 exam objectives"]},
    {id:"d48t2",text:"Second practice assessment — target 80%+",cat:"cert",steps:["Retake the practice assessment. If scoring 80%+, you're ready for the real exam if you choose to take it"]}
  ]},
  {day:49,label:"Zero Trust Architecture — Capstone Study",tasks:[
    {id:"d49t1",text:"Study and document your zero-trust implementation",cat:"review",steps:["Map out your entire lab as a zero-trust architecture:","• Identity: Entra ID + MFA + PIM + CA policies → verify every identity","• Devices: Intune compliance + Autopilot + BitLocker → verify every device","• Applications: Enterprise app SSO + SCIM provisioning → verify every app access","• Data: DLP policies + Sensitivity labels → protect data","• Network: Named Locations + geoblocking → verify every access location","• Monitoring: Sign-in logs + Identity Protection + Defender → detect and respond","Write this up as a 1-page 'Zero Trust Architecture Summary' — this is your portfolio capstone"]},
    {id:"d49t2",text:"Practice explaining your zero-trust implementation out loud",cat:"interview",steps:["Practice the full walkthrough: 'I designed and implemented a zero-trust security framework covering identity, device, application, data, network, and monitoring layers using Microsoft Entra ID, Intune, and Defender...'","Hit specific examples from each layer. Keep it under 3 minutes"]}
  ]},
  {day:50,label:"Phase 3 Complete",tasks:[
    {id:"d50t1",text:"Review all Entra policies and document them",cat:"review",steps:["List every CA policy, authentication method, PIM configuration, and governance setting you built","This is your 'identity security portfolio' — reference it in every interview"]},
    {id:"d50t2",text:"Update resume with Phase 3 achievements",cat:"career",steps:["Add: Conditional Access policies, PIM configuration, Identity Protection, SAML SSO integrations, lifecycle workflows, access reviews","Add Applied Skills credentials earned in Phase 3","You now have BOTH endpoint management AND identity security experience — that's the full picture"]}
  ]},

  // ═══ PHASE 4: ENTERPRISE SCENARIOS & INTERVIEW PREP (Days 51-60) ═══
  {day:51,label:"Simulate a Compromised Account",tasks:[
    {id:"d51t1",text:"Run the compromised account scenario end-to-end",cat:"lab",steps:["SCENARIO: A dummy user's credentials were 'leaked'. Simulate the investigation and response:","1. Sign in as a dummy user from an unusual location or use Identity Protection to flag the user as risky","2. Check: Identity Protection → Risky users → the user should appear","3. Investigate: Sign-in logs → filter by user → examine the suspicious entry → IP, location, device, CA evaluation","4. Respond: Force password reset → Revoke all active sessions (Users → user → 'Revoke sessions') → Review CA policies that should have caught it → Block the user if needed","5. Remediate: Require the user to re-register MFA → monitor for follow-up suspicious activity","DOCUMENT every step with screenshots and notes — this becomes your best interview story"]},
    {id:"d51t2",text:"Write up the incident response as a STAR story",cat:"interview",steps:["SITUATION: Account compromise detected via Identity Protection risk alert","TASK: Investigate, contain, remediate, and prevent recurrence","ACTION: Reviewed sign-in logs, identified anomalous login from unexpected location, revoked sessions, forced password reset, required MFA re-registration, created new CA policy to block the attack vector","RESULT: Account secured within 15 minutes, no data exfiltration confirmed, new CA policy prevents similar attacks","Practice this story until it's natural — 2-3 minutes, conversational, specific"]}
  ]},
  {day:52,label:"Document Your Entire Lab Build",tasks:[
    {id:"d52t1",text:"Write the full lab documentation",cat:"review",steps:["Create a professional PDF/Doc covering:","1. Lab Architecture: M365 Business Premium tenant, MacBook + Windows 11 VM, Entra ID + Intune + Defender","2. Identity Configuration: 20+ users, dynamic groups, Admin Units, CA policies (list each), PIM, authentication methods","3. Endpoint Configuration: Compliance policies, config profiles, BitLocker, ASR rules, app deployment, Autopilot","4. Zero Trust Summary: how each layer is covered","5. Automation: PowerShell scripts for onboarding, device reporting, policy export","This is your portfolio piece — share it with hiring managers during interviews"]},
    {id:"d52t2",text:"Publish key scripts to GitHub",cat:"career",steps:["Create a GitHub repo or gists with your PowerShell scripts","Include: user creation, device compliance report, CA policy export, stale device cleanup, onboarding automation","Add the repo link to your resume and LinkedIn"]}
  ]},
  {day:53,label:"Interview Prep — Core Questions",tasks:[
    {id:"d53t1",text:"Practice all 5 core interview questions",cat:"interview",steps:["Q1: Walk me through integrating a new SaaS app with SSO and SCIM (SAML/OIDC + SCIM flow, pilot group, CA policy)","Q2: How do you balance BYOD security with user experience? (MAM vs MDM, app protection policies)","Q3: How would you handle identity lifecycle for 500+ employees? (Lifecycle workflows, dynamic groups, access packages, access reviews)","Q4: Tell me about your lab/environment (your full zero-trust lab walkthrough)","Q5: Describe a security incident you handled (your compromised account scenario from Day 51)","2-3 minutes each, out loud, conversational"]},
    {id:"d53t2",text:"Practice the 'career transition' narrative",cat:"interview",steps:["You will be asked: 'Why are you moving from IT support to security engineering?'","Your answer: 'I spent 7 years managing identity and endpoint infrastructure for a law firm — a heavily regulated environment where client data security is paramount. That experience showed me that the highest-impact work isn't reactive troubleshooting, it's proactive policy design. I built a full security lab on my own time — Entra ID, Intune, Conditional Access, Autopilot — and earned Microsoft credentials validating those skills. I'm making this move because it's where my experience and passion converge.'","Practice until this sounds natural and confident, not defensive"]}
  ]},
  {day:54,label:"Interview Prep — Technical Deep-Dive",tasks:[
    {id:"d54t1",text:"Prepare for whiteboard/scenario questions",cat:"interview",steps:["Common scenario questions:","• 'Design a CA policy set for a 500-person company with remote workers, contractors, and BYOD' — draw it out on paper","• 'A user can't access SharePoint from their laptop. How do you troubleshoot?' — check CA policy evaluation in sign-in logs, check device compliance, check app assignment","• 'How would you migrate from SCCM to Intune?' — co-management, shift workloads one at a time, start with compliance and updates, then apps, then full migration","• 'Explain zero trust in 60 seconds' — verify explicitly (every user, device, app access), least privilege (just-in-time, just-enough), assume breach (monitor, detect, respond)","Practice each for 2-3 minutes"]},
    {id:"d54t2",text:"Research companies you're interviewing with",cat:"interview",steps:["For each upcoming interview: check their job description for tech stack clues","Google: '[company] tech stack', '[company] IT infrastructure'","Tailor your answers to reference their specific tools"]}
  ]},
  {day:55,label:"Mock Interview Day",tasks:[
    {id:"d55t1",text:"Full 45-minute mock interview",cat:"interview",steps:["Have someone grill you — friend, family, or use Claude as the interviewer","Cover: CA design, Autopilot walkthrough, compromised account response, MDM vs MAM, identity lifecycle, PIM, zero trust explanation, career transition narrative","Record yourself if possible — listen back and refine"]},
    {id:"d55t2",text:"Self-assess: identify strongest and weakest answers",cat:"review",steps:["Which answers flowed naturally? Lead with these in real interviews","Which were shaky? Spend targeted time on those topics tomorrow"]}
  ]},
  {day:56,label:"Final Application Push",tasks:[
    {id:"d56t1",text:"Apply to 5+ more jobs",cat:"career",steps:["Target: 'IT Security Engineer', 'Identity & Access Management', 'Endpoint Security', 'M365 Administrator', 'Cloud Security Engineer'","Try broader searches too: 'Entra', 'Intune', 'Conditional Access' as keywords","Apply to 3-5 per day this week"]},
    {id:"d56t2",text:"Follow up on all pending applications",cat:"career",steps:["For any application over 1 week old: find the recruiter on LinkedIn → brief follow-up message","For any scheduled interviews: research the company and prepare tailored answers"]}
  ]},
  {day:57,label:"Portfolio Polish",tasks:[
    {id:"d57t1",text:"Finalize your Zero Trust case study PDF",cat:"career",steps:["Proof-read, format professionally, add your architecture diagram","This should be 5-10 pages: executive summary, lab architecture, policies implemented, Autopilot results, compromised account response, automation scripts"]},
    {id:"d57t2",text:"Update LinkedIn Featured section",cat:"career",steps:["Pin: your case study PDF, your GitHub scripts, your LinkedIn Autopilot post, your Microsoft Applied Skills credentials","These are the first things hiring managers see when they visit your profile"]}
  ]},
  {day:58,label:"Final Resume Update",tasks:[
    {id:"d58t1",text:"Final resume revision with all 60-day achievements",cat:"career",steps:["Update both your general resume and Indeed resume","Add all Applied Skills credentials (remove 'In Progress' for any you've passed)","Strengthen bullets with specific examples from your lab","Make sure the career transition narrative is clear: IT Admin → Security Engineering"]},
    {id:"d58t2",text:"Update Indeed with the new resume PDF",cat:"career",steps:["Re-export your Indeed resume to PDF","Upload to Indeed → Profile → Resume → replace current file","Indeed re-parses the document for ATS matching — the new keywords will improve your visibility"]}
  ]},
  {day:59,label:"Final Review",tasks:[
    {id:"d59t1",text:"Review all interview answers one final time",cat:"interview",steps:["Run through every question. They should all feel natural by now","Focus on the career transition narrative — this is the first question in every interview"]},
    {id:"d59t2",text:"Review your lab documentation for accuracy",cat:"review",steps:["Read through your case study — make sure every claim is accurate and you can defend it in an interview","If someone asks 'tell me more about X policy,' you should be able to explain the what, why, and how"]}
  ]},
  {day:60,label:"Sprint Complete 🎉",tasks:[
    {id:"d60t1",text:"Reflect on your transformation",cat:"review",steps:["In 60 days you've:","• Built a production-grade M365 security lab from scratch","• Provisioned 20+ users, enrolled devices, deployed apps — all via automation","• Designed and enforced Conditional Access policies covering MFA, compliance, location, admin roles","• Implemented Autopilot zero-touch provisioning and WIPED AND REPROVISIONED a device","• Configured PIM, identity protection, access reviews, lifecycle workflows","• Simulated and responded to a compromised account incident","• Earned 2-3 Microsoft Applied Skills credentials","• Built a portfolio with documentation, scripts, and a case study","• Applied to 20+ jobs and practiced until your interview answers are natural","That's not 'I learned from a textbook.' That's 'I built and operated a real environment.' Own it."]},
    {id:"d60t2",text:"Keep the momentum going",cat:"career",steps:["Your $22/month tenant is your ongoing lab — keep experimenting","New features launch constantly in Entra and Intune — stay current","Continue applying, interviewing, and refining","The role is coming. You've earned it."]}
  ]},
];

const LS={get(k){try{return JSON.parse(localStorage.getItem(k))}catch{return null}},set(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}},del(k){try{localStorage.removeItem(k)}catch{}}};
function App(){
  const[completed,setCompleted]=useState(()=>LS.get("se-done")||{});
  const[habitLog,setHabitLog]=useState(()=>LS.get("se-hab")||{});
  const[startDate,setStartDate]=useState(()=>LS.get("se-start"));
  const[selectedDay,setSelectedDay]=useState(null);
  const[view,setView]=useState("today");
  const[expandedTask,setExpandedTask]=useState(null);
  const toggle=useCallback(id=>{setCompleted(p=>{const n={...p,[id]:!p[id]};LS.set("se-done",n);return n;});},[]);
  const todayKey=new Date().toISOString().slice(0,10);
  const toggleHabit=useCallback(id=>{setHabitLog(p=>{const dh=p[todayKey]||{};const n={...p,[todayKey]:{...dh,[id]:!dh[id]}};LS.set("se-hab",n);return n;});},[todayKey]);
  const start=useCallback(()=>{setStartDate(todayKey);LS.set("se-start",todayKey);},[todayKey]);
  const reset=useCallback(()=>{if(!confirm("Reset all progress?"))return;setCompleted({});setHabitLog({});setStartDate(null);setView("today");LS.del("se-done");LS.del("se-hab");LS.del("se-start");},[]);
  const dayNum=startDate?Math.max(1,Math.ceil((Date.now()-new Date(startDate+"T00:00:00").getTime())/86400000)):0;
  const totalTasks=DAYS.reduce((s,d)=>s+d.tasks.length,0);
  const doneTasks=DAYS.reduce((s,d)=>s+d.tasks.filter(t=>completed[t.id]).length,0);
  const pct=totalTasks?Math.round(doneTasks/totalTasks*100):0;
  const todayHabits=habitLog[todayKey]||{};
  const habitsDone=HABITS.filter(h=>todayHabits[h.id]).length;
  let streak=0;if(startDate){const now=new Date();now.setHours(0,0,0,0);for(let i=0;i<90;i++){const d=new Date(now);d.setDate(d.getDate()-i);const k=d.toISOString().slice(0,10);if(k<startDate)break;const dh=habitLog[k]||{};const a=HABITS.every(h=>dh[h.id]);if(i===0&&!a)continue;if(a)streak++;else break;}}
  const activeDay=selectedDay||Math.min(dayNum,60);const activeDayData=DAYS.find(d=>d.day===activeDay);const activePhase=PHASES.find(p=>activeDay>=p.days[0]&&activeDay<=p.days[1]);const currentPhaseIdx=dayNum<=5?0:dayNum<=30?1:dayNum<=50?2:3;
  const f="'Outfit',sans-serif",m="'JetBrains Mono',monospace";
