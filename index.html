    {id:"d46t1",text:"Review and improve your tenant's Secure Score",cat:"lab",steps:["Go to security.microsoft.com → Secure Score","Review each recommended action — try to implement as many as possible in your lab tenant","Example actions: enable self-service password reset, require MFA for all admins, block legacy authentication, enable sign-in risk policy","Each action you complete raises your score — document the before/after in your notes","In interviews: 'I improved the tenant's Secure Score from X to Y by implementing these specific policies'"]},
    {id:"d46t2",text:"MS Learn: Complete any unfinished SC-300 modules",cat:"study",steps:["Return to learn.microsoft.com/en-us/credentials/certifications/identity-and-access-administrator/ and audit your progress across all 5 SC-300 learning paths","Finish any path or module still marked incomplete","By Day 48 you should be 100% through the full SC-300 curriculum on MS Learn"]}
  ]},
  {day:47,label:"Apply + Community Building",tasks:[
    {id:"d47t1",text:"Apply to 5 more jobs",cat:"career",steps:["Search for: 'Identity and Access Administrator', 'IT Security Engineer', 'Endpoint Management Engineer', 'M365 Security Administrator'","Tailor resume per posting — match their keywords","Track everything in a spreadsheet: company, role, date, status"]},
    {id:"d47t2",text:"LinkedIn outreach — connect with 3 people in target roles",cat:"career",steps:["Find people with titles you're targeting → send a brief connection note","Ask for a 15-min informational chat about their role and what skills matter most"]}
  ]},
  {day:48,label:"SC-300 Course Completion",tasks:[
    {id:"d48t1",text:"Finalize all SC-300 MS Learn coverage",cat:"study",steps:["Verify 100% completion of all 5 SC-300 learning paths on learn.microsoft.com: 'Explore identity in Microsoft Entra ID', 'Implement an identity management solution', 'Implement an Authentication and Access Management solution', 'Implement Access Management for Apps', 'Plan and implement an identity governance strategy'","Screenshot your completed learning paths for LinkedIn — Microsoft Learn tracks badges automatically","You should now have covered every published SC-300 exam objective"]},
    {id:"d48t2",text:"Second practice assessment — target 80%+",cat:"cert",steps:["Retake the practice assessment. If scoring 80%+, you're ready for the real exam if you choose to take it"]}
  ]},
  {day:49,label:"Zero Trust Architecture — Capstone Study",tasks:[
    {id:"d49t1",text:"Study and document your zero-trust implementation",cat:"review",steps:["Map out your entire lab as a zero-trust architecture:","• Identity: Entra ID + MFA + PIM + CA policies → verify every identity","• Devices: Intune compliance + Autopilot + BitLocker → verify every device","• Applications: Enterprise app SSO + SCIM provisioning → verify every app access","• Data: DLP policies + Sensitivity labels → protect data","• Network: Named Locations + geoblocking → verify every access location","• Monitoring: Sign-in logs + Identity Protection + Defender → detect and respond","Write this up as a 1-page 'Zero Trust Architecture Summary' — this is your portfolio capstone"]},
    {id:"d49t2",text:"Practice explaining your zero-trust implementation out loud",cat:"interview",steps:["Practice the full walkthrough: 'I designed and implemented a zero-trust security framework covering identity, device, application, data, network, and monitoring layers using Microsoft Entra ID, Intune, and Defender...'","Hit specific examples from each layer. Keep it under 3 minutes"]}
  ]},
  {day:50,label:"Phase 3 Complete",tasks:[
    {id:"d50t1",text:"Review all Entra policies and document them",cat:"review",steps:["List every CA policy, authentication method, PIM configuration, and governance setting you built","This is your 'identity security portfolio' — reference it in every interview"]},
    {id:"d50t2",text:"Update resume with Phase 3 achievements",cat:"career",steps:["Add: Conditional Access policies, PIM configuration, Identity Protection, SAML SSO integrations, lifecycle workflows, access reviews","Add Applied Skills credentials earned in Phase 3","You now have BOTH endpoint management AND identity security experience — that's the full picture"]}
  ]},

  // ═══ PHASE 4: ENTERPRISE SCENARIOS & INTERVIEW PREP (Days 51-60) ═══
  {day:51,label:"Simulate a Compromised Account",tasks:[
    {id:"d51t1",text:"Run the compromised account scenario end-to-end",cat:"lab",steps:["SCENARIO: A dummy user's credentials were 'leaked'. Simulate the investigation and response:","1. Sign in as a dummy user from an unusual location or use Identity Protection to flag the user as risky","2. Check: Identity Protection → Risky users → the user should appear","3. Investigate: Sign-in logs → filter by user → examine the suspicious entry → IP, location, device, CA evaluation","4. Respond: Force password reset → Revoke all active sessions (Users → user → 'Revoke sessions') → Review CA policies that should have caught it → Block the user if needed","5. Remediate: Require the user to re-register MFA → monitor for follow-up suspicious activity","DOCUMENT every step with screenshots and notes — this becomes your best interview story"]},
    {id:"d51t2",text:"Write up the incident response as a STAR story",cat:"interview",steps:["SITUATION: Account compromise detected via Identity Protection risk alert","TASK: Investigate, contain, remediate, and prevent recurrence","ACTION: Reviewed sign-in logs, identified anomalous login from unexpected location, revoked sessions, forced password reset, required MFA re-registration, created new CA policy to block the attack vector","RESULT: Account secured within 15 minutes, no data exfiltration confirmed, new CA policy prevents similar attacks","Practice this story until it's natural — 2-3 minutes, conversational, specific"]}
  ]},
  {day:52,label:"Document Your Entire Lab Build",tasks:[
    {id:"d52t1",text:"Write the full lab documentation",cat:"review",steps:["Create a professional PDF/Doc covering:","1. Lab Architecture: M365 Business Premium tenant, Surface Pro 5 running Windows 11 as managed endpoint, Entra ID + Intune + Defender","2. Identity Configuration: 20+ users, dynamic groups, Admin Units, CA policies (list each), PIM, authentication methods","3. Endpoint Configuration: Compliance policies, config profiles, BitLocker, ASR rules, app deployment, Autopilot","4. Zero Trust Summary: how each layer is covered","5. Automation: PowerShell scripts for onboarding, device reporting, policy export","This is your portfolio piece — share it with hiring managers during interviews"]},
    {id:"d52t2",text:"Publish key scripts to GitHub",cat:"career",steps:["Create a GitHub repo or gists with your PowerShell scripts","Include: user creation, device compliance report, CA policy export, stale device cleanup, onboarding automation","Add the repo link to your resume and LinkedIn"]}
  ]},
  {day:53,label:"Interview Prep — Core Questions",tasks:[
    {id:"d53t1",text:"Practice all 5 core interview questions",cat:"interview",steps:["Q1: Walk me through integrating a new SaaS app with SSO and SCIM (SAML/OIDC + SCIM flow, pilot group, CA policy)","Q2: How do you balance BYOD security with user experience? (MAM vs MDM, app protection policies)","Q3: How would you handle identity lifecycle for 500+ employees? (Lifecycle workflows, dynamic groups, access packages, access reviews)","Q4: Tell me about your lab/environment (your full zero-trust lab walkthrough)","Q5: Describe a security incident you handled (your compromised account scenario from Day 51)","2-3 minutes each, out loud, conversational"]},
    {id:"d53t2",text:"Practice the 'career transition' narrative",cat:"interview",steps:["You will be asked: 'Why are you moving from IT support to security engineering?'","Your answer: 'I spent 7 years managing identity and endpoint infrastructure for a law firm — a heavily regulated environment where client data security is paramount. That experience showed me that the highest-impact work isn't reactive troubleshooting, it's proactive policy design. I built a full security lab on my own time — Entra ID, Intune, Conditional Access, Autopilot — and earned Microsoft credentials validating those skills. I'm making this move because it's where my experience and passion converge.'","Practice until this sounds natural and confident, not defensive"]}
  ]},
  {day:54,label:"Interview Prep — Technical Deep-Dive",tasks:[
    {id:"d54t1",text:"Prepare for whiteboard/scenario questions",cat:"interview",steps:["Common scenario questions:","• 'Design a CA policy set for a 500-person company with remote workers, contractors, and BYOD' — draw it out on paper","• 'A user can't access SharePoint from their laptop. How do you troubleshoot?' — check CA policy evaluation in sign-in logs, check device compliance, check app assignment","• 'How would you migrate from SCCM to Intune?' — co-management, shift workloads one at a time, start with compliance and updates, then apps, then full migration","• 'Explain zero trust in 60 seconds' — verify explicitly (every user, device, app access), least privilege (just-in-time, just-enough), assume breach (monitor, detect, respond)","Practice each for 2-3 minutes"]},
