  // ═══ PHASE 3: IDENTITY & ACCESS — SC-300 (Days 31–50) ═══
  {day:31,label:"SC-300 Kickoff + Named Locations",tasks:[
    {id:"d31t1",text:"MS Learn: 'Explore identity in Microsoft Entra ID'",cat:"study",icon:"📖",time:"~90 min",diff:2,steps:[
      "## Open the path",
      "https://learn.microsoft.com/en-us/training/paths/m365-identity/",
      "## Authentication protocols",
      "SAML (Security Assertion Markup Language) — XML-based, common in enterprise SaaS",
      "OIDC (OpenID Connect) — modern identity layer on OAuth 2.0, used by Entra",
      "OAuth 2.0 — authorization protocol, the 'grant app access to my data' flow",
      "## Entra editions",
      "Free — basic directory",
      "P1 — common workforce features (included in Business Premium)",
      "P2 — advanced (PIM, Identity Protection)",
      "## Identity types to distinguish",
      "Cloud-only, synchronized, guest"
    ]},
    {id:"d31t2",text:"Create Named Locations in Entra",cat:"lab",icon:"📍",time:"~20 min",diff:1,prereq:"d1t2",steps:[
      "## Open",
      "entra.microsoft.com → Protection → Conditional Access → Named locations",
      "## Trusted Office IP",
      "+ IP ranges location → Name: 'Trusted Office IP'",
      "Add your home public IP from https://whatismyip.com as x.x.x.x/32",
      "Mark as trusted",
      "## Blocked Countries",
      "+ Countries location → Name: 'Blocked Countries'",
      "Select 2–3 countries you'd never expect legitimate sign-ins from",
      "## Purpose",
      "Named Locations are building blocks — referenced by CA policies in Day 32"
    ]},
  ]},
  {day:32,label:"Conditional Access — First Policies",tasks:[
    {id:"d32t1",text:"Build CA Policy: Require MFA for all users",cat:"lab",icon:"🔑",time:"~45 min",diff:2,prereq:"d31t2",steps:[
      "## Why this task now",
      "Your first real Conditional Access policy is a rite of passage. Every piece of identity security from here on stacks on top of CA. You will be asked in every identity interview 'walk me through building a CA policy' — this task is your answer.",
      "MFA for all users is the single most impactful security policy any tenant can deploy. It stops ~99% of account compromise attempts per Microsoft's own telemetry.",
      "## What CA is",
      "Conditional Access = Entra's IF/THEN engine. For each sign-in attempt, it evaluates: IF (who + what resource + what conditions) THEN (grant / block / require extra controls). Policies are evaluated in parallel; if any policy blocks, the sign-in is blocked.",

      "## CRITICAL: Break-glass account first",
      "Before creating ANY CA policy that could lock people out: create an emergency account that's excluded from all policies.",
      "entra.microsoft.com → Users → + New user → Create new user",
      "• User principal name: breakglass@<your-tenant>.onmicrosoft.com",
      "• Display name: Emergency Break-Glass Admin",
      "• Password: use a 20+ character random password — save in password manager AND write on paper stored offline",
      "Then: Users → select breakglass → Assigned roles → + Add assignments → Global Administrator",
      "This account must NEVER be used for daily work. It exists only to fix catastrophic lockouts.",
      "Official Microsoft guidance: https://learn.microsoft.com/en-us/entra/identity/role-based-access-control/security-emergency-access",

      "## Step 1 — Navigate to Conditional Access",
      "https://entra.microsoft.com → Protection (left nav) → Conditional Access",
      "You land on Overview → click Policies in the sub-nav",
      "If there are existing Microsoft-managed policies (sometimes pre-provisioned with Business Premium), leave them alone",
      "Click '+ New policy'",
      "Official doc with screenshots: https://learn.microsoft.com/en-us/entra/identity/conditional-access/concept-conditional-access-policies",

      "## Step 2 — Name the policy",
      "Name: CA001-Require-MFA-AllUsers",
      "(Naming convention: CA### prefix + terse action description. Numbering helps enforce ordering in your documentation — Day 51 walkthrough.)",

      "## Step 3 — Assignments: Users",
      "Click 'Users' (under Assignments)",
      "",
      "Include tab:",
      "• Select 'All users'",
      "• You'll see a warning: 'This policy will impact all of your users. Make sure you have a break-glass account configured.' — you do, continue.",
      "",
      "Exclude tab (CRITICAL):",
      "• Check 'Users and groups'",
      "• Click the 'Select excluded users and groups' link",
      "• Add: breakglass@<your-tenant>.onmicrosoft.com (your break-glass account from above)",
      "• Click Select",
      "Users pane should now read: Include: All users | Exclude: 1",

      "## Step 4 — Assignments: Target resources",
      "Click 'Target resources'",
      "Select what this policy applies to: leave at 'Cloud apps'",
      "Include tab:",
      "• Select 'All cloud apps'",
      "Exclude tab:",
      "• Leave empty",
      "(Some orgs exclude specific apps here — like Microsoft Intune Enrollment — but for your lab, All Cloud Apps is correct.)",

      "## Step 5 — Assignments: Conditions",
      "Click 'Conditions'",
      "Leave everything here Not configured for this first policy — no conditions means the policy evaluates on EVERY sign-in regardless of location, device, platform, or risk.",
      "(You'll add conditions in later policies: d32t2 adds location conditions, d33 adds device conditions.)",

      "## Step 6 — Access controls: Grant",
      "Click 'Grant' (under Access Controls)",
      "Select 'Grant access'",
      "Check: 'Require multifactor authentication'",
      "Leave the other checkboxes unchecked (those come in later policies)",
      "For multiple controls: leave at 'Require one of the selected controls' (default)",
      "Click Select",

      "## Step 7 — Access controls: Session",
      "Leave at default (nothing configured)",
      "Session controls handle things like 'sign-in frequency' and 'persistent browser session' — later concerns.",

      "## Step 8 — Enable policy: REPORT-ONLY (critical first step)",
      "At the bottom of the policy form, under 'Enable policy':",
      "Select 'Report-only'",
      "(DO NOT select 'On'. Report-only is CA's dry-run mode. It evaluates the policy against real sign-ins and logs what WOULD have happened — but doesn't actually enforce anything. This prevents accidentally locking everyone out with a misconfigured policy.)",

      "## Step 9 — Create the policy",
      "Click Create at the bottom",
      "Policy appears in the list with status 'Report-only'",

      "## Step 10 — Wait 24 hours, then review sign-in logs",
      "Don't enforce yet. Let the policy run in Report-only for 24 hours to see real impact.",
      "After 24 hours: entra.microsoft.com → Monitoring → Sign-in logs",
      "Click any sign-in event → 'Conditional Access' tab in the detail pane",
      "You'll see 'CA001-Require-MFA-AllUsers' listed with a result:",
      "• 'Would have succeeded' — user DID satisfy MFA, policy would've let them through",
      "• 'Would have failed' — user did NOT have MFA, policy WOULD have blocked them",
      "Count the 'Would have failed' events. These users will need MFA guidance before you enforce.",

      "## Step 11 — Switch from Report-only to On (after review period)",
      "Only after you've confirmed the report-only results are acceptable:",
      "Protection → Conditional Access → Policies → CA001-Require-MFA-AllUsers → click to edit",
      "Enable policy: change from 'Report-only' to 'On'",
      "Save",
      "Policy is now enforcing.",

      "## Step 12 — Test the enforcement",
      "Sign out of your admin session → sign back in with a regular test user (not break-glass, not the admin that created the policy)",
      "You should be prompted to register for MFA: phone number or Authenticator app",
      "Register, complete sign-in",
      "From now on, that user will be challenged for MFA on every new session",

      "## If something goes wrong — the break-glass drill",
      "If you accidentally lock yourself out despite the exclusion:",
      "Sign in with the breakglass@<tenant>.onmicrosoft.com account",
      "Edit or delete the problematic CA policy",
      "Test your normal account again",
      "After the incident: rotate the break-glass password, document what happened",

      "## Common issues",
      "• 'This policy impacts every user' warning — expected. That's the point of an 'all users' policy.",
      "• Sign-in log Conditional Access tab empty — sign-in was before the policy was created, or the policy didn't evaluate for that session type (service principal, legacy auth).",
      "• Report-only shows 'Failure' but user signs in fine — that IS the report-only working. The user succeeded because the policy isn't enforcing yet.",
      "• 'Report-only' option missing — your tenant may not support Report-only for some reason; check that you're on Entra P1+ (Business Premium includes it).",

      "## What you learned that you'll reuse",
      "• The 5-block CA policy structure (Users → Resources → Conditions → Grant → Session) is identical for every policy you build in d32t2, d32t3, d33, d34",
      "• Report-only BEFORE On is the professional deployment pattern — skip it and you risk tenant-wide lockout",
      "• Break-glass accounts are the one thing that prevents a bad CA policy from ending your career. Every tenant has one. You just built yours.",
      "• The sign-in log's Conditional Access tab is THE troubleshooting surface for identity — every 'why can't user X access app Y' question starts there"
    ]},
    {id:"d32t2",text:"Build CA Policy: Block sign-ins from outside the US",cat:"lab",icon:"🌍",time:"~20 min",diff:2,prereq:"d31t2",steps:[
      "## Create",
      "Name: 'CA002-Block-Outside-US'",
      "Users: All users | Target resources: All cloud apps",
      "Conditions → Locations → Include: Any location → Exclude: Trusted Office IP + United States",
      "Grant: Block access",
      "## Test",
      "Report-only → check logs → then enable",
      "Try signing in on the Surface Pro (US) — should work",
      "Review the sign-in log entry to see the CA evaluation"
    ]},
    {id:"d32t3",text:"MS Learn: Conditional Access modules",cat:"study",icon:"📖",time:"~75 min",diff:2,steps:[
      "## Open the path",
      "https://learn.microsoft.com/en-us/training/paths/implement-authentication-access-management/",
      "## Focus",
      "All Conditional Access modules — this is the single most tested SC-300 topic",
      "## The formula",
      "IF (users + apps + conditions: location, device, risk, platform) THEN (grant/block + session controls)",
      "## Design principle",
      "Think in layers: base policies + exception policies + break-glass accounts",
      "Individual rules don't protect — sets of policies working together do"
    ]},
  ]},
  {day:33,label:"CA for Device Compliance",tasks:[
    {id:"d33t1",text:"Build CA Policy: Require compliant device",cat:"lab",icon:"✅",time:"~20 min",diff:2,prereq:"d32t1",steps:[
      "## Create",
      "Name: 'CA003-Require-Compliant-Desktop'",
      "Users: All users",
      "Target resources: All cloud apps",
      "Conditions → Device platforms: Windows, macOS",
      "Grant: Require device to be marked as compliant",
      "## What this bridges",
      "Intune evaluates compliance → Entra reads compliance state → CA enforces access decision",
      "Noncompliant device = blocked from M365",
      "## Test",
      "Your Surface Pro should pass since Phase 2 compliance policies are applied"
    ]},
    {id:"d33t2",text:"Build CA Policy: Block legacy authentication",cat:"lab",icon:"🚫",time:"~15 min",diff:2,steps:[
      "## Create",
      "Name: 'CA004-Block-Legacy-Auth'",
      "Users: All users | Target resources: All cloud apps",
      "Conditions → Client apps → Select: Exchange ActiveSync clients + Other clients (legacy)",
      "Grant: Block access",
      "## Why",
      "Legacy auth (basic auth, POP, IMAP without OAuth) bypasses MFA",
      "Blocking it is the single highest-impact security policy most tenants can enable",
      "## Report-only first, then enable"
    ]},
  ]},
  {day:34,label:"Authentication Methods",tasks:[
    {id:"d34t1",text:"Configure authentication methods in Entra",cat:"lab",icon:"🔐",time:"~45 min",diff:2,prereq:"d1t2",steps:[
      "## Why this task now",
      "d32 required MFA via Conditional Access. But 'MFA' is a category, not a specific method — SMS is MFA, Microsoft Authenticator is MFA, FIDO2 keys are MFA. They're not equally secure. SMS is vulnerable to SIM swap; Authenticator push is vulnerable to fatigue attacks; FIDO2 is phishing-resistant. Configuring which methods your users CAN use determines how strong your MFA actually is.",
      "This task is also the gateway to d34t2 (Authentication Strengths) which requires specific phishing-resistant methods for admins.",
      "## Learn context",
      "SC-300 module 'Plan and implement multifactor authentication' covers strength hierarchy. Key interview knowledge: SMS < Voice Call < Authenticator (notification only) < Authenticator (number matching) < FIDO2 / Windows Hello for Business.",

      "## Step 1 — Navigate to Authentication methods",
      "https://entra.microsoft.com → Protection (left nav)",
      "Click 'Authentication methods' under Protection",
      "Sub-nav appears: Policies, Monitoring, Password protection, Password reset, User registration details, etc.",
      "Click Policies (default)",
      "You see a list of every authentication method Entra supports with its current state:",
      "• FIDO2 security key",
      "• Microsoft Authenticator",
      "• SMS",
      "• Temporary Access Pass",
      "• Hardware OATH tokens",
      "• Third-party software OATH tokens",
      "• Voice call",
      "• Email OTP",
      "• Certificate-based authentication",
      "• Windows Hello for Business (newer UI versions list this separately)",
      "Official doc: https://learn.microsoft.com/en-us/entra/identity/authentication/concept-authentication-methods",

      "## Step 2 — Enable Microsoft Authenticator (strongest practical method)",
      "Click 'Microsoft Authenticator' row",
      "Right-hand panel opens",
      "",
      "Enable and Target tab:",
      "• Enable: Yes",
      "• Target: include All users",
      "",
      "Configure tab (this is where the anti-fatigue settings live):",
      "• Allow use of Microsoft Authenticator OTP: Enabled",
      "• Microsoft Authenticator authentication mode: Any (allows push, OTP, or passwordless)",
      "",
      "Show application name in push and passwordless notifications:",
      "• State: Enabled",
      "• Target: All users",
      "",
      "Show geographic location in push and passwordless notifications:",
      "• State: Enabled",
      "• Target: All users",
      "",
      "Require number matching for push notifications:",
      "• State: Enabled",
      "• Target: All users",
      "(CRITICAL — this is the anti-fatigue control. Without number matching, an attacker spamming MFA prompts can eventually get a user to accidentally tap Approve. With number matching, the user must type the correct number from the sign-in screen.)",
      "",
      "Click Save",

      "## Step 3 — Enable FIDO2 (for phishing-resistant MFA, required by d34t2)",
      "Click FIDO2 security key row",
      "Enable and Target tab: Enable = Yes, Target = All users",
      "Configure tab:",
      "• Allow self-service set up: Yes",
      "• Enforce attestation: Yes (verifies the key is from a trusted manufacturer)",
      "• Enforce key restrictions: No (for lab; in production, restrict to YubiKey/Feitian/etc.)",
      "Save",
      "(Note: You don't need an actual FIDO2 key today. Enabling the method is what allows your admins — in d34t2 — to require it for high-privilege roles.)",

      "## Step 4 — Enable Windows Hello for Business (if not already)",
      "Click Windows Hello for Business row (or 'Passkey (Windows Hello)' in newer UIs)",
      "Enable: Yes, Target: All users",
      "Save",
      "(WHfB is biometric + TPM — phishing-resistant like FIDO2. On Entra-joined Windows devices it's often enabled by default.)",

      "## Step 5 — Restrict SMS (keep enabled as fallback, but target narrowly)",
      "Click SMS row",
      "Enable: Yes",
      "Target tab: change from All users to a specific group (e.g., SG-LegalSMS, or specific users who can't use Authenticator)",
      "(The professional pattern is: don't disable SMS entirely (lockout risk for users without smartphones), but restrict it so most users default to Authenticator.)",
      "Save",

      "## Step 6 — Disable or restrict Voice call",
      "Same pattern as SMS — click → Enable: Yes → Target: empty group or specific exceptions only",
      "Voice call is as weak as SMS and has even fewer legitimate use cases.",

      "## Step 7 — Disable Email OTP (if enabled)",
      "Click Email OTP row",
      "Enable: No",
      "Save",
      "(Email OTP = 'your code is X, sent to your email'. Fine for guest sign-ins but not for primary MFA. Default should be disabled for your own users.)",

      "## Step 8 — Configure Temporary Access Pass (powerful onboarding tool)",
      "Click Temporary Access Pass row",
      "Enable: Yes",
      "Target: All users (or a specific admin group that can issue TAPs)",
      "Configure tab:",
      "• Minimum lifetime: 1 hour",
      "• Maximum lifetime: 8 hours",
      "• Default lifetime: 1 hour",
      "• One-time use: Required (best practice)",
      "• Length: 8 digits",
      "Save",
      "(TAP lets admins issue a time-limited code for users to onboard MFA without a password reset. Huge unlock for helpdesk scenarios.)",

      "## Step 9 — Audit — the Authentication methods activity report",
      "Left nav under Authentication methods: Monitoring → User registration details",
      "Shows every user and which methods they've registered",
      "Filter by 'Method registered' = 'None' to find users without any MFA registered — those are your risk accounts",
      "Export to CSV for record-keeping",

      "## Step 10 — Register MFA for a test user",
      "Sign out of admin → sign in as one of your d3 test users in InPrivate browser",
      "If your d32 CA policy is enforcing, MFA registration is triggered",
      "On the prompt: choose Microsoft Authenticator app",
      "• Download Microsoft Authenticator on phone (if not installed)",
      "• Scan the QR code on screen",
      "• Complete a test sign-in with number matching",
      "Back in admin session: Users → the test user → Authentication methods tab → should show Microsoft Authenticator listed",

      "## Common issues",
      "• Changes don't apply to users — Authentication methods policies can take up to 1 hour to propagate. Force a new sign-in to re-evaluate.",
      "• 'Your organization requires additional security info' loop — Combined Registration is disabled. Go to entra.microsoft.com → Overview → Properties → 'Security defaults' and 'User settings' → Enable Combined Registration.",
      "• User can't register FIDO2 despite being enabled — FIDO2 requires a compatible browser (Edge, Chrome) and HTTPS context. Test at aka.ms/mysecurityinfo.",
      "• Number matching not showing — user's Authenticator app is outdated. Update the app to the latest version from the App Store / Play Store.",

      "## What you learned that you'll reuse",
      "• Authentication methods policies = WHICH methods are allowed. CA policies = WHEN to require MFA (using whatever allowed methods).",
      "• Number matching is the single most important setting to enable — it defeats push fatigue attacks.",
      "• The strength hierarchy: SMS/Voice (weakest) < Authenticator notification < Authenticator with number matching < FIDO2 / Windows Hello for Business (phishing-resistant)",
      "• Temporary Access Pass is the helpdesk's modern password-reset replacement — memorize this for interviews"
    ]},
    {id:"d34t2",text:"Create an Authentication Strengths policy",cat:"lab",icon:"💪",time:"~20 min",diff:3,prereq:"d34t1",steps:[
      "## Open",
      "entra.microsoft.com → Protection → Authentication methods → Authentication strengths",
      "## Create a custom strength",
      "Name: 'Admin-Phishing-Resistant-Only'",
      "Allowed methods: FIDO2 only + Windows Hello for Business",
      "## Apply via CA",
      "Create a CA policy targeting admin roles that requires this authentication strength",
      "Now admins cannot satisfy MFA with Authenticator push — only FIDO2 or WHfB"
    ]},
    {id:"d34t3",text:"MS Learn: Authentication methods and MFA",cat:"study",icon:"📖",time:"~60 min",diff:2,steps:[
      "## Open",
      "https://learn.microsoft.com/en-us/search/?terms=Plan%20and%20implement%20multifactor%20authentication&category=LearningPath",
      "## Strength hierarchy",
      "SMS (weakest — SIM swap vulnerable) → Authenticator push → Number matching → FIDO2 / Windows Hello for Business (strongest, phishing-resistant)",
      "## What makes FIDO2 phishing-resistant",
      "Private key never leaves the device — attacker cannot replay a stolen token",
      "## MFA definition",
      "Something you know (password) + something you have (phone, key) + optionally something you are (biometric)"
    ]},
  ]},
  {day:35,label:"Privileged Identity Management",tasks:[
    {id:"d35t1",text:"Explore PIM (Entra ID P2 feature)",cat:"lab",icon:"⏱️",time:"~30 min",diff:2,prereq:"d1t2",steps:[
      "## Navigate",
      "entra.microsoft.com → Identity governance → Privileged Identity Management",
      "## License note",
      "PIM requires Entra ID P2 — Business Premium includes P1 only",
      "Some features will be unavailable in your tenant — note which ones for interview honesty",
      "## Explore the UI",
      "Roles → Entra roles → My roles",
      "Settings → Roles → (select a role) → Settings",
      "## Concept preview",
      "Eligible vs Active assignments, activation workflow, approval chains"
    ]},
    {id:"d35t2",text:"Configure PIM role settings for Global Admin",cat:"lab",icon:"⚙️",time:"~20 min",diff:3,prereq:"d35t1",steps:[
      "## Open settings",
      "PIM → Entra roles → Settings → Global Administrator",
      "## Configure activation",
      "Activation maximum duration: 2 hours",
      "Require MFA on activation: Yes",
      "Require justification: Yes",
      "Require ticket information: Yes (integrates with ITSM)",
      "Require approval: Yes (approver: another admin)",
      "## Concept",
      "No standing Global Admin — elevation is JIT with approval + MFA + audit trail"
    ]},
    {id:"d35t3",text:"MS Learn: PIM modules",cat:"study",icon:"📖",time:"~60 min",diff:3,steps:[
      "## Open",
      "https://learn.microsoft.com/en-us/entra/id-governance/privileged-identity-management/pim-configure",
      "Module: https://learn.microsoft.com/en-us/search/?terms=Configure%20Microsoft%20Entra%20Privileged%20Identity%20Management&category=Module",
      "## What PIM is",
      "Privileged Identity Management — users become ELIGIBLE for roles instead of permanently assigned",
      "Activation requires MFA + justification + optional approval — this is JIT (Just-In-Time) access",
      "## Interview framing",
      "'Standing admin rights are the #1 cause of breach blast radius. PIM provides JIT elevation with approval, MFA, and full audit trail.'"
    ]},
  ]},
  {day:36,label:"Identity Protection",tasks:[
    {id:"d36t1",text:"Explore Identity Protection (P2 feature)",cat:"lab",icon:"🚨",time:"~30 min",diff:2,prereq:"d1t2",steps:[
      "## Navigate",
      "entra.microsoft.com → Protection → Identity Protection",
      "## Review risk views",
      "Risky users, Risky sign-ins, Risk detections",
      "## Configure risk policies",
      "User risk policy (high risk → require password change)",
      "Sign-in risk policy (medium+ risk → require MFA)",
      "## License note",
      "Full Identity Protection requires P2 — some features may be limited in Business Premium"
    ]},
    {id:"d36t2",text:"MS Learn: Identity Protection modules",cat:"study",icon:"📖",time:"~45 min",diff:2,steps:[
      "## Open",
      "https://learn.microsoft.com/en-us/entra/id-protection/overview-identity-protection",
      "Module: https://learn.microsoft.com/en-us/search/?terms=Implement%20Microsoft%20Entra%20ID%20Protection&category=Module",
      "## Risk distinction",
      "User risk — the account is likely compromised (leaked credentials, unusual behavior)",
      "Sign-in risk — THIS sign-in is suspicious (impossible travel, anonymous IP, unfamiliar location)",
      "## Remediation paths",
      "Self-remediation — user can unblock via password reset + MFA",
      "Admin-driven — 'Confirm user compromised' shuts the account down entirely",
      "## Overlap note",
      "Risk-based CA policies and Identity Protection risk policies cover similar ground — know when to use which"
    ]},
  ]},
  {day:37,label:"Application Management & SSO",tasks:[
    {id:"d37t1",text:"Configure a SAML SSO app integration",cat:"lab",icon:"🔗",time:"~45 min",diff:3,prereq:"d1t2",steps:[
      "## What SSO is",
      "SSO = Single Sign-On — user signs into Entra once, gets into every connected SaaS app without re-authenticating",
      "Security benefit: one identity, one audit trail, no password sprawl",
      "## Pick a gallery app",
      "entra.microsoft.com → Applications → Enterprise applications → '+ New application'",
      "Search the gallery for Salesforce, Box, or ServiceNow — pick one with a SAML tutorial",
      "## Configure",
      "Set up Single Sign-On → SAML",
      "Configure Entity ID (unique app identifier)",
      "Configure Reply URL (where Entra sends the SAML response)",
      "Map attributes: UPN, email, display name",
      "## Assign and test",
      "Assign the app to SG-Sales-Team",
      "No actual SaaS subscription needed — configuring the Entra side is the learning"
    ]},
    {id:"d37t2",text:"Configure user consent settings",cat:"lab",icon:"🛡️",time:"~15 min",diff:2,steps:[
      "## Navigate",
      "entra.microsoft.com → Applications → Enterprise applications → Consent and permissions",
      "## Restrict user consent",
      "User consent for applications: Allow user consent for apps from verified publishers, for selected permissions",
      "## Why",
      "Without restriction, users can grant third-party apps access to your tenant data — consent phishing is a real attack vector",
      "## Admin consent workflow",
      "Enable admin consent workflow so users can request admin review for blocked apps"
    ]},
    {id:"d37t3",text:"MS Learn: 'Implement Access Management for Apps'",cat:"study",icon:"📖",time:"~75 min",diff:3,steps:[
      "## Open the path",
      "https://learn.microsoft.com/en-us/training/paths/implement-access-management-apps/",
      "## Concepts",
      "Enterprise applications vs App registrations",
      "SAML vs OIDC federation",
      "Consent framework (admin consent vs user consent)",
      "App permissions (delegated vs application)",
      "## Interview-critical concept",
      "How do you control which third-party apps users can authorize against your tenant?",
      "Answer: User consent settings + admin consent workflow + verified publisher requirements",
      "## Bonus: App Proxy",
      "App Proxy publishes on-prem apps through Entra without opening firewall ports"
    ]},
  ]},
  {day:38,label:"External Identities (B2B)",tasks:[
    {id:"d38t1",text:"Invite a guest user and configure B2B settings",cat:"lab",icon:"🤝",time:"~25 min",diff:2,prereq:"d3t1",steps:[
      "## Invite",
      "entra.microsoft.com → Users → '+ Invite external user'",
      "Use a personal email you control",
      "## Check the invitation flow",
      "Accept the invite from the personal mailbox",
      "Observe how the guest lands in your tenant as an external user",
      "## Review external collaboration settings",
      "entra.microsoft.com → External Identities → External collaboration settings",
      "Guest user access restrictions: 'Guest users have limited access'",
      "Collaboration restrictions: Allow invitations to specific domains only (configurable)"
    ]},
    {id:"d38t2",text:"MS Learn: External identities and B2B collaboration",cat:"study",icon:"📖",time:"~45 min",diff:2,steps:[
      "## Open",
      "https://learn.microsoft.com/en-us/entra/external-id/external-identities-overview",
      "Module: https://learn.microsoft.com/en-us/search/?terms=Explore%20external%20identities%20in%20Microsoft%20Entra%20ID&category=Module",
      "## B2B vs B2C",
      "B2B — partners/vendors authenticate with their own IdP, access your resources under your policies",
      "B2C — customer-facing identity, separate consumer directory, used for retail apps",
      "## Cross-tenant access settings",
      "Fine-grained control over which external Entra orgs can collaborate",
      "Trust their MFA claims, define which resources they reach"
    ]},
  ]},
  {day:39,label:"Identity Governance",tasks:[
    {id:"d39t1",text:"Create an Access Review",cat:"lab",icon:"📋",time:"~25 min",diff:2,prereq:"d3t2",steps:[
      "## Navigate",
      "entra.microsoft.com → Identity governance → Access reviews → '+ New access review'",
      "## Configure",
      "Review type: Teams + Groups → select SG-Legal-Team",
      "Reviewers: Group owners (or self-review)",
      "Duration: 7 days, recurring quarterly",
      "## Purpose",
      "Access reviews force periodic re-justification of group membership",
      "Prevents 'permission creep' — users accumulating access they no longer need"
    ]},
    {id:"d39t2",text:"Create an Entitlement Management access package",cat:"lab",icon:"🎁",time:"~30 min",diff:3,prereq:"d39t1",steps:[
      "## Navigate",
      "Identity governance → Entitlement management → Access packages → '+ New access package'",
      "## Configure",
      "Name: 'AP-Marketing-Onboarding'",
      "Resources: SG-Marketing-Auto group + any SaaS apps for marketing",
      "Assignment policy: For users not in your directory (external) + requires approval",
      "Access expires after 90 days with review",
      "## What this automates",
      "Instead of admins manually adding each new hire to groups and apps, the access package is a self-service bundle with approval + expiration",
      "## License note",
      "Access packages require Entra ID Governance license"
    ]},
    {id:"d39t3",text:"MS Learn: 'Plan and implement an identity governance strategy'",cat:"study",icon:"📖",time:"~75 min",diff:3,steps:[
      "## Open the path",
      "https://learn.microsoft.com/en-us/training/paths/plan-implement-identity-governance-strategy/",
      "## Modules",
      "Entitlement management (access packages)",
      "Access reviews",
      "Privileged Identity Management (revisited)",
      "Terms of use",
      "## Interview framing",
      "'Governance is how you prove to auditors that access is appropriate — not just that it was granted by the right person'"
    ]},
  ]},
  {day:40,label:"Lifecycle Workflows",tasks:[
    {id:"d40t1",text:"Create a Lifecycle Workflow (Leaver scenario)",cat:"lab",icon:"🔄",time:"~30 min",diff:3,prereq:"d3t2",steps:[
      "## Navigate",
      "entra.microsoft.com → Identity governance → Lifecycle workflows → '+ New workflow'",
      "## Configure (Leaver scenario)",
      "Template: 'Pre-hire' → pick 'Leaver' scenario",
      "Name: 'LW-Leaver-StandardOffboarding'",
      "Trigger: Scheduled, when employeeLeaveDateTime is reached",
      "## Tasks to chain",
      "Disable user account",
      "Remove user from all groups",
      "Remove user from all Teams",
      "Send email notification to manager",
      "## Test",
      "Use 'Execute on-demand' with a test user to validate",
      "## License note",
      "Requires Entra ID Governance add-on"
    ]},
    {id:"d40t2",text:"MS Learn: Lifecycle workflows",cat:"study",icon:"📖",time:"~45 min",diff:3,steps:[
      "## Open",
      "https://learn.microsoft.com/en-us/entra/id-governance/what-are-lifecycle-workflows",
      "Module: https://learn.microsoft.com/en-us/search/?terms=Plan%20and%20implement%20lifecycle%20workflows&category=Module",
      "## What this automates",
      "The JML process (Joiner / Mover / Leaver) — historically the most tedious and error-prone admin task",
      "## Trigger types",
      "Joiner — new hire",
      "Mover — role change",
      "Leaver — termination",
      "## Strong interview answer",
      "'How would you handle identity lifecycle at scale?' — walk through the Leaver workflow from Day 40 lab"
    ]},
  ]},
  {day:41,label:"Monitoring & Sign-in Logs",tasks:[
    {id:"d41t1",text:"Investigate sign-in logs in Entra",cat:"lab",icon:"🔍",time:"~30 min",diff:2,prereq:"d32t1",steps:[
      "## Navigate",
      "entra.microsoft.com → Monitoring → Sign-in logs",
      "## Filter and pivot",
      "Filter by a specific user → review all recent sign-ins",
      "Click an individual sign-in → review the detail pane",
      "## Tabs to explore per sign-in",
      "Basic info, Location, Device info, Authentication details, Conditional Access (which policies evaluated and how)",
      "## Exercise",
      "Find the sign-in entry from your Day 32 CA test — confirm the policy evaluation result shown",
      "## Mental model",
      "Every sign-in = data point. Every suspicious sign-in = investigation start."
    ]},
    {id:"d41t2",text:"MS Learn: Entra monitoring and reporting",cat:"study",icon:"📖",time:"~60 min",diff:2,steps:[
      "## Open",
      "https://learn.microsoft.com/en-us/entra/identity/monitoring-health/overview-monitoring-health",
      "Module: https://learn.microsoft.com/en-us/search/?terms=Monitor%2C%20troubleshoot%2C%20and%20report%20on%20Microsoft%20Entra%20ID&category=Module",
      "## Log types",
      "Sign-in logs (interactive, non-interactive, service principal, managed identity)",
      "Audit logs (who changed what)",
      "Provisioning logs (sync from HR/on-prem)",
      "## Retention",
      "Entra retains 30 days by default — export to Log Analytics or Sentinel for long-term",
      "## Investigation flow",
      "Alert → pivot to sign-in logs → filter by user/IP/app → identify risk signals → confirm compromise → remediate (revoke sessions, reset password, require MFA re-registration)"
    ]},
  ]},
  {day:42,label:"Incident Response Drill",tasks:[
    {id:"d42t1",text:"Simulate a compromised account response",cat:"lab",icon:"🚒",time:"~75 min",diff:3,prereq:"d41t1",steps:[
      "## Why this task now",
      "Compromised account response is the single most-asked scenario question in identity security interviews. 'A user calls and says their account was phished — what do you do?' You need this flow cold, including the ORDER of actions (containment first, investigation second — not the other way around).",
      "The runbook you produce today goes into your portfolio (Day 47) and is referenced in the Day 55 mock interview.",
      "## Learn context",
      "This drill synthesizes SC-300 content from paths 'Implement an Authentication and Access Management solution' and 'Plan and implement an identity governance strategy'. No new concepts — you're applying what you've studied under time pressure.",

      "## The scenario (act this out as if it's real)",
      "11:47 AM: A test user calls the IT helpdesk. 'I clicked a link in an email that said my mailbox was full. It took me to what looked like a Microsoft sign-in page. I entered my password. Then nothing happened and I closed the window. Now I'm worried.'",
      "You are the on-call identity engineer. Go.",

      "## The NIST IR phases (frame your thinking)",
      "1. CONTAIN — stop the attacker's access immediately",
      "2. ERADICATE — remove attacker persistence (malicious forwarding rules, app consents, inbox rules, added devices)",
      "3. INVESTIGATE — what did the attacker do before you cut them off?",
      "4. RECOVER — safely restore user access",
      "5. POST-INCIDENT — lessons learned, close gaps",
      "Order matters. Interviewers listen for 'contain first' — juniors investigate first and let the attacker stay in.",

      "## Phase 1: CONTAIN (do these in parallel, fast)",
      "",
      "Action 1.1 — Revoke all active sessions",
      "• entra.microsoft.com → Users → select the compromised user",
      "• Overview tab → top bar → click 'Revoke sessions'",
      "• Confirm",
      "• WHAT THIS DOES: invalidates every refresh token the user has. Any stolen session cookies become worthless. Attacker sitting in OWA? Kicked out.",
      "• Cmdlet equivalent: Revoke-MgUserSignInSession -UserId <userId>",
      "",
      "Action 1.2 — Disable the account temporarily",
      "• Same user page → Overview → click 'Disable account' (cloud icon with slash)",
      "• Confirm",
      "• WHAT THIS DOES: blocks new sign-ins entirely. Attacker can't get back in even with credentials.",
      "• (You'll re-enable after password reset — this is a holding measure.)",
      "",
      "Action 1.3 — Reset the password to a strong random value",
      "• Same user page → top bar → 'Reset password'",
      "• Generate a new temporary password (or let Entra auto-generate)",
      "• DO NOT share with the user yet — first you'll investigate and eradicate",

      "## Phase 2: ERADICATE (remove persistence)",
      "",
      "Action 2.1 — Check for malicious inbox rules in Exchange",
      "• admin.microsoft.com → Exchange admin center → Mail flow → or go direct to https://admin.exchange.microsoft.com",
      "• Recipients → Mailboxes → find the compromised user",
      "• Mailbox settings → Rules",
      "• Common attacker rules to look for: auto-forward to external domain, delete-on-arrival for specific senders (to hide attacker replies), move-to-Archive for messages containing 'password' or 'invoice'",
      "• Delete any suspicious rules",
      "• PowerShell equivalent: Get-InboxRule -Mailbox <user>",
      "",
      "Action 2.2 — Check for unauthorized app consents",
      "• entra.microsoft.com → Applications → Enterprise applications → 'User assignment required? = any'",
      "• Filter by user: your compromised user",
      "• Or: entra.microsoft.com → Users → user → Applications",
      "• Attacker pattern: consent-grant phishing — trick user into granting a malicious OAuth app access to mail",
      "• Review each app. Anything unfamiliar → revoke consent.",
      "• Detailed doc: https://learn.microsoft.com/en-us/defender-office-365/detect-and-remediate-illicit-consent-grants",
      "",
      "Action 2.3 — Check for added devices",
      "• entra.microsoft.com → Users → user → Devices",
      "• Unfamiliar devices registered under this user = attacker enrolled their own device to bypass MFA",
      "• Disable or delete any suspicious devices",
      "",
      "Action 2.4 — Check for added authentication methods",
      "• Users → user → Authentication methods",
      "• Attacker pattern: attacker registers their own phone number or Authenticator app as a secondary MFA method",
      "• Delete any methods the user doesn't recognize",
      "• Click 'Require re-register multifactor authentication' at top",

      "## Phase 3: INVESTIGATE (what did they do?)",
      "",
      "Action 3.1 — Sign-in logs for the compromised user",
      "• entra.microsoft.com → Monitoring → Sign-in logs",
      "• Filter: User = compromised user, Date = last 24 hours",
      "• For each sign-in: check Location (is it from expected geography?), IP address, Device (unfamiliar = compromise indicator), Application accessed",
      "• Flag every sign-in from an unfamiliar location/IP — that was the attacker",
      "• Document time range of attacker activity",
      "",
      "Action 3.2 — Audit logs for admin actions",
      "• entra.microsoft.com → Monitoring → Audit logs",
      "• Filter: Initiated by (actor) = compromised user, Date = last 24 hours",
      "• Look for: role assignments, password resets, group additions, app consents, device joins",
      "• Any of these = attacker attempted escalation. Document and revert each.",
      "",
      "Action 3.3 — Check for mailbox exfiltration",
      "• Exchange admin center → Reports → Mail flow",
      "• Or: Defender XDR (security.microsoft.com) → Explorer → search by user",
      "• Look for unusual outbound volume, large attachments sent externally, emails to unknown domains",
      "",
      "Action 3.4 — Check for data access in SharePoint/OneDrive",
      "• admin.microsoft.com → SharePoint admin → site → activity",
      "• Or: Purview audit log search (if available)",
      "• Unusual file downloads from this user's account during the attacker window = data exfiltration",

      "## Phase 4: RECOVER",
      "",
      "Action 4.1 — Re-enable the user account",
      "• entra.microsoft.com → Users → user → Enable account",
      "",
      "Action 4.2 — Deliver the new temporary password out-of-band",
      "• Call the user directly (not via the compromised email)",
      "• Or use a Temporary Access Pass (d34t1 Step 8): Users → user → Authentication methods → + Add authentication method → Temporary Access Pass",
      "• Issue a 1-hour TAP; user uses it to sign in and register new MFA methods",
      "",
      "Action 4.3 — Force new MFA registration",
      "• Already triggered in Action 2.4. User must re-register Authenticator on next sign-in.",

      "## Phase 5: POST-INCIDENT",
      "",
      "Action 5.1 — Write the incident note",
      "• What happened, what was done, timeline, affected scope",
      "• Save to your incident log",
      "",
      "Action 5.2 — Identify gaps",
      "• Did your CA policies catch this? (Phishing sign-in from a new location should have triggered MFA. If it didn't, why?)",
      "• Did Identity Protection flag it as risky? (If not, check your risk policies.)",
      "• Is there a CA policy tightening that would prevent repeat?",

      "## Step — Write the runbook document",
      "Open any markdown editor (VS Code, Typora, or Notepad)",
      "Create 'compromised-account-runbook.md' in your IntuneScripts folder (git-tracked)",
      "Include: the 5 phases above, specific click paths for each action, PowerShell equivalents",
      "Add a one-page 'quick card' at top — the 'under 5 minute containment' checklist",
      "This is a PORTFOLIO ARTIFACT — include it on LinkedIn Featured (Day 47) and attach to applications",

      "## Practice the 60-second verbal summary",
      "'If a user reports suspicious account activity: First, revoke sessions and disable the account to contain. Second, check inbox rules, app consents, added devices, and added MFA methods for persistence — remove anything unauthorized. Third, review sign-in logs and audit logs to understand what the attacker did while they had access. Fourth, reset the password, deliver out-of-band, and re-enable. Fifth, close the gaps — what policy should have caught this?'",
      "Rehearse this until it's under 60 seconds and comes out cleanly.",

      "## Common issues",
      "• 'Revoke sessions' button disabled — user not selected or you don't have User Administrator role",
      "• Can't find inbox rules in Exchange admin — make sure you're in the user's mailbox settings, not tenant-wide mail flow rules (different object)",
      "• 'Add authentication method' TAP option missing — Temporary Access Pass isn't enabled tenant-wide. Revisit d34t1 Step 8.",
      "• Unified audit log returns nothing — it may not be enabled on older tenants. admin.exchange.microsoft.com → Search & investigation → Audit log search → 'Start recording user and admin activities'",

      "## What you learned that you'll reuse",
      "• Contain → Eradicate → Investigate → Recover → Post-incident — the 5 phases map to NIST IR and work for almost any security incident",
      "• Session revocation is the single most impactful containment action — stolen tokens become useless",
      "• Persistence-check checklist (inbox rules + OAuth grants + devices + auth methods) — memorize this for interviews",
      "• This task's runbook is the interview artifact — hiring managers asked 'show me something you built' will love it"
    ]},
    {id:"d42t2",text:"Practice the incident response narrative",cat:"interview",icon:"🎤",time:"~20 min",diff:2,prereq:"d42t1",steps:[
      "## The question",
      "'A user reports a suspicious sign-in to their account. Walk me through your response.'",
      "## Answer structure",
      "1. Contain — revoke sessions, reset password",
      "2. Investigate — review sign-in logs, audit logs",
      "3. Eradicate — require MFA re-registration, check for persistence (added apps, forwarding rules)",
      "4. Recover — restore access, communicate with user",
      "5. Lessons learned — did CA policies catch this? What needs tightening?",
      "## Practice out loud",
      "2–3 minutes — this is one of the most common identity interview questions"
    ]},
  ]},
  {day:43,label:"Hybrid Identity Concepts",tasks:[
    {id:"d43t1",text:"Study Entra Connect and hybrid identity",cat:"study",icon:"🌉",time:"~45 min",diff:2,steps:[
      "## Why this matters for interviews",
      "Most enterprises are hybrid — on-prem AD plus Entra",
      "You need to know the sync methods cold",
      "## Three sign-in methods",
      "PHS (Password Hash Sync) — on-prem password hash synced to cloud; users authenticate against Entra. Simplest, 95% of orgs.",
      "PTA (Pass-Through Authentication) — user types password in Entra → Entra forwards validation to on-prem AD via a lightweight agent. Password stays on-prem.",
      "Federation — ADFS or third-party IdP handles auth entirely. Legacy, being phased out.",
      "## Recommendation framework",
      "Default → PHS",
      "Password hashes can't legally leave on-prem → PTA",
      "Third-party MFA/identity provider required → Federation (rare)"
    ]},
    {id:"d43t2",text:"MS Learn: Hybrid identity modules",cat:"study",icon:"📖",time:"~60 min",diff:2,steps:[
      "## Open",
      "https://learn.microsoft.com/en-us/entra/identity/hybrid/connect/whatis-hybrid-identity",
      "Entra Connect: https://learn.microsoft.com/en-us/entra/identity/hybrid/connect/whatis-azure-ad-connect",
      "## Tools",
      "Entra Connect Sync — legacy, installed on a Windows server, full UI",
      "Entra Cloud Sync — modern, lightweight agent, less flexibility but easier ops",
      "## Complete the knowledge check"
    ]},
  ]},

  {day:51,label:"Enterprise Scenario — 500-Person Design",tasks:[
    {id:"d51t1",text:"Design the CA policy set for a fictitious 500-person company",cat:"review",icon:"🏢",time:"~90 min",diff:3,prereq:"d49t1",steps:[
      "## Fictitious company profile",
      "500 employees, US-based HQ, 3 regional offices",
      "Mix of in-office, remote, and BYOD",
      "Admins: ~15 people across tiers",
      "External contractors: ~30",
      "## Design the policy set",
      "CA001 — Require MFA all users (Report-only, then enforce)",
      "CA002 — Block legacy auth",
      "CA003 — Require compliant device for desktop platforms",
      "CA004 — Block sign-ins from outside the US (exclude travel flag group)",
      "CA005 — Require phishing-resistant MFA for admin roles",
      "CA006 — Session controls for SharePoint/OneDrive (browser only, no download on unmanaged)",
      "CA007 — Block high-risk sign-ins",
      "CA008 — Require terms of use for guest users",
      "## Document each",
      "Policy name, assignments, conditions, controls, justification",
      "This is an interview deliverable — walk through it in whiteboard-style conversation"
    ]},
    {id:"d51t2",text:"Practice the enterprise CA walkthrough out loud",cat:"interview",icon:"🎤",time:"~30 min",diff:2,prereq:"d51t1",steps:[
      "## Rehearse the explanation",

      "Talk through each policy: what it does, what gap it closes, what order you'd deploy them",
      "Target: 5–7 minutes from CA001 through CA008, fluently",
      "## Whiteboard discipline",
      "Be able to draw a 2-axis grid — Users (rows) × Resources (columns) — and plot which policy covers which intersection",
      "This is the format many interviewers expect for identity architecture questions"
    ]},

// ===== AUTO-LINK URLs IN PROSE =====
const linkify = (text, accent) => {
  if (!text || typeof text !== "string") return text;
  const URL_REGEX = /(https?:\/\/\S+)/g;
  const parts = text.split(URL_REGEX);
  return parts.map((part, i) => {
    // Odd indices are captured URLs (split with a capture group interleaves them)
    if (i % 2 === 1) {
      // Strip trailing punctuation that's almost certainly not part of the URL
      let url = part;
      let trailing = "";
      while (url.length > 0 && /[.,;:!?)\]}]/.test(url[url.length - 1])) {
        trailing = url[url.length - 1] + trailing;
        url = url.slice(0, -1);
      }
      return (
        <React.Fragment key={i}>
          <a href={url} target="_blank" rel="noopener noreferrer" onClick={e => e.stopPropagation()} style={{
            color: accent || "#06B6D4",
            textDecoration: "underline",
            textDecorationColor: `${accent || "#06B6D4"}66`,
            textUnderlineOffset: 2,
            wordBreak: "break-all"
          }}>{url}</a>
          {trailing}
        </React.Fragment>
      );
    }
    return part;
  });
};

// ===== STEP RENDERING HELPERS (new) =====
const isSectionLine = s => s.startsWith("## ");
const isBulletLine = s => s.startsWith("•");
const isCodeStart = s => /^(\$|Connect-|Get-|New-|Set-|Install-|Remove-|foreach|if |while |for |try|catch|\}|\)|gam |Import-|Export-|cd |mkdir |#|@\{|Revoke-)/.test(s);
const isCodeContinue = s => /^(\s|\}|\))/.test(s);

// Group consecutive code lines that are part of the same logical script
// (multi-line constructs with open braces/parens stay together; standalone
// commands stay as their own block — one copy button each).
const groupSteps = (steps) => {
  const groups = [];
  let i = 0;
  while (i < steps.length) {
    const s = steps[i];
    if (isSectionLine(s)) { groups.push({ type: "section", text: s.slice(3) }); i++; continue; }
    if (isBulletLine(s))  { groups.push({ type: "bullet",  text: s }); i++; continue; }
    if (isCodeStart(s)) {
      const lines = [s];
      let depth = 0;
      const updateDepth = (line) => {
        for (const ch of line) {
          if (ch === "{" || ch === "(") depth++;
          else if (ch === "}" || ch === ")") depth--;
        }
      };
      updateDepth(s);
      let j = i + 1;
      while (j < steps.length && depth > 0) {
        const next = steps[j];
        if (isCodeStart(next) || isCodeContinue(next)) {
          lines.push(next);
          updateDepth(next);
          j++;
        } else break;
      }
      groups.push({ type: "code", lines });
      i = j;
      continue;
    }
    groups.push({ type: "prose", text: s });
    i++;
  }
  return groups;
};

// Code block component with its own copy button.
const CodeBlock = ({ lines, accent }) => {
  const [copied, setCopied] = useState(false);
  const m = "'JetBrains Mono',monospace";
  const text = lines.join("\n");
  const doCopy = () => {
    const fallback = () => {
      const el = document.createElement("textarea");
      el.value = text; el.style.position = "fixed"; el.style.opacity = "0";
      document.body.appendChild(el); el.select();
      try { document.execCommand("copy"); } catch (e) {}
      document.body.removeChild(el);
    };
    const after = () => { setCopied(true); setTimeout(() => setCopied(false), 1500); };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(after).catch(() => { fallback(); after(); });
    } else { fallback(); after(); }
  };
  return (
    <div style={{
      position: "relative", margin: "4px 0 14px 27px",
      background: "#1a2236", border: "1px solid #2a3450", borderRadius: 7,
      overflow: "hidden"
    }}>
      <button onClick={doCopy} style={{
        position: "absolute", top: 6, right: 6, zIndex: 2,
        padding: "4px 9px",
        background: copied ? "#10B98120" : "#0B1120E5",
        border: `1px solid ${copied ? "#10B98155" : "#334155"}`,
        borderRadius: 5,
        color: copied ? "#10B981" : (accent || "#06B6D4"),
        fontFamily: m, fontSize: 9.5, fontWeight: 700, letterSpacing: 0.5, cursor: "pointer"
      }}>{copied ? "✓ COPIED" : "📋 COPY"}</button>
      <pre style={{
        margin: 0, padding: "10px 12px", paddingRight: 64,
        fontFamily: m, fontSize: 12.5, lineHeight: 1.65,
        color: "#CBD5E1", overflowX: "auto", whiteSpace: "pre"
      }}>{text}</pre>
    </div>
  );
};

// ===== GITHUB GIST SYNC =====
const GIST_FILE = "sprint-progress.json";
const GIST_DESCRIPTION = "Security Engineering Sprint — progress (private)";
const SYNC_DEBOUNCE_MS = 2500;

const gistFetch = async (token, path, opts = {}) => {
  const res = await fetch(`https://api.github.com${path}`, {
    ...opts,
    headers: {
      "Authorization": `Bearer ${token}`,
      "Accept": "application/vnd.github+json",
      "X-GitHub-Api-Version": "2022-11-28",
      "Content-Type": "application/json",
      ...(opts.headers || {})
    }
  });
  if (!res.ok) {
    const text = await res.text().catch(() => "");
    throw new Error(`GitHub ${res.status}: ${text.slice(0, 140) || res.statusText}`);
  }
  return res.json();
};

const gistAPI = {
  validateToken: (token) => gistFetch(token, "/user"),
  create: (token, content) => gistFetch(token, "/gists", {
    method: "POST",
    body: JSON.stringify({
      description: GIST_DESCRIPTION,
      public: false,
      files: { [GIST_FILE]: { content } }
    })
  }),
  read: async (token, gistId) => {
    const data = await gistFetch(token, `/gists/${gistId}`);
    const file = data.files?.[GIST_FILE];
    if (!file) throw new Error(`Gist found but missing file '${GIST_FILE}'`);
    return { content: file.content, updatedAt: data.updated_at, gistId: data.id };
  },
  update: (token, gistId, content) => gistFetch(token, `/gists/${gistId}`, {
    method: "PATCH",
    body: JSON.stringify({ files: { [GIST_FILE]: { content } } })
  })
};

const buildSnapshot = (data) => JSON.stringify({
  version: 1,
  lastModified: new Date().toISOString(),
  completed: data.completed || {},
  habitLog: data.habitLog || {},
  startDate: data.startDate || null,
  labRef: data.labRef || { tenantId: "", tenantDomain: "", adminUpn: "", recoveryUsb: "" }
}, null, 2);

const parseSnapshot = (content) => {
  const data = JSON.parse(content);
  return {
    completed: data.completed || {},
    habitLog: data.habitLog || {},
    startDate: data.startDate || null,
    labRef: data.labRef || { tenantId: "", tenantDomain: "", adminUpn: "", recoveryUsb: "" }
  };
};

const snapshotKey = (s) => JSON.stringify({
  c: s.completed, h: s.habitLog, s: s.startDate, l: s.labRef
});

const fmtRelative = (iso) => {
  if (!iso) return "never";
  const diff = Date.now() - new Date(iso).getTime();
  if (diff < 60000) return "just now";
  if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
  if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
  return `${Math.floor(diff / 86400000)}d ago`;
};

const LS={get(k){try{return JSON.parse(localStorage.getItem(k))}catch{return null}},set(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}},del(k){try{localStorage.removeItem(k)}catch{}}};

function useGistSync({ snapshot, applyRemote }) {
  const [cfg, setCfg] = useState(() => LS.get("se-sync") || null);
  const [status, setStatus] = useState({ state: "idle", lastSync: null, error: null });
  const [hydrated, setHydrated] = useState(false);
  const debounceRef = React.useRef(null);
  const lastSentKeyRef = React.useRef(null);

  const updateCfg = useCallback((next) => {
    if (next) LS.set("se-sync", next); else LS.del("se-sync");
    setCfg(next);
    if (!next) { setHydrated(false); lastSentKeyRef.current = null; }
  }, []);

  // Pull on mount / cfg change
  useEffect(() => {
    if (!cfg?.enabled || !cfg?.token || !cfg?.gistId) { setHydrated(false); return; }
    let cancelled = false;
    (async () => {
      setStatus({ state: "syncing", lastSync: null, error: null });
      try {
        const { content } = await gistAPI.read(cfg.token, cfg.gistId);
        if (cancelled) return;
        const remote = parseSnapshot(content);
        applyRemote(remote);
        lastSentKeyRef.current = snapshotKey(remote);
        setStatus({ state: "idle", lastSync: new Date().toISOString(), error: null });
        setHydrated(true);
      } catch (e) {
        if (!cancelled) setStatus({ state: "error", lastSync: null, error: e.message });
      }
    })();
    return () => { cancelled = true; };
  }, [cfg?.enabled, cfg?.gistId, cfg?.token, applyRemote]);

  // Push debounced
  useEffect(() => {
    if (!cfg?.enabled || !hydrated) return;
    const key = snapshotKey(snapshot);
    if (key === lastSentKeyRef.current) return;
    if (debounceRef.current) clearTimeout(debounceRef.current);
    debounceRef.current = setTimeout(async () => {
      setStatus(s => ({ ...s, state: "syncing", error: null }));
      try {
        await gistAPI.update(cfg.token, cfg.gistId, buildSnapshot(snapshot));
        lastSentKeyRef.current = key;
        setStatus({ state: "idle", lastSync: new Date().toISOString(), error: null });
      } catch (e) {
        setStatus({ state: "error", error: e.message });
      }
    }, SYNC_DEBOUNCE_MS);
    return () => { if (debounceRef.current) clearTimeout(debounceRef.current); };
  }, [snapshot, cfg, hydrated]);

  const syncNow = useCallback(async () => {
    if (!cfg?.enabled) return;
    setStatus({ state: "syncing", error: null });
    try {
      await gistAPI.update(cfg.token, cfg.gistId, buildSnapshot(snapshot));
      const { content } = await gistAPI.read(cfg.token, cfg.gistId);
      const remote = parseSnapshot(content);
      applyRemote(remote);
      lastSentKeyRef.current = snapshotKey(remote);
      setStatus({ state: "idle", lastSync: new Date().toISOString(), error: null });
    } catch (e) {
      setStatus({ state: "error", error: e.message });
    }
  }, [cfg, snapshot, applyRemote]);

  return { cfg, updateCfg, status, syncNow, hydrated };
}

function SyncBadge({ status, cfg, onClick }) {
  if (!cfg?.enabled) return null;
  const m = "'JetBrains Mono',monospace";
  const colors = { idle: "#10B981", syncing: "#06B6D4", error: "#EF4444" };
  const labels = {
    idle: status.lastSync ? `Synced ${fmtRelative(status.lastSync)}` : "Synced",
    syncing: "Syncing...",
    error: "Sync error"
  };
  const color = colors[status.state] || "#94A3B8";
  return (
    <button onClick={onClick} title={status.error || ""} style={{
      display: "inline-flex", alignItems: "center", gap: 5,
      padding: "3px 8px", borderRadius: 5, marginTop: 6,
      background: `${color}15`, border: `1px solid ${color}30`,
      fontFamily: m, fontSize: 9.5, color, fontWeight: 600, cursor: "pointer"
    }}>
      <span style={{ width: 6, height: 6, borderRadius: 3, background: color,
        animation: status.state === "syncing" ? "pulse 1s infinite" : "none" }}/>
      {labels[status.state]}
    </button>
  );
}
