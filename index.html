  const TaskItem=({task,accent})=>{const done=completed[task.id];const c=CAT[task.cat];const isExp=expandedTask===task.id;return(<div style={{marginBottom:6}}><div style={{display:"flex",alignItems:"flex-start",gap:10,padding:"12px 14px",background:done?`${accent||c.color}0A`:"#151D2E",border:done?`1px solid ${c.color}25`:"1px solid #1E293B",borderRadius:isExp?"10px 10px 0 0":"10px"}}><button onClick={e=>{e.stopPropagation();toggle(task.id);}} style={{width:22,height:22,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",background:done?c.color:"transparent",border:done?"none":`2px solid ${c.color}55`,fontSize:12,color:"#fff",flexShrink:0,marginTop:1,cursor:"pointer",padding:0}}>{done?"✓":""}</button><button onClick={()=>setExpandedTask(isExp?null:task.id)} style={{flex:1,minWidth:0,background:"none",border:"none",cursor:"pointer",textAlign:"left",padding:0}}><div style={{fontSize:13.5,color:done?"#4B5563":"#D1D5DB",fontWeight:400,textDecoration:done?"line-through":"none",lineHeight:1.5,fontFamily:f}}>{task.text}</div><div style={{display:"flex",alignItems:"center",gap:6,marginTop:4}}><span style={{padding:"2px 8px",borderRadius:4,fontSize:9,fontFamily:m,letterSpacing:0.5,color:c.color,background:`${c.color}15`}}>{c.label}</span>{task.steps&&<span style={{fontSize:9,color:"#64748B",fontFamily:m}}>{isExp?"▲ Hide":"▼ "+task.steps.length+" steps"}</span>}</div></button></div>{isExp&&task.steps&&(<div style={{background:"#0D1525",border:"1px solid #1E293B",borderTop:"none",borderRadius:"0 0 10px 10px",padding:"10px 14px 14px"}}><div style={{fontSize:10,fontFamily:m,color:"#475569",letterSpacing:1.5,textTransform:"uppercase",marginBottom:8}}>Step-by-Step</div>{task.steps.map((step,i)=>{const isCode=step.startsWith("$")||step.startsWith("Connect-")||step.startsWith("Get-")||step.startsWith("New-")||step.startsWith("Set-")||step.startsWith("Install-")||step.startsWith("foreach")||step.startsWith("}")||step.startsWith(")")||step.startsWith("Remove-")||step.startsWith("gam ");return(<div key={i} style={{display:"flex",gap:8,marginBottom:6,alignItems:"flex-start"}}><span style={{fontSize:10,fontFamily:m,color:c.color,fontWeight:600,flexShrink:0,marginTop:3,minWidth:16,textAlign:"right"}}>{step.startsWith("•")||isCode?"":i+1+"."}</span><span style={{fontSize:12.5,color:"#B0BEC5",lineHeight:1.6,fontFamily:isCode?m:f,background:isCode?"#1a2236":"transparent",padding:isCode?"4px 8px":"0",borderRadius:4,wordBreak:"break-word"}}>{step}</span></div>);})}</div>)}</div>);};
  return(<div style={{minHeight:"100dvh",background:"#0B1120",color:"#E2E8F0",fontFamily:f}}>
    <div style={{background:"linear-gradient(180deg,#111827,#0B1120)",borderBottom:"1px solid #1E293B",padding:"20px 20px 16px",position:"sticky",top:0,zIndex:10}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}><div><div style={{fontSize:10,fontFamily:m,color:"#475569",letterSpacing:3,textTransform:"uppercase"}}>Mission Control</div><h1 style={{fontSize:18,fontWeight:800,margin:"4px 0 0",background:"linear-gradient(135deg,#06B6D4,#8B5CF6)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Security Engineering Sprint</h1></div>{startDate&&<div style={{textAlign:"right"}}><div style={{fontSize:32,fontWeight:800,fontFamily:m,color:dayNum>60?"#EF4444":"#06B6D4",lineHeight:1}}>{Math.min(dayNum,60)}</div><div style={{fontSize:9,color:"#475569",fontFamily:m,letterSpacing:1}}>/ 60 DAYS</div></div>}</div>
      {!startDate?<button onClick={start} style={{width:"100%",padding:"14px",background:"linear-gradient(135deg,#06B6D4,#8B5CF6)",border:"none",borderRadius:10,color:"#fff",fontSize:15,fontWeight:700,fontFamily:f,cursor:"pointer",marginTop:14}}>🔒 Start Security Engineering Sprint</button>
      :<><div style={{marginTop:12}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}><span style={{fontSize:11,color:"#64748B",fontFamily:m}}>{doneTasks}/{totalTasks}</span><span style={{fontSize:11,fontWeight:700,fontFamily:m,color:pct===100?"#10B981":"#06B6D4"}}>{pct}%</span></div><div style={{height:6,background:"#1E293B",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:pct===100?"#10B981":"linear-gradient(90deg,#06B6D4,#8B5CF6)",borderRadius:3,transition:"width 0.5s"}}/></div></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginTop:10}}>{[{l:"Streak",v:`${streak}d`,i:"🔥"},{l:"Habits",v:`${habitsDone}/3`,i:"✅"},{l:"Day",v:`${Math.min(dayNum,60)}`,i:PHASES[currentPhaseIdx]?.icon}].map((s,i)=><div key={i} style={{background:"#151D2E",borderRadius:8,padding:"8px 6px",textAlign:"center",border:"1px solid #1E293B"}}><div style={{fontSize:14}}>{s.i}</div><div style={{fontSize:18,fontWeight:700,fontFamily:m,color:"#F1F5F9"}}>{s.v}</div><div style={{fontSize:8,color:"#475569",fontFamily:m,letterSpacing:1,textTransform:"uppercase",marginTop:2}}>{s.l}</div></div>)}</div></>}
    </div>
    {startDate&&<div style={{display:"flex",background:"#111827",borderBottom:"1px solid #1E293B",position:"sticky",top:148,zIndex:9}}>{[{k:"today",l:"Today"},{k:"calendar",l:"Calendar"},{k:"phases",l:"Phases"}].map(t=><button key={t.k} onClick={()=>{setView(t.k);if(t.k==="today"){setSelectedDay(null);setExpandedTask(null);}}} style={{flex:1,padding:"9px 0",border:"none",cursor:"pointer",fontFamily:m,fontSize:10,letterSpacing:1.5,textTransform:"uppercase",background:view===t.k?"#0B1120":"transparent",color:view===t.k?"#06B6D4":"#475569",borderBottom:view===t.k?"2px solid #06B6D4":"2px solid transparent"}}>{t.l}</button>)}</div>}
    <div style={{padding:"16px 16px 120px"}}>
      {startDate&&view==="today"&&(()=>{const td=DAYS.find(d=>d.day===Math.min(dayNum,60));if(!td)return null;const ph=PHASES.find(p=>td.day>=p.days[0]&&td.day<=p.days[1]);const tdDone=td.tasks.filter(t=>completed[t.id]).length;return<><div style={{marginBottom:20}}><div style={{fontSize:10,fontFamily:m,color:"#475569",letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>Daily Habits — {new Date().toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric"})}</div>{HABITS.map(h=>{const done=todayHabits[h.id];return<button key={h.id} onClick={()=>toggleHabit(h.id)} style={{display:"flex",alignItems:"center",gap:12,width:"100%",padding:"12px 14px",background:done?"rgba(16,185,129,0.06)":"#151D2E",border:done?"1px solid rgba(16,185,129,0.25)":"1px solid #1E293B",borderRadius:10,marginBottom:6,cursor:"pointer",textAlign:"left"}}><div style={{width:22,height:22,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",background:done?"#10B981":"transparent",border:done?"none":"2px solid #374151",fontSize:12,color:"#fff",flexShrink:0}}>{done?"✓":""}</div><div style={{fontSize:13.5,color:done?"#10B981":"#D1D5DB",fontWeight:500,textDecoration:done?"line-through":"none",fontFamily:f,flex:1}}>{h.text}</div><span style={{fontSize:16,flexShrink:0}}>{h.icon}</span></button>;})}</div>
        <div style={{marginBottom:16}}><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}><div style={{fontSize:10,fontFamily:m,color:"#475569",letterSpacing:2,textTransform:"uppercase"}}>Day {td.day} — {td.label}</div><span style={{fontSize:11,fontFamily:m,color:tdDone===td.tasks.length?"#10B981":"#64748B"}}>{tdDone}/{td.tasks.length}</span></div>{ph&&<div style={{display:"inline-block",padding:"4px 10px",borderRadius:6,fontSize:10,fontFamily:m,color:ph.color,background:`${ph.color}12`,border:`1px solid ${ph.color}25`,marginBottom:10}}>{ph.icon} {ph.title}</div>}<div style={{background:"#131B2E",border:"1px solid #1E293B",borderRadius:8,padding:"10px 12px",marginBottom:12,fontSize:11,color:"#94A3B8",lineHeight:1.6}}>💡 <strong style={{color:"#CBD5E1"}}>Tap any task</strong> for step-by-step instructions.</div>{td.tasks.map(t=><TaskItem key={t.id} task={t} accent={ph?.color}/>)}</div></>;})()}
      {startDate&&view==="calendar"&&<><div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:16}}>{["S","M","T","W","T","F","S"].map((d,i)=><div key={i} style={{textAlign:"center",fontSize:9,fontFamily:m,color:"#475569",padding:"4px 0"}}>{d}</div>)}{(()=>{const sd=new Date(startDate+"T00:00:00");const dow=sd.getDay();const cells=[];for(let i=0;i<dow;i++)cells.push(<div key={`p${i}`}/>);for(let i=1;i<=60;i++){const dd=DAYS.find(d=>d.day===i);const allD=dd?dd.tasks.every(t=>completed[t.id]):false;const someD=dd?dd.tasks.some(t=>completed[t.id]):false;const isCur=i===Math.min(dayNum,60);const ph=PHASES.find(p=>i>=p.days[0]&&i<=p.days[1]);cells.push(<button key={i} onClick={()=>{setSelectedDay(i);setView("day");setExpandedTask(null);}} style={{width:"100%",aspectRatio:"1",borderRadius:8,border:isCur?"2px solid #06B6D4":"1px solid #1E293B",background:allD?`${ph?.color}20`:someD?"#1a2236":"#111827",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:0}}><span style={{fontSize:12,fontWeight:isCur?800:500,fontFamily:m,color:allD?"#10B981":isCur?"#06B6D4":"#94A3B8"}}>{i}</span>{allD&&<div style={{width:4,height:4,borderRadius:2,background:"#10B981",marginTop:2}}/>}{someD&&!allD&&<div style={{width:4,height:4,borderRadius:2,background:"#F59E0B",marginTop:2}}/>}</button>);}return cells;})()}</div>{PHASES.map(p=>{const pd=DAYS.filter(d=>d.day>=p.days[0]&&d.day<=p.days[1]);const dn=pd.reduce((s,d)=>s+d.tasks.filter(t=>completed[t.id]).length,0);const tt=pd.reduce((s,d)=>s+d.tasks.length,0);const pp=tt?Math.round(dn/tt*100):0;return<div key={p.title} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:"#151D2E",borderRadius:8,border:"1px solid #1E293B",marginBottom:4}}><span style={{fontSize:14}}>{p.icon}</span><div style={{flex:1}}><div style={{fontSize:11,fontWeight:600,color:"#CBD5E1"}}>{p.title}</div><div style={{fontSize:9,fontFamily:m,color:"#475569"}}>Days {p.days[0]}–{p.days[1]}</div></div><div style={{width:60}}><div style={{height:4,background:"#1E293B",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:`${pp}%`,background:pp===100?"#10B981":p.color,borderRadius:2}}/></div><div style={{fontSize:9,fontFamily:m,color:pp===100?"#10B981":"#64748B",textAlign:"right",marginTop:2}}>{pp}%</div></div></div>})}</>}
      {startDate&&view==="day"&&activeDayData&&<><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}><button onClick={()=>{setSelectedDay(Math.max(1,activeDay-1));setExpandedTask(null);}} disabled={activeDay<=1} style={{padding:"6px 14px",background:"#151D2E",border:"1px solid #1E293B",borderRadius:8,color:activeDay<=1?"#334155":"#94A3B8",cursor:activeDay<=1?"default":"pointer",fontFamily:m,fontSize:12}}>←</button><div style={{textAlign:"center"}}><div style={{fontSize:22,fontWeight:800,fontFamily:m,color:activePhase?.color||"#06B6D4"}}>Day {activeDay}</div><div style={{fontSize:11,color:"#64748B"}}>{activeDayData.label}</div></div><button onClick={()=>{setSelectedDay(Math.min(60,activeDay+1));setExpandedTask(null);}} disabled={activeDay>=60} style={{padding:"6px 14px",background:"#151D2E",border:"1px solid #1E293B",borderRadius:8,color:activeDay>=60?"#334155":"#94A3B8",cursor:activeDay>=60?"default":"pointer",fontFamily:m,fontSize:12}}>→</button></div>{activePhase&&<div style={{display:"inline-block",padding:"4px 10px",borderRadius:6,fontSize:10,fontFamily:m,color:activePhase.color,background:`${activePhase.color}12`,border:`1px solid ${activePhase.color}25`,marginBottom:12}}>{activePhase.icon} {activePhase.title}</div>}{activeDayData.tasks.map(t=><TaskItem key={t.id} task={t}/>)}<button onClick={()=>setView("calendar")} style={{width:"100%",padding:"10px",background:"transparent",border:"1px solid #1E293B",borderRadius:8,color:"#64748B",fontFamily:m,fontSize:11,cursor:"pointer",marginTop:12}}>← Back to Calendar</button></>}
      {startDate&&view==="phases"&&<>{PHASES.map(phase=>{const pd=DAYS.filter(d=>d.day>=phase.days[0]&&d.day<=phase.days[1]);const dn=pd.reduce((s,d)=>s+d.tasks.filter(t=>completed[t.id]).length,0);const tt=pd.reduce((s,d)=>s+d.tasks.length,0);const pp=tt?Math.round(dn/tt*100):0;return<div key={phase.title} style={{marginBottom:10}}><div style={{padding:"14px 16px",background:"#151D2E",borderRadius:10,border:`1px solid ${pp===100?"#10B98133":"#1E293B"}`}}><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:18}}>{phase.icon}</span><div><div style={{fontSize:14,fontWeight:700,color:"#F1F5F9"}}>{phase.title}</div><div style={{fontSize:10,fontFamily:m,color:"#475569"}}>Days {phase.days[0]}–{phase.days[1]}</div></div></div><span style={{fontSize:13,fontFamily:m,color:pp===100?"#10B981":phase.color,fontWeight:700}}>{pp}%</span></div><div style={{height:4,background:"#0B1120",borderRadius:2,overflow:"hidden",marginBottom:10}}><div style={{height:"100%",width:`${pp}%`,background:pp===100?"#10B981":phase.color,borderRadius:2}}/></div><div style={{display:"flex",flexWrap:"wrap",gap:4}}>{pd.map(d=>{const allD=d.tasks.every(t=>completed[t.id]);const someD=d.tasks.some(t=>completed[t.id]);return<button key={d.day} onClick={()=>{setSelectedDay(d.day);setView("day");setExpandedTask(null);}} style={{padding:"4px 8px",borderRadius:6,border:allD?"1px solid #10B98133":"1px solid #1E293B",background:allD?"#10B98115":someD?"#F59E0B10":"#111827",cursor:"pointer",fontSize:10,fontFamily:m,color:allD?"#10B981":someD?"#F59E0B":"#64748B"}}>D{d.day}</button>})}</div></div></div>})}<button onClick={reset} style={{width:"100%",padding:"10px",background:"transparent",border:"1px solid #EF444422",borderRadius:8,color:"#EF4444",fontSize:11,fontFamily:m,cursor:"pointer",marginTop:16}}>Reset All Progress</button></>}
      {!startDate&&<div style={{textAlign:"center",padding:"40px 20px"}}><div style={{fontSize:48,marginBottom:16}}>🔒</div><h2 style={{fontSize:20,fontWeight:700,color:"#F1F5F9",marginBottom:8}}>Security Engineering Sprint</h2><p style={{fontSize:14,color:"#94A3B8",lineHeight:1.6,maxWidth:320,margin:"0 auto"}}>{totalTasks} tasks. 60 days. Real M365 tenant. Windows VM. MD-102 + SC-300 courses. From IT Admin to Security Engineer.</p><div style={{display:"flex",flexWrap:"wrap",justifyContent:"center",gap:6,marginTop:20}}>{PHASES.map(p=><div key={p.title} style={{padding:"5px 10px",background:`${p.color}12`,border:`1px solid ${p.color}25`,borderRadius:6,fontSize:10,color:p.color,fontFamily:m}}>{p.icon} Days {p.days[0]}–{p.days[1]}</div>)}</div></div>}
