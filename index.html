<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useCallback}=React;
const CAT={
  lab:{label:"Hands-On Lab",color:"#3B82F6"},
  study:{label:"Study",color:"#8B5CF6"},
  cert:{label:"Credential",color:"#10B981"},
  interview:{label:"Interview Prep",color:"#F59E0B"},
  career:{label:"Career",color:"#EF4444"},
  review:{label:"Review",color:"#6366F1"},
  infra:{label:"Infrastructure",color:"#06B6D4"},
};
const DIFF=["","Easy","Medium","Hard"];
const HABITS=[
  {id:"h1",text:"30 min hands-on lab (Surface Pro + tenant)",icon:"⌨️"},
  {id:"h2",text:"Complete 1 MS Learn module (MD-102 or SC-300)",icon:"🎓"},
  {id:"h3",text:"Practice explaining one concept out loud",icon:"🎤"},
];
const PHASES=[
  {days:[1,5],title:"Infrastructure & Lab Foundation",icon:"🔧",color:"#06B6D4"},
  {days:[6,30],title:"Device Management & Endpoint Security",icon:"📱",color:"#8B5CF6"},
  {days:[31,50],title:"Identity, Access & Zero Trust",icon:"🛡️",color:"#10B981"},
  {days:[51,60],title:"Enterprise Scenarios & Interview Prep",icon:"🎯",color:"#F59E0B"},
];
const DAYS=[
  // ═══ PHASE 1: INFRASTRUCTURE (Days 1–5) ═══
  {day:1,label:"Provision Your Tenant",tasks:[
    {id:"d1t1",text:"Sign up for Microsoft 365 Business Premium trial",cat:"infra",icon:"🏢",time:"~20 min",diff:1,steps:[
      "## Start the trial",
      "Go to https://www.microsoft.com/en-us/microsoft-365/business/microsoft-365-business-premium",
      "Click 'Try free for 1 month'",
      "Use a personal email (Gmail or Outlook.com) to sign up",
      "## Create the tenant",
      "Create a .onmicrosoft.com domain (e.g., smokkelabs.onmicrosoft.com)",
      "Create the Global Admin account",
      "Save the username and password in a password manager immediately",
      "Skip 'add users' and 'domain verification' for now",
      "## What you get",
      "Business Premium includes Entra ID P1, Intune, Defender for Business, and Autopilot",
      "Trial is 30 days free, then $22/user/month if converted"
    ]},
    {id:"d1t2",text:"Bookmark the four admin portals",cat:"infra",icon:"🔖",time:"~10 min",diff:1,prereq:"d1t1",steps:[
      "## Open in InPrivate window",
      "Always use an InPrivate/Incognito window for tenant work to keep it separate from personal accounts",
      "## The four portals",
      "https://admin.microsoft.com — M365 Admin Center (users, licenses, billing)",
      "https://entra.microsoft.com — Entra ID (identity, groups, CA policies, app registrations, PIM)",
      "https://intune.microsoft.com — Intune (device management, compliance, apps, Autopilot)",
      "https://security.microsoft.com — Microsoft Defender (alerts, incidents, Secure Score)",
      "## Orient yourself",
      "Bookmark all four",
      "Spend 10 minutes clicking through the left navigation of each portal"
    ]},
    {id:"d1t3",text:"Bookmark the MS Learn certification pages",cat:"study",icon:"📚",time:"~10 min",diff:1,steps:[
      "## MD-102 Endpoint Administrator",
      "https://learn.microsoft.com/en-us/credentials/certifications/modern-desktop/",
      "Bookmark all 8 learning paths listed under Training",
      "## SC-300 Identity and Access Administrator",
      "https://learn.microsoft.com/en-us/credentials/certifications/identity-and-access-administrator/",
      "Bookmark all 5 learning paths listed under Training",
      "## Exam study guides",
      "https://learn.microsoft.com/en-us/credentials/certifications/resources/study-guides/md-102",
      "https://learn.microsoft.com/en-us/credentials/certifications/resources/study-guides/sc-300",
      "## Approach",
      "All MS Learn content is free and includes sandbox labs",
      "For each module: read the theory, then execute it in your own Business Premium tenant"
    ]},
  ]},
  {day:2,label:"Prepare the Surface Pro Lab Device",tasks:[
    {id:"d2t1",text:"Verify Windows 11 clean baseline on the Surface Pro",cat:"infra",icon:"🖥️",time:"~10 min",diff:1,steps:[
      "## Confirm local account",
      "Open Settings → Accounts → Your info",
      "Confirm it shows a local account, not a personal Microsoft account (Outlook.com, Xbox, etc.)",
      "If signed into a personal account, sign out and create a new local account before continuing",
      "## Record baseline build",
      "Settings → System → About",
      "Note the Windows 11 version and build (e.g., 23H2, build 22631.xxxx)",
      "This is the reference point for update compliance checks later",
      "## Enable developer features",
      "Settings → Privacy & security → For developers",
      "Toggle on 'Use developer features' so unsigned PowerShell scripts run without prompts"
    ]},
    {id:"d2t2",text:"Create a Windows 11 recovery USB",cat:"infra",icon:"💾",time:"~25 min",diff:2,prereq:"d2t1",steps:[
      "## Why",
      "Without a VM, there is no snapshot to revert to. The recovery USB is the fastest path back from a destructive lab action (~25 min vs hours)",
      "## Build the USB",
      "Insert an 8 GB or larger USB drive",
      "Go to https://www.microsoft.com/en-us/software-download/windows11",
      "Under 'Create Windows 11 Installation Media', click Download Now",
      "Run the Media Creation Tool",
      "Accept license → language: English (US) → select USB flash drive → pick your drive → Next",
      "## Label and store",
      "Label the USB 'W11 Lab Rebuild'",
      "Keep it next to the Surface Pro — this is lab infrastructure, not disposable"
    ]},
    {id:"d2t3",text:"Set a System Restore point and document the recovery kit",cat:"infra",icon:"🧰",time:"~15 min",diff:1,prereq:"d2t2",steps:[
      "## Enable System Restore",
      "Press Win key → type 'Create a restore point' → open System Properties",
      "Under Protection Settings, select C: → Configure → 'Turn on system protection' → Max Usage 5% → OK",
      "Click Create → name it 'Clean Lab Baseline' → Create (~60 sec)",
      "## Document the recovery kit",
      "Create a note in your phone (not on the Surface — if it bricks, you can't read it)",
      "Include: tenant name, admin UPN, admin password location, the four portal URLs, W11 Rebuild USB location, baseline build number from d2t1",
      "## Coverage",
      "System Restore rolls back policy/driver mistakes without a reinstall",
      "Recovery USB handles full rebuilds after a Wipe"
    ]},
  ]},
  {day:3,label:"Populate Your Directory",tasks:[
    {id:"d3t1",text:"Create 15–25 dummy users via PowerShell",cat:"lab",icon:"👥",time:"~45 min",diff:2,prereq:"d1t1",steps:[
      "## Why this task now",
      "You need a populated directory before any later lab (groups, CA policies, Autopilot, access reviews) has anything meaningful to target. The PowerShell + Graph pattern you learn here returns in Day 16 (automation) and Day 40 (lifecycle workflows).",
      "## Learn context (for later)",
      "The identity management theory for this task is in the SC-300 path 'Implement an identity management solution' — but you start SC-300 on Day 31. For now you're executing the pattern so the next 28 days of labs have users to target. Understanding comes later; the reps come now.",
      "## Find your tenant ID (you'll use it twice)",
      "Go to https://entra.microsoft.com → Overview",
      "Under 'Basic information' the Tenant ID shows as a GUID, e.g., 1a2b3c4d-5678-90ab-cdef-1234567890ab",
      "Click the copy icon → save it in your password manager under the tenant entry (alongside the admin UPN)",
      "## Install the Graph module",
      "Right-click Start → Terminal (Admin) → confirm the top tab says PowerShell (not Command Prompt)",
      "Install-Module Microsoft.Graph -Scope CurrentUser",
      "If prompted to install NuGet provider → type Y and Enter",
      "If prompted about untrusted repository (PSGallery) → type Y and Enter",
      "## Connect to your tenant",
      "Connect-MgGraph -Scopes 'User.ReadWrite.All','Organization.Read.All' -TenantId '<paste-tenant-id-here>'",
      "A browser window opens → sign in with your Global Admin UPN from Day 1",
      "Accept any permission consent prompt",
      "Terminal returns 'Welcome To Microsoft Graph!' — you are connected",
      "## Prepare the CSV",
      "Open Notepad → save empty file to Desktop as users.csv (in Save dialog: 'Save as type' = All Files, filename = users.csv)",
      "Paste this first row as the header: DisplayName,UPN,Department,JobTitle,Password",
      "UPN = full sign-in identifier, e.g., john.smith@<your-tenant>.onmicrosoft.com",
      "Add 20 rows across: IT (5), Legal (5), Sales (5), Marketing (3), Executives (2)",
      "Each password must be strong — 12+ chars, mixed case, number, symbol",
      "## Run the create-users script",
      "In the same PowerShell terminal: cd $HOME\\Desktop",
      "$users = Import-Csv './users.csv'",
      "foreach ($u in $users) {",
      "  New-MgUser -DisplayName $u.DisplayName -UserPrincipalName $u.UPN -Department $u.Department -JobTitle $u.JobTitle -MailNickname ($u.UPN.Split('@')[0]) -AccountEnabled -PasswordProfile @{Password=$u.Password; ForceChangePasswordNextSignIn=$false} -UsageLocation 'US'",
      "}",
      "No output = success (PowerShell is quiet on success by design)",
      "## Assign Business Premium licenses",
      "$sku = Get-MgSubscribedSku | Where-Object {$_.SkuPartNumber -eq 'SPB'}",
      "(SPB = Microsoft 365 Business Premium's internal SKU name)",
      "Get-MgUser -All | Where-Object {$_.UserPrincipalName -like \"*@$($sku.AccountName)*\"} | ForEach-Object { Set-MgUserLicense -UserId $_.Id -AddLicenses @(@{SkuId=$sku.SkuId}) -RemoveLicenses @() }",
      "## Verify",
      "https://entra.microsoft.com → Users — confirm all 20 accounts appear",
      "Click any user → Licenses tab → confirm Microsoft 365 Business Premium is assigned",
      "If any user shows no license: your tenant may only have the trial 25-seat cap — reduce to 20 users total and retry"
    ]},
    {id:"d3t2",text:"Create security groups (static + dynamic)",cat:"lab",icon:"🗂️",time:"~20 min",diff:2,prereq:"d3t1",steps:[
      "## Assigned groups",
      "Create via PowerShell or entra.microsoft.com → Groups:",
      "SG-IT-Staff, SG-Legal-Team, SG-Sales-Team, SG-Executives, SG-AllEmployees",
      "Add the appropriate users to each",
      "## Dynamic group",
      "Create one dynamic group to understand the concept:",
      "Name: DG-Marketing-Auto | Rule: user.department -eq 'Marketing'",
      "Wait 5–15 minutes for dynamic membership to evaluate",
      "## Device group (for later)",
      "Name: SG-Managed-Devices | Type: Security | Membership: Assigned",
      "Leave empty — devices get added after Intune enrollment"
    ]},
    {id:"d3t3",text:"MS Learn: 'Explore endpoint management' learning path",cat:"study",icon:"📖",time:"~60 min",diff:1,steps:[
      "## Open the path",
      "https://learn.microsoft.com/en-us/training/paths/explore-endpoint-management/",
      "## Complete all modules",
      "'Explore Microsoft Intune'",
      "'Explore Microsoft Configuration Manager'",
      "'Explore co-management'",
      "## Concepts to internalize",
      "Intune is the cloud MDM service for Windows, iOS, Android, and macOS",
      "Configuration Manager (SCCM) is the on-premises predecessor",
      "Co-management runs both simultaneously during migration",
      "## Complete the knowledge check"
    ]},
  ]},
  {day:4,label:"Device Enrollment Concepts",tasks:[
    {id:"d4t1",text:"Explore the Intune enrollment options",cat:"lab",icon:"🔍",time:"~20 min",diff:1,prereq:"d1t2",steps:[
      "## Open Intune",
      "https://intune.microsoft.com → Devices → Enrollment",
      "## Review each platform tab",
      "Windows, Apple, Android — note the enrollment methods each supports",
      "## Confirm automatic MDM enrollment",
      "Windows → Enrollment → Automatic Enrollment — should show 'All' (default in Business Premium)",
      "This is what makes an Entra-joined Windows device auto-enroll into Intune"
    ]},
    {id:"d4t2",text:"Configure the company branding on the Entra sign-in page",cat:"lab",icon:"🎨",time:"~15 min",diff:1,prereq:"d1t1",steps:[
      "## Navigate",
      "entra.microsoft.com → User experiences → Company branding → Configure",
      "## Set defaults",
      "Upload a square logo (any PNG works for lab)",
      "Set a sign-in page background",
      "Add a sign-in page text line (e.g., 'Smokke Labs — authorized users only')",
      "## Why it matters",
      "This branding appears in Autopilot OOBE — it makes the zero-touch deployment feel production-grade"
    ]},
    {id:"d4t3",text:"MS Learn: 'Execute device enrollment' learning path",cat:"study",icon:"📖",time:"~75 min",diff:2,steps:[
      "## Open the path",
      "https://learn.microsoft.com/en-us/training/paths/execute-device-enrollment/",
      "## Complete all modules",
      "'Manage device authentication'",
      "'Enroll devices using Microsoft Configuration Manager'",
      "'Enroll devices using Microsoft Intune'",
      "## Enrollment methods to know",
      "Automatic MDM enrollment (MDM = Mobile Device Management)",
      "User-driven enrollment",
      "Windows Autopilot",
      "Bulk enrollment via provisioning packages",
      "Apple Business Manager / Android Enterprise",
      "## Apply what you learned",
      "intune.microsoft.com → Devices → Enrollment — locate each method in the UI"
    ]},
  ]},
  {day:5,label:"First Device Enrollment",tasks:[
    {id:"d5t1",text:"Entra Join the Surface Pro to your tenant",cat:"lab",icon:"🔗",time:"~20 min",diff:2,prereq:"d2t1",steps:[
      "## Connect the device",
      "On the Surface Pro → Settings → Accounts → Access work or school → '+ Connect'",
      "Click 'Join this device to Microsoft Entra ID'",
      "Sign in with a test user UPN (not the Global Admin)",
      "Accept prompts → the device is now Entra Joined",
      "## Verify in Entra",
      "entra.microsoft.com → Devices — confirm the Surface Pro appears as 'Microsoft Entra joined'",
      "## Verify in Intune",
      "intune.microsoft.com → Devices — the Surface Pro should appear as enrolled",
      "Automatic MDM enrollment means Entra Join triggers Intune enrollment in one step"
    ]},
    {id:"d5t2",text:"Review device details and enrollment metadata",cat:"lab",icon:"📋",time:"~15 min",diff:1,prereq:"d5t1",steps:[
      "## Open the device record",
      "intune.microsoft.com → Devices → select the Surface Pro",
      "## Explore the tabs",
      "Overview, Hardware, Discovered apps, Device compliance, Device configuration, App configuration, Managed apps",
      "## Note the enrollment metadata",
      "Enrolled by (user), enrollment method, join type, OS version, last check-in",
      "## Context",
      "From this point, every compliance policy, configuration profile, and app deployment will target this device"
    ]},
    {id:"d5t3",text:"MS Learn: Entra Join vs Hybrid Join deep-dive",cat:"study",icon:"📖",time:"~45 min",diff:2,steps:[
      "## Open the reference",
      "https://learn.microsoft.com/en-us/entra/identity/devices/concept-directory-join",
      "## Three join types",
      "Registered — personal devices accessing work apps (BYOD)",
      "Entra Joined — cloud-only, joined directly to Entra ID (modern default)",
      "Hybrid Entra Joined — on-prem AD joined + synced to Entra (legacy/migration)",
      "## Decision logic for interviews",
      "Greenfield deployments → Entra Joined",
      "Existing AD environment → Hybrid during migration, then Entra Joined",
      "BYOD → Registered with MAM policies",
      "## Complete the knowledge check"
    ]},
  ]},
  // ═══ PHASE 2: MD-102 DEVICE MANAGEMENT (Days 6–30) ═══
  {day:6,label:"Compliance Policies",tasks:[
    {id:"d6t1",text:"Build your first compliance policy",cat:"lab",icon:"✅",time:"~30 min",diff:2,prereq:"d5t1",steps:[
      "## Create the policy",
      "intune.microsoft.com → Devices → Compliance → '+ Create policy'",
      "Platform: Windows 10+ | Profile type: Windows 10/11 compliance policy",
      "Name: 'COMP-Win11-Standard'",
      "## Configure settings",
      "Device Health: Require BitLocker, Require Secure Boot, Require Code Integrity",
      "Device Properties: Minimum OS version = your baseline build from d2t1",
      "System Security: Require password, Minimum password length 8, Password type: Alphanumeric",
      "Defender: Real-time protection on, Signature up-to-date",
      "## Assign and test",
      "Assign to All Devices",
      "Wait 15–30 min → check the Surface Pro's compliance status",
      "A 'Noncompliant' result at first is expected if BitLocker is not yet on — fix in d6t2"
    ]},
    {id:"d6t2",text:"Enable BitLocker on the Surface Pro",cat:"lab",icon:"🔐",time:"~30 min",diff:2,prereq:"d6t1",steps:[
      "## Turn on BitLocker",
      "On the Surface Pro → Control Panel → BitLocker Drive Encryption → Turn on BitLocker for C:",
      "Save the recovery key to your Microsoft account or a file",
      "## TPM check if BitLocker refuses",
      "TPM (Trusted Platform Module) is a chip that stores encryption keys",
      "Run 'tpm.msc' → confirm TPM is Ready",
      "If Not Ready: reboot into UEFI (Volume Up + Power during boot) → enable TPM → retry",
      "## Force a sync",
      "Settings → Accounts → Access work or school → your connected account → Info → Sync",
      "## Verify compliance",
      "Check Intune after 15 minutes — device should show Compliant"
    ]},
    {id:"d6t3",text:"MS Learn: 'Manage authentication and compliance' learning path",cat:"study",icon:"📖",time:"~90 min",diff:2,steps:[
      "## Open the path",
      "https://learn.microsoft.com/en-us/training/paths/manage-authentication-compliance/",
      "## Complete all modules",
      "'Explore device compliance'",
      "'Implement device compliance policies'",
      "'Implement Conditional Access policies'",
      "## Key concepts",
      "Compliance policies evaluate device state (pass/fail)",
      "Configuration profiles enforce device settings (apply)",
      "Noncompliant devices can be blocked from M365 resources via Conditional Access",
      "Grace periods give users time to remediate before full block",
      "## Complete all knowledge checks"
    ]},
  ]},
  {day:7,label:"Configuration Profiles",tasks:[
    {id:"d7t1",text:"Create a Device Restrictions profile",cat:"lab",icon:"⚙️",time:"~30 min",diff:2,prereq:"d5t1",steps:[
      "## Create the profile",
      "intune.microsoft.com → Devices → Configuration → '+ Create' → New policy",
      "Platform: Windows 10 and later | Profile type: Templates → Device restrictions",
      "Name: 'CONF-Win11-DeviceRestrictions'",
      "## Configure settings",
      "Password: require numeric PIN, minimum length 6",
      "App Store: block adding Microsoft accounts (personal)",
      "General: block camera, block Cortana, block developer unlock",
      "## Assign and verify",
      "Assign to All Devices",
      "Force sync on the Surface Pro → verify the settings apply (try opening Camera — blocked)"
    ]},
    {id:"d7t2",text:"Create a Settings Catalog profile",cat:"lab",icon:"🧩",time:"~25 min",diff:2,steps:[
      "## Why Settings Catalog",
      "Settings Catalog is Microsoft's modern, granular, searchable profile type",
      "Use it instead of legacy Templates for new deployments",
      "## Create",
      "Devices → Configuration → '+ Create' → Windows 10+ → Settings Catalog",
      "Name: 'CONF-Win11-SettingsCatalog-Baseline'",
      "## Add settings",
      "Add Setting → search 'Smart Screen' → enable",
      "Add Setting → search 'USB' → block removable storage write access",
      "Add Setting → search 'Clipboard' → disable clipboard history sync",
      "## Assign and verify",
      "Assign to All Devices → force sync → verify restrictions apply"
    ]},
    {id:"d7t3",text:"MS Learn: 'Configure profiles for users and devices' learning path",cat:"study",icon:"📖",time:"~75 min",diff:2,steps:[
      "## Open the path",
      "https://learn.microsoft.com/en-us/training/paths/configure-profiles-users-devices/",
      "## Modules",
      "'Execute device profiles'",
      "'Oversee device profiles'",
      "'Maintain user profiles'",
      "## Three profile types to distinguish",
      "Templates — legacy, pre-grouped (Device Restrictions, Wi-Fi, VPN)",
      "ADMX Import — upload .admx files to migrate GPO settings to Intune",
      "Settings Catalog — modern, granular, searchable — recommended default",
      "## Complete the knowledge check"
    ]},
  ]},
  {day:8,label:"Application Deployment",tasks:[
    {id:"d8t1",text:"Deploy Microsoft 365 Apps via Intune",cat:"lab",icon:"📦",time:"~45 min",diff:2,prereq:"d5t1",steps:[
      "## Add the app",
      "intune.microsoft.com → Apps → Windows → '+ Add'",
      "App type: Microsoft 365 Apps (Windows 10 and later)",
      "## Configure",
      "Name: 'M365 Apps — Current Channel'",
      "Select apps: Word, Excel, PowerPoint, Outlook, Teams, OneDrive",
      "Architecture: 64-bit | Update channel: Current Channel",
      "## Assign and verify",
      "Assign as Required to All Devices",
      "Force sync on Surface Pro — apps install silently in the background (20–40 min)",
      "Open Word or Outlook on the Surface Pro to verify"
    ]},
    {id:"d8t2",text:"Deploy a Microsoft Store app (Win32 install)",cat:"lab",icon:"📥",time:"~30 min",diff:2,prereq:"d8t1",steps:[
      "## Add the app",
      "Apps → Windows → '+ Add' → App type: Microsoft Store app (new)",
      "Search: 'Windows Terminal' (or any free Store app)",
      "## Assign",
      "Assignment: Required → All Devices",
      "## Verify",
      "Force sync on Surface Pro",
      "Confirm the app installs silently and appears in Start Menu"
    ]},
    {id:"d8t3",text:"MS Learn: 'Examine application management' learning path",cat:"study",icon:"📖",time:"~75 min",diff:2,steps:[
      "## Open the path",
      "https://learn.microsoft.com/en-us/training/paths/examine-application-management/",
      "## Coverage",
      "App types: Store apps, M365 Apps suite, Win32 apps, LOB apps, web links",
      "Assignment types: Required (auto-install), Available (user-initiated in Company Portal), Uninstall",
      "App protection policies (MAM) — covered separately in Day 10",
      "## Complete the knowledge check"
    ]},
  ]},
  {day:9,label:"Windows Update Management",tasks:[
    {id:"d9t1",text:"Create an Update Ring",cat:"lab",icon:"🔄",time:"~25 min",diff:2,prereq:"d5t1",steps:[
      "## Create the ring",
      "intune.microsoft.com → Devices → Windows updates → Update rings for Windows 10 and later → '+ Create profile'",
      "Name: 'UR-Production-Standard'",
      "## Configure deferrals",
      "Quality update deferral: 7 days",
      "Feature update deferral: 30 days",
      "Automatic update behavior: Auto install and restart at maintenance time",
      "## Assign",
      "Assign to All Devices"
    ]},
    {id:"d9t2",text:"Create a Feature Update policy",cat:"lab",icon:"🎯",time:"~15 min",diff:2,steps:[
      "## Create",
      "Devices → Windows updates → Feature updates → '+ Create profile'",
      "Name: 'FU-Target-Current'",
      "Target Windows 11 version: current supported version",
      "## Assign",
      "Assign to All Devices",
      "## Result",
      "Feature update policies pin devices to a specific Windows version — prevents surprise feature rollouts"
    ]},
    {id:"d9t3",text:"MS Learn: Windows Update management modules",cat:"study",icon:"📖",time:"~45 min",diff:2,steps:[
      "## Open the module",
      "https://learn.microsoft.com/en-us/search/?terms=Manage%20Windows%20updates%20with%20Intune&category=Module",
      "## Key concepts",
      "Update Rings — groups of devices that get updates on different schedules",
      "Feature Update policies — control which Windows version to target",
      "Expedited updates — emergency out-of-cycle patches",
      "Delivery Optimization — peer-to-peer update distribution",
      "## Why defer updates",
      "Test compatibility on a pilot ring before broad rollout",
      "Prevent broken updates from hitting the entire fleet at once",
      "## Complete the knowledge check"
    ]},
  ]},
  {day:10,label:"App Protection (MAM / BYOD)",tasks:[
    {id:"d10t1",text:"Create an App Protection Policy for iOS/Android",cat:"lab",icon:"📲",time:"~30 min",diff:2,prereq:"d1t1",steps:[
      "## Create",
      "intune.microsoft.com → Apps → App protection policies → '+ Create' → iOS/iPadOS (or Android)",
      "Name: 'MAM-BYOD-Protection'",
      "## Target apps",
      "Select 'All Microsoft Apps' (Outlook, Teams, OneDrive, etc.)",
      "## Data protection settings",
      "Backup org data to iTunes/iCloud: Block",
      "Send org data to other apps: Policy managed apps",
      "Save copies of org data: Block",
      "Restrict cut/copy/paste: Policy managed apps with paste-in",
      "## Access requirements",
      "PIN to access: Required, 6 digits, reset after 5 attempts",
      "## Assign",
      "Assign to All Users"
    ]},
    {id:"d10t2",text:"Enroll a personal device to test MAM",cat:"lab",icon:"📱",time:"~20 min",diff:2,prereq:"d10t1",steps:[
      "## Optional if you don't want to enroll personal device",
      "Skip this lab and rely on the MS Learn module instead",
      "## If testing",
      "On your phone: install Outlook or Teams from the app store",
      "Sign in with a tenant test user",
      "Observe the managed app PIN prompt",
      "Try to copy corporate text and paste into a non-managed app — should be blocked"
    ]},
    {id:"d10t3",text:"MS Learn: App Protection Policies (MAM)",cat:"study",icon:"📖",time:"~45 min",diff:2,steps:[
      "## Open the reference",
      "https://learn.microsoft.com/en-us/mem/intune/apps/app-protection-policy",
      "## Module path",
      "https://learn.microsoft.com/en-us/search/?terms=app%20protection%20policies%20overview&category=Module",
      "## What MAM is",
      "MAM (Mobile Application Management) applies policies to specific apps rather than the whole device",
      "Used for BYOD: you don't control the device but protect company data inside company apps",
      "## Key concepts",
      "Data protection (copy/paste, save-as, backup restrictions)",
      "Conditional launch rules (require PIN, block jailbroken)",
      "PIN vs biometric requirements"
    ]},
  ]},
  {day:11,label:"Windows Autopilot",tasks:[
    {id:"d11t1",text:"Register the Surface Pro for Autopilot",cat:"lab",icon:"🚀",time:"~20 min",diff:2,prereq:"d5t1",steps:[
      "## Run the hash collection script",
      "On the Surface Pro, open PowerShell as Administrator:",
      "Install-Script -Name Get-WindowsAutopilotInfo -Force",
      "Get-WindowsAutopilotInfo -Online",
      "Sign in with the Global Admin when prompted",
      "## Verify registration",
      "intune.microsoft.com → Devices → Enrollment → Windows → Devices (Autopilot)",
      "The Surface Pro should appear within a few minutes"
    ]},
    {id:"d11t2",text:"Create an Autopilot deployment profile",cat:"lab",icon:"🧭",time:"~25 min",diff:2,prereq:"d11t1",steps:[
      "## Create",
      "intune.microsoft.com → Devices → Enrollment → Windows → Deployment Profiles → '+ Create profile'",
      "Name: 'AP-Standard-UserDriven'",
      "## Configure",
      "Deployment mode: User-driven | Join type: Microsoft Entra joined",
      "OOBE (Out-Of-Box Experience) settings: Hide privacy, Hide EULA, Hide change account options, User account type: Standard",
      "Device name template: 'LAB-%SERIAL%'",
      "## Assign",
      "Assign to All devices (or a group containing your Autopilot devices)"
    ]},
    {id:"d11t3",text:"MS Learn: 'Deploy using cloud-based tools' — Autopilot",cat:"study",icon:"📖",time:"~75 min",diff:2,steps:[
      "## Open the path",
      "https://learn.microsoft.com/en-us/training/paths/deploy-using-cloud-based-tools/",
      "## Focus module",
      "'Deploying devices using Windows Autopilot'",
      "## Deployment modes",
      "User-driven — user signs in during OOBE",
      "Self-deploying — no user interaction (kiosks, shared devices)",
      "Pre-provisioned (White Glove) — IT/vendor pre-stages, user finishes",
      "## The Autopilot flow end to end",
      "OEM/IT registers hardware hash → device connects to internet during OOBE → downloads Autopilot profile → applies Entra join + Intune enrollment + policies + apps → user signs in",
      "## Complete the knowledge check — this topic is heavily tested on MD-102"
    ]},
  ]},
  {day:12,label:"Autopilot Reprovisioning Milestone",tasks:[
    {id:"d12t1",text:"Configure the Enrollment Status Page (ESP)",cat:"lab",icon:"📺",time:"~15 min",diff:2,prereq:"d11t2",steps:[
      "## Create the ESP profile",
      "intune.microsoft.com → Devices → Enrollment → Windows → Enrollment Status Page",
      "Edit the default profile or create a new one",
      "## Configure",
      "Show app and profile configuration progress: Yes",
      "Block device use until all required apps and profiles are installed: Yes",
      "Allow users to reset device if installation error occurs: Yes",
      "Show error when installation exceeds 60 minutes",
      "## Purpose",
      "ESP closes the gap between enrollment and policy application — users can't log in and use an unmanaged device"
    ]},
    {id:"d12t2",text:"Run Autopilot Reset on the Surface Pro",cat:"lab",icon:"🔁",time:"~30 min",diff:3,prereq:"d12t1",steps:[
      "## Why Autopilot Reset vs Wipe",
      "Autopilot Reset keeps the device Entra-joined and forces OOBE again — non-destructive to the device, destructive to user profile",
      "Wipe requires a full rebuild from the recovery USB",
      "Autopilot Reset is the production pattern for reprovisioning a device",
      "## Trigger the reset",
      "intune.microsoft.com → Devices → select the Surface Pro → '...' More → Autopilot Reset",
      "## Watch the reprovisioning",
      "Surface Pro reboots into OOBE",
      "Expect company branding, hidden privacy screens, sign-in prompt",
      "After sign-in, the ESP shows apps and policies installing",
      "## Success criteria",
      "Device returns to a fully managed state without manual configuration",
      "This is the zero-touch provisioning demo — record the time it took",
      "## Optional: full Wipe test",
      "Use Intune → Wipe instead — requires the W11 Rebuild USB to recover (~45–60 min total)"
    ]},
  ]},
  {day:13,label:"Endpoint Security Policies",tasks:[
    {id:"d13t1",text:"Deploy the Microsoft Security Baseline",cat:"lab",icon:"🛡️",time:"~20 min",diff:2,prereq:"d5t1",steps:[
      "## Navigate",
      "intune.microsoft.com → Endpoint security → Security baselines → 'Security Baseline for Windows 10 and later'",
      "## Create profile",
      "'+ Create profile' → Name: 'SB-Windows-Baseline-Standard'",
      "Accept Microsoft's recommended settings for first deployment",
      "## Assign",
      "Assign to All Devices",
      "## Monitor drift",
      "Security baselines report deviations per device — review after 24 hours"
    ]},
    {id:"d13t2",text:"Create an Antivirus policy",cat:"lab",icon:"🦠",time:"~20 min",diff:2,steps:[
      "## Create",
      "Endpoint security → Antivirus → '+ Create Policy' → Windows 10+ → Microsoft Defender Antivirus",
      "Name: 'AV-Defender-Standard'",
      "## Key settings",
      "Real-time protection: On",
      "Cloud-delivered protection: High",
      "PUA protection: Block (blocks unwanted/bundled software)",
      "Scheduled scan: Quick, daily, 2 AM",
      "## Assign to All Devices"
    ]},
    {id:"d13t3",text:"MS Learn: 'Manage endpoint security' learning path",cat:"study",icon:"📖",time:"~75 min",diff:2,steps:[
      "## Open the path",
      "https://learn.microsoft.com/en-us/training/paths/manage-endpoint-security/",
      "## Modules",
      "Data protection (Windows Information Protection, BitLocker)",
      "Defender for Endpoint integration",
      "Built-in Windows security features",
      "## Attack Surface Reduction (ASR)",
      "ASR rules block specific attack techniques before they execute",
      "Memorize 3–4 rule names by heart for interviews (e.g., 'Block Office child processes', 'Block credential stealing from LSASS')",
      "## Complete all knowledge checks"
    ]},
  ]},
  {day:14,label:"Zero Trust & Conditional Access Primer",tasks:[
    {id:"d14t1",text:"Study the Microsoft Zero Trust framework",cat:"study",icon:"🎯",time:"~45 min",diff:1,steps:[
      "## Read",
      "https://learn.microsoft.com/en-us/security/zero-trust/zero-trust-overview",
      "## Three principles",
      "Verify explicitly — authenticate every user, device, app access",
      "Use least-privilege access — JIT (Just-In-Time), just-enough-access",
      "Assume breach — monitor, detect, respond continuously",
      "## Six pillars",
      "Identity, Devices, Applications, Data, Infrastructure, Network",
      "## Prepare the 60-second explanation",
      "Be able to explain Zero Trust in 60 seconds to a non-technical interviewer"
    ]},
    {id:"d14t2",text:"Explore Conditional Access (preview before SC-300)",cat:"lab",icon:"🚦",time:"~30 min",diff:1,prereq:"d1t2",steps:[
      "## Open Conditional Access",
      "entra.microsoft.com → Protection → Conditional Access",
      "## Review existing policies",
      "Check any Microsoft-managed default policies (Security Defaults, templates)",
      "## Explore the policy builder",
      "'+ New policy' — walk through without saving:",
      "Assignments: Users, Target resources, Conditions",
      "Controls: Grant, Session",
      "## Mental model",
      "CA = IF (user + resource + conditions) THEN (grant / block / require MFA / require compliant device)",
      "This is the core of identity security — you'll build real policies in Phase 3"
    ]},
  ]},
  {day:15,label:"Advanced Targeting",tasks:[
    {id:"d15t1",text:"Configure assignment filters and scope tags",cat:"lab",icon:"🎯",time:"~30 min",diff:2,prereq:"d5t1",steps:[
      "## Create an assignment filter",
      "intune.microsoft.com → Devices → Filters → '+ Create' → Windows 10+",
      "Name: 'FILTER-Win11-Only' | Rule: (device.osVersion -startsWith \"10.0.22\")",
      "## Apply the filter",
      "Edit an existing configuration policy → Assignments → Include filter → select FILTER-Win11-Only",
      "## Create scope tags",
      "Tenant administration → Roles → Scope (Tags) → '+ Create'",
      "Examples: Tag-US-East, Tag-EU-Pilot",
      "## Use case",
      "Combine with RBAC so regional admins only see devices/policies tagged for their region"
    ]},
    {id:"d15t2",text:"MS Learn: Assignment filters and scope tags",cat:"study",icon:"📖",time:"~30 min",diff:2,steps:[
      "## Open the references",
      "Assignment filters: https://learn.microsoft.com/en-us/mem/intune/fundamentals/filters",
      "Scope tags: https://learn.microsoft.com/en-us/mem/intune/fundamentals/scope-tags",
      "## Concepts",
      "Assignment filters refine WHO gets a policy within an assigned group (e.g., All Devices filtered to Windows 11 only)",
      "Scope tags delegate admin visibility — regional admins only see tagged resources",
      "## Interview connection",
      "Be able to explain why you'd use a filter instead of creating multiple dynamic groups"
    ]},
  ]},
  {day:16,label:"PowerShell + Microsoft Graph",tasks:[
    {id:"d16t1",text:"Query devices via Microsoft Graph",cat:"lab",icon:"⌨️",time:"~30 min",diff:2,prereq:"d3t1",steps:[
      "## Connect",
      "Connect-MgGraph -Scopes 'DeviceManagementManagedDevices.Read.All'",
      "## List all enrolled devices",
      "Get-MgDeviceManagementManagedDevice | Select DeviceName, ComplianceState, OperatingSystem, LastSyncDateTime | Format-Table",
      "## Filter by compliance",
      "Get-MgDeviceManagementManagedDevice -Filter \"complianceState eq 'noncompliant'\"",
      "## Export to CSV",
      "Get-MgDeviceManagementManagedDevice | Export-Csv -Path './devices.csv' -NoTypeInformation"
    ]},
    {id:"d16t2",text:"Script: export all compliance and config policies to JSON",cat:"lab",icon:"💾",time:"~30 min",diff:3,prereq:"d16t1",steps:[
      "## Connect with read scopes",
      "Connect-MgGraph -Scopes 'DeviceManagementConfiguration.Read.All'",
      "## Export compliance policies",
      "Get-MgDeviceManagementDeviceCompliancePolicy | ConvertTo-Json -Depth 10 | Out-File './compliance-policies.json'",
      "## Export configuration profiles",
      "Get-MgDeviceManagementDeviceConfiguration | ConvertTo-Json -Depth 10 | Out-File './config-profiles.json'",
      "## Why",
      "JSON exports provide documentation and change tracking",
      "Interview answer: 'I script policy exports for version control and audit trails'"
    ]},
    {id:"d16t3",text:"MS Learn: Microsoft Graph fundamentals",cat:"study",icon:"📖",time:"~60 min",diff:2,steps:[
      "## Learning path",
      "https://learn.microsoft.com/en-us/training/paths/m365-msgraph-fundamentals/",
      "## Graph Explorer",
      "https://developer.microsoft.com/en-us/graph/graph-explorer",
      "Sign in with tenant admin to test API calls against real data",
      "## What Graph is",
      "Unified API for M365 — users, groups, devices, policies, mail, files through one endpoint (graph.microsoft.com)",
      "## Permission types",
      "Delegated — acts as the signed-in user",
      "Application — acts as the app itself, no user context",
      "## Register an app for Graph access when writing automation"
    ]},
  ]},
  {day:17,label:"Defender for Business",tasks:[
    {id:"d17t1",text:"Explore Defender for Business",cat:"lab",icon:"🛡️",time:"~30 min",diff:1,prereq:"d1t2",steps:[
      "## Navigate",
      "https://security.microsoft.com — sign in with tenant admin",
      "## Tour the dashboard",
      "Incidents & alerts, Device inventory, Secure Score",
      "## Secure Score review",
      "Click Secure Score → review recommended actions",
      "Each action improves tenant security posture — track your score over the sprint",
      "## Verify the Surface Pro is onboarded",
      "Device inventory → find the Surface Pro → review security status and installed agents"
    ]},
    {id:"d17t2",text:"Configure Attack Surface Reduction (ASR) rules",cat:"lab",icon:"🚧",time:"~30 min",diff:3,prereq:"d17t1",steps:[
      "## Create the policy",
      "intune.microsoft.com → Endpoint security → Attack surface reduction → '+ Create policy'",
      "Platform: Windows 10+ | Profile: Attack Surface Reduction Rules",
      "Name: 'ASR-Baseline-Audit'",
      "## Enable rules in AUDIT mode first",
      "Block executable content from email client and webmail",
      "Block Office applications from creating child processes",
      "Block credential stealing from Windows LSASS",
      "## Why audit first",
      "Audit mode logs what would be blocked without enforcing — prevents breaking legitimate workflows",
      "## Assign and monitor",
      "Assign to All Devices",
      "After 1 week of audit data, clone the policy and set rules to Block mode"
    ]},
    {id:"d17t3",text:"MS Learn: Security baselines and ASR deep-dive",cat:"study",icon:"📖",time:"~60 min",diff:2,steps:[
      "## Return to the path",
      "https://learn.microsoft.com/en-us/training/paths/manage-endpoint-security/",
      "## Focus modules",
      "Security baselines and Attack Surface Reduction",
      "## Security baselines",
      "Pre-configured sets of security settings Microsoft recommends",
      "Deploy as-is or customize individual settings",
      "## Attack Surface Reduction",
      "ASR rules block specific attack techniques before they execute",
      "Memorize 3–4 rule names for interviews: Block Office child processes, Block LSASS credential theft, Block executable content from email, Block Win32 API calls from Office macros"
    ]},
  ]},
  {day:18,label:"BitLocker & Disk Encryption",tasks:[
    {id:"d18t1",text:"Deploy a BitLocker encryption policy via Intune",cat:"lab",icon:"🔐",time:"~30 min",diff:2,prereq:"d5t1",steps:[
      "## Create",
      "intune.microsoft.com → Endpoint security → Disk encryption → '+ Create policy'",
      "Platform: Windows 10+ | Profile: BitLocker",
      "Name: 'ENC-BitLocker-Standard'",
      "## Configure",
      "Require device encryption: Yes",
      "Encryption method: XTS-AES 256-bit",
      "Recovery key rotation: Enabled for Entra-joined and hybrid devices",
      "Silent encryption: Enabled",
      "## Assign",
      "Assign to All Devices",
      "## Recovery key escrow",
      "BitLocker recovery keys auto-escrow to Entra ID",
      "View at entra.microsoft.com → Devices → select device → BitLocker keys"
    ]},
    {id:"d18t2",text:"Verify BitLocker key escrow",cat:"lab",icon:"🔑",time:"~10 min",diff:1,prereq:"d18t1",steps:[
      "## In Entra",
      "entra.microsoft.com → Devices → select the Surface Pro → BitLocker keys",
      "Recovery key should be visible here",
      "## In Intune",
      "intune.microsoft.com → Devices → select the Surface Pro → Recovery keys tab",
      "## Helpdesk scenario",
      "This is the path helpdesk takes when a user is locked out — memorize both locations"
    ]},
    {id:"d18t3",text:"MS Learn: BitLocker and disk encryption modules",cat:"study",icon:"📖",time:"~45 min",diff:2,steps:[
      "## Open the path",
      "https://learn.microsoft.com/en-us/training/paths/manage-endpoint-security/",
      "Focus on data protection and BitLocker modules",
      "## Deeper reference",
      "https://learn.microsoft.com/en-us/search/?terms=BitLocker%20management&category=Module",
      "## Key concepts",
      "Silent encryption, recovery key escrow to Entra, BitLocker compliance, key rotation",
      "## Practice",
      "Know both locations to retrieve a recovery key cold — this is the most common helpdesk scenario"
    ]},
  ]},
  {day:19,label:"Monitoring & Reporting",tasks:[
    {id:"d19t1",text:"Enable Endpoint Analytics",cat:"lab",icon:"📊",time:"~15 min",diff:1,prereq:"d5t1",steps:[
      "## Enable",
      "intune.microsoft.com → Reports → Endpoint Analytics → Settings → enable for your tenant",
      "## Wait for data",
      "Initial data collection takes 24–48 hours",
      "## Metrics to review once populated",
      "Startup performance",
      "Application reliability",
      "Work from anywhere score",
      "## Framing",
      "Endpoint Analytics identifies slow or unreliable devices before users complain — proactive, not reactive"
    ]},
    {id:"d19t2",text:"MS Learn: Intune monitoring and reporting",cat:"study",icon:"📖",time:"~45 min",diff:2,steps:[
      "## References",
      "Intune reports: https://learn.microsoft.com/en-us/mem/intune/fundamentals/reports",
      "Endpoint Analytics: https://learn.microsoft.com/en-us/mem/analytics/overview",
      "## Report types an admin runs",
      "Device compliance status",
      "Noncompliant devices",
      "Failed deployments",
      "App install status",
      "## Integration",
      "Intune logs can forward to Log Analytics / Microsoft Sentinel for SIEM correlation"
    ]},
  ]},
  {day:20,label:"Mid-Phase Review",tasks:[
    {id:"d20t1",text:"Document all Intune policies created so far",cat:"review",icon:"📝",time:"~45 min",diff:1,steps:[
      "## Inventory",
      "List every policy created: compliance, configuration profiles, app deployments, update rings, endpoint security, ASR, BitLocker",
      "## One-line summary per policy",
      "Include: name, what it does, why, assignment target",
      "## Output",
      "Save as 'policy-portfolio.md' — this becomes your interview reference when asked 'give me an example of a policy you built'"
    ]},
    {id:"d20t2",text:"Practice the Autopilot demonstration narrative",cat:"interview",icon:"🎤",time:"~20 min",diff:2,steps:[
      "## The script",
      "Practice saying this out loud, 2–3 minutes:",
      "'I built a zero-touch provisioning workflow using Windows Autopilot. I registered the device hash in Intune, created a User-Driven deployment profile with custom OOBE branding, configured the Enrollment Status Page to block access until all required apps and compliance policies were applied, then reset the device and let Autopilot fully provision it without manual IT intervention. The device was Entra Joined, Intune enrolled, compliant with BitLocker and password policies, and had M365 apps installed — all automatically.'",
      "## Polish points",
      "Pause on key phrases: 'zero-touch', 'Entra Joined', 'automatically'",
      "No filler words — record yourself and listen back"
    ]},
  ]},
  {day:21,label:"Role-Based Access Control",tasks:[
    {id:"d21t1",text:"Configure Intune RBAC with a custom role",cat:"lab",icon:"👥",time:"~30 min",diff:2,prereq:"d3t2",steps:[
      "## Review built-in roles",
      "intune.microsoft.com → Tenant administration → Roles",
      "Note: Intune Administrator, Helpdesk Operator, Application Manager, Endpoint Security Manager, Read Only Operator",
      "## Create a custom role",
      "'+ Create' → Name: 'Tier-1 Support'",
      "Permissions: Read devices, Sync devices, Remote lock, Reset passcode",
      "Exclude: Wipe, Retire, Delete",
      "## Assign",
      "Assign to SG-IT-Staff group → scope: All devices",
      "## Test",
      "Sign in as an IT staff user → confirm they can sync/lock but cannot wipe",
      "## Principle",
      "Least-privilege — helpdesk can respond quickly without catastrophic-action authority"
    ]},
    {id:"d21t2",text:"MS Learn: Intune RBAC and tenant administration",cat:"study",icon:"📖",time:"~45 min",diff:2,steps:[
      "## Open the reference",
      "https://learn.microsoft.com/en-us/mem/intune/fundamentals/role-based-access-control",
      "## What RBAC is",
      "Role-Based Access Control — different admins get different permission levels instead of making everyone Global Admin",
      "## Hierarchy",
      "Built-in roles → Custom roles → Scope groups (which admins) → Scope tags (which resources they can see)",
      "## Built-in roles to know by name",
      "Intune Administrator, Helpdesk Operator, Application Manager, Endpoint Security Manager, Read Only Operator"
    ]},
  ]},
  {day:22,label:"Device Lifecycle & Remote Actions",tasks:[
    {id:"d22t1",text:"Test remote device actions on the Surface Pro",cat:"lab",icon:"🎛️",time:"~30 min",diff:2,prereq:"d5t1",steps:[
      "## Safe actions to run",
      "Sync — forces immediate policy check-in (100% safe, start here)",
      "Restart — schedules remote reboot (save work first)",
      "Fresh Start — removes preinstalled bloatware, keeps user data (safe on lab device)",
      "## Destructive actions — understand but do NOT run today",
      "Autopilot Reset — wipes user profile, reprovisions (~20 min recovery)",
      "Wipe — full device wipe (requires W11 Rebuild USB to recover, ~45–60 min)",
      "Retire — removes corporate data, keeps personal data (on BYOD scenarios)",
      "## Execute today",
      "Run Sync, Restart, and Fresh Start on the Surface Pro",
      "## Decision framework for interviews",
      "Wipe = stolen or decommissioned corporate device",
      "Retire = BYOD user leaving the company",
      "Fresh Start = clean up a bloated machine",
      "Autopilot Reset = reprovision for a new user or role"
    ]},
    {id:"d22t2",text:"MS Learn: Device lifecycle and remote actions",cat:"study",icon:"📖",time:"~30 min",diff:2,steps:[
      "## Open the reference",
      "https://learn.microsoft.com/en-us/mem/intune/remote-actions/device-management",
      "## Lifecycle",
      "Enrollment → compliance evaluation → management → retirement/wipe",
      "## Decision tree for each action",
      "Wipe, Retire, Fresh Start, Autopilot Reset — know cold which to use in which scenario",
      "## Interview scenario",
      "'A user's laptop was stolen — walk me through what you do'",
      "Correct answer: Wipe + revoke sessions in Entra + rotate BitLocker recovery key"
    ]},
  ]},
  {day:23,label:"Cloud Desktops Concepts",tasks:[
    {id:"d23t1",text:"Study Windows 365 Cloud PC and Azure Virtual Desktop",cat:"study",icon:"☁️",time:"~30 min",diff:1,steps:[
      "## Positioning",
      "Windows 365 — simple, per-user persistent Cloud PC, managed through Intune",
      "Azure Virtual Desktop (AVD) — flexible, multi-session, per-session pricing",
      "## Use case fit",
      "Windows 365 → remote workers, contractors, BYOD",
      "AVD → call centers, shared workstations, cost-optimized pools",
      "Third-party → Citrix, VMware Horizon (compare to these from Carnival Cruise / Quarles experience)",
      "## No deployment required",
      "Both cost money to deploy — concepts are enough for MD-102 and interviews"
    ]},
    {id:"d23t2",text:"MS Learn: Windows 365 and AVD fundamentals",cat:"study",icon:"📖",time:"~60 min",diff:1,steps:[
      "## Paths",
      "Windows 365: https://learn.microsoft.com/en-us/training/paths/get-started-with-windows-365/",
      "AVD: https://learn.microsoft.com/en-us/training/paths/m365-wvd/",
      "## Decision criteria",
      "When to recommend Cloud PC vs managed endpoint vs multi-session AVD",
      "## Connect to your experience",
      "Your Citrix background gives you a strong comparison framework — use it in interviews"
    ]},
  ]},
  {day:24,label:"Co-Management & Hybrid",tasks:[
    {id:"d24t1",text:"Study SCCM/MECM co-management",cat:"study",icon:"🔗",time:"~30 min",diff:2,steps:[
      "## What co-management is",
      "Devices managed by both SCCM (on-prem) and Intune (cloud) simultaneously",
      "## Workload slider",
      "Each workload has a toggle between SCCM and Intune: compliance, Windows Update, Endpoint Protection, device config, Office Click-to-Run, client apps",
      "## Migration pattern",
      "Shift workloads one at a time — typically starting with compliance and updates",
      "Co-management is a transition state, not a permanent architecture",
      "## Connect to your experience",
      "Your Quarles SCCM background is a direct interview asset — you've been on the legacy side of a co-management migration"
    ]},
    {id:"d24t2",text:"MS Learn: 'Deploy using on-premises based tools'",cat:"study",icon:"📖",time:"~60 min",diff:2,steps:[
      "## Open the path",
      "https://learn.microsoft.com/en-us/training/paths/deploy-using-on-premises-based-tools/",
      "## Focus",
      "Co-management and Configuration Manager modules",
      "## Concepts",
      "Authority slider per workload",
      "Client agent installation and conflict resolution",
      "Migration strategy and endgame (full cloud-native Intune)",
      "## Complete the knowledge check"
    ]},
  ]},
  {day:25,label:"Applied Skills — Intune Credential",tasks:[
    {id:"d25t1",text:"Take the 'Deploy and manage devices with Microsoft Intune' assessment",cat:"cert",icon:"🎓",time:"~90 min",diff:3,prereq:"d20t1",steps:[
      "## Open the assessment",
      "https://learn.microsoft.com/en-us/credentials/applied-skills/deploy-and-manage-devices-by-using-microsoft-intune/",
      "## Format",
      "Free, lab-based, hands-on assessment — no multiple choice",
      "Do the work in a live Microsoft-provided sandbox",
      "Typically 12–16 tasks",
      "## Preparation",
      "You've been doing these tasks for 3 weeks — compliance, config profiles, app deployment, Autopilot",
      "## Take it",
      "Click Start → complete tasks → Submit",
      "Pass/fail result in ~60 seconds"
    ]},
    {id:"d25t2",text:"If passed, add credential to LinkedIn and resume",cat:"career",icon:"📄",time:"~20 min",diff:1,prereq:"d25t1",steps:[
      "## Get the credential URL",
      "Microsoft Learn profile → Credentials → Share → copy URL",
      "## Add to LinkedIn",
      "Profile → Add certification → paste URL → issuer: Microsoft",
      "## Update resume",
      "Add the credential under a Certifications section in your resume DOCX",
      "## Positioning",
      "Applied Skills = verified hands-on capability, not just multiple-choice knowledge"
    ]},
  ]},
  {day:26,label:"MD-102 Content Completion",tasks:[
    {id:"d26t1",text:"Finish remaining MD-102 MS Learn modules",cat:"study",icon:"📖",time:"~90 min",diff:2,steps:[
      "## Audit your progress",
      "https://learn.microsoft.com/en-us/credentials/certifications/modern-desktop/",
      "Check completion across all 8 MD-102 learning paths",
      "## Finish incomplete paths/modules",
      "Common gaps: Windows Hello for Business, certificate deployment (SCEP/PKCS), VPN profiles, Wi-Fi profiles",
      "## Retake knowledge checks",
      "Any scored below 80% — re-study and retake",
      "## Note interview gaps",
      "Topics that didn't come up in hands-on labs are your study focus for the next two days"
    ]},
    {id:"d26t2",text:"Take the MD-102 practice assessment on MS Learn",cat:"cert",icon:"📝",time:"~60 min",diff:2,prereq:"d26t1",steps:[

      "https://learn.microsoft.com/en-us/credentials/certifications/modern-desktop/practice/assessment",
      "## Take the full assessment",

  {day:27,label:"Lab Documentation",tasks:[
    {id:"d27t1",text:"Write the Phase 2 lab documentation",cat:"review",icon:"📄",time:"~90 min",diff:2,prereq:"d20t1",steps:[

      "5. Automation (PowerShell + Graph scripts)",

    {id:"d27t2",text:"Publish your GitHub PowerShell scripts repo",cat:"career",icon:"📦",time:"~45 min",diff:2,steps:[
      "## Create repo",
      "github.com → '+ New repository' → name: 'smokke-intune-scripts'",
      "Make public (or private with selective sharing)",
      "## Commit scripts from Phase 2",

      "Device compliance export",
      "Policy export (JSON)",
      "## Write a README",
      "Describe what each script does and how to run it",
      "## Add to LinkedIn",
      "Profile → Featured → add the repo URL"

  ]},
  {day:28,label:"Career Check-In",tasks:[
    {id:"d28t1",text:"Resume update — Phase 2 achievements",cat:"career",icon:"📄",time:"~45 min",diff:2,prereq:"d25t2",steps:[
      "## Add achievements",
      "Deployed Autopilot zero-touch provisioning",
      "Built 15+ Intune policies (compliance, config, app, security)",
      "Configured BitLocker with Entra key escrow",
      "Deployed Microsoft Security Baseline + ASR rules",
      "Automated user onboarding via PowerShell + Microsoft Graph",
      "## Add credentials",
      "Applied Skills: Deploy and manage devices with Intune",
      "## Quantify where possible",
      "'Managed X policies across Y devices', 'Reduced provisioning time from N to M'"
    ]},
    {id:"d28t2",text:"Apply to 5 target roles",cat:"career",icon:"📨",time:"~60 min",diff:1,steps:[
      "## Target titles",
      "IT Security Engineer",
      "Identity & Access Management Engineer",
      "Endpoint Security Engineer",
      "M365 Administrator (with security focus)",
      "Cloud Security Engineer (with M365 emphasis)",
      "## Tailoring",
      "For each application, reference 1–2 specific skills from the job description",
      "Attach the Phase 2 lab documentation PDF"
    ]},
  ]},
  {day:29,label:"Interview Preparation — Phase 2",tasks:[
    {id:"d29t1",text:"Practice the Intune/Autopilot interview block",cat:"interview",icon:"🎤",time:"~45 min",diff:2,prereq:"d20t2",steps:[
      "## Common questions to rehearse",
      "'Walk me through an Autopilot deployment end to end'",
      "'How do you enforce compliance on a remote device?'",
      "'Difference between a compliance policy and a configuration profile?'",
      "'How would you handle a lost corporate laptop?' (Wipe + revoke sessions + rotate BitLocker key)",
      "'Settings Catalog vs Templates — when to use each?'",
      "## Practice out loud",
      "2–3 minutes per question",
      "Record yourself — listen back and refine filler words"
    ]},
    {id:"d29t2",text:"Simulate an Intune admin scenario",cat:"interview",icon:"🧩",time:"~30 min",diff:2,steps:[
      "## Scenario",
      "'A user reports they cannot access SharePoint from their laptop. Walk me through troubleshooting.'",
      "## Answer framework",
      "1. Check CA policy evaluation in Entra sign-in logs",
      "2. Check device compliance state in Intune",
      "3. Check app assignment in Intune",
      "4. Check Windows Event Viewer for MDM sync errors",
      "5. Force sync from the device and re-evaluate",
      "## Practice",
      "Rehearse this flow until it's natural — scenario questions are common in interviews"
    ]},
  ]},
  {day:30,label:"Phase 2 Checkpoint",tasks:[
    {id:"d30t1",text:"Phase 2 retrospective",cat:"review",icon:"🎯",time:"~30 min",diff:1,steps:[
      "## What you built",
      "Production-style M365 tenant with 20+ users, security groups, RBAC",
      "Fully managed Surface Pro endpoint with compliance, config, BitLocker, ASR",
      "Autopilot zero-touch provisioning demonstrated end to end",
      "PowerShell + Graph automation for reporting and policy export",
      "Applied Skills credential earned",
      "## What to strengthen in Phase 3",
      "Conditional Access (you've previewed; Phase 3 is the deep dive)",
      "Identity Protection and PIM",
      "App registrations and SSO integrations"
    ]},
    {id:"d30t2",text:"Transition prep for SC-300",cat:"study",icon:"🧭",time:"~15 min",diff:1,steps:[
      "## Bookmark the SC-300 path landing",
      "https://learn.microsoft.com/en-us/credentials/certifications/identity-and-access-administrator/",
      "## Mindset shift",
      "Phase 2 focused on the DEVICE layer — enforcement, compliance, configuration",
      "Phase 3 focuses on the IDENTITY layer — who, how, and under what conditions access is granted",
      "## Tomorrow",
      "Start SC-300 Learning Path 1: 'Explore identity in Microsoft Entra ID'"
    ]},
  ]},
  // ═══ PHASE 3: IDENTITY & ACCESS — SC-300 (Days 31–50) ═══
  {day:31,label:"SC-300 Kickoff + Named Locations",tasks:[
    {id:"d31t1",text:"MS Learn: 'Explore identity in Microsoft Entra ID'",cat:"study",icon:"📖",time:"~90 min",diff:2,steps:[
      "## Open the path",
      "https://learn.microsoft.com/en-us/training/paths/m365-identity/",
      "## Authentication protocols",
      "SAML (Security Assertion Markup Language) — XML-based, common in enterprise SaaS",
      "OIDC (OpenID Connect) — modern identity layer on OAuth 2.0, used by Entra",
      "OAuth 2.0 — authorization protocol, the 'grant app access to my data' flow",
      "## Entra editions",
      "Free — basic directory",
      "P1 — common workforce features (included in Business Premium)",
      "P2 — advanced (PIM, Identity Protection)",
      "## Identity types to distinguish",
      "Cloud-only, synchronized, guest"
    ]},
    {id:"d31t2",text:"Create Named Locations in Entra",cat:"lab",icon:"📍",time:"~20 min",diff:1,prereq:"d1t2",steps:[
      "## Open",
      "entra.microsoft.com → Protection → Conditional Access → Named locations",
      "## Trusted Office IP",
      "+ IP ranges location → Name: 'Trusted Office IP'",
      "Add your home public IP from https://whatismyip.com as x.x.x.x/32",
      "Mark as trusted",
      "## Blocked Countries",
      "+ Countries location → Name: 'Blocked Countries'",
      "Select 2–3 countries you'd never expect legitimate sign-ins from",
      "## Purpose",
      "Named Locations are building blocks — referenced by CA policies in Day 32"
    ]},
  ]},
  {day:32,label:"Conditional Access — First Policies",tasks:[
    {id:"d32t1",text:"Build CA Policy: Require MFA for all users",cat:"lab",icon:"🔑",time:"~25 min",diff:2,prereq:"d31t2",steps:[
      "## What CA is",
      "CA = Conditional Access — the IF/THEN engine Entra uses to decide whether a sign-in is allowed, blocked, or requires an extra step",
      "## Create",
      "entra.microsoft.com → Protection → Conditional Access → Policies → '+ New policy'",
      "Name: 'CA001-Require-MFA-AllUsers'",
      "Users: All users (exclude a break-glass admin)",
      "Target resources: All cloud apps",
      "Grant: Require multifactor authentication",
      "## Test in Report-only mode FIRST",
      "Set 'Enable policy' to Report-only",
      "Wait 24 hours → review sign-in logs to see who would be impacted",
      "Then switch to On",
      "## Break-glass account note",
      "Always exclude at least one admin from MFA policies — prevents lockout if MFA infrastructure fails"
    ]},
    {id:"d32t2",text:"Build CA Policy: Block sign-ins from outside the US",cat:"lab",icon:"🌍",time:"~20 min",diff:2,prereq:"d31t2",steps:[
      "## Create",
      "Name: 'CA002-Block-Outside-US'",
      "Users: All users | Target resources: All cloud apps",
      "Conditions → Locations → Include: Any location → Exclude: Trusted Office IP + United States",
      "Grant: Block access",
      "## Test",
      "Report-only → check logs → then enable",
      "Try signing in on the Surface Pro (US) — should work",
      "Review the sign-in log entry to see the CA evaluation"
    ]},
    {id:"d32t3",text:"MS Learn: Conditional Access modules",cat:"study",icon:"📖",time:"~75 min",diff:2,steps:[
      "## Open the path",
      "https://learn.microsoft.com/en-us/training/paths/implement-authentication-access-management/",
      "## Focus",
      "All Conditional Access modules — this is the single most tested SC-300 topic",
      "## The formula",
      "IF (users + apps + conditions: location, device, risk, platform) THEN (grant/block + session controls)",
      "## Design principle",
      "Think in layers: base policies + exception policies + break-glass accounts",
      "Individual rules don't protect — sets of policies working together do"
    ]},
  ]},
  {day:33,label:"CA for Device Compliance",tasks:[
    {id:"d33t1",text:"Build CA Policy: Require compliant device",cat:"lab",icon:"✅",time:"~20 min",diff:2,prereq:"d32t1",steps:[
      "## Create",
      "Name: 'CA003-Require-Compliant-Desktop'",
      "Users: All users",
      "Target resources: All cloud apps",
      "Conditions → Device platforms: Windows, macOS",
      "Grant: Require device to be marked as compliant",
      "## What this bridges",
      "Intune evaluates compliance → Entra reads compliance state → CA enforces access decision",
      "Noncompliant device = blocked from M365",
      "## Test",
      "Your Surface Pro should pass since Phase 2 compliance policies are applied"
    ]},
    {id:"d33t2",text:"Build CA Policy: Block legacy authentication",cat:"lab",icon:"🚫",time:"~15 min",diff:2,steps:[
      "## Create",
      "Name: 'CA004-Block-Legacy-Auth'",
      "Users: All users | Target resources: All cloud apps",
      "Conditions → Client apps → Select: Exchange ActiveSync clients + Other clients (legacy)",
      "Grant: Block access",
      "## Why",
      "Legacy auth (basic auth, POP, IMAP without OAuth) bypasses MFA",
      "Blocking it is the single highest-impact security policy most tenants can enable",
      "## Report-only first, then enable"
    ]},
  ]},
  {day:34,label:"Authentication Methods",tasks:[
    {id:"d34t1",text:"Configure authentication methods in Entra",cat:"lab",icon:"🔐",time:"~30 min",diff:2,prereq:"d1t2",steps:[
      "## Navigate",
      "entra.microsoft.com → Protection → Authentication methods → Policies",
      "## Enable methods in order of strength",
      "Microsoft Authenticator — push notifications with number matching",
      "FIDO2 security keys — phishing-resistant hardware tokens",
      "Windows Hello for Business — biometric + TPM",
      "## Disable/restrict weaker methods",
      "SMS — disable or restrict to specific groups (vulnerable to SIM swap)",
      "Voice call — same as SMS",
      "## Require number matching",
      "Microsoft Authenticator → configure → Require number matching: Enabled",
      "Prevents push fatigue attacks (accidental Approve taps)"
    ]},
    {id:"d34t2",text:"Create an Authentication Strengths policy",cat:"lab",icon:"💪",time:"~20 min",diff:3,prereq:"d34t1",steps:[
      "## Open",
      "entra.microsoft.com → Protection → Authentication methods → Authentication strengths",
      "## Create a custom strength",
      "Name: 'Admin-Phishing-Resistant-Only'",
      "Allowed methods: FIDO2 only + Windows Hello for Business",
      "## Apply via CA",
      "Create a CA policy targeting admin roles that requires this authentication strength",
      "Now admins cannot satisfy MFA with Authenticator push — only FIDO2 or WHfB"
    ]},
    {id:"d34t3",text:"MS Learn: Authentication methods and MFA",cat:"study",icon:"📖",time:"~60 min",diff:2,steps:[
      "## Open",
      "https://learn.microsoft.com/en-us/search/?terms=Plan%20and%20implement%20multifactor%20authentication&category=LearningPath",
      "## Strength hierarchy",
      "SMS (weakest — SIM swap vulnerable) → Authenticator push → Number matching → FIDO2 / Windows Hello for Business (strongest, phishing-resistant)",
      "## What makes FIDO2 phishing-resistant",
      "Private key never leaves the device — attacker cannot replay a stolen token",
      "## MFA definition",
      "Something you know (password) + something you have (phone, key) + optionally something you are (biometric)"
    ]},
  ]},
  {day:35,label:"Privileged Identity Management",tasks:[
    {id:"d35t1",text:"Explore PIM (Entra ID P2 feature)",cat:"lab",icon:"⏱️",time:"~30 min",diff:2,prereq:"d1t2",steps:[
      "## Navigate",
      "entra.microsoft.com → Identity governance → Privileged Identity Management",
      "## License note",
      "PIM requires Entra ID P2 — Business Premium includes P1 only",
      "Some features will be unavailable in your tenant — note which ones for interview honesty",
      "## Explore the UI",
      "Roles → Entra roles → My roles",
      "Settings → Roles → (select a role) → Settings",
      "## Concept preview",
      "Eligible vs Active assignments, activation workflow, approval chains"
    ]},
    {id:"d35t2",text:"Configure PIM role settings for Global Admin",cat:"lab",icon:"⚙️",time:"~20 min",diff:3,prereq:"d35t1",steps:[
      "## Open settings",
      "PIM → Entra roles → Settings → Global Administrator",
      "## Configure activation",
      "Activation maximum duration: 2 hours",
      "Require MFA on activation: Yes",
      "Require justification: Yes",
      "Require ticket information: Yes (integrates with ITSM)",
      "Require approval: Yes (approver: another admin)",
      "## Concept",
      "No standing Global Admin — elevation is JIT with approval + MFA + audit trail"
    ]},
    {id:"d35t3",text:"MS Learn: PIM modules",cat:"study",icon:"📖",time:"~60 min",diff:3,steps:[
      "## Open",
      "https://learn.microsoft.com/en-us/entra/id-governance/privileged-identity-management/pim-configure",
      "Module: https://learn.microsoft.com/en-us/search/?terms=Configure%20Microsoft%20Entra%20Privileged%20Identity%20Management&category=Module",
      "## What PIM is",
      "Privileged Identity Management — users become ELIGIBLE for roles instead of permanently assigned",
      "Activation requires MFA + justification + optional approval — this is JIT (Just-In-Time) access",
      "## Interview framing",
      "'Standing admin rights are the #1 cause of breach blast radius. PIM provides JIT elevation with approval, MFA, and full audit trail.'"
    ]},
  ]},
  {day:36,label:"Identity Protection",tasks:[
    {id:"d36t1",text:"Explore Identity Protection (P2 feature)",cat:"lab",icon:"🚨",time:"~30 min",diff:2,prereq:"d1t2",steps:[
      "## Navigate",
      "entra.microsoft.com → Protection → Identity Protection",
      "## Review risk views",
      "Risky users, Risky sign-ins, Risk detections",
      "## Configure risk policies",
      "User risk policy (high risk → require password change)",
      "Sign-in risk policy (medium+ risk → require MFA)",
      "## License note",
      "Full Identity Protection requires P2 — some features may be limited in Business Premium"
    ]},
    {id:"d36t2",text:"MS Learn: Identity Protection modules",cat:"study",icon:"📖",time:"~45 min",diff:2,steps:[
      "## Open",
      "https://learn.microsoft.com/en-us/entra/id-protection/overview-identity-protection",
      "Module: https://learn.microsoft.com/en-us/search/?terms=Implement%20Microsoft%20Entra%20ID%20Protection&category=Module",
      "## Risk distinction",
      "User risk — the account is likely compromised (leaked credentials, unusual behavior)",
      "Sign-in risk — THIS sign-in is suspicious (impossible travel, anonymous IP, unfamiliar location)",
      "## Remediation paths",
      "Self-remediation — user can unblock via password reset + MFA",
      "Admin-driven — 'Confirm user compromised' shuts the account down entirely",
      "## Overlap note",
      "Risk-based CA policies and Identity Protection risk policies cover similar ground — know when to use which"
    ]},
  ]},
  {day:37,label:"Application Management & SSO",tasks:[
    {id:"d37t1",text:"Configure a SAML SSO app integration",cat:"lab",icon:"🔗",time:"~45 min",diff:3,prereq:"d1t2",steps:[
      "## What SSO is",
      "SSO = Single Sign-On — user signs into Entra once, gets into every connected SaaS app without re-authenticating",
      "Security benefit: one identity, one audit trail, no password sprawl",
      "## Pick a gallery app",
      "entra.microsoft.com → Applications → Enterprise applications → '+ New application'",
      "Search the gallery for Salesforce, Box, or ServiceNow — pick one with a SAML tutorial",
      "## Configure",
      "Set up Single Sign-On → SAML",
      "Configure Entity ID (unique app identifier)",
      "Configure Reply URL (where Entra sends the SAML response)",
      "Map attributes: UPN, email, display name",
      "## Assign and test",
      "Assign the app to SG-Sales-Team",
      "No actual SaaS subscription needed — configuring the Entra side is the learning"
    ]},
    {id:"d37t2",text:"Configure user consent settings",cat:"lab",icon:"🛡️",time:"~15 min",diff:2,steps:[
      "## Navigate",
      "entra.microsoft.com → Applications → Enterprise applications → Consent and permissions",
      "## Restrict user consent",
      "User consent for applications: Allow user consent for apps from verified publishers, for selected permissions",
      "## Why",
      "Without restriction, users can grant third-party apps access to your tenant data — consent phishing is a real attack vector",
      "## Admin consent workflow",
      "Enable admin consent workflow so users can request admin review for blocked apps"
    ]},
    {id:"d37t3",text:"MS Learn: 'Implement Access Management for Apps'",cat:"study",icon:"📖",time:"~75 min",diff:3,steps:[
      "## Open the path",
      "https://learn.microsoft.com/en-us/training/paths/implement-access-management-apps/",
      "## Concepts",
      "Enterprise applications vs App registrations",
      "SAML vs OIDC federation",
      "Consent framework (admin consent vs user consent)",
      "App permissions (delegated vs application)",
      "## Interview-critical concept",
      "How do you control which third-party apps users can authorize against your tenant?",
      "Answer: User consent settings + admin consent workflow + verified publisher requirements",
      "## Bonus: App Proxy",
      "App Proxy publishes on-prem apps through Entra without opening firewall ports"
    ]},
  ]},
  {day:38,label:"External Identities (B2B)",tasks:[
    {id:"d38t1",text:"Invite a guest user and configure B2B settings",cat:"lab",icon:"🤝",time:"~25 min",diff:2,prereq:"d3t1",steps:[
      "## Invite",
      "entra.microsoft.com → Users → '+ Invite external user'",
      "Use a personal email you control",
      "## Check the invitation flow",
      "Accept the invite from the personal mailbox",
      "Observe how the guest lands in your tenant as an external user",
      "## Review external collaboration settings",
      "entra.microsoft.com → External Identities → External collaboration settings",
      "Guest user access restrictions: 'Guest users have limited access'",
      "Collaboration restrictions: Allow invitations to specific domains only (configurable)"
    ]},
    {id:"d38t2",text:"MS Learn: External identities and B2B collaboration",cat:"study",icon:"📖",time:"~45 min",diff:2,steps:[
      "## Open",
      "https://learn.microsoft.com/en-us/entra/external-id/external-identities-overview",
      "Module: https://learn.microsoft.com/en-us/search/?terms=Explore%20external%20identities%20in%20Microsoft%20Entra%20ID&category=Module",
      "## B2B vs B2C",
      "B2B — partners/vendors authenticate with their own IdP, access your resources under your policies",
      "B2C — customer-facing identity, separate consumer directory, used for retail apps",
      "## Cross-tenant access settings",
      "Fine-grained control over which external Entra orgs can collaborate",
      "Trust their MFA claims, define which resources they reach"
    ]},
  ]},
  {day:39,label:"Identity Governance",tasks:[
    {id:"d39t1",text:"Create an Access Review",cat:"lab",icon:"📋",time:"~25 min",diff:2,prereq:"d3t2",steps:[
      "## Navigate",
      "entra.microsoft.com → Identity governance → Access reviews → '+ New access review'",
      "## Configure",
      "Review type: Teams + Groups → select SG-Legal-Team",
      "Reviewers: Group owners (or self-review)",
      "Duration: 7 days, recurring quarterly",
      "## Purpose",
      "Access reviews force periodic re-justification of group membership",
      "Prevents 'permission creep' — users accumulating access they no longer need"
    ]},
    {id:"d39t2",text:"Create an Entitlement Management access package",cat:"lab",icon:"🎁",time:"~30 min",diff:3,prereq:"d39t1",steps:[
      "## Navigate",
      "Identity governance → Entitlement management → Access packages → '+ New access package'",
      "## Configure",
      "Name: 'AP-Marketing-Onboarding'",
      "Resources: SG-Marketing-Auto group + any SaaS apps for marketing",
      "Assignment policy: For users not in your directory (external) + requires approval",
      "Access expires after 90 days with review",
      "## What this automates",
      "Instead of admins manually adding each new hire to groups and apps, the access package is a self-service bundle with approval + expiration",
      "## License note",
      "Access packages require Entra ID Governance license"
    ]},
    {id:"d39t3",text:"MS Learn: 'Plan and implement an identity governance strategy'",cat:"study",icon:"📖",time:"~75 min",diff:3,steps:[
      "## Open the path",
      "https://learn.microsoft.com/en-us/training/paths/plan-implement-identity-governance-strategy/",
      "## Modules",
      "Entitlement management (access packages)",
      "Access reviews",
      "Privileged Identity Management (revisited)",
      "Terms of use",
      "## Interview framing",
      "'Governance is how you prove to auditors that access is appropriate — not just that it was granted by the right person'"
    ]},
  ]},
  {day:40,label:"Lifecycle Workflows",tasks:[
    {id:"d40t1",text:"Create a Lifecycle Workflow (Leaver scenario)",cat:"lab",icon:"🔄",time:"~30 min",diff:3,prereq:"d3t2",steps:[
      "## Navigate",
      "entra.microsoft.com → Identity governance → Lifecycle workflows → '+ New workflow'",
      "## Configure (Leaver scenario)",
      "Template: 'Pre-hire' → pick 'Leaver' scenario",
      "Name: 'LW-Leaver-StandardOffboarding'",
      "Trigger: Scheduled, when employeeLeaveDateTime is reached",
      "## Tasks to chain",
      "Disable user account",
      "Remove user from all groups",
      "Remove user from all Teams",
      "Send email notification to manager",
      "## Test",
      "Use 'Execute on-demand' with a test user to validate",
      "## License note",
      "Requires Entra ID Governance add-on"
    ]},
    {id:"d40t2",text:"MS Learn: Lifecycle workflows",cat:"study",icon:"📖",time:"~45 min",diff:3,steps:[
      "## Open",
      "https://learn.microsoft.com/en-us/entra/id-governance/what-are-lifecycle-workflows",
      "Module: https://learn.microsoft.com/en-us/search/?terms=Plan%20and%20implement%20lifecycle%20workflows&category=Module",
      "## What this automates",
      "The JML process (Joiner / Mover / Leaver) — historically the most tedious and error-prone admin task",
      "## Trigger types",
      "Joiner — new hire",
      "Mover — role change",
      "Leaver — termination",
      "## Strong interview answer",
      "'How would you handle identity lifecycle at scale?' — walk through the Leaver workflow from Day 40 lab"
    ]},
  ]},
  {day:41,label:"Monitoring & Sign-in Logs",tasks:[
    {id:"d41t1",text:"Investigate sign-in logs in Entra",cat:"lab",icon:"🔍",time:"~30 min",diff:2,prereq:"d32t1",steps:[
      "## Navigate",
      "entra.microsoft.com → Monitoring → Sign-in logs",
      "## Filter and pivot",
      "Filter by a specific user → review all recent sign-ins",
      "Click an individual sign-in → review the detail pane",
      "## Tabs to explore per sign-in",
      "Basic info, Location, Device info, Authentication details, Conditional Access (which policies evaluated and how)",
      "## Exercise",
      "Find the sign-in entry from your Day 32 CA test — confirm the policy evaluation result shown",
      "## Mental model",
      "Every sign-in = data point. Every suspicious sign-in = investigation start."
    ]},
    {id:"d41t2",text:"MS Learn: Entra monitoring and reporting",cat:"study",icon:"📖",time:"~60 min",diff:2,steps:[
      "## Open",
      "https://learn.microsoft.com/en-us/entra/identity/monitoring-health/overview-monitoring-health",

      "Provisioning logs (sync from HR/on-prem)",
      "## Retention",
      "Entra retains 30 days by default — export to Log Analytics or Sentinel for long-term",
      "## Investigation flow",
      "Alert → pivot to sign-in logs → filter by user/IP/app → identify risk signals → confirm compromise → remediate (revoke sessions, reset password, require MFA re-registration)"
