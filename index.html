const DIFF=["","Easy","Medium","Hard"];
const HABITS=[
  {id:"h1",text:"30 min hands-on lab in your tenant",icon:"⌨️",guide:[
    "## Why daily",
    "Muscle memory beats cramming. Thirty minutes every day builds the reflexes that show up in interview scenarios — you can click to a setting without thinking.",
    "## What counts",
    "Any deliberate action against your tenant: creating a group, tweaking a policy, running a PowerShell query, testing a sign-in under a CA rule.",
    "Re-doing yesterday's task from memory counts — repetition is the point.",
    "Passively browsing the portal does NOT count.",
    "## If short on ideas",
    "Preview tomorrow's task — click through the portal to find where the settings live, then come back and execute tomorrow.",
    "Re-run a PowerShell script with different parameters to see what changes.",
    "Read your own notes from 3 days ago and verify the config is still applied."
  ]},
  {id:"h2",text:"Complete 1 MS Learn module",icon:"🎓",guide:[
    "## Purpose",
    "MS Learn modules are 15–30 min chunks. One per day = full coverage of MD-102 and SC-300 content by Day 60.",
    "## Where",
    "Phase 1–2 (Days 1–30) → MD-102 paths: https://learn.microsoft.com/en-us/credentials/certifications/modern-desktop/",
    "Phase 3 (Days 31–50) → SC-300 paths: https://learn.microsoft.com/en-us/credentials/certifications/identity-and-access-administrator/",
    "## What counts",
    "Read the whole module + complete its knowledge check. Score ≥80% or retake after a break.",
    "## Skip rule",
    "If today's scheduled task already includes a specific Learn module, that counts — don't double up.",
    "## Track completion",
    "MS Learn auto-tracks at https://learn.microsoft.com/en-us/users/me/transcript — check it every Friday."
  ]},
  {id:"h3",text:"Practice explaining one concept out loud",icon:"🎤",guide:[
    "## Why out loud",
    "Silent understanding is not interview fluency. Speaking forces you to fill gaps in real time — the same gaps that appear under interview pressure.",
    "## What to practice",
    "Pick any concept from the last 3 days. Examples by phase:",
    "• Phase 1–2: 'Walk me through Autopilot end to end', 'Difference between compliance and configuration policies', 'How does BitLocker key escrow work?'",
    "• Phase 3: 'Explain Conditional Access in 60 seconds', 'What does PIM solve?', 'User risk vs sign-in risk — when do you use each?'",
    "## How",
    "2–3 minutes, no notes. Phone voice recorder on → talk → listen back once.",
    "## What to fix on review",
    "Filler words ('um', 'like', 'so basically')",
    "Hedging ('I think', 'I guess', 'kind of')",
    "Pace — slow down on key terms, don't rush the technical meat"
  ]},
];
const PHASES=[
  {days:[1,5],title:"Infrastructure & Lab Foundation",icon:"🔧",color:"#06B6D4"},
  {days:[6,30],title:"Device Management & Endpoint Security",icon:"📱",color:"#8B5CF6"},
  {days:[31,50],title:"Identity, Access & Zero Trust",icon:"🛡️",color:"#10B981"},
  {days:[51,60],title:"Enterprise Scenarios & Interview Prep",icon:"🎯",color:"#F59E0B"},

const DAYS=[
  // ═══ PHASE 1: INFRASTRUCTURE (Days 1–5) ═══
  {day:1,label:"Provision Your Tenant",tasks:[
    {id:"d1t1",text:"Sign up for Microsoft 365 Business Premium trial",cat:"infra",icon:"🏢",time:"~20 min",diff:1,steps:[
      "## Start the trial",
      "Go to https://www.microsoft.com/en-us/microsoft-365/business/microsoft-365-business-premium",
      "Click 'Try free for 1 month'",
      "Use a personal email (Gmail or Outlook.com) to sign up",
      "## Create the tenant",
      "Create a .onmicrosoft.com domain (e.g., smokkelabs.onmicrosoft.com)",
      "Create the Global Admin account",
      "Save the username and password in a password manager immediately",
      "Skip 'add users' and 'domain verification' for now",
      "## What you get",
      "Business Premium includes Entra ID P1, Intune, Defender for Business, and Autopilot",
      "Trial is 30 days free, then $22/user/month if converted"
    ]},
    {id:"d1t2",text:"Bookmark the four admin portals",cat:"infra",icon:"🔖",time:"~10 min",diff:1,prereq:"d1t1",steps:[
      "## Open in InPrivate window",
      "Always use an InPrivate/Incognito window for tenant work to keep it separate from personal accounts",
      "## The four portals",
      "https://admin.microsoft.com — M365 Admin Center (users, licenses, billing)",
      "https://entra.microsoft.com — Entra ID (identity, groups, CA policies, app registrations, PIM)",
      "https://intune.microsoft.com — Intune (device management, compliance, apps, Autopilot)",
      "https://security.microsoft.com — Microsoft Defender (alerts, incidents, Secure Score)",
      "## Orient yourself",
      "Bookmark all four",
      "Spend 10 minutes clicking through the left navigation of each portal"
    ]},
    {id:"d1t3",text:"Bookmark the MS Learn certification pages",cat:"study",icon:"📚",time:"~10 min",diff:1,steps:[
      "## MD-102 Endpoint Administrator",
      "https://learn.microsoft.com/en-us/credentials/certifications/modern-desktop/",
      "Bookmark all 8 learning paths listed under Training",
      "## SC-300 Identity and Access Administrator",
      "https://learn.microsoft.com/en-us/credentials/certifications/identity-and-access-administrator/",
      "Bookmark all 5 learning paths listed under Training",
      "## Exam study guides",
      "https://learn.microsoft.com/en-us/credentials/certifications/resources/study-guides/md-102",
      "https://learn.microsoft.com/en-us/credentials/certifications/resources/study-guides/sc-300",
      "## Approach",
      "All MS Learn content is free and includes sandbox labs",
      "For each module: read the theory, then execute it in your own Business Premium tenant"
    ]},
  ]},
  {day:2,label:"Prepare the Surface Pro Lab Device",tasks:[
    {id:"d2t1",text:"Verify Windows 11 clean baseline on the Surface Pro",cat:"infra",icon:"🖥️",time:"~10 min",diff:1,steps:[
      "## Confirm local account",
      "Open Settings → Accounts → Your info",
      "Confirm it shows a local account, not a personal Microsoft account (Outlook.com, Xbox, etc.)",
      "If signed into a personal account, sign out and create a new local account before continuing",
      "## Record baseline build",
      "Settings → System → About",
      "Note the Windows 11 version and build (e.g., 23H2, build 22631.xxxx)",
      "This is the reference point for update compliance checks later",
      "## Enable developer features",
      "Settings → Privacy & security → For developers",
      "Toggle on 'Use developer features' so unsigned PowerShell scripts run without prompts"
    ]},
    {id:"d2t2",text:"Create a Windows 11 recovery USB",cat:"infra",icon:"💾",time:"~25 min",diff:2,prereq:"d2t1",steps:[
      "## Why",
      "Without a VM, there is no snapshot to revert to. The recovery USB is the fastest path back from a destructive lab action (~25 min vs hours)",
      "## Build the USB",
      "Insert an 8 GB or larger USB drive",
      "Go to https://www.microsoft.com/en-us/software-download/windows11",
      "Under 'Create Windows 11 Installation Media', click Download Now",
      "Run the Media Creation Tool",
      "Accept license → language: English (US) → select USB flash drive → pick your drive → Next",
      "## Label and store",
      "Label the USB 'W11 Lab Rebuild'",
      "Keep it next to the Surface Pro — this is lab infrastructure, not disposable"
    ]},
    {id:"d2t3",text:"Set a System Restore point and document the recovery kit",cat:"infra",icon:"🧰",time:"~15 min",diff:1,prereq:"d2t2",steps:[
      "## Enable System Restore",
      "Press Win key → type 'Create a restore point' → open System Properties",
      "Under Protection Settings, select C: → Configure → 'Turn on system protection' → Max Usage 5% → OK",
      "Click Create → name it 'Clean Lab Baseline' → Create (~60 sec)",
      "## Document the recovery kit",
      "Create a note in your phone (not on the Surface — if it bricks, you can't read it)",
      "Include: tenant name, admin UPN, admin password location, the four portal URLs, W11 Rebuild USB location, baseline build number from d2t1",
      "## Coverage",
      "System Restore rolls back policy/driver mistakes without a reinstall",
      "Recovery USB handles full rebuilds after a Wipe"
    ]},
  ]},
  {day:3,label:"Populate Your Directory",tasks:[
    {id:"d3t1",text:"Create 15–25 dummy users via PowerShell",cat:"lab",icon:"👥",time:"~60 min",diff:2,prereq:"d1t1",steps:[
      "## Why this task now",
      "You need a populated directory before any later lab (groups, CA policies, Autopilot, access reviews) has anything meaningful to target. The PowerShell + Graph pattern here returns on Day 16 (automation), Day 40 (lifecycle workflows), and Day 42 (incident response).",
      "## Learn context",
      "Theory for this task lives in SC-300 path 'Implement an identity management solution' — you start that path on Day 31. Today you're executing the pattern so the next 28 days have users to target. Execute now, conceptualize later.",

      "## Step 1 — Find and save your tenant ID",
      "The tenant ID is a GUID that identifies your Entra tenant uniquely. You'll paste it into the Connect-MgGraph command in Step 3, and into roughly a dozen PowerShell/API calls throughout the sprint.",
      "Open an InPrivate browser window → go to https://entra.microsoft.com",
      "Sign in with your Global Admin UPN from Day 1",
      "On the left nav, make sure you're in the Home view — the landing page",
      "In the main area you'll see a tile called 'Tenant information' or 'Basic information' (the label moved between UI revisions). Tenant ID is displayed as a GUID: 1a2b3c4d-5678-90ab-cdef-1234567890ab",
      "Click the small clipboard icon next to the Tenant ID to copy it",
      "IMMEDIATELY: Today tab → Lab Reference (collapsed card above habits) → paste into Tenant ID field. It's now saved to this device and one tap away whenever a script needs it.",
      "Microsoft's official doc with current screenshots: https://learn.microsoft.com/en-us/entra/fundamentals/how-to-find-tenant",

      "## Step 2 — Install the Microsoft Graph PowerShell module",
      "Open PowerShell as Administrator:",
      "• Press the Windows key → type 'terminal'",
      "• Right-click 'Terminal' in the results → 'Run as administrator'",
      "• Click Yes on the UAC prompt",
      "• Confirm the title bar reads 'Administrator: Windows PowerShell' — if it says 'Command Prompt', click the v-arrow at top of the Terminal window → select 'Windows PowerShell'",
      "Run: Install-Module Microsoft.Graph -Scope CurrentUser",
      "You'll see three possible prompts — answer them in this order:",
      "• 'NuGet provider is required to continue... Do you want PowerShellGet to install and import the NuGet provider now?' → type Y, press Enter",
      "• 'You are installing the modules from an untrusted repository... Are you sure you want to install the modules from PSGallery?' → type Y, press Enter (or A for 'Yes to All' to silence future prompts)",
      "• Progress bar appears at the top of the terminal — install takes 2–5 minutes, downloads ~100 MB",
      "When your prompt returns (PS C:\\Windows\\system32>), install is complete",
      "Verify: Get-Module Microsoft.Graph -ListAvailable → should return several module names starting with 'Microsoft.Graph.'",
      "Official doc with screenshots: https://learn.microsoft.com/en-us/powershell/microsoftgraph/installation",

      "## Step 3 — Connect PowerShell to your tenant",
      "Run: Connect-MgGraph -Scopes 'User.ReadWrite.All','Organization.Read.All','Directory.ReadWrite.All' -TenantId 'paste-your-tenant-id-here'",
      "Replace 'paste-your-tenant-id-here' with the GUID from Step 1 (keep the single quotes)",
      "What happens next:",
      "• A browser window or tab pops open titled 'Sign in to your account'",
      "• Sign in with your Global Admin UPN (admin@<your-tenant>.onmicrosoft.com)",
      "• A consent prompt appears: 'Microsoft Graph Command Line Tools is requesting the following permissions' → lists User.ReadWrite.All, Organization.Read.All, Directory.ReadWrite.All",
      "• Click Accept",
      "• Browser shows 'You signed in to Microsoft Graph Command Line Tools. You can close this window.' → close it",
      "Return to the PowerShell terminal — you should see: 'Welcome to Microsoft Graph!' — you are connected",
      "If you get 'Could not open port' or a localhost redirect error: run Connect-MgGraph -UseDeviceAuthentication -Scopes '...' → it gives you a code to paste at microsoft.com/devicelogin instead",

      "## Step 4 — Prepare the CSV file",
      "You'll write 20 users in a CSV that PowerShell will read.",
      "Option A (Notepad — simplest):",
      "• Press Windows key → type 'notepad' → Enter",
      "• Paste this exact header row as the FIRST line: DisplayName,UPN,Department,JobTitle,Password",
      "• Add 20 user rows below (format: Name,upn@yourtenant.onmicrosoft.com,Department,JobTitle,Password123!)",
      "• File → Save As → Desktop → File name: users.csv → 'Save as type' dropdown: change from 'Text Documents (*.txt)' to 'All Files (*.*)' → Save",
      "Option B (Excel): Enter header in row 1, users in rows 2–21, Save As → CSV UTF-8",
      "Department distribution for realism: IT (5), Legal (5), Sales (5), Marketing (3), Executives (2)",
      "Password requirements for trial tenant: minimum 8 chars, must contain 3 of 4 (upper, lower, number, symbol). Safest: use 'LabPass2025!' or similar for all users (this is a lab, not production)",
      "Example row: John Smith,john.smith@smokkelabs.onmicrosoft.com,IT,System Administrator,LabPass2025!",
      "If unsure about UPN: it's the full email-format address using your tenant's .onmicrosoft.com domain from Day 1",

      "## Step 5 — Run the create-users script",
      "In the same PowerShell terminal (Connect-MgGraph session still active):",
      "cd $HOME\\Desktop",
      "$users = Import-Csv './users.csv'",
      "(verify: type $users and Enter → should list all 20 rows)",
      "foreach ($u in $users) {",
      "  New-MgUser -DisplayName $u.DisplayName -UserPrincipalName $u.UPN -Department $u.Department -JobTitle $u.JobTitle -MailNickname ($u.UPN.Split('@')[0]) -AccountEnabled -PasswordProfile @{Password=$u.Password; ForceChangePasswordNextSignIn=$false} -UsageLocation 'US'",
      "}",
      "Expected output: silence. PowerShell returns no text on success — this is by design.",
      "If you get red errors, the most common causes:",
      "• 'Insufficient privileges' — your Connect-MgGraph session lost the right scope. Re-run Step 3.",
      "• 'Another object with the same value... already exists' — a duplicate UPN in your CSV or a prior partial run. Check entra.microsoft.com → Users to see who was created.",
      "• 'The domain portion of the userPrincipalName property is invalid' — your UPN's domain doesn't match your actual tenant. Confirm the exact domain at entra.microsoft.com → Overview → Domain names.",
      "Reference: https://learn.microsoft.com/en-us/powershell/module/microsoft.graph.users/new-mguser",

      "## Step 6 — Assign Business Premium licenses to all users",
      "Discover your SKU (Stock Keeping Unit — Microsoft's internal name for a license product):",
      "$sku = Get-MgSubscribedSku | Where-Object {$_.SkuPartNumber -eq 'SPB'}",
      "$sku | Select SkuPartNumber, SkuId, ConsumedUnits, @{n='Total';e={$_.PrepaidUnits.Enabled}}",
      "(SPB is the SkuPartNumber for Microsoft 365 Business Premium. Total should be 25 for the trial; ConsumedUnits is how many are already assigned.)",
      "Assign the license to every unlicensed user:",
      "Get-MgUser -All -Property 'Id','UserPrincipalName','AssignedLicenses' | Where-Object {$_.AssignedLicenses.Count -eq 0 -and $_.UserPrincipalName -notlike '*#EXT#*'} | ForEach-Object {",
      "  Set-MgUserLicense -UserId $_.Id -AddLicenses @(@{SkuId=$sku.SkuId}) -RemoveLicenses @()",
      "}",
      "(The #EXT# filter skips guest users from other tenants — you have none yet, but this makes the script safe for later days.)",
      "Full SKU reference (if SPB isn't your product): https://learn.microsoft.com/en-us/entra/identity/users/licensing-service-plan-reference",

      "## Step 7 — Verify in the portal",
      "https://entra.microsoft.com → Users (left nav under 'Identity')",
      "User count should show 21+ (your admin + the 20 you created)",
      "Click any user's Display name → opens their profile",
      "• Overview tab: confirm Department and Job Title populated",
      "• Licenses tab (left side): confirm 'Microsoft 365 Business Premium' listed with status 'Active'",
      "• Sign-in logs tab: empty — they haven't signed in yet; normal",
      "If any user shows no license:",
      "• Trial tenants cap at 25 seats. Admin + 20 users = 21 — fine. If you created 25+ users, some won't license. Delete extras.",
      "• Run Get-MgSubscribedSku again — if ConsumedUnits hit 25 before everyone got licensed, free up seats by deleting unassigned trial accounts you don't need.",

      "## What you learned that you'll reuse",
      "• The Install-Module / Connect-MgGraph / run-cmdlets flow is the template for every PowerShell + Graph task through Day 60",
      "• Tenant ID + SkuPartNumber are values scripts need constantly — Lab Reference card keeps them one tap away",
      "• CSV-driven bulk operations scale to any user count (not just 20) — this is the real-world onboarding pattern",
      "• Silent success in PowerShell = output means a problem; no output means it worked"
    ]},
    {id:"d3t2",text:"Create security groups (static + dynamic)",cat:"lab",icon:"🗂️",time:"~20 min",diff:2,prereq:"d3t1",steps:[
      "## Assigned groups",
      "Create via PowerShell or entra.microsoft.com → Groups:",
      "SG-IT-Staff, SG-Legal-Team, SG-Sales-Team, SG-Executives, SG-AllEmployees",
      "Add the appropriate users to each",
      "## Dynamic group",
      "Create one dynamic group to understand the concept:",
      "Name: DG-Marketing-Auto | Rule: user.department -eq 'Marketing'",
      "Wait 5–15 minutes for dynamic membership to evaluate",
      "## Device group (for later)",
      "Name: SG-Managed-Devices | Type: Security | Membership: Assigned",
      "Leave empty — devices get added after Intune enrollment"
    ]},
    {id:"d3t3",text:"MS Learn: 'Explore endpoint management' learning path",cat:"study",icon:"📖",time:"~60 min",diff:1,steps:[
      "## Open the path",
      "https://learn.microsoft.com/en-us/training/paths/explore-endpoint-management/",
      "## Complete all modules",
      "'Explore Microsoft Intune'",
      "'Explore Microsoft Configuration Manager'",
      "'Explore co-management'",
      "## Concepts to internalize",
      "Intune is the cloud MDM service for Windows, iOS, Android, and macOS",
      "Configuration Manager (SCCM) is the on-premises predecessor",
      "Co-management runs both simultaneously during migration",
      "## Complete the knowledge check"
    ]},
  ]},
  {day:4,label:"Device Enrollment Concepts",tasks:[
    {id:"d4t1",text:"Explore the Intune enrollment options",cat:"lab",icon:"🔍",time:"~20 min",diff:1,prereq:"d1t2",steps:[
      "## Open Intune",
      "https://intune.microsoft.com → Devices → Enrollment",
      "## Review each platform tab",
      "Windows, Apple, Android — note the enrollment methods each supports",
      "## Confirm automatic MDM enrollment",
      "Windows → Enrollment → Automatic Enrollment — should show 'All' (default in Business Premium)",
      "This is what makes an Entra-joined Windows device auto-enroll into Intune"
    ]},
    {id:"d4t2",text:"Configure the company branding on the Entra sign-in page",cat:"lab",icon:"🎨",time:"~15 min",diff:1,prereq:"d1t1",steps:[
      "## Navigate",
      "entra.microsoft.com → User experiences → Company branding → Configure",
      "## Set defaults",
      "Upload a square logo (any PNG works for lab)",
      "Set a sign-in page background",
      "Add a sign-in page text line (e.g., 'Smokke Labs — authorized users only')",
      "## Why it matters",
      "This branding appears in Autopilot OOBE — it makes the zero-touch deployment feel production-grade"
    ]},
    {id:"d4t3",text:"MS Learn: 'Execute device enrollment' learning path",cat:"study",icon:"📖",time:"~75 min",diff:2,steps:[
      "## Open the path",
      "https://learn.microsoft.com/en-us/training/paths/execute-device-enrollment/",
      "## Complete all modules",
      "'Manage device authentication'",
      "'Enroll devices using Microsoft Configuration Manager'",
      "'Enroll devices using Microsoft Intune'",
      "## Enrollment methods to know",
      "Automatic MDM enrollment (MDM = Mobile Device Management)",
      "User-driven enrollment",
      "Windows Autopilot",
      "Bulk enrollment via provisioning packages",
      "Apple Business Manager / Android Enterprise",
      "## Apply what you learned",
      "intune.microsoft.com → Devices → Enrollment — locate each method in the UI"
    ]},
  ]},
  {day:5,label:"First Device Enrollment",tasks:[
    {id:"d5t1",text:"Entra Join the Surface Pro to your tenant",cat:"lab",icon:"🔗",time:"~25 min",diff:2,prereq:"d2t1",steps:[
      "## Why this task now",
      "Every endpoint management lab from this point (compliance, config profiles, BitLocker, Autopilot, app deployment) targets devices enrolled in Intune. Entra Join is the enrollment step that makes your Surface Pro visible to Intune — without it, there's nothing to target.",
      "## Learn context",
      "Device join theory is covered in MD-102 path 'Execute device enrollment' (your Day 4 study). You've read about Entra Join; today you execute it.",

      "## Before you start — which user to use",
      "Use one of the test users you created in d3t1, NOT your Global Admin.",
      "Real environments never have admins signing into endpoints — that's a zero-trust violation. Practicing with a test user now builds the correct muscle memory.",
      "Pick one from Entra → Users → copy their UPN (e.g., john.smith@smokkelabs.onmicrosoft.com)",
      "Confirm they have a Business Premium license assigned (d3t1 Step 6 handled this)",

      "## Step 1 — Sign out of any current Microsoft accounts on the Surface",
      "On the Surface Pro: Settings → Accounts → Your info",
      "If 'Email, calendar, and contacts' shows a personal account (Outlook.com, Xbox, etc.), click Manage my accounts and remove it",
      "If 'Access work or school' shows any connection, click the entry → Disconnect → Yes",
      "Restart the Surface Pro — clean slate for the join",

      "## Step 2 — Initiate the Entra Join",
      "After reboot, sign in to your local account",
      "Open Settings (Win + I) → Accounts (left nav) → 'Access work or school'",
      "Click 'Connect' (the + button)",
      "A dialog opens titled 'Set up a work or school account'",
      "IMPORTANT: Do NOT type the UPN in the top email field yet. Instead, look at the bottom of the dialog — click 'Join this device to Microsoft Entra ID' (small blue link text)",
      "If you accidentally typed in the top field, click Back and look for the link again",
      "Official doc with screenshots: https://learn.microsoft.com/en-us/entra/identity/devices/device-join-out-of-box",

      "## Step 3 — Sign in and complete the join",
      "Dialog title changes to 'Let's get you signed in'",
      "Enter the test user's UPN (from Step 0 above) → Next",
      "Password prompt → enter the password from your CSV (d3t1 Step 4)",
      "MFA prompt may appear (if CA MFA policies are already active from a future task — not yet)",
      "Dialog: 'Make sure this is your organization' → confirm the tenant name and domain match yours → Join",
      "Dialog: 'You're all set!' → Done",
      "## Expected completion time",
      "Entra Join completes in <10 seconds. Intune enrollment (automatic afterward) takes 1–5 minutes to fully propagate policies.",

      "## Step 4 — Verify on the Surface Pro",
      "Settings → Accounts → Access work or school",
      "You should see the test user's account listed with 'Connected to <your tenant>'s Azure AD'",
      "Click the account entry → Info button",
      "Scroll to 'Advanced Diagnostic Report' → click Create Report",
      "Device ID, Tenant ID, and 'Work Account SID' should all be populated",
      "Device state should show 'AzureAdJoined: YES' and 'MdmEnrollmentUrl' populated",

      "## Step 5 — Verify in Entra (cloud side)",
      "https://entra.microsoft.com → Devices → All devices",
      "Find the Surface Pro by name (default name = the Windows computer name, often starts with DESKTOP- or LAB-)",
      "Click the device row",
      "• Join Type column should show 'Microsoft Entra joined'",
      "• Owner column should show the test user's display name",
      "• MDM column should show 'Microsoft Intune' (this confirms auto-enrollment worked)",

      "## Step 6 — Verify in Intune (device management side)",
      "https://intune.microsoft.com → Devices → All devices",
      "Find the Surface Pro — may take 5–15 min to appear here",
      "Click the device → Overview tab",
      "• Compliance shows 'See Policy' or Compliant/Not compliant (Not compliant is expected — no compliance policy assigned yet; fixed on Day 6)",
      "• Operating system shows Windows 10/11 with build number matching your d2t1 baseline",
      "• Primary user shows the test user",
      "• Enrollment type: 'User' (joined as a user-owned device)",

      "## Common issues",
      "• 'Something went wrong' during join — usually licensing. Verify the test user has a Business Premium license in entra.microsoft.com → Users → <user> → Licenses",
      "• Device doesn't appear in Intune after 30 min — intune.microsoft.com → Devices → right side toolbar → 'Sync' forces a check-in. On the device: Settings → Accounts → Access work or school → account → Info → Sync",
      "• Join fails with 'Your organization requires...' — a Conditional Access policy may be blocking. Since you haven't created CA policies yet, check for Security Defaults: entra.microsoft.com → Properties → Manage Security defaults → disable temporarily",

      "## What you learned that you'll reuse",
      "• Entra Join = cloud identity + automatic MDM enrollment in one action (this is the Business Premium / Entra P1 default)",
      "• The 'Access work or school' settings page is the device-side source of truth for enrollment status",
      "• Intune's Overview tab on a device is the single-pane-of-glass you'll return to for every device-level troubleshooting scenario (Days 6, 7, 11, 13, 22)"
    ]},

  // ═══ PHASE 2: MD-102 DEVICE MANAGEMENT (Days 6–30) ═══
  {day:6,label:"Compliance Policies",tasks:[
    {id:"d6t1",text:"Build your first compliance policy",cat:"lab",icon:"✅",time:"~40 min",diff:2,prereq:"d5t1",steps:[
      "## Why this task now",
      "A compliance policy is Intune's way of asking 'is this device in a safe state?' — BitLocker on, Secure Boot enabled, password set, etc. The compliance RESULT (Compliant/Not compliant) is what Conditional Access in Phase 3 will consult to decide 'allow or block access to M365'. Without compliance policies, there's nothing for CA to evaluate.",
      "## Learn context",
      "MD-102 path 'Manage authentication and compliance' (your Day 6 study) explains the theory. Policies vs profiles distinction: a compliance policy EVALUATES state and returns pass/fail; a configuration profile ENFORCES settings (applies them). Two different concepts — don't conflate.",

      "## Step 1 — Navigate to Compliance Policies",
      "Open https://intune.microsoft.com (or use the bookmark from d1t2)",
      "Sign in with your Global Admin UPN",
      "Left nav: Devices → Compliance (under 'By platform' or the main 'Manage' section depending on UI version)",
      "Current UI landing page shows: Policies tab, Notifications tab, Locations tab, etc. You want Policies (default tab)",
      "If any Microsoft-managed default policies appear, leave them — we're adding our own",

      "## Step 2 — Start creating the policy",
      "Click '+ Create policy' button (top of the Policies list)",
      "A side panel opens titled 'Create a policy'",
      "• Platform: Windows 10 and later",
      "• Profile type: Windows 10/11 compliance policy (the default option)",
      "• Click Create button at the bottom of the panel",
      "Official doc: https://learn.microsoft.com/en-us/mem/intune/protect/create-compliance-policy",

      "## Step 3 — Basics tab",
      "• Name: COMP-Win11-Standard",
      "• Description: 'Baseline compliance for all Windows 11 endpoints — BitLocker, Secure Boot, password, Defender'",
      "• Platform: Windows 10 and later (pre-filled)",
      "• Click Next",
      "(Naming convention COMP- prefix is a discipline you'll maintain throughout: COMP=compliance, CONF=configuration, AV=antivirus, ENC=encryption, etc. Makes policies instantly scannable in long lists.)",

      "## Step 4 — Compliance settings tab (the meat of the policy)",
      "Expand each section by clicking the section header, then configure:",
      "",
      "**Custom Compliance** — leave all at 'Not configured'",
      "",
      "**Device Health** — these evaluate integrity signals from Windows:",
      "• Require BitLocker: Require",
      "• Require Secure Boot to be enabled on the device: Require",
      "• Require code integrity: Require",
      "",
      "**Device Properties** — these enforce OS version floors:",
      "• Minimum OS version: enter the build from d2t1 (e.g., 10.0.22631.2428 — adjust to your actual build)",
      "• Maximum OS version: leave blank",
      "• Minimum OS required for mobile devices: leave blank (not applicable to Windows)",
      "",
      "**Configuration Manager Compliance** — leave all at 'Not configured' (you're not using SCCM)",
      "",
      "**System Security** — password and encryption settings:",
      "• Require a password to unlock mobile devices: Require",
      "• Simple passwords: Block",
      "• Password type: Alphanumeric",
      "• Minimum password length: 8",
      "• Maximum minutes of inactivity before password is required: 15",
      "• Password expiration (days): 90 (or leave blank for passwordless goals)",
      "• Number of previous passwords to prevent reuse: 5",
      "• Encryption of data storage on device: Require",
      "• Firewall: Require",
      "• Antivirus: Require",
      "• Antispyware: Require",
      "",
      "**Microsoft Defender Antimalware** — enforce Defender is healthy:",
      "• Microsoft Defender Antimalware: Require",
      "• Microsoft Defender Antimalware minimum version: leave blank (any active version)",
      "• Microsoft Defender Antimalware security intelligence up-to-date: Require",
      "• Real-time protection: Require",
      "",
      "**Microsoft Defender for Endpoint** — leave at 'Not configured' (requires Defender for Endpoint license you don't have)",
      "",
      "Click Next",

      "## Step 5 — Actions for noncompliance tab",
      "Already has one default action: 'Mark device noncompliant' immediately (0 days)",
      "Add a second action:",
      "• Click '+ Add' below the list",
      "• Action: Send email to end user",
      "• Schedule (days after noncompliance): 1",
      "• Message template: Create one (or use None for now — you can add a template later)",
      "This gives users a 1-day grace period notification before CA starts blocking them.",
      "Click Next",

      "## Step 6 — Scope tags tab",
      "Leave at Default",
      "Click Next",
      "(Scope tags become relevant in Day 15 for regional admin delegation — not needed yet.)",

      "## Step 7 — Assignments tab",
      "Under 'Included groups', click '+ Add all devices'",
      "This assigns the policy to every enrolled device tenant-wide — exactly what we want for a baseline",
      "Excluded groups: leave blank",
      "Click Next",
      "Review + create tab: scan all settings, click Create",

      "## Step 8 — Wait for evaluation and check the Surface Pro",
      "Evaluation takes 15–60 minutes for the first compliance check",
      "To speed it up: on the Surface Pro → Settings → Accounts → Access work or school → your account → Info → Sync",
      "Then in intune.microsoft.com → Devices → All devices → click your Surface Pro → Device compliance tab",
      "Expected FIRST result: Not compliant",
      "Click on the policy name to see WHICH setting failed — most likely 'Require BitLocker' because BitLocker isn't on yet",
      "This is the expected sequence — d6t2 (next task) turns BitLocker on, then recheck",

      "## Reading the compliance report",
      "For each evaluated setting, the detail view shows: Passing state, Failing state, Error state, Not evaluated",
      "A single failing setting marks the whole device Not compliant",
      "Once BitLocker is enabled (d6t2), you'll force another sync and the policy should flip to Compliant",

      "## Common issues",
      "• Policy shows 'Not evaluated' forever — the device hasn't checked in. Force sync from the device or intune.microsoft.com → Devices → device → Sync button",
      "• 'Minimum OS version' check fails unexpectedly — your build number format might be wrong. It should be 4 numbers separated by dots: 10.0.22631.2428 — not 23H2",
      "• Device shows Compliant when you expected Not compliant — double-check you selected Require (not 'Not configured') for each setting",

      "## What you learned that you'll reuse",
      "• The 8-tab flow (Basics → Settings → Actions → Scope → Assignments → Review) is the template for EVERY Intune policy type you'll create (configuration, app protection, update rings, endpoint security) — Days 7, 8, 9, 13, 17, 18, 21",
      "• COMP- naming prefix + descriptive suffix = scannable policy library",
      "• Not compliant on first evaluation is normal — it tells you the policy is working, not broken"
    ]},
    {id:"d6t2",text:"Enable BitLocker on the Surface Pro",cat:"lab",icon:"🔐",time:"~30 min",diff:2,prereq:"d6t1",steps:[
      "## Turn on BitLocker",
      "On the Surface Pro → Control Panel → BitLocker Drive Encryption → Turn on BitLocker for C:",
      "Save the recovery key to your Microsoft account or a file",
      "## TPM check if BitLocker refuses",
      "TPM (Trusted Platform Module) is a chip that stores encryption keys",
      "Run 'tpm.msc' → confirm TPM is Ready",
      "If Not Ready: reboot into UEFI (Volume Up + Power during boot) → enable TPM → retry",
      "## Force a sync",
      "Settings → Accounts → Access work or school → your connected account → Info → Sync",
      "## Verify compliance",
      "Check Intune after 15 minutes — device should show Compliant"
    ]},
    {id:"d6t3",text:"MS Learn: 'Manage authentication and compliance' learning path",cat:"study",icon:"📖",time:"~90 min",diff:2,steps:[
      "## Open the path",
      "https://learn.microsoft.com/en-us/training/paths/manage-authentication-compliance/",
      "## Complete all modules",
      "'Explore device compliance'",
      "'Implement device compliance policies'",
      "'Implement Conditional Access policies'",
      "## Key concepts",
      "Compliance policies evaluate device state (pass/fail)",
      "Configuration profiles enforce device settings (apply)",
      "Noncompliant devices can be blocked from M365 resources via Conditional Access",
      "Grace periods give users time to remediate before full block",
      "## Complete all knowledge checks"
    ]},
  ]},
  {day:7,label:"Configuration Profiles",tasks:[
    {id:"d7t1",text:"Create a Device Restrictions profile",cat:"lab",icon:"⚙️",time:"~30 min",diff:2,prereq:"d5t1",steps:[
      "## Create the profile",
      "intune.microsoft.com → Devices → Configuration → '+ Create' → New policy",
      "Platform: Windows 10 and later | Profile type: Templates → Device restrictions",
      "Name: 'CONF-Win11-DeviceRestrictions'",
      "## Configure settings",
      "Password: require numeric PIN, minimum length 6",
      "App Store: block adding Microsoft accounts (personal)",
      "General: block camera, block Cortana, block developer unlock",
      "## Assign and verify",
      "Assign to All Devices",
      "Force sync on the Surface Pro → verify the settings apply (try opening Camera — blocked)"

    {id:"d7t2",text:"Create a Settings Catalog profile",cat:"lab",icon:"🧩",time:"~25 min",diff:2,steps:[
      "## Why Settings Catalog",
      "Settings Catalog is Microsoft's modern, granular, searchable profile type",
      "Use it instead of legacy Templates for new deployments",
      "## Create",
      "Devices → Configuration → '+ Create' → Windows 10+ → Settings Catalog",
      "Name: 'CONF-Win11-SettingsCatalog-Baseline'",
      "## Add settings",
      "Add Setting → search 'Smart Screen' → enable",
      "Add Setting → search 'USB' → block removable storage write access",
      "Add Setting → search 'Clipboard' → disable clipboard history sync",
      "## Assign and verify",
      "Assign to All Devices → force sync → verify restrictions apply"
    ]},
    {id:"d7t3",text:"MS Learn: 'Configure profiles for users and devices' learning path",cat:"study",icon:"📖",time:"~75 min",diff:2,steps:[
      "## Open the path",
      "https://learn.microsoft.com/en-us/training/paths/configure-profiles-users-devices/",
      "## Modules",
      "'Execute device profiles'",
      "'Oversee device profiles'",
      "'Maintain user profiles'",
      "## Three profile types to distinguish",
      "Templates — legacy, pre-grouped (Device Restrictions, Wi-Fi, VPN)",
      "ADMX Import — upload .admx files to migrate GPO settings to Intune",
      "Settings Catalog — modern, granular, searchable — recommended default",
      "## Complete the knowledge check"
    ]},
  ]},
  {day:8,label:"Application Deployment",tasks:[
    {id:"d8t1",text:"Deploy Microsoft 365 Apps via Intune",cat:"lab",icon:"📦",time:"~60 min (+ install wait)",diff:2,prereq:"d5t1",steps:[
      "## Why this task now",
      "Deploying M365 Apps via Intune instead of letting users install them manually is the standard enterprise pattern. It proves the device management stack end-to-end: Intune assigns → device receives → apps install silently → Intune reports success. This same 8-tab assignment flow reappears in d8t2 (Store apps), d9 (Update Rings), d13 (ASR policies), d17 (endpoint security), and d32 (Conditional Access).",
      "## Learn context",
      "MD-102 path 'Examine application management' (your Day 8 study) covers app types. Microsoft 365 Apps is a special case — Intune has a dedicated installer type for it that handles the XML configuration file Office deployment normally requires.",

      "## Step 1 — Navigate to Apps",
      "https://intune.microsoft.com → Apps (left nav)",
      "Under 'By platform', click Windows",
      "The main pane shows all Windows apps currently deployed — likely empty for your tenant",
      "Click '+ Add' at the top",

      "## Step 2 — Choose the app type",
      "Side panel opens: 'Select app type'",
      "In the dropdown under 'App type', select 'Microsoft 365 Apps' (under the 'Microsoft 365 Apps' group heading)",
      "Sub-option appears: 'Windows 10 and later' — select it",
      "Click Select button at the bottom",
      "Official doc with screenshots: https://learn.microsoft.com/en-us/mem/intune/apps/apps-add-office365",

      "## Step 3 — App suite information tab",
      "The form auto-fills several fields based on the suite:",
      "• Suite Name: change to 'M365 Apps — Current Channel' (or leave default if you prefer)",
      "• Suite Description: 'Standard Microsoft 365 Apps for Enterprise deployment — Current Channel, 64-bit'",
      "• Publisher: Microsoft (pre-filled)",
      "• Category: Productivity (select from dropdown)",
      "• Show this as a featured app in the Company Portal: Yes",
      "• Information URL: leave blank",
      "• Privacy URL: leave blank",
      "• Developer: Microsoft (pre-filled)",
      "• Owner: leave blank",
      "• Notes: 'Baseline office suite for all users'",
      "• Logo: pre-populated with Microsoft 365 logo (don't change)",
      "Click Next",

      "## Step 4 — Configure app suite tab (the critical one)",
      "Configuration settings format: choose 'Configuration designer' (the GUI option; not XML)",
      "Select Office apps — check ONLY these (uncheck Access, OneNote, Publisher, Skype for Business):",
      "• Excel",
      "• OneDrive (Groove.Exe — the desktop sync client)",
      "• Outlook",
      "• PowerPoint",
      "• Teams",
      "• Word",
      "(Why limit? Installing only what users need reduces attack surface and disk footprint. Your company doesn't need Publisher.)",
      "",
      "Select other Office apps (license required): uncheck everything",
      "",
      "Architecture: 64-bit",
      "",
      "Update channel: Current Channel",
      "(Options: Current Channel = monthly features + bug fixes [most orgs]; Current Channel Preview = one month ahead; Monthly Enterprise Channel = predictable monthly Tuesday; Semi-Annual Enterprise Channel = twice yearly, pilot; Semi-Annual Enterprise Channel = twice yearly, production. Stick with Current Channel for lab.)",
      "",
      "Remove other versions: Yes",
      "(This uninstalls any pre-existing Office versions — MSI-based Office 2016, consumer Office, etc. Critical for clean deployments.)",
      "",
      "Version to install: Latest",
      "",
      "Specific version: leave blank",
      "",
      "Use shared computer activation: No",
      "(Shared computer activation = multi-user scenarios like Session Hosts / Cloud PCs. Not applicable to your Surface Pro.)",
      "",
      "Accept the Microsoft Software License Terms on behalf of users: Yes",
      "",
      "Languages: English (United States) — add more if you have multilingual users",
      "",
      "Click Next",

      "## Step 5 — Scope tags tab",
      "Leave Default → Next",

      "## Step 6 — Assignments tab",
      "Three assignment types — use 'Required' for mandatory, silent install:",
      "",
      "Required section → '+ Add group' OR '+ Add all devices'",
      "• For this lab: click '+ Add all devices'",
      "• In production you'd usually target a user group (SG-AllEmployees from d3t2) for user-based targeting",
      "",
      "Available for enrolled devices: leave empty",
      "(Available = shows in Company Portal for users to self-install. Good for optional apps.)",
      "",
      "Uninstall: leave empty",
      "",
      "Click Next",

      "## Step 7 — Review + create",
      "Scroll the summary — confirm apps, architecture, channel",
      "Click Create",
      "Wait for 'Microsoft 365 Apps — Current Channel was created successfully' notification at the top right",

      "## Step 8 — Force the Surface Pro to sync and install",
      "Installation starts on next device check-in — normally every 8 hours. To trigger now:",
      "On the Surface Pro: Settings → Accounts → Access work or school → your account → Info → Sync",
      "OR in Intune: Devices → All devices → select Surface Pro → Sync button in the toolbar",
      "Install time: 20–40 minutes. This is a 3–4 GB download.",
      "You'll see Office apps appear in Start Menu as they install — Word first, then Excel, then Outlook, etc.",

      "## Step 9 — Verify the install",
      "On the Surface Pro, press Windows key → type 'Word' → open Microsoft Word",
      "First launch: Office runs a one-time activation. Sign in with the test user's UPN when prompted",
      "File → Account → should show 'Subscription Product: Microsoft 365 Apps for business' + the test user's UPN",
      "In Intune: Apps → Windows → click 'M365 Apps — Current Channel' → Device install status (left nav)",
      "Should show '1 / Installed' for your Surface Pro",

      "## Common issues",
      "• Install stuck at 'Pending' for 1+ hour — force another sync. Check device is actually online.",
      "• Install fails with error 0x87D13B9F — usually disk space or a conflict with existing Office. Verify Step 4 'Remove other versions' = Yes.",
      "• Office installed but won't activate — the test user needs a Business Premium license assigned (d3t1 Step 6). Verify at entra.microsoft.com → Users → <user> → Licenses",
      "• Apps don't appear in Start Menu — restart the Surface Pro; some shortcuts populate only after reboot",

      "## What you learned that you'll reuse",
      "• The 7-tab Intune app deployment flow (type → info → config → scope → assign → review → create) is the template for EVERY app type",
      "• Required vs Available distinction — silent mandatory vs opt-in self-service",
      "• Sync button on both device and Intune sides is your first debugging move for any deployment delay",
      "• The Device install status report is where you prove to management 'we deployed to X devices, Y succeeded, Z failed with reason'"
    ]},
    {id:"d8t2",text:"Deploy a Microsoft Store app (Win32 install)",cat:"lab",icon:"📥",time:"~30 min",diff:2,prereq:"d8t1",steps:[

  {day:10,label:"App Protection (MAM / BYOD)",tasks:[
    {id:"d10t1",text:"Create an App Protection Policy for iOS/Android",cat:"lab",icon:"📲",time:"~30 min",diff:2,prereq:"d1t1",steps:[
      "## Create",
      "intune.microsoft.com → Apps → App protection policies → '+ Create' → iOS/iPadOS (or Android)",
      "Name: 'MAM-BYOD-Protection'",

      "## Data protection settings",

      "Send org data to other apps: Policy managed apps",

      "## Assign",
      "Assign to All Users"
    ]},
    {id:"d10t2",text:"Enroll a personal device to test MAM",cat:"lab",icon:"📱",time:"~20 min",diff:2,prereq:"d10t1",steps:[
      "## Optional if you don't want to enroll personal device",
      "Skip this lab and rely on the MS Learn module instead",
      "## If testing",
      "On your phone: install Outlook or Teams from the app store",
      "Sign in with a tenant test user",
      "Observe the managed app PIN prompt",
      "Try to copy corporate text and paste into a non-managed app — should be blocked"
    ]},
    {id:"d10t3",text:"MS Learn: App Protection Policies (MAM)",cat:"study",icon:"📖",time:"~45 min",diff:2,steps:[
      "## Open the reference",
      "https://learn.microsoft.com/en-us/mem/intune/apps/app-protection-policy",
      "## Module path",
      "https://learn.microsoft.com/en-us/search/?terms=app%20protection%20policies%20overview&category=Module",
      "## What MAM is",
      "MAM (Mobile Application Management) applies policies to specific apps rather than the whole device",
      "Used for BYOD: you don't control the device but protect company data inside company apps",
      "## Key concepts",

      "Conditional launch rules (require PIN, block jailbroken)",

    ]},

  {day:11,label:"Windows Autopilot",tasks:[
    {id:"d11t1",text:"Register the Surface Pro for Autopilot",cat:"lab",icon:"🚀",time:"~30 min",diff:2,prereq:"d5t1",steps:[
      "## Why this task now",
      "Autopilot is the zero-touch provisioning workflow — unbox a device, turn it on, user signs in, device fully configures itself from the cloud. No IT tech, no imaging, no manual setup. This is THE interview topic for MD-102 and for endpoint engineering roles generally. You need to demonstrate (d12) that you can reprovision a device hands-off.",
      "Step 1 here (hash collection) is how real IT departments register devices without a vendor relationship. For enterprise scale, Microsoft or your device OEM uploads hashes directly — but the script method is what you'll describe in interviews.",
      "## Learn context",
      "MD-102 path 'Deploy using cloud-based tools' (d11t3 study after this) covers Autopilot theory. The hardware hash is a 4KB blob that uniquely identifies a device to Microsoft's Autopilot service. Registering it tells Autopilot 'when this specific device boots, apply this profile'.",

      "## Step 1 — Open PowerShell as Administrator on the Surface Pro",
      "On the Surface Pro itself (not your daily driver):",
      "Press Windows key → type 'terminal' → right-click 'Terminal' → Run as administrator → Yes on UAC",
      "Confirm title bar reads 'Administrator:' prefix",

      "## Step 2 — Allow script execution temporarily",
      "Run: Set-ExecutionPolicy -Scope Process -ExecutionPolicy RemoteSigned -Force",
      "(This loosens script restrictions for THIS PowerShell session only — closes when you close the window. Safe for lab.)",

      "## Step 3 — Install the hash collection script",
      "Install-Script -Name Get-WindowsAutopilotInfo -Force",
      "Prompts you may see:",
      "• 'NuGet provider is required...' → Y + Enter",
      "• 'You are installing the scripts from an untrusted repository...' → Y + Enter (or A for Yes to All)",
      "Install takes 1–2 minutes",
      "Official script: https://www.powershellgallery.com/packages/Get-WindowsAutopilotInfo",

      "## Step 4 — Run the hash collection against your tenant (online mode)",
      "Get-WindowsAutopilotInfo -Online",
      "What happens:",
      "• Script prompts for Graph permissions — a browser opens for MFA sign-in",
      "• Sign in with your Global Admin UPN",
      "• Consent to the permissions requested (DeviceManagementServiceConfig.ReadWrite.All)",
      "• Script collects the hardware hash from the Surface Pro's TPM",
      "• Script uploads the hash directly to your Intune Autopilot service",
      "• Terminal returns: 'Device registration complete' or similar",
      "Total time: 2–5 minutes",
      "Official doc with screenshots: https://learn.microsoft.com/en-us/mem/autopilot/add-devices#using-powershell",

      "## Step 5 — Verify registration in Intune",
      "https://intune.microsoft.com → Devices → Enrollment → Windows (tab) → Windows Autopilot devices",
      "(Some UI versions: Devices → Windows → Windows enrollment → Devices)",
      "Your Surface Pro should appear in the list within 5–15 minutes",
      "Columns to check:",
      "• Serial number: matches the Surface Pro's serial (find on bottom of device or in Settings → System → About)",
      "• Manufacturer: 'Microsoft Corporation'",
      "• Model: 'Surface Pro 5' (or your exact model)",
      "• Group Tag: empty (we'll use this later if we want multi-profile routing)",
      "• Profile Status: 'Not assigned' — this will change after d11t2",

      "## Alternative method (offline mode, if online fails)",
      "If Step 4's online mode fails due to firewall or permissions issues:",
      "Run: Get-WindowsAutopilotInfo -OutputFile C:\\autopilot-hash.csv",
      "This creates a CSV with the hardware hash",
      "Manually upload at intune.microsoft.com → Devices → Enrollment → Windows → Windows Autopilot devices → Import button",

      "## Common issues",
      "• 'Cannot find path' error on Install-Script — you didn't run PowerShell as Administrator",
      "• Script hangs at hash collection — the TPM is disabled. Check with: Get-Tpm — if TpmPresent=False, enable TPM in UEFI (reboot, hold Volume Up + Power)",
      "• 'Insufficient privileges to complete the operation' — your Global Admin account doesn't have the right scope. Run Connect-MgGraph with explicit scopes: DeviceManagementServiceConfig.ReadWrite.All",
      "• Device appears but serial number shows dashes — hash collected from VM or TPM-less device. Not usable for Autopilot.",

      "## What you learned that you'll reuse",
      "• Hardware hash = 4 KB identifier that tells Autopilot 'recognize this specific device'",
      "• Online mode (one step) vs offline mode (export then import) — online is preferred for small fleets, offline for vendor/OEM delivery",
      "• The Windows Autopilot devices list is where you manage registered (but not yet deployed) hardware — separate from 'All devices' which shows enrolled (already provisioned) devices",
      "• Device is now registered but NO profile assigned yet — d11t2 does that"
    ]},
    {id:"d11t2",text:"Create an Autopilot deployment profile",cat:"lab",icon:"🧭",time:"~30 min",diff:2,prereq:"d11t1",steps:[
      "## Why this task now",
      "The deployment profile is the 'how do I want this device configured?' definition. When a registered device (from d11t1) boots, Autopilot looks up the assigned profile and applies it during Out-Of-Box Experience (OOBE). Without a profile, the registered device just boots normally like any Windows install.",
      "## Learn context",
      "Three Autopilot deployment modes to know cold for interviews:",
      "• User-driven — user signs in, becomes device owner. Standard corporate desktop/laptop. (What you're building today.)",
      "• Self-deploying — no user interaction, device joins as itself. Kiosks, digital signage, shared room devices.",
      "• Pre-provisioned (previously 'White Glove') — IT/vendor runs the heavy install phase before the user ever sees the device; user only signs in at the end.",
      "MD-102 weights User-driven heaviest because it's the majority of real deployments.",

      "## Step 1 — Navigate to deployment profiles",
      "https://intune.microsoft.com → Devices → Enrollment → Windows (tab)",
      "Scroll down to 'Windows Autopilot' section → click 'Deployment Profiles'",
      "Click '+ Create profile' → select 'Windows PC' (not HoloLens)",

      "## Step 2 — Basics tab",
      "• Name: AP-Standard-UserDriven",
      "• Description: 'Standard corporate deployment — User-driven, Entra joined, hidden OOBE screens, LAB- prefix naming'",
      "• Convert all targeted devices to Autopilot: Yes",
      "(This auto-registers any device that enrolls into your tenant via normal means — so future Entra Joins become Autopilot-capable without re-running d11t1's script.)",
      "Click Next",
      "Official doc: https://learn.microsoft.com/en-us/mem/autopilot/profiles",

      "## Step 3 — Out-of-box experience (OOBE) tab — the heart of the profile",
      "This tab controls what the user sees during first-boot setup:",
      "",
      "• Deployment mode: User-Driven",
      "",
      "• Join to Microsoft Entra ID as: Microsoft Entra joined",
      "(Other option 'Microsoft Entra hybrid joined' is for on-prem AD scenarios — not your cloud-only lab.)",
      "",
      "• Microsoft Software License Terms: Hide",
      "(Users don't need to accept EULA on every deployment — your company's IT ToS covers it.)",
      "",
      "• Privacy settings: Hide",
      "(Skips the 5-page telemetry/location wizard. Corporate policy decides these, not end users.)",
      "",
      "• Hide change account options: Hide",
      "(Prevents users from creating a local admin or personal account during OOBE — they MUST use their corporate identity.)",
      "",
      "• User account type: Standard",
      "(Not Administrator. Principle of least privilege. If users need local admin for legitimate reasons, grant via separate Intune policy — don't bake it into the profile.)",
      "",
      "• Allow pre-provisioned deployment: No",
      "(Yes only if you're doing the vendor hand-off pattern.)",
      "",
      "• Language (Region): Operating system default — or pick your region explicitly",
      "",
      "• Automatically configure keyboard: Yes",
      "",
      "• Apply device name template: Yes",
      "• Enter a name: LAB-%SERIAL%",
      "(Template placeholders: %SERIAL% = device serial, %RAND:x% = random digits. LAB- prefix makes lab devices scannable in device lists. In production: use COMPANY-%SERIAL% or COMPANY-%RAND:5%.)",
      "",
      "Click Next",

      "## Step 4 — Scope tags tab",
      "Default → Next",

      "## Step 5 — Assignments tab",
      "Included groups: '+ Add all devices'",
      "(In production, you'd create a group called 'AutopilotDevices' and add only devices that should get this profile. For lab, all-devices is fine — you only have the Surface.)",
      "Excluded groups: blank",
      "Click Next",

      "## Step 6 — Review + create",
      "Scan the summary. Click Create.",
      "Wait for success notification.",

      "## Step 7 — Verify assignment on your registered device",
      "https://intune.microsoft.com → Devices → Enrollment → Windows → Windows Autopilot devices",
      "Click your Surface Pro",
      "• Profile status: changes from 'Not assigned' to 'Assigning...' to 'Assigned' over 5–15 minutes",
      "• Assigned profile: AP-Standard-UserDriven",
      "If status stays 'Not assigned' after 30 min: Refresh the page, verify the assignment in the profile settings, confirm group assignment includes this device",

      "## What's ready now (d12 uses this)",
      "The registered Surface Pro + assigned profile = fully primed for zero-touch provisioning demo in d12",
      "d12 triggers Autopilot Reset; the device reboots into OOBE; this profile runs; device returns to a managed state without you touching it",

      "## Common issues",
      "• Profile shows 'Not Applicable' on a device — the device was enrolled via a path other than Autopilot (like your manual d5t1 join). After this profile is created with 'Convert all targeted devices to Autopilot: Yes', it should eventually flip to Assigned — can take up to 24 hours first time.",
      "• 'Waiting for assignment...' stuck for hours — force an Intune sync from the device, or wait. First-time profile assignment is slow.",
      "• Name template fails to apply — template strings have strict rules. %SERIAL% must be uppercase; the resulting name must be ≤15 chars. LAB-%SERIAL% on a long serial will truncate.",

      "## What you learned that you'll reuse",
      "• Deployment profile = the 'how' of Autopilot (what the user sees during OOBE, what account type, what name)",
      "• User-driven is the mainstream pattern; self-deploying and pre-provisioned are variants to know for interviews",
      "• 'Convert all targeted devices to Autopilot: Yes' is the subtle setting that turns your tenant into an Autopilot-first environment"
    ]},

  {day:16,label:"PowerShell + Microsoft Graph",tasks:[
    {id:"d16t1",text:"Query devices via Microsoft Graph",cat:"lab",icon:"⌨️",time:"~45 min",diff:2,prereq:"d3t1",steps:[
      "## Why this task now",
      "You've been clicking through the Intune portal for 10 days. Today you learn to get the same information via PowerShell + Microsoft Graph — the programmatic alternative. This is the 'I can automate reporting and bulk operations' story that separates senior candidates from button-clickers in interviews.",
      "The skills from this task apply immediately: d16t2 (policy export), d20 (policy portfolio documentation), d27 (GitHub scripts repo). Script output becomes portfolio artifacts.",
      "## Learn context",
      "Microsoft Graph is the unified API behind all M365 management UIs. Every click in Intune or Entra ultimately calls a Graph endpoint. PowerShell cmdlets like Get-MgDeviceManagementManagedDevice wrap those API calls. Today's MS Learn study (d16t3) gives the conceptual background.",

      "## Step 1 — Open PowerShell as Administrator on your daily driver",
      "Not the Surface Pro this time — use a dev machine where you'll keep scripts",
      "Press Windows key → 'terminal' → right-click → Run as administrator → Yes",
      "cd $HOME\\Documents → make a folder: mkdir IntuneScripts → cd IntuneScripts",
      "This is where your scripts live going forward",

      "## Step 2 — Connect with device-read scopes",
      "(You already installed Microsoft.Graph in d3t1. If not, re-run: Install-Module Microsoft.Graph -Scope CurrentUser)",
      "Connect-MgGraph -Scopes 'DeviceManagementManagedDevices.Read.All','DeviceManagementConfiguration.Read.All' -TenantId '<your-tenant-id>'",
      "Browser opens → sign in → consent to permissions → Welcome message",
      "Note: Scopes are cumulative — more scopes = more you can do, but only grant what you need. This is the least-privilege principle (interview topic for Day 54).",

      "## Step 3 — List all enrolled devices (basic query)",
      "Get-MgDeviceManagementManagedDevice | Select DeviceName, ComplianceState, OperatingSystem, OsVersion, LastSyncDateTime | Format-Table -AutoSize",
      "Expected output: a table with your Surface Pro (and any other enrolled devices)",
      "What each column means:",
      "• DeviceName — what you see in the portal",
      "• ComplianceState — compliant / noncompliant / unknown / error",
      "• OperatingSystem — Windows, iOS, Android, macOS",
      "• OsVersion — full build number",
      "• LastSyncDateTime — when the device last checked into Intune",
      "Official cmdlet reference: https://learn.microsoft.com/en-us/powershell/module/microsoft.graph.devicemanagement/get-mgdevicemanagementmanageddevice",

      "## Step 4 — Filter by compliance state",
      "Get-MgDeviceManagementManagedDevice -Filter \"complianceState eq 'noncompliant'\" | Select DeviceName, ComplianceState, UserPrincipalName",
      "The -Filter parameter uses OData syntax (not PowerShell syntax). Note the single quotes around 'noncompliant' — required.",
      "Other filter examples:",
      "• -Filter \"operatingSystem eq 'Windows'\"",
      "• -Filter \"lastSyncDateTime lt 2025-01-01T00:00:00Z\" (devices that haven't synced since Jan 1)",

      "## Step 5 — Find stale devices (no sync in 30 days)",
      "$threshold = (Get-Date).AddDays(-30).ToString('yyyy-MM-ddTHH:mm:ssZ')",
      "Get-MgDeviceManagementManagedDevice -Filter \"lastSyncDateTime lt $threshold\" | Select DeviceName, UserPrincipalName, LastSyncDateTime | Format-Table",
      "Why this matters: stale devices = potential security risk (user left, device lost, offline forever). In interviews: 'I run a stale-device report weekly and action anything >30 days silent.'",

      "## Step 6 — Export to CSV for reporting",
      "Get-MgDeviceManagementManagedDevice | Select DeviceName, ComplianceState, OperatingSystem, OsVersion, LastSyncDateTime, UserPrincipalName, Manufacturer, Model, SerialNumber | Export-Csv -Path './all-devices.csv' -NoTypeInformation",
      "Open the CSV in Excel → you have a shareable device inventory report",
      "The -NoTypeInformation flag prevents PowerShell from adding a junk header row",
      "This CSV is portfolio material — rename to something meaningful and commit to your GitHub repo (Day 27)",

      "## Step 7 — Count devices by compliance status",
      "Get-MgDeviceManagementManagedDevice | Group-Object -Property ComplianceState | Select Name, Count",
      "Expected output:",
      "  Name           Count",
      "  ----           -----",
      "  compliant      8",
      "  noncompliant   2",
      "  unknown        1",
      "This one-liner gives you the compliance dashboard number — memorize it for interview 'how do you report on fleet health?' questions.",

      "## Step 8 — Save your queries as a reusable script",
      "Notepad → paste all the commands above with comments → save as .\\device-report.ps1 (in your IntuneScripts folder)",
      "Next time you need the report: .\\device-report.ps1",
      "This is what 'I automate reporting' means in interviews — show the script.",

      "## Common issues",
      "• 'Authentication_ExpiredToken' — your Connect-MgGraph session timed out. Re-run Connect-MgGraph.",
      "• 'Insufficient privileges' — missing a scope. Add the needed scope to the Connect-MgGraph command and reconnect.",
      "• -Filter returns nothing when data exists — OData filter syntax is strict. Single quotes around string values. Property names camelCase (complianceState not ComplianceState in filter).",
      "• Format-Table truncates columns — pipe to Format-List instead to see full values for one device",

      "## What you learned that you'll reuse",
      "• Connect-MgGraph with specific scopes = interactive authentication to Graph API",
      "• The Get-Mg* / Set-Mg* / New-Mg* / Remove-Mg* cmdlet families mirror Graph REST endpoints",
      "• Piping to Select, Where, Group-Object, Export-Csv is the PowerShell reporting toolkit — same pattern applies to users, groups, policies, sign-in logs",
      "• Saving scripts to a folder + version control = the 'I automate ops' story for interviews"
    ]},
    {id:"d16t2",text:"Script: export all compliance and config policies to JSON",cat:"lab",icon:"💾",time:"~45 min",diff:3,prereq:"d16t1",steps:[
      "## Why this task now",
      "Your tenant has ~10 policies by now (compliance, config profiles, app deployments, security baseline, updates). Six weeks from now you won't remember what each one does. JSON exports give you:",
      "• Version-control-friendly documentation (commit to git, diff across time)",
      "• Disaster recovery (restore from export if a policy is accidentally deleted)",
      "• Audit evidence (prove to compliance what was configured on a given date)",
      "• Template library (clone working policies for a new tenant)",
      "## Learn context",
      "Same Graph API, different endpoints. Every policy type has a dedicated Graph endpoint. The pattern of 'discover, enumerate, export' works for compliance, config, app protection, update rings, endpoint security — all of it.",

      "## Step 1 — Set up the export directory",
      "In your existing PowerShell session (from d16t1):",
      "cd $HOME\\Documents\\IntuneScripts",
      "mkdir exports -ErrorAction SilentlyContinue",
      "$stamp = Get-Date -Format 'yyyy-MM-dd'",
      "mkdir \"exports\\$stamp\"",
      "cd \"exports\\$stamp\"",
      "(The date-stamped folder gives you a point-in-time snapshot each time you export.)",

      "## Step 2 — Ensure you have the right scopes",
      "If Connect-MgGraph was already called with DeviceManagementConfiguration.Read.All in d16t1, you're set",
      "Otherwise: Connect-MgGraph -Scopes 'DeviceManagementConfiguration.Read.All' -TenantId '<tenant-id>'",

      "## Step 3 — Export all compliance policies",
      "$compliance = Get-MgDeviceManagementDeviceCompliancePolicy",
      "$compliance.Count  # how many you have",
      "$compliance | ForEach-Object {",
      "  $safename = $_.DisplayName -replace '[^a-zA-Z0-9\\-]','_'",
      "  $_ | ConvertTo-Json -Depth 20 | Out-File -FilePath \".\\compliance-$safename.json\" -Encoding UTF8",
      "}",
      "(The $safename line strips characters invalid in filenames. -Depth 20 ensures nested properties serialize fully.)",
      "After this runs: ls .\\compliance-*.json — you should see one JSON file per compliance policy",

      "## Step 4 — Export all configuration profiles",
      "$config = Get-MgDeviceManagementDeviceConfiguration",
      "$config.Count",
      "$config | ForEach-Object {",
      "  $safename = $_.DisplayName -replace '[^a-zA-Z0-9\\-]','_'",
      "  $_ | ConvertTo-Json -Depth 20 | Out-File -FilePath \".\\config-$safename.json\" -Encoding UTF8",
      "}",

      "## Step 5 — Export settings catalog configurations (modern format)",
      "(Get-MgDeviceManagementDeviceConfiguration only catches the legacy template-based profiles. Settings Catalog profiles use a different endpoint.)",
      "$settingsCatalog = Invoke-MgGraphRequest -Uri 'https://graph.microsoft.com/beta/deviceManagement/configurationPolicies' -Method GET",
      "$settingsCatalog.value | ForEach-Object {",
      "  $safename = $_.name -replace '[^a-zA-Z0-9\\-]','_'",
      "  $_ | ConvertTo-Json -Depth 20 | Out-File -FilePath \".\\settingscatalog-$safename.json\" -Encoding UTF8",
      "}",
      "Note: Some settings catalog policies require a second Graph call to get their actual settings. For now the policy metadata is enough.",

      "## Step 6 — Export app assignments",
      "$apps = Get-MgDeviceAppManagementMobileApp",
      "$apps | Select DisplayName, Id, '@odata.type', Publisher | Export-Csv -Path '.\\apps-inventory.csv' -NoTypeInformation",
      "(Apps inventory goes to CSV because the full JSON is heavy and most reporting needs just the metadata.)",

      "## Step 7 — Generate a summary report",
      "@\"",
      "Intune Policy Export — $stamp",
      "==============================",
      "Compliance policies: $($compliance.Count)",
      "Configuration profiles (legacy): $($config.Count)",
      "Settings Catalog policies: $($settingsCatalog.value.Count)",
      "Deployed apps: $($apps.Count)",
      "",
      "Files written to: $(Get-Location)",
      "\"@ | Out-File -FilePath '.\\SUMMARY.txt' -Encoding UTF8",
      "Get-Content .\\SUMMARY.txt",

      "## Step 8 — Save as a reusable export script",
      "Combine all of the above into a single .ps1 file:",
      "New-Item -ItemType File -Path $HOME\\Documents\\IntuneScripts\\export-all-policies.ps1 -Force",
      "(Open that file in Notepad and paste all the commands from Steps 1–7)",
      "Now you have an export-all-policies.ps1 script. Run it monthly. Each run creates a new dated folder.",

      "## Step 9 — Put it in GitHub (for Day 27)",
      "When you hit Day 27 (Publish your GitHub scripts repo), this script is one of the hero artifacts.",
      "Add a README entry: 'export-all-policies.ps1 — Snapshots all Intune compliance, configuration, and settings catalog policies to timestamped JSON files for audit and version control.'",

      "## Common issues",
      "• 'Invoke-MgGraphRequest' unknown — the beta endpoint requires Microsoft.Graph.Beta module OR Invoke-MgGraphRequest (v2+). Update-Module Microsoft.Graph should fix it.",
      "• JSON is 'corrupted' or incomplete — increase -Depth. Intune objects are heavily nested; -Depth 20 is the safe minimum.",
      "• Encoding issues in JSON when opened later — always use -Encoding UTF8 on Out-File. Default PowerShell encoding can mangle special characters.",
      "• 'Access denied' on Settings Catalog — your Connect-MgGraph session needs DeviceManagementConfiguration.ReadWrite.All (Read.All might not be enough for the beta endpoint).",

      "## What you learned that you'll reuse",
      "• Export + timestamp + version control = the 'I maintain audit-ready documentation' story",
      "• Settings Catalog lives at a different endpoint than legacy templates — this distinction matters for SC-300/MD-102 exams",
      "• Invoke-MgGraphRequest is the escape hatch when there's no dedicated cmdlet — it can call any Graph endpoint directly"
    ]},

  {day:17,label:"Defender for Business",tasks:[
    {id:"d17t1",text:"Explore Defender for Business",cat:"lab",icon:"🛡️",time:"~30 min",diff:1,prereq:"d1t2",steps:[
      "## Navigate",
      "https://security.microsoft.com — sign in with tenant admin",
      "## Tour the dashboard",
      "Incidents & alerts, Device inventory, Secure Score",
      "## Secure Score review",
      "Click Secure Score → review recommended actions",
      "Each action improves tenant security posture — track your score over the sprint",
      "## Verify the Surface Pro is onboarded",
      "Device inventory → find the Surface Pro → review security status and installed agents"
    ]},
    {id:"d17t2",text:"Configure Attack Surface Reduction (ASR) rules",cat:"lab",icon:"🚧",time:"~30 min",diff:3,prereq:"d17t1",steps:[
      "## Create the policy",
      "intune.microsoft.com → Endpoint security → Attack surface reduction → '+ Create policy'",
      "Platform: Windows 10+ | Profile: Attack Surface Reduction Rules",
      "Name: 'ASR-Baseline-Audit'",
      "## Enable rules in AUDIT mode first",
      "Block executable content from email client and webmail",
      "Block Office applications from creating child processes",
      "Block credential stealing from Windows LSASS",
      "## Why audit first",
      "Audit mode logs what would be blocked without enforcing — prevents breaking legitimate workflows",
      "## Assign and monitor",
      "Assign to All Devices",
      "After 1 week of audit data, clone the policy and set rules to Block mode"
    ]},
    {id:"d17t3",text:"MS Learn: Security baselines and ASR deep-dive",cat:"study",icon:"📖",time:"~60 min",diff:2,steps:[
      "## Return to the path",
      "https://learn.microsoft.com/en-us/training/paths/manage-endpoint-security/",
      "## Focus modules",
      "Security baselines and Attack Surface Reduction",
      "## Security baselines",
      "Pre-configured sets of security settings Microsoft recommends",
      "Deploy as-is or customize individual settings",
      "## Attack Surface Reduction",
      "ASR rules block specific attack techniques before they execute",
      "Memorize 3–4 rule names for interviews: Block Office child processes, Block LSASS credential theft, Block executable content from email, Block Win32 API calls from Office macros"
    ]},
  ]},
  {day:18,label:"BitLocker & Disk Encryption",tasks:[
    {id:"d18t1",text:"Deploy a BitLocker encryption policy via Intune",cat:"lab",icon:"🔐",time:"~30 min",diff:2,prereq:"d5t1",steps:[
      "## Create",
      "intune.microsoft.com → Endpoint security → Disk encryption → '+ Create policy'",
      "Platform: Windows 10+ | Profile: BitLocker",
      "Name: 'ENC-BitLocker-Standard'",
      "## Configure",
      "Require device encryption: Yes",
      "Encryption method: XTS-AES 256-bit",
      "Recovery key rotation: Enabled for Entra-joined and hybrid devices",
      "Silent encryption: Enabled",
      "## Assign",
      "Assign to All Devices",
      "## Recovery key escrow",
      "BitLocker recovery keys auto-escrow to Entra ID",
      "View at entra.microsoft.com → Devices → select device → BitLocker keys"
    ]},
    {id:"d18t2",text:"Verify BitLocker key escrow",cat:"lab",icon:"🔑",time:"~10 min",diff:1,prereq:"d18t1",steps:[
      "## In Entra",
      "entra.microsoft.com → Devices → select the Surface Pro → BitLocker keys",
      "Recovery key should be visible here",
      "## In Intune",
      "intune.microsoft.com → Devices → select the Surface Pro → Recovery keys tab",
      "## Helpdesk scenario",
      "This is the path helpdesk takes when a user is locked out — memorize both locations"
    ]},
    {id:"d18t3",text:"MS Learn: BitLocker and disk encryption modules",cat:"study",icon:"📖",time:"~45 min",diff:2,steps:[
      "## Open the path",
      "https://learn.microsoft.com/en-us/training/paths/manage-endpoint-security/",
      "Focus on data protection and BitLocker modules",
      "## Deeper reference",
      "https://learn.microsoft.com/en-us/search/?terms=BitLocker%20management&category=Module",
      "## Key concepts",
      "Silent encryption, recovery key escrow to Entra, BitLocker compliance, key rotation",
      "## Practice",
      "Know both locations to retrieve a recovery key cold — this is the most common helpdesk scenario"
    ]},
  ]},
  {day:19,label:"Monitoring & Reporting",tasks:[

      "Startup performance",
      "Application reliability",
      "Work from anywhere score",
      "## Framing",
      "Endpoint Analytics identifies slow or unreliable devices before users complain — proactive, not reactive"

    {id:"d19t2",text:"MS Learn: Intune monitoring and reporting",cat:"study",icon:"📖",time:"~45 min",diff:2,steps:[
      "## References",
      "Intune reports: https://learn.microsoft.com/en-us/mem/intune/fundamentals/reports",
      "Endpoint Analytics: https://learn.microsoft.com/en-us/mem/analytics/overview",

  {day:20,label:"Mid-Phase Review",tasks:[
    {id:"d20t1",text:"Document all Intune policies created so far",cat:"review",icon:"📝",time:"~45 min",diff:1,steps:[
      "## Inventory",
      "List every policy created: compliance, configuration profiles, app deployments, update rings, endpoint security, ASR, BitLocker",

      "Include: name, what it does, why, assignment target",
      "## Output",

    ]},
    {id:"d20t2",text:"Practice the Autopilot demonstration narrative",cat:"interview",icon:"🎤",time:"~20 min",diff:2,steps:[
      "## The script",
      "Practice saying this out loud, 2–3 minutes:",
      "'I built a zero-touch provisioning workflow using Windows Autopilot. I registered the device hash in Intune, created a User-Driven deployment profile with custom OOBE branding, configured the Enrollment Status Page to block access until all required apps and compliance policies were applied, then reset the device and let Autopilot fully provision it without manual IT intervention. The device was Entra Joined, Intune enrolled, compliant with BitLocker and password policies, and had M365 apps installed — all automatically.'",

  {day:21,label:"Role-Based Access Control",tasks:[
    {id:"d21t1",text:"Configure Intune RBAC with a custom role",cat:"lab",icon:"👥",time:"~30 min",diff:2,prereq:"d3t2",steps:[
      "## Review built-in roles",
      "intune.microsoft.com → Tenant administration → Roles",
      "Note: Intune Administrator, Helpdesk Operator, Application Manager, Endpoint Security Manager, Read Only Operator",
      "## Create a custom role",
      "'+ Create' → Name: 'Tier-1 Support'",
      "Permissions: Read devices, Sync devices, Remote lock, Reset passcode",
      "Exclude: Wipe, Retire, Delete",
      "## Assign",
      "Assign to SG-IT-Staff group → scope: All devices",
      "## Test",
      "Sign in as an IT staff user → confirm they can sync/lock but cannot wipe",
      "## Principle",
      "Least-privilege — helpdesk can respond quickly without catastrophic-action authority"
    ]},
    {id:"d21t2",text:"MS Learn: Intune RBAC and tenant administration",cat:"study",icon:"📖",time:"~45 min",diff:2,steps:[
      "## Open the reference",
      "https://learn.microsoft.com/en-us/mem/intune/fundamentals/role-based-access-control",
      "## What RBAC is",
      "Role-Based Access Control — different admins get different permission levels instead of making everyone Global Admin",
      "## Hierarchy",
      "Built-in roles → Custom roles → Scope groups (which admins) → Scope tags (which resources they can see)",
      "## Built-in roles to know by name",
      "Intune Administrator, Helpdesk Operator, Application Manager, Endpoint Security Manager, Read Only Operator"
    ]},
  ]},
  {day:22,label:"Device Lifecycle & Remote Actions",tasks:[
    {id:"d22t1",text:"Test remote device actions on the Surface Pro",cat:"lab",icon:"🎛️",time:"~30 min",diff:2,prereq:"d5t1",steps:[
      "## Safe actions to run",
      "Sync — forces immediate policy check-in (100% safe, start here)",
      "Restart — schedules remote reboot (save work first)",
      "Fresh Start — removes preinstalled bloatware, keeps user data (safe on lab device)",
      "## Destructive actions — understand but do NOT run today",
      "Autopilot Reset — wipes user profile, reprovisions (~20 min recovery)",
      "Wipe — full device wipe (requires W11 Rebuild USB to recover, ~45–60 min)",
      "Retire — removes corporate data, keeps personal data (on BYOD scenarios)",
      "## Execute today",
      "Run Sync, Restart, and Fresh Start on the Surface Pro",
      "## Decision framework for interviews",
      "Wipe = stolen or decommissioned corporate device",
      "Retire = BYOD user leaving the company",
      "Fresh Start = clean up a bloated machine",
      "Autopilot Reset = reprovision for a new user or role"
    ]},
    {id:"d22t2",text:"MS Learn: Device lifecycle and remote actions",cat:"study",icon:"📖",time:"~30 min",diff:2,steps:[
      "## Open the reference",
      "https://learn.microsoft.com/en-us/mem/intune/remote-actions/device-management",
      "## Lifecycle",
      "Enrollment → compliance evaluation → management → retirement/wipe",
      "## Decision tree for each action",
      "Wipe, Retire, Fresh Start, Autopilot Reset — know cold which to use in which scenario",
      "## Interview scenario",
      "'A user's laptop was stolen — walk me through what you do'",
      "Correct answer: Wipe + revoke sessions in Entra + rotate BitLocker recovery key"
    ]},
  ]},
