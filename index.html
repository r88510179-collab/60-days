<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useCallback}=React;
const CAT={
  lab:{label:"Hands-On Lab",color:"#3B82F6"},
  study:{label:"Course / Study",color:"#8B5CF6"},
  cert:{label:"Credential",color:"#10B981"},
  interview:{label:"Interview Prep",color:"#F59E0B"},
  career:{label:"Career Action",color:"#EF4444"},
  review:{label:"Review / Document",color:"#6366F1"},
  infra:{label:"Infrastructure",color:"#06B6D4"},
};
const HABITS=[
  {id:"h1",text:"30 min hands-on lab (Surface Pro + tenant)",icon:"⌨️"},
  {id:"h2",text:"Complete 1 MS Learn module (MD-102 or SC-300)",icon:"🎓"},
  {id:"h3",text:"Practice explaining one concept out loud",icon:"🎤"},
];
const PHASES=[
  {days:[1,5],title:"Infrastructure & Lab Foundation",icon:"🔧",color:"#06B6D4"},
  {days:[6,30],title:"Device Mgmt & Endpoint Security (MD-102)",icon:"📱",color:"#8B5CF6"},
  {days:[31,50],title:"Identity, Access & Zero Trust (SC-300)",icon:"🛡️",color:"#10B981"},
  {days:[51,60],title:"Enterprise Scenarios & Interview Prep",icon:"🎯",color:"#F59E0B"},
];
const DAYS=[
  // ═══ PHASE 1: INFRASTRUCTURE (Days 1-5) ═══
  {day:1,label:"Provision Your Tenant",tasks:[
    {id:"d1t1",text:"Sign up for Microsoft 365 Business Premium 30-day free trial",cat:"infra",steps:[
      "Go to microsoft.com/en-us/microsoft-365/business/microsoft-365-business-premium — click 'Try free for 1 month'",
      "Use a PERSONAL email (Gmail, Outlook.com) to sign up — this bypasses any restrictions from using a work/school account",
      "When prompted, create your .onmicrosoft.com domain (e.g., smokkelabs.onmicrosoft.com)",
      "Create your Global Admin account — write down the username and password in a password manager immediately",
      "Complete the setup wizard — skip adding other users for now, skip domain verification",
      "Business Premium includes: Entra ID P1, Intune, Defender for Business, Autopilot — everything you need"
    ]},
    {id:"d1t2",text:"Log into all admin portals and bookmark them",cat:"infra",steps:[
      "Open an Incognito/InPrivate window — always use this for your lab tenant to keep it separate from personal accounts",
      "admin.microsoft.com — M365 Admin Center (users, licenses, billing)",
      "entra.microsoft.com — Entra ID (identity, groups, CA policies, app registrations, PIM)",
      "intune.microsoft.com — Intune (device management, compliance, apps, Autopilot)",
      "security.microsoft.com — Microsoft Defender (security alerts, incidents, Secure Score)",
      "Bookmark all four. Spend 10 minutes clicking through the left nav of each portal to get oriented"
    ]},
    {id:"d1t3",text:"Bookmark the official MS Learn MD-102 and SC-300 learning paths",cat:"study",steps:[
      "Go to learn.microsoft.com/en-us/credentials/certifications/modern-desktop/ — this is the MD-102 (Endpoint Administrator) certification page",
      "Scroll to 'Training' → bookmark each learning path: 'Explore endpoint management', 'Execute device enrollment', 'Configure profiles for users and devices', 'Examine application management', 'Manage authentication and compliance', 'Manage endpoint security', 'Deploy using on-premises based tools', 'Deploy using cloud based tools'",
      "Go to learn.microsoft.com/en-us/credentials/certifications/identity-and-access-administrator/ — this is the SC-300 (Identity and Access Administrator) certification page",
      "Bookmark each learning path: 'Explore identity in Microsoft Entra ID', 'Implement an identity management solution', 'Implement an Authentication and Access Management solution', 'Implement Access Management for Apps', 'Plan and implement an identity governance strategy'",
      "These are 100% FREE, official Microsoft training — no Udemy subscription needed",
      "Each module includes READING + LAB EXERCISES in Microsoft-provided sandbox environments. Treat every module as: read theory → then IMMEDIATELY execute it in YOUR Business Premium tenant",
      "Also bookmark the exam study guides (these show EXACTLY what's on each exam, section by section): https://learn.microsoft.com/en-us/credentials/certifications/resources/study-guides/md-102 and https://learn.microsoft.com/en-us/credentials/certifications/resources/study-guides/sc-300"
    ]},
  ]},
  {day:2,label:"Prepare Your Surface Pro Lab Device",tasks:[
    {id:"d2t1",text:"Confirm Windows 11 clean baseline on your Surface Pro 5",cat:"infra",steps:[
      "You've already installed Windows 11 from ISO with no product key — unactivated is 100% fine for lab work (the only thing locked is personalization, everything Intune/Entra touches works perfectly)",
      "Open Settings → Accounts → Your info → confirm this shows a LOCAL account (not signed into a personal Microsoft account / Outlook.com / Xbox). If it's linked, sign out and recreate as local before continuing",
      "Settings → System → About → write down your Windows 11 build (e.g., 23H2 · build 22631.xxxx) — this is your baseline. Every time Intune pushes an update you'll compare against this",
      "Settings → Privacy & security → For developers → toggle ON 'Use developer features' so PowerShell scripts run without fighting you",
      "RULE OF THUMB: from this point forward, no personal anything on this device — no Gmail, no Spotify, no Chrome profile sync. The Surface Pro is your 'dummy corporate endpoint' — you'll Entra-join it, enroll it in Intune, push policies at it, and eventually reset it"
    ]},
    {id:"d2t2",text:"Create a Windows 11 recovery USB — your 'snapshot alternative'",cat:"infra",steps:[
      "Without a VM, you can't 'revert a snapshot' when a lab test goes sideways. So your fallback is a bootable Windows 11 installer USB that lets you rebuild in ~25 min instead of starting from scratch",
      "Grab an 8GB+ USB stick (anything spare)",
      "On your Surface Pro, go to: https://www.microsoft.com/en-us/software-download/windows11",
      "Under 'Create Windows 11 Installation Media' → click Download Now → run the tool",
      "Accept license → language: English (US) → select USB flash drive → pick your USB → click Next — it'll write the installer (~15 min)",
      "When done, label the USB 'W11 Lab Rebuild' with a sticker or sharpie and keep it next to the Surface",
      "Later when a lab task says 'revert to snapshot' or 'wipe and start over' — your recovery flow is: boot from USB → reinstall Windows 11 (skip product key) → sign back into your tenant → re-enroll. Annoying but fast enough"
    ]},
    {id:"d2t3",text:"Set a System Restore point and document your recovery kit",cat:"infra",steps:[
      "System Restore is Windows' built-in 'undo button' — it won't save you from a full Wipe but it's GREAT for rolling back a botched policy deployment or driver install without reinstalling",
      "Press the Windows key → type 'Create a restore point' → open 'System Properties'",
      "Under Protection Settings: select the C: drive → click Configure → 'Turn on system protection' → set Max Usage to about 5% → OK",
      "Back on the main tab → click Create → name it 'Clean Lab Baseline — Pre-Enrollment' → Create (takes ~60 sec)",
      "Now open Notepad or OneNote (or your phone's notes app) and write your RECOVERY KIT doc. Include: (1) your tenant name + admin UPN, (2) admin password or where it's stored in your password manager, (3) link to https://intune.microsoft.com, (4) link to https://entra.microsoft.com, (5) location of the W11 Rebuild USB, (6) your Windows 11 build number from d2t1",
      "This is your 'if I brick the Surface, here's my rebuild playbook' — keep it somewhere you can access FROM YOUR PHONE (because if the Surface is dead you can't get to it from the Surface)"
    ]},
  ]},
  {day:3,label:"Populate Your Directory",tasks:[
    {id:"d3t1",text:"Write PowerShell script to create 15-25 dummy users in Entra ID",cat:"lab",steps:[
      "Open PowerShell on your Surface Pro (right-click the Start button → 'Terminal (Admin)' → make sure it says PowerShell, not CMD). Install the Microsoft.Graph module:",
      "Install-Module Microsoft.Graph -Scope CurrentUser",
      "Connect-MgGraph -Scopes 'User.ReadWrite.All' -TenantId 'YOUR-TENANT-ID'",
      "Create a CSV file (users.csv) with columns: DisplayName, UPN (User Principal Name — the user's full sign-in identifier, e.g., john.smith@yourtenant.onmicrosoft.com), Department, JobTitle, Password",
      "Include users across departments: IT (5), Legal (5), Sales (5), Marketing (3), Executives (2)",
      "Write the script:",
      "$users = Import-Csv './users.csv'",
      "foreach ($u in $users) {",
      "  New-MgUser -DisplayName $u.DisplayName -UserPrincipalName $u.UPN -Department $u.Department -JobTitle $u.JobTitle -MailNickname ($u.UPN.Split('@')[0]) -AccountEnabled -PasswordProfile @{Password=$u.Password; ForceChangePasswordNextSignIn=$false} -UsageLocation 'US'",
      "}",
      "Run it → verify at entra.microsoft.com → Users that all accounts appear",
      "Assign each user a Business Premium license: Get-MgSubscribedSku to find your SKU ID, then Set-MgUserLicense for each user"
    ]},
    {id:"d3t2",text:"Create security groups and dynamic groups",cat:"lab",steps:[
      "Create ASSIGNED groups via PowerShell or portal:",
      "SG-IT-Staff, SG-Legal-Team, SG-Sales-Team, SG-Executives, SG-AllEmployees",
      "Add appropriate users to each group",
      "Create one DYNAMIC group to test the concept:",
      "Name: DG-Marketing-Auto | Rule: user.department -eq 'Marketing'",
      "Wait 5-15 min for dynamic membership to evaluate",
      "Create a DEVICE group (you'll use this later for Intune policies):",
      "Name: SG-Managed-Devices | Type: Security | Membership: Assigned (you'll add devices after enrollment)"
    ]},
    {id:"d3t3",text:"Begin MS Learn: MD-102 Learning Path 1 — 'Explore endpoint management'",cat:"study",steps:[
      "Go to learn.microsoft.com/en-us/training/paths/explore-endpoint-management/",
      "Complete the modules in this path: 'Explore the Enterprise Desktop', 'Explore Windows Editions', 'Understand Microsoft Entra ID', 'Manage Microsoft Entra identities'",
      "Each module has reading + a knowledge check at the end — do BOTH. The knowledge checks cement the material",
      "Don't just read — keep your Intune portal open (intune.microsoft.com) and click through concepts as you encounter them",
      "Target: complete the entire 'Explore endpoint management' path in one sitting (~2 hours). This is foundation material — you'll move faster than later paths"
    ]},
  ]},
  {day:4,label:"Directory Deep-Dive + Course",tasks:[
    {id:"d4t1",text:"Create Administrative Units and test delegated administration",cat:"lab",steps:[
      "Go to entra.microsoft.com → Roles & admins → Admin units → '+ Add'",
      "Create 'Legal Department AU' — add all Legal department users as members",
      "Assign one of your IT users as 'User Administrator' scoped to only this AU",
      "Test: log in as that IT user → they should be able to manage Legal users but NOT Sales or Marketing users",
      "This is scoped delegation — critical for enterprise environments and a favorite interview topic"
    ]},
    {id:"d4t2",text:"Register a test app in Entra + understand app permissions",cat:"lab",steps:[
      "Go to entra.microsoft.com → Applications → App registrations → '+ New registration'",
      "Name: 'Lab SaaS App' | Supported accounts: 'This org only'",
      "After registration: note the Application (client) ID and Directory (tenant) ID",
      "Go to 'API permissions' → '+ Add permission' → 'Microsoft Graph' → add: User.Read, User.ReadWrite.All (delegated), and Directory.Read.All (application)",
      "Go to 'Certificates & secrets' → create a client secret → COPY IT NOW (you can never see it again)",
      "This is the foundation of every SaaS app integration — understanding client IDs, secrets, and permission scopes"
    ]},
    {id:"d4t3",text:"MS Learn: MD-102 Learning Path 2 — 'Execute device enrollment'",cat:"study",steps:[
      "Go to learn.microsoft.com/en-us/training/paths/execute-device-enrollment/ (or search 'MD-102 Execute device enrollment')",
      "Complete modules: 'Manage device authentication', 'Enroll devices using Microsoft Configuration Manager', 'Enroll devices using Microsoft Intune'",
      "Enrollment types to internalize: Automatic MDM enrollment (MDM = Mobile Device Management — the mechanism that lets a cloud service push policy/apps/config to an enrolled device), User-driven, Autopilot, Bulk enrollment via provisioning packages, Apple ABM/Google Android Enterprise",
      "After reading: go to intune.microsoft.com → Devices → Enrollment → find each enrollment option you just read about"
    ]},
  ]},
  {day:5,label:"First Enrollment + Course",tasks:[
    {id:"d5t1",text:"Entra Join your Windows 11 lab device to your tenant",cat:"lab",steps:[
      "In your Windows 11 lab device → Settings → Accounts → Access work or school → '+ Connect'",
      "Click 'Join this device to Microsoft Entra ID' (NOT 'Connect' — that's a different flow)",
      "Sign in with one of your test user accounts (e.g., it.admin@yourdomain.onmicrosoft.com)",
      "Accept the prompts → the Surface Pro is now Entra Joined",
      "Verify: go to entra.microsoft.com → Devices → you should see the Surface Pro listed as a 'Microsoft Entra joined' device",
      "Also check intune.microsoft.com → Devices → the Surface Pro should appear as enrolled (if automatic MDM enrollment is enabled, which it is by default in Business Premium)",
      "TAKE A SECOND SNAPSHOT: name it 'Entra Joined + Enrolled — Baseline'"
    ]},
    {id:"d5t2",text:"Verify Intune enrollment and explore device details",cat:"lab",steps:[
      "Go to intune.microsoft.com → Devices → find your Surface Pro → click on it",
      "Explore all tabs: Overview (compliance status, last check-in), Properties (OS version, serial, manufacturer), Hardware, Detected apps",
      "Try a remote action: click 'Sync' to force a policy refresh",
      "Note: your Surface Pro is now a managed device. Every compliance policy, configuration profile, and app deployment you create from Day 6 onwards will target this device"
    ]},
    {id:"d5t3",text:"MS Learn: Continue MD-102 — Entra Join vs Hybrid Entra Join deep-dive",cat:"study",steps:[
      "Within the MD-102 'Execute device enrollment' path, focus on the device identity section",
      "Entra Joined: device only talks to the cloud. No on-prem AD needed. Best for cloud-native orgs",
      "Hybrid Entra Joined: device is joined to BOTH on-prem AD and Entra ID. For orgs still running on-prem AD DS",
      "Your lab is cloud-native (Entra Joined). Know both concepts for interviews — many orgs are migrating from hybrid to cloud-native",
      "Also read: learn.microsoft.com/en-us/entra/identity/devices/concept-directory-join — the official comparison of join types"
    ]},
  ]},

  // ═══ PHASE 2: DEVICE MANAGEMENT & ENDPOINT SECURITY — MD-102 (Days 6-30) ═══
  {day:6,label:"Compliance Policies",tasks:[
    {id:"d6t1",text:"Build your first compliance policy: require BitLocker, min OS, passwords",cat:"lab",steps:[
      "Go to intune.microsoft.com → Devices → Compliance → '+ Create policy' → Windows 10 and later",
      "Name: 'COMP-Win-Standard'",
      "Device Health: Require BitLocker: Yes | Require Secure Boot: Yes",
      "Device Properties: Minimum OS version: set to your Surface Pro's current version (check Settings → System → About)",
      "System Security: Require password: Yes | Min length: 8 | Password type: Alphanumeric",
      "Actions for noncompliance: Mark device noncompliant: immediately (0 days) | Send email: after 1 day",
      "Assign to: SG-Managed-Devices or All devices",
      "Wait 15-30 min → check your Surface Pro's compliance status in Intune. It may show noncompliant if BitLocker isn't on yet — that's expected and a learning moment"
    ]},
    {id:"d6t2",text:"Fix compliance — enable BitLocker on the Surface Pro",cat:"lab",steps:[
      "If your Surface Pro shows noncompliant due to BitLocker: in the Surface Pro, open Control Panel → BitLocker Drive Encryption → Turn on BitLocker",
      "Note: Surface Pro 5 has a real TPM (Trusted Platform Module — a security chip that stores encryption keys) 2.0 chip built in, so BitLocker should enable cleanly. If it refuses: open 'tpm.msc' from Start → confirm TPM is Ready. If Not Ready → reboot into UEFI (Unified Extensible Firmware Interface — modern replacement for BIOS; hold Volume Up + Power during boot on Surface) → enable TPM. Rare, but worth knowing how to troubleshoot",
      "Force a sync: on the Surface Pro, Settings → Accounts → Access work or school → click your connected account → Info → Sync",
      "Check Intune again after 15 min — device should now show 'Compliant'"
    ]},
    {id:"d6t3",text:"MS Learn: 'Manage authentication and compliance' learning path",cat:"study",steps:["Go to learn.microsoft.com and find MD-102 Learning Path: 'Manage authentication and compliance'","Modules: 'Explore device compliance', 'Implement device compliance policies', 'Implement Conditional Access policies'","Key concepts: compliance vs configuration (compliance = evaluation, configuration = enforcement), noncompliance actions, grace periods","Understand: compliance status feeds into Conditional Access — a noncompliant device can be BLOCKED from accessing M365 resources","Complete the module's knowledge check at the end"]}
  ]},
  {day:7,label:"Configuration Profiles — Settings Catalog",tasks:[
    {id:"d7t1",text:"Build a configuration profile using Settings Catalog",cat:"lab",steps:[
      "Go to intune.microsoft.com → Devices → Configuration → '+ Create' → Windows 10+ → Settings catalog",
      "Name: 'CFG-Security-Baseline'",
      "Click '+ Add settings' and configure these:",
      "• Search 'Control Panel' → Administrative Templates > Control Panel: Prohibit access to Control Panel and PC Settings → Enabled (blocks regular users from changing settings)",
      "• Search 'Camera' → Camera > Allow Camera → Block (disables webcam — common in secure environments)",
      "• Search 'USB' → System > Removable Storage Access > Removable Disk Deny Write Access → Enabled (blocks USB write — prevents data exfiltration)",
      "Assign to: All devices or SG-Managed-Devices",
      "Force sync on Surface Pro → verify: try opening Control Panel — it should be blocked. Try writing to a USB — blocked",
      "Settings Catalog is the MODERN approach Microsoft recommends over legacy Templates"
    ]},
    {id:"d7t2",text:"Build a second profile: lock screen + wallpaper",cat:"lab",steps:[
      "Create another Settings catalog profile: 'CFG-Branding'",
      "Search 'Lock screen' → Personalization > Lock Screen Image URL → set a URL to any image (corporate branding scenario)",
      "Search 'Desktop wallpaper' → set a custom wallpaper URL",
      "These seem cosmetic but demonstrate centralized device management — interviewers often ask 'how do you push settings to devices without touching them?'"
    ]},
    {id:"d7t3",text:"MS Learn: 'Configure profiles for users and devices' learning path",cat:"study",steps:["Complete MD-102 path 'Configure profiles for users and devices'","Modules: 'Execute device profiles', 'Oversee device profiles', 'Maintain user profiles'","Key distinction — Settings Catalog vs Templates vs ADMX Import:","• Templates: legacy, pre-grouped (Device Restrictions, Wi-Fi, VPN)","• ADMX: upload .admx files to migrate GPO settings to Intune","• Settings Catalog: modern, granular, searchable — Microsoft's recommended path forward","Complete the knowledge check"]}
  ]},
  {day:8,label:"App Deployment",tasks:[
    {id:"d8t1",text:"Deploy Microsoft 365 Apps to your Surface Pro via Intune",cat:"lab",steps:[
      "Go to intune.microsoft.com → Apps → All apps → '+ Add' → App type: 'Microsoft 365 Apps (Windows 10 and later)'",
      "App suite: select Word, Excel, PowerPoint, Outlook, Teams",
      "Update channel: Monthly Enterprise Channel (standard for most orgs)",
      "Assignment: Required → assign to All devices",
      "Force sync on Surface Pro → the M365 apps will install silently in the background. This can take 20-40 minutes",
      "When done, open Word or Outlook on the Surface Pro to verify the install"
    ]},
    {id:"d8t2",text:"Deploy a Win32 app (learn the .intunewin packaging process)",cat:"lab",steps:[
      "Download the Microsoft Win32 Content Prep Tool from GitHub (search 'IntuneWinAppUtil')",
      "Pick any free small app — 7-Zip, Notepad++, or VLC",
      "Download the installer (.msi or .exe) → run IntuneWinAppUtil.exe → select the installer → it creates a .intunewin file",
      "In Intune: Apps → '+ Add' → 'Windows app (Win32)' → upload the .intunewin file",
      "Set: Install command (e.g., 'msiexec /i 7z.msi /quiet'), detection rule (file exists or registry key), requirements (min OS)",
      "Assign as Required → force sync → verify the app installs silently on the Surface Pro",
      "Win32 app deployment is a common interview topic — knowing the packaging and detection process is important"
    ]},
    {id:"d8t3",text:"MS Learn: 'Examine application management' learning path",cat:"study",steps:["Complete MD-102 path 'Examine application management'","Modules cover: deploying apps, Win32 apps, M365 Apps, app protection policies (MAM), managing browser-based apps","App types: Store apps, M365 Apps suite, Win32 apps, LOB apps, web links","Assignment types: Required (auto-install), Available (user chooses in Company Portal), Uninstall","App protection policies (MAM) are covered separately — coming in a few days"]}
  ]},
  {day:9,label:"Windows Update Management",tasks:[
    {id:"d9t1",text:"Configure a Windows Update Ring",cat:"lab",steps:[
      "Go to intune.microsoft.com → Devices → Windows → Update rings → '+ Create'",
      "Name: 'Update-Ring-Standard'",
      "Quality update deferral: 7 days (security/monthly updates delayed 7 days — lets early adopters catch bugs)",
      "Feature update deferral: 30 days (major Windows updates delayed 30 days)",
      "Automatic update behavior: Auto install at maintenance time",
      "Active hours: 8 AM - 6 PM (no forced restarts during work hours)",
      "Delivery optimization: HTTP blended with Internet and peering (reduces bandwidth)",
      "Assign to: All devices"
    ]},
    {id:"d9t2",text:"Configure a Feature Update policy to pin a Windows version",cat:"lab",steps:[
      "Go to Update rings page → 'Feature updates' tab → '+ Create'",
      "Select a specific Windows 11 version to deploy/pin (e.g., 24H2)",
      "This CONTROLS which major Windows version your fleet runs — critical for enterprise stability",
      "Assign to: All devices"
    ]},
    {id:"d9t3",text:"MS Learn: Windows Update management modules",cat:"study",steps:["Open directly: https://learn.microsoft.com/en-us/search/?terms=Manage%20Windows%20updates%20with%20Intune&category=Module","Key concepts: Update Rings (groups of devices that get updates on different schedules), Feature Update policies (control which Windows version to target), Expedited updates (emergency out-of-cycle patches), Delivery Optimization (peer-to-peer update distribution to save bandwidth)","Understand WHY you defer updates: test compatibility, prevent broken installs hitting your whole fleet at once","Complete the module's knowledge check"]}
  ]},
  {day:10,label:"App Protection (MAM / BYOD — Bring Your Own Device)",tasks:[
    {id:"d10t1",text:"Create an App Protection Policy for iOS/Android",cat:"lab",steps:[
      "Go to intune.microsoft.com → Apps → App protection policies → '+ Create' → iOS/iPadOS (or Android)",
      "Name: 'MAM-BYOD-Protection'",
      "Target: All Microsoft Apps (Outlook, Teams, OneDrive, etc.)",
      "Data protection: Send org data to other apps → Policy managed apps only | Save copies → Block | Cut/copy/paste → Policy managed apps with paste in",
      "Access requirements: PIN for access → Yes | Type: Numeric | Min length: 6",
      "Conditional launch: Jailbroken/rooted → Block access | Min OS version → set to recent",
      "Assign to: All users",
      "This is MAM WITHOUT enrollment — personal devices are untouched but corporate data inside managed apps is encrypted and controlled"
    ]},
    {id:"d10t2",text:"Understand MDM vs MAM and when to use each",cat:"study",steps:[
      "MDM (Mobile Device Management): full device control. You manage the DEVICE. For corporate-owned hardware",
      "MAM (Mobile App Management): app-level control only. You manage APPS, not the device. For BYOD/personal devices",
      "The split: corporate laptops → MDM (compliance + configuration + apps). Personal phones → MAM only (app protection, no full enrollment)",
      "This is THE most common interview question for endpoint management roles. Practice explaining it out loud"
    ]},
    {id:"d10t3",text:"MS Learn: App Protection Policies (MAM — Mobile Application Management)",cat:"study",steps:["Open directly: https://learn.microsoft.com/en-us/mem/intune/apps/app-protection-policy","Also hit the module: https://learn.microsoft.com/en-us/search/?terms=app%20protection%20policies%20overview&category=Module","MAM = Mobile Application Management — policies applied to specific apps (like Outlook mobile) rather than the whole device. Used for BYOD where you don't control the device but still need to protect company data inside company apps","Focus on: data protection settings (copy/paste controls, save-as restrictions), conditional launch rules (require PIN, block jailbroken), PIN vs biometric requirements","Mental model: user installs Outlook on their personal iPhone → signs in → gets prompted to set a managed app PIN → corporate email is now isolated from their personal photos, iMessage, etc."]}
  ]},
  {day:11,label:"Windows Autopilot — Setup",tasks:[
    {id:"d11t1",text:"Register your Surface Pro for Windows Autopilot",cat:"lab",steps:[
      "In your Windows 11 lab device, open PowerShell as Administrator and run:",
      "Install-Script -Name Get-WindowsAutopilotInfo",
      "Get-WindowsAutopilotInfo -Online",
      "This collects the Surface Pro's hardware hash and uploads it directly to your Intune tenant",
      "Sign in with your Global Admin when prompted",
      "Go to intune.microsoft.com → Devices → Enrollment → Windows → Devices (under Autopilot) — your Surface Pro should appear after a few minutes",
      "If it doesn't show up: try the manual method — run Get-WindowsAutopilotInfo -OutputFile autopilot.csv → then import the CSV via the portal"
    ]},
    {id:"d11t2",text:"Create an Autopilot deployment profile (User-Driven)",cat:"lab",steps:[
      "Go to intune.microsoft.com → Devices → Enrollment → Windows → Deployment profiles → '+ Create profile' → Windows PC",
      "Name: 'AP-Standard-UserDriven'",
      "Deployment mode: User-driven | Join type: Microsoft Entra joined",
      "OOBE settings (OOBE = Out-Of-Box Experience, the 'first boot' setup screens Windows shows on a new/wiped device): Hide privacy settings → Yes | Hide EULA → Yes | Hide change account options → Yes | User account type → Standard (NOT admin)",
      "Apply device name template: e.g., 'LAB-%SERIAL%' (auto-names devices)",
      "Assign to: All devices (or a group containing your Autopilot devices)"
    ]},
    {id:"d11t3",text:"MS Learn: 'Deploy using cloud-based tools' — Autopilot module",cat:"study",steps:["Go to MD-102 learning path 'Deploy using cloud-based tools'","Module: 'Deploying devices using Windows Autopilot' — this is a MAJOR exam topic and interview favorite","Deployment modes: User-driven (user signs in during OOBE), Self-deploying (no user interaction, for kiosks/shared devices), Pre-provisioned (White Glove — IT or vendor pre-stages, user finishes)","Know the whole flow: OEM/IT registers hardware hash → device connects to internet during OOBE → downloads Autopilot profile → applies Entra join + Intune enrollment + policies + apps → user is productive","Complete the knowledge check — Autopilot questions show up heavily on MD-102"]}
  ]},
  {day:12,label:"Autopilot — The Wipe & Reprovision Test",tasks:[
    {id:"d12t1",text:"Configure Enrollment Status Page (ESP)",cat:"lab",steps:[
      "Go to intune.microsoft.com → Devices → Enrollment → Windows → Enrollment Status Page",
      "Edit the default profile or create a new one:",
      "Show app and profile configuration progress: Yes",
      "Block device use until all required apps and profiles are installed: Yes",
      "Allow users to reset device if installation error occurs: Yes",
      "Show error when installation exceeds 60 minutes",
      "ESP prevents users from using the device before Intune finishes configuring it — closing the security gap between enrollment and policy application"
    ]},
    {id:"d12t2",text:"MILESTONE: Autopilot Reset the Surface Pro and watch it reprovision",cat:"lab",steps:[
      "THIS IS THE BIG TEST — zero-touch reprovisioning. Since you're on bare metal (no VM snapshots), we'll use AUTOPILOT RESET instead of Wipe. Autopilot Reset keeps the device Entra-joined but forces it through OOBE again — safer and faster, and it proves the same thing",
      "From https://intune.microsoft.com → Devices → find your Surface Pro → click '...' (More) → Autopilot Reset",
      "The Surface Pro will reboot and go through OOBE (Out-Of-Box Experience, the 'first setup' screens Windows shows on a new device)",
      "OOBE should show your org's branding, skip the privacy screens, and prompt you to sign in with a tenant user",
      "After sign-in, the Enrollment Status Page (ESP) shows → apps and policies install automatically → device is fully configured without you touching it",
      "If this works: congratulations — you've just demonstrated zero-touch provisioning end to end. This is resume gold",
      "OPTIONAL full-send test (only if you want the full Wipe experience): use Intune → Wipe instead of Autopilot Reset. This actually nukes Windows — you'll need your W11 Rebuild USB from Day 2 to reinstall, then OOBE will trigger Autopilot. Budget 45-60 min for the full Wipe + rebuild cycle",
      "If it doesn't: troubleshoot — check Autopilot device registration, profile assignment, ESP settings. Troubleshooting is equally valuable learning",
      "TAKE NOTES on every step and outcome — you'll write this up as a case study in Phase 4"
    ]},
    {id:"d12t3",text:"Document the Autopilot experience",cat:"review",steps:["Write up what happened: what worked, what didn't, how long it took, what appeared on the ESP","Screenshot each stage if possible — these go into your portfolio and interview answers","Frame it: 'I designed and tested a zero-touch Autopilot deployment that enrolled, configured, and delivered a compliant device with no manual IT intervention'"]}
  ]},
  {day:13,label:"Endpoint Security Policies",tasks:[
    {id:"d13t1",text:"Configure Endpoint Security — Antivirus policy",cat:"lab",steps:[
      "Go to intune.microsoft.com → Endpoint security → Antivirus → '+ Create policy'",
      "Platform: Windows 10+, Profile: Microsoft Defender Antivirus",
      "Cloud-delivered protection level: High | Real-time protection: Enable | Network protection: Enable in block mode",
      "Assign to: All devices",
      "This is SEPARATE from configuration profiles — Endpoint Security policies are specifically for security settings and are managed by security teams in larger orgs"
    ]},
    {id:"d13t2",text:"Configure Endpoint Security — Firewall policy",cat:"lab",steps:[
      "Endpoint security → Firewall → '+ Create policy'",
      "Platform: Windows 10+ | Profile: Microsoft Defender Firewall",
      "Enable Firewall for Domain, Private, and Public profiles",
      "Block all inbound connections: No (too restrictive for lab) but understand when you'd use this",
      "Assign to: All devices"
    ]},
    {id:"d13t3",text:"MS Learn: 'Manage endpoint security' learning path",cat:"study",steps:["Complete MD-102 path 'Manage endpoint security' at learn.microsoft.com/en-us/training/paths/manage-endpoint-security/","Modules cover: data protection (WIP, BitLocker), Defender for Endpoint, built-in Windows security features","Key concept: ASR rules — these block specific attack techniques (e.g., block Office macros from creating child processes, block credential stealing from LSASS). Know 3-4 ASR rules by name for interviews","Complete all knowledge checks in this path"]}
  ]},
  {day:14,label:"Proactive Remediations + Review",tasks:[
    {id:"d14t1",text:"Create a Proactive Remediation script pair",cat:"lab",steps:[
      "Go to intune.microsoft.com → Devices → Remediations → '+ Create script package'",
      "Detection script (PowerShell): checks if a condition exists. Example — detect if temp folder is over 1GB:",
      "$tempSize = (Get-ChildItem $env:TEMP -Recurse -ErrorAction SilentlyContinue | Measure-Object Length -Sum).Sum / 1GB",
      "if ($tempSize -gt 1) { Write-Output 'Temp folder exceeds 1GB'; exit 1 } else { exit 0 }",
      "Remediation script: fixes the issue if detection fails:",
      "Remove-Item $env:TEMP\\* -Recurse -Force -ErrorAction SilentlyContinue",
      "Set schedule: run daily | Assign to: All devices",
      "Proactive remediations fix issues BEFORE users report them — this is proactive vs reactive, which is the whole theme of your career transition"
    ]},
    {id:"d14t2",text:"Week 2 review — can you explain compliance, config, apps, Autopilot?",cat:"review",steps:["Quiz yourself out loud on these:","1. What's the difference between a compliance policy and a configuration profile?","2. How does Autopilot work end-to-end?","3. What's the difference between MDM and MAM?","4. How do you deploy a Win32 app via Intune?","5. What is a proactive remediation?","If you stumble on any answer, go back to the corresponding MS Learn module and redo the lab"]}
  ]},
  // Days 15-30: Continue MD-102 deep-dive
  {day:15,label:"Device Groups & Targeting",tasks:[
    {id:"d15t1",text:"Create dynamic device groups for policy targeting",cat:"lab",steps:["Go to entra.microsoft.com → Groups → New group → Security → Dynamic Device","Name: 'DG-Windows-Devices' | Rule: device.deviceOSType -eq 'Windows'","Create another: 'DG-Autopilot-Devices' | Rule: device.devicePhysicalIds -any _ -startsWith '[OrderID]:'","Retarget your compliance and configuration policies to use these dynamic groups instead of 'All devices'","This is how real enterprises target policies — by device type, enrollment method, or department"]},
    {id:"d15t2",text:"MS Learn: Device targeting, assignment filters, scope tags",cat:"study",steps:["Assignment filters: https://learn.microsoft.com/en-us/mem/intune/fundamentals/filters","Scope tags: https://learn.microsoft.com/en-us/mem/intune/fundamentals/scope-tags","Assignment filters = refine who gets a policy WITHIN an assigned group (e.g., assign to All Devices but filter to only Windows 11 24H2). Prevents you from having to build a dozen dynamic groups just to split targeting","Scope tags = delegate admin visibility. IT admins in the London office only see devices/policies tagged 'UK' — you use these with RBAC (Role-Based Access Control, the system for giving admins different permission levels)","Read the knowledge checks and practice scoping in your tenant"]}
  ]},
  {day:16,label:"PowerShell + Graph API for Intune",tasks:[
    {id:"d16t1",text:"Write PowerShell scripts to query Intune device data via Graph",cat:"lab",steps:["Connect-MgGraph -Scopes 'DeviceManagementManagedDevices.Read.All'","Get-MgDeviceManagementManagedDevice | Select DeviceName, ComplianceState, OperatingSystem, LastSyncDateTime | Format-Table","Export to CSV: | Export-Csv './device-report.csv' -NoTypeInformation","This is your automation skill — pulling compliance reports on demand instead of clicking through the portal"]},
    {id:"d16t2",text:"Write a script to export all compliance and config policies to JSON",cat:"lab",steps:["Connect-MgGraph -Scopes 'DeviceManagementConfiguration.Read.All'","Get-MgDeviceManagementDeviceCompliancePolicy | ConvertTo-Json -Depth 10 | Out-File './compliance-policies.json'","Get-MgDeviceManagementDeviceConfiguration | ConvertTo-Json -Depth 10 | Out-File './config-profiles.json'","These JSON exports = documentation and change tracking. In interviews: 'I script policy exports for version control and audit trails'"]},
    {id:"d16t3",text:"MS Learn: Microsoft Graph fundamentals",cat:"study",steps:["Learning path: https://learn.microsoft.com/en-us/training/paths/m365-msgraph-fundamentals/","Graph Explorer (live API testbed, no coding needed): https://developer.microsoft.com/en-us/graph/graph-explorer — sign in with your tenant admin to try real API calls against your real data","Graph = the UNIFIED API for M365. Users, groups, devices, policies, mail, files — all through one endpoint (graph.microsoft.com). Instead of learning 10 different APIs, you learn one","Read about: permission scopes, delegated permissions (acts AS the signed-in user) vs application permissions (acts AS the app itself, no user), how to register an app for Graph access"]}
  ]},
  {day:17,label:"Defender for Business",tasks:[
    {id:"d17t1",text:"Explore Defender for Business in your tenant",cat:"lab",steps:["Go to security.microsoft.com → sign in with your tenant admin","Explore: Incidents & alerts, Device inventory, Secure Score","Click on Secure Score → review the recommended actions — each one improves your tenant's security posture","In Device inventory → find your Surface Pro → review its security status, any alerts, installed security software"]},
    {id:"d17t2",text:"Configure Attack Surface Reduction (ASR) rules",cat:"lab",steps:["Go to intune.microsoft.com → Endpoint security → Attack surface reduction → '+ Create policy'","Platform: Windows 10+ | Profile: Attack Surface Reduction Rules","Enable these rules in AUDIT mode first (not Block — you want to see what would be blocked before enforcing):","• Block executable content from email client and webmail","• Block Office applications from creating child processes","• Block credential stealing from Windows LSASS","Assign to: All devices | Change to Block mode after 1 week of audit data"]},
    {id:"d17t3",text:"MS Learn: 'Manage endpoint security' — security baselines & ASR deep-dive",cat:"study",steps:["Return to MD-102 learning path 'Manage endpoint security' at learn.microsoft.com","Focus on the modules covering security baselines and Attack Surface Reduction","Security baselines: pre-configured sets of security settings Microsoft recommends — you can deploy them as-is or customize individual settings","ASR rules: block specific attack techniques before they execute (e.g., block Office child processes, block LSASS credential theft). Memorize 3-4 rule names by heart — interviewers love this","Complete the knowledge check"]}
  ]},
  {day:18,label:"BitLocker + Disk Encryption",tasks:[
    {id:"d18t1",text:"Configure BitLocker encryption policy through Intune",cat:"lab",steps:["Go to intune.microsoft.com → Endpoint security → Disk encryption → '+ Create policy'","Platform: Windows 10+ | Profile: BitLocker","Require device encryption: Yes | Encryption method: XTS-AES 256-bit","Recovery key rotation: Enable for both Entra joined and hybrid devices","Silent encryption: Enable (encrypts without user interaction)","Assign to: All devices","BitLocker recovery keys are escrowed to Entra ID — you can view them at entra.microsoft.com → Devices → device → BitLocker keys"]},
    {id:"d18t2",text:"Verify BitLocker key escrow in Entra",cat:"lab",steps:["After BitLocker enables on the Surface Pro: go to entra.microsoft.com → Devices → find your Surface Pro → 'BitLocker keys'","You should see the recovery key stored there — this is how helpdesk retrieves keys when users get locked out","Also check: intune.microsoft.com → Devices → your Surface Pro → Recovery keys tab"]},
    {id:"d18t3",text:"MS Learn: 'Manage endpoint security' — BitLocker and disk encryption modules",cat:"study",steps:["Within MD-102 path 'Manage endpoint security', focus on the data protection and BitLocker modules at learn.microsoft.com","Also search for 'BitLocker management for Windows' module for deeper reference","Key concepts: silent encryption, recovery key escrow to Entra ID, encryption method (XTS-AES), BitLocker compliance requirements, key rotation","Know cold: how to retrieve a recovery key via the Entra portal or Intune — this is THE most common helpdesk scenario","Complete the knowledge check"]}
  ]},
  {day:19,label:"Endpoint Analytics",tasks:[
    {id:"d19t1",text:"Enable and explore Endpoint Analytics",cat:"lab",steps:["Go to intune.microsoft.com → Reports → Endpoint Analytics → Settings → enable for your tenant","After data collection (may take 24-48 hours): review Startup performance scores, Application reliability, Work from anywhere score","Even with one device, understand what each metric measures and why it matters","Endpoint Analytics = proactive monitoring. You identify slow devices BEFORE users complain"]},
    {id:"d19t2",text:"MS Learn: Intune monitoring, reporting, and Endpoint Analytics",cat:"study",steps:["Intune reports overview: https://learn.microsoft.com/en-us/mem/intune/fundamentals/reports","Endpoint Analytics: https://learn.microsoft.com/en-us/mem/analytics/overview","Covers: built-in Intune reports, Endpoint Analytics scores (Startup performance, Application reliability, Work from anywhere), Log Analytics integration","Focus on which reports an admin runs regularly: device compliance status, noncompliant devices, failed deployments, app install status","Interview framing: 'I use Endpoint Analytics to identify slow devices BEFORE users complain' — that's proactive security engineering, not reactive helpdesk"]}
  ]},
  {day:20,label:"Review & Practice — Halfway Through Phase 2",tasks:[
    {id:"d20t1",text:"Review all Intune policies and document them",cat:"review",steps:["Go through every policy you've created: compliance, configuration profiles, app deployments, update rings, endpoint security, ASR, BitLocker","Write a one-line summary of each: what it does, why, who/what it targets","This becomes your 'policy portfolio' — reference it during interviews when asked 'give me an example of a policy you built'"]},
    {id:"d20t2",text:"Practice the Autopilot demo explanation",cat:"interview",steps:["Practice saying out loud (2-3 min):","'I built a zero-touch provisioning workflow using Windows Autopilot. I registered the device hash in Intune, created a User-Driven deployment profile with custom OOBE branding, configured the Enrollment Status Page to block access until all required apps and compliance policies were applied, then wiped the device and let Autopilot fully provision it without any manual IT intervention. The device was Entra Joined, Intune enrolled, compliant with BitLocker and password policies, and had M365 apps installed — all automatically.'","This is your strongest interview answer right now. Polish it."]}
  ]},
  // Days 21-30: Continue MD-102, deeper Intune topics
  {day:21,label:"RBAC in Intune",tasks:[
    {id:"d21t1",text:"Configure role-based access control in Intune",cat:"lab",steps:["Go to intune.microsoft.com → Tenant administration → Roles","Review built-in roles: Intune Administrator, Helpdesk Operator, Application Manager, Endpoint Security Manager, Read Only Operator","Create a custom role: '+ Create' → Name: 'Tier-1 Support' → Permissions: Read devices, sync devices, remote lock, reset passcode (but NOT wipe, retire, or delete)","Assign the role to your SG-IT-Staff group → scope to All devices","Test: log in as one of the IT staff users → they should see devices but be limited in what actions they can take","RBAC = least privilege. Helpdesk can lock/sync devices but can't wipe them. Senior admins can do everything. This is enterprise-standard security"]},
    {id:"d21t2",text:"MS Learn: Intune RBAC, scope tags, and tenant administration",cat:"study",steps:["Open directly: https://learn.microsoft.com/en-us/mem/intune/fundamentals/role-based-access-control","RBAC = Role-Based Access Control — a system for giving different admins different levels of permission instead of making everyone a Global Admin","Hierarchy to memorize: Built-in roles → Custom roles → Scope groups (which admins get the role) → Scope tags (which devices/users those admins can see)","Built-in roles to know by name: Intune Administrator (full), Helpdesk Operator (day-to-day support), Application Manager, Endpoint Security Manager, Read Only Operator","Key concept: least-privilege delegation — Tier-1 helpdesk can sync/remote-lock but NOT wipe; senior admins get full rights"]}
  ]},
  {day:22,label:"Device Actions & Remote Management",tasks:[
    {id:"d22t1",text:"Test remote device actions on your Surface Pro (safely)",cat:"lab",steps:["In Intune → Devices → your Surface Pro → try each action:","• Sync — forces immediate policy check-in. 100% safe, do this one first","• Restart — schedules a remote restart. Safe — save your work, then trigger it","• Fresh Start — removes pre-installed bloatware (keeps user data, removes apps not from Intune). SAFE on a lab device with no real data. Run it, watch it","• Autopilot Reset — wipes user data and reprovisions via Autopilot, keeps Entra join. Destructive to the user profile but keeps the device usable. Budget 20 min","• Wipe — full device wipe (nuclear option). You'll need your W11 Rebuild USB from Day 2 to recover. Skip unless you want the full experience","• Retire — removes corporate data but leaves personal files. On bare metal with no personal data it looks the same as Wipe","Know when to use each IRL: Wipe = stolen/decommissioned corporate device · Retire = BYOD user leaving the company · Fresh Start = clean up a bloated machine · Autopilot Reset = reprovision when a user changes roles","WHAT TO ACTUALLY DO TODAY: run Sync, Restart, and Fresh Start. Skip Wipe/Retire — you already proved reprovisioning works on Day 12"]},
    {id:"d22t2",text:"MS Learn: Device lifecycle management and remote actions",cat:"study",steps:["Open directly: https://learn.microsoft.com/en-us/mem/intune/remote-actions/device-management","Covers the full lifecycle: enrollment → compliance evaluation → management → retirement/wipe","Decision tree — know cold which action to use: Wipe (lost/decommissioned), Retire (BYOD offboarding, keeps personal data), Fresh Start (clean up bloatware), Autopilot Reset (reprovision while keeping Entra join)","Interviewers love asking 'a user's laptop was stolen, walk me through what you do' — the correct answer is Wipe + revoke sessions in Entra + rotate BitLocker recovery key"]}
  ]},
  {day:23,label:"Windows 365 / Virtual Desktops Concepts",tasks:[
    {id:"d23t1",text:"Study: Windows 365 Cloud PC and Azure Virtual Desktop concepts",cat:"study",steps:["You don't need to deploy these (they cost $$$) but you NEED to know what they are for interviews","Windows 365: cloud-hosted Windows desktops managed through Intune. Each user gets a persistent Cloud PC. Good for remote workers, contractors, BYOD","Azure Virtual Desktop (AVD): more customizable, multi-session Windows, better for call centers and shared workstations","Know the positioning: Windows 365 = simple/per-user | AVD = complex/per-session | Citrix/VMware Horizon = third-party alternatives","Your Carnival Cruise + Quarles experience with Citrix gives you context here — you can compare"]},
    {id:"d23t2",text:"MS Learn: Windows 365 Cloud PC and Azure Virtual Desktop fundamentals",cat:"study",steps:["Windows 365: https://learn.microsoft.com/en-us/training/paths/get-started-with-windows-365/","Azure Virtual Desktop: https://learn.microsoft.com/en-us/training/paths/m365-wvd/","Focus on when to recommend Cloud PC vs traditional managed endpoint vs multi-session AVD","Windows 365 = simple, per-user persistent Cloud PC, managed via Intune. AVD = flexible, multi-session, per-session pricing, better for call centers","Your Citrix experience from Carnival/Quarles = a great comparison point in interviews"]}
  ]},
  {day:24,label:"Co-Management & Hybrid Scenarios",tasks:[
    {id:"d24t1",text:"Study: SCCM/MECM co-management with Intune",cat:"study",steps:["Co-management: devices managed by BOTH SCCM (on-prem) and Intune (cloud) simultaneously","Workloads can be shifted one at a time: compliance policies → Intune, app deployment → still SCCM, OS updates → Intune","This is how most large enterprises are MIGRATING from SCCM to Intune — not a hard cutover","Since you have SCCM experience at Quarles, you can speak to this directly in interviews: 'I understand the co-management migration path because I've worked with SCCM in production'"]},
    {id:"d24t2",text:"MS Learn: 'Deploy using on-premises based tools' — co-management modules",cat:"study",steps:["Go to the MD-102 learning path 'Deploy using on-premises based tools' at learn.microsoft.com","Focus on the co-management and Configuration Manager modules","Key concept: co-management authority slider — each workload (compliance, Windows Update, Endpoint Protection, device config, Office Click-to-Run, client apps) has an individual toggle between SCCM and Intune","Understand: co-management is a TRANSITION strategy, not a permanent state. The endgame is full cloud-native management via Intune","Your Quarles SCCM experience = strong interview material: 'I've been on the SCCM side of a co-management migration'","Complete the knowledge check"]}
  ]},
  {day:25,label:"Applied Skills: Intune Credential",tasks:[
    {id:"d25t1",text:"Take Applied Skills: 'Deploy and manage devices with Microsoft Intune'",cat:"cert",steps:["Go to learn.microsoft.com/en-us/credentials/applied-skills/deploy-and-manage-devices-by-using-microsoft-intune/","This is a FREE lab-based assessment — no multiple choice, you DO the work in a live environment","You've been doing all of this for 3 weeks — compliance policies, config profiles, app deployment, Autopilot","Click Start → complete the 12-16 tasks → Submit → pass/fail in 60 seconds","If you pass: add to LinkedIn immediately (it's a verified Microsoft credential)"]},
    {id:"d25t2",text:"If passed, add to LinkedIn and resume",cat:"career",steps:["Microsoft Learn profile → Credentials → Share → copy the URL","LinkedIn → Add certification → paste URL → issuer: Microsoft","Update your resume DOCX with the credential","This is proof you can do the work, not just talk about it"]}
  ]},
  {day:26,label:"MD-102 Course Completion Push",tasks:[
    {id:"d26t1",text:"Complete any remaining MD-102 MS Learn modules",cat:"study",steps:["Return to learn.microsoft.com/en-us/credentials/certifications/modern-desktop/ and check your progress across all 8 MD-102 learning paths","Finish any paths or modules still marked incomplete — especially: Windows Hello for Business, certificate deployment (SCEP/PKCS), VPN profiles, Wi-Fi profiles","Retake any knowledge checks you scored below 80% on","Take notes on anything that didn't come up during your hands-on labs — that's your interview gap to fill"]},
    {id:"d26t2",text:"Run the MD-102 practice assessment on MS Learn",cat:"cert",steps:["Go to learn.microsoft.com → search 'MD-102 practice assessment'","Take the full practice exam — see how you score","This tells you what you know vs what you still need to study","You don't need to take the paid exam right now (it's $165) but knowing you COULD pass it builds confidence"]}
  ]},
  {day:27,label:"PowerShell Automation Day",tasks:[
    {id:"d27t1",text:"Write an end-to-end onboarding automation script",cat:"lab",steps:["Create a script that: reads from CSV → creates Entra user → assigns license → adds to correct department group → generates a Temporary Access Pass → outputs a 'new hire packet' with login info","This is your SHOWPIECE automation — document it thoroughly","Save it as a GitHub gist at gist.github.com → add the link to your resume"]},
    {id:"d27t2",text:"Write a stale device cleanup script",cat:"lab",steps:["Script that queries Intune for devices that haven't synced in 90+ days → exports a report → optionally retires them","Connect-MgGraph -Scopes 'DeviceManagementManagedDevices.ReadWrite.All'","$staleDate = (Get-Date).AddDays(-90)","Get-MgDeviceManagementManagedDevice -Filter \"lastSyncDateTime lt $($staleDate.ToString('yyyy-MM-ddTHH:mm:ssZ'))\"","This is a real-world admin task every org needs"]}
  ]},
  {day:28,label:"Resume & Career Update",tasks:[
    {id:"d28t1",text:"Update resume with all Phase 2 achievements",cat:"career",steps:["Add your Applied Skills credential","Update the Intune bullet with specific examples: 'Designed Windows Autopilot deployment profiles enabling zero-touch device provisioning...'","Add: compliance policies, configuration profiles via Settings Catalog, ASR rules, BitLocker encryption, proactive remediations","Add your PowerShell scripts to the Automation bullet"]},
    {id:"d28t2",text:"Start applying to jobs — don't wait for Phase 3",cat:"career",steps:["Search: 'Intune Administrator', 'Endpoint Management Engineer', 'IT Security Engineer', 'M365 Administrator'","Apply to 3+ jobs this week — tailor resume keywords to each posting","You now have real hands-on experience to discuss, not just theory"]}
  ]},
  {day:29,label:"Community + Networking",tasks:[
    {id:"d29t1",text:"Join sysadmin communities and answer questions",cat:"career",steps:["reddit.com/r/Intune — subscribe, answer questions about topics you've just learned","reddit.com/r/sysadmin — largest IT community","discord.gg/winadmins — very active, helpful community","Answering questions solidifies YOUR knowledge and builds professional reputation"]},
    {id:"d29t2",text:"LinkedIn: write a post about your Autopilot lab experience",cat:"career",steps:["Write a short post: what you built, what you learned, what surprised you","Tag: #Intune #Autopilot #EndpointManagement #ZeroTrust","Pin it to your Featured section"]}
  ]},
  {day:30,label:"Phase 2 Complete — Transition Day",tasks:[
    {id:"d30t1",text:"Cancel the free trial and purchase the $22/month Business Premium license",cat:"infra",steps:["Your 30-day trial is ending. Go to admin.microsoft.com → Billing → Your products","Cancel the trial (if it would auto-convert to a full-price multi-user plan)","Purchase a SINGLE Microsoft 365 Business Premium license at $22/month","This maintains your tenant, all your Entra ID P1 features, Intune, Defender, and Autopilot","Expense it through your LLC — it's a legitimate business education/lab cost"]},
    {id:"d30t2",text:"Review: you now have a full endpoint management portfolio",cat:"review",steps:["In 25 days you've: provisioned a cloud tenant, repurposed a Surface Pro as a managed lab device, created 20+ users via PowerShell, enrolled a device in Intune, built compliance policies, config profiles, deployed apps silently, configured Autopilot and reprovisioned a device from scratch, set up security baselines and ASR rules, encrypted drives with BitLocker, built proactive remediations, and earned a Microsoft Applied Skills credential","That's not a lab exercise — that's a real environment. You can talk about all of this in interviews with confidence"]}
  ]},

  // ═══ PHASE 3: IDENTITY, ACCESS & ZERO TRUST — SC-300 (Days 31-50) ═══
  {day:31,label:"SC-300 Course Begins + Conditional Access Foundations",tasks:[
    {id:"d31t1",text:"MS Learn: Start SC-300 path 'Explore identity in Microsoft Entra ID'",cat:"study",steps:["Go to https://learn.microsoft.com/en-us/credentials/certifications/identity-and-access-administrator/ — bookmark this for the full SC-300 journey","Start learning path: 'Explore identity in Microsoft Entra ID'","Modules cover: Entra ID architecture, identity types (cloud-only, synchronized, guest), and authentication protocols:","• SAML (Security Assertion Markup Language — XML-based, older but still everywhere, especially enterprise SaaS)","• OIDC (OpenID Connect — modern identity layer built on top of OAuth 2.0, what Microsoft uses for Entra sign-in)","• OAuth 2.0 (authorization protocol — the 'let this app access my data on your behalf' flow, e.g., 'Sign in with Google' type buttons)","Entra editions: Free (basic directory), P1 (most common workforce features), P2 (advanced — PIM, Identity Protection)","Pay attention to HOW Entra ID fits into the broader Microsoft security stack — this is the foundation you'll build on for the next 17 days"]},
    {id:"d31t2",text:"Create Named Locations in Entra",cat:"lab",steps:["Go to entra.microsoft.com → Protection → Conditional Access → Named locations","Create 'Trusted Office IP' → IP ranges → your home public IP (whatismyip.com) as x.x.x.x/32 → Mark as trusted","Create 'Blocked Countries' → Countries → select 2-3 countries you'd never expect legitimate logins from","These Named Locations are referenced by Conditional Access policies"]}
  ]},
  {day:32,label:"Conditional Access — First Policies",tasks:[
    {id:"d32t1",text:"Build CA Policy: Require MFA for all users",cat:"lab",steps:["CA = Conditional Access — the 'IF/THEN' engine Entra uses to decide whether a sign-in is allowed, blocked, or requires an extra step (like MFA). You'll build dozens of these","Go to https://entra.microsoft.com → Protection → Conditional Access → Policies → '+ New policy'","Name: 'CA001-Require-MFA-AllUsers' | Users: All users | Target resources: All cloud apps | Grant: Require multifactor authentication","CRITICAL: set to 'Report-only' first — check sign-in logs after 24 hours before switching to 'On'","Report-only lets you see who WOULD be blocked without actually blocking them — this prevents you from accidentally locking yourself out"]},
    {id:"d32t2",text:"Build CA Policy: Block sign-ins from outside the US",cat:"lab",steps:["Name: 'CA002-Block-Outside-US' | Users: All users | Target resources: All cloud apps","Conditions → Locations → Include: Any location → Exclude: your trusted location + 'United States'","Grant: Block access","Set to Report-only → check logs → then enable","TEST IT: try signing into the portal from inside the Surface Pro (should work since you're in the US) and check the sign-in log to see the CA evaluation result"]},
    {id:"d32t3",text:"MS Learn: 'Implement an Authentication and Access Management solution' — Conditional Access modules",cat:"study",steps:["Go to SC-300 learning path 'Implement an Authentication and Access Management solution' at learn.microsoft.com","Focus on the Conditional Access modules — this is the CORE of identity security and the most heavily tested SC-300 topic","Understand the formula: IF [assignments: users + apps + conditions (location, device, risk, platform)] THEN [controls: grant/block + session controls]","The best CA admins think in terms of policies that WORK TOGETHER, not individual rules — base policies + exception policies + break-glass accounts","Complete the knowledge check"]}
  ]},
  {day:33,label:"Conditional Access — Advanced",tasks:[
    {id:"d33t1",text:"Build CA Policy: Require compliant device for desktop access",cat:"lab",steps:["Name: 'CA003-Require-Compliant-Desktop'","Users: All users | Apps: All cloud apps | Conditions → Device platforms: Windows, macOS","Grant: Require device to be marked as compliant","This connects Intune (compliance) to Entra (access). A noncompliant device = blocked from M365","Your Surface Pro should pass since you set up compliance policies in Phase 2"]},
    {id:"d33t2",text:"Build CA Policy: Require phishing-resistant MFA for admins",cat:"lab",steps:["Name: 'CA004-Admin-PhishResistant-MFA'","Users → Include: Directory roles → Global Admin, User Admin, Security Admin, Intune Admin","Apps: All cloud apps","Grant: Require authentication strength → Phishing-resistant MFA","Set to Report-only (you may not have FIDO2 keys to actually authenticate)","This demonstrates zero-trust for admin accounts — interview gold"]},
    {id:"d33t3",text:"Test CA policies by logging in as different dummy users",cat:"lab",steps:["Open your Surface Pro or a new browser → sign in as a dummy user → watch the CA policies trigger","Check: entra.microsoft.com → Sign-in logs → find the login → 'Conditional Access' tab → see which policies evaluated, which applied, which were skipped","This is how you PROVE your policies work. Document the results"]}
  ]},
  {day:34,label:"MFA & Authentication Methods",tasks:[
    {id:"d34t1",text:"Configure Authentication Methods policy",cat:"lab",steps:["Go to entra.microsoft.com → Protection → Authentication methods → Policies","Review and configure each method:","Microsoft Authenticator: Enable for All users, require number matching","FIDO2 security keys: Enable for SG-IT-Staff","Temporary Access Pass: Enable for All users (for onboarding)","SMS: consider DISABLING for admins (it's the weakest MFA method)","These settings control which MFA methods your users can register"]},
    {id:"d34t2",text:"Generate a Temporary Access Pass for a dummy user",cat:"lab",steps:["Go to Users → select a dummy user → Authentication methods → '+ Add' → Temporary Access Pass","Configure: one-time use, 24-hour lifetime","A TAP code is generated — in production, you'd give this to a new hire on Day 1 so they can set up passwordless auth (Authenticator app or FIDO2 key) without needing a traditional password","This is the modern onboarding flow"]},
    {id:"d34t3",text:"MS Learn: Authentication methods and MFA deep-dive",cat:"study",steps:["Open directly: https://learn.microsoft.com/en-us/search/?terms=Plan%20and%20implement%20multifactor%20authentication&category=LearningPath","Authentication method strength hierarchy: SMS (weakest — vulnerable to SIM swap attacks) → Authenticator push → Number matching → FIDO2 / Windows Hello for Business (strongest, phishing-resistant because the private key never leaves the device)","Key concept: 'Authentication Strengths' in Conditional Access policies let you REQUIRE specific MFA methods (e.g., FIDO2-only for admins, Authenticator OK for regular users)","MFA = Multi-Factor Authentication — something you know (password) + something you have (phone, security key) + optionally something you are (biometric)"]}
  ]},
  {day:35,label:"Privileged Identity Management (PIM)",tasks:[
    {id:"d35t1",text:"Enable PIM and configure just-in-time admin access",cat:"lab",steps:["Go to entra.microsoft.com → Identity Governance → Privileged Identity Management","Click 'Microsoft Entra roles' → Roles → 'User Administrator' → '+ Add assignments'","Select a dummy IT user → Assignment type: 'Eligible' (NOT Active)","'Eligible' = they must REQUEST and ACTIVATE the role each time they need it","Configure role settings: click Settings → User Administrator → Edit:","• Max activation duration: 4 hours","• Require justification: Yes","• Require MFA on activation: Yes","• Require approval: Yes → set yourself as approver"]},
    {id:"d35t2",text:"Test the PIM flow end-to-end",cat:"lab",steps:["Sign in as the dummy IT user → PIM → My roles → Activate 'User Administrator' → provide justification","Switch to your admin account → PIM → Approve requests → approve it","Back as the dummy user → they now have User Admin for 4 hours → verify by editing another user","After 4 hours (or manual deactivation) the role is automatically removed","THIS FLOW is the definition of 'just-in-time access' and 'least privilege'. Practice explaining it"]},
    {id:"d35t3",text:"MS Learn: Privileged Identity Management (PIM) modules",cat:"study",steps:["Open directly: https://learn.microsoft.com/en-us/entra/id-governance/privileged-identity-management/pim-configure","Module path: https://learn.microsoft.com/en-us/search/?terms=Configure%20Microsoft%20Entra%20Privileged%20Identity%20Management&category=Module","PIM = Privileged Identity Management — instead of permanently assigning admin roles, you make users ELIGIBLE for roles they activate (with MFA + justification + optional approval) only when needed. This is called JIT (Just-In-Time) access","Understand cold: eligible vs active assignments, activation workflow, approval chains, MFA-on-activation, PIM for Azure resources (not just Entra roles)","PIM requires Entra ID P2 license — if your Business Premium tenant only includes P1, note which PIM features are unavailable in your lab (useful honesty in interviews)","Interview framing: 'Standing admin rights are the #1 cause of breach blast radius. PIM gives me JIT elevation with approval + MFA + audit logging.'"]}
  ]},
  {day:36,label:"Identity Protection",tasks:[
    {id:"d36t1",text:"Explore Entra ID Protection dashboard and risk policies",cat:"lab",steps:["Go to entra.microsoft.com → Protection → Identity Protection","Review: Risky users, Risky sign-ins, Risk detections","You may not have real risk events in your lab — that's OK. Understand what TYPES of risks are detected:","• Impossible travel: user signs in from New York then Tokyo 10 minutes later","• Anonymous IP: sign-in from Tor/VPN exit nodes","• Leaked credentials: Microsoft found user's password in a dark web dump","• Malware-linked IP: sign-in from known botnet infrastructure","Configure a User Risk Policy: if user risk = High → require password change","Configure a Sign-in Risk Policy: if sign-in risk = High → block (you built this as a CA policy on Day 32 — but it can also be done here)"]},
    {id:"d36t2",text:"MS Learn: Microsoft Entra Identity Protection modules",cat:"study",steps:["Open directly: https://learn.microsoft.com/en-us/entra/id-protection/overview-identity-protection","Module path: https://learn.microsoft.com/en-us/search/?terms=Implement%20Microsoft%20Entra%20ID%20Protection&category=Module","Focus on: risk levels (low/medium/high), user risk (the account is compromised) vs sign-in risk (this PARTICULAR sign-in is sketchy), risk-based Conditional Access policies vs Identity Protection's own policies (they overlap — know the difference)","Key concept: self-remediation via password reset + MFA (letting the user unblock themselves) vs admin-driven 'Confirm user compromised' in the portal (shuts it all down)","Requires Entra ID P2 license — same note as PIM"]}
  ]},
  {day:37,label:"App Registrations & Enterprise Apps Deep-Dive",tasks:[
    {id:"d37t1",text:"Configure a SAML SSO app integration",cat:"lab",steps:["SSO = Single Sign-On — user signs into Entra once and gets into every connected SaaS app without re-entering credentials. From a security angle, this is huge: one identity = one audit trail, no password sprawl","Go to https://entra.microsoft.com → Applications → Enterprise applications → '+ New application'","Search the gallery for a common app (e.g., 'Salesforce', 'Box', 'ServiceNow') — pick one with a SAML tutorial","Follow the setup wizard: configure Entity ID (unique identifier for your app), Reply URL (where Entra sends the SAML response after auth), attribute mappings (UPN, email, display name)","Assign the app to a group (e.g., SG-Sales-Team)","You don't need an actual subscription to the SaaS app — just configuring the Entra side teaches the process","This is the SAML SSO integration walkthrough that interview question #1 is all about"]},
    {id:"d37t2",text:"Configure SCIM provisioning for the app",cat:"lab",steps:["On the Enterprise App page → Provisioning → Get started → Automatic","The app will ask for a Tenant URL and Secret Token (from the SaaS app's admin portal) — since you may not have a real subscription, just understand the FIELDS and FLOW","Map attributes: which Entra user fields map to which app fields","Set scope: 'Sync only assigned users and groups' → link to your SG-Sales-Team group","Provisioning = automatic user creation in the SaaS app when you assign them in Entra. No manual account creation in 50 different apps"]},
    {id:"d37t3",text:"MS Learn: 'Implement Access Management for Apps' learning path",cat:"study",steps:["Go to SC-300 learning path 'Implement Access Management for Apps' at learn.microsoft.com","Modules cover: enterprise applications vs app registrations, SAML vs OIDC federation, the consent framework, app permissions (delegated vs application), SSO configuration","Key interview concept: admin consent vs user consent — how do you control which third-party apps users can authorize against your tenant? (Answer: user consent settings + admin consent workflow)","Also important: App Proxy for publishing on-prem apps through Entra, without opening firewall ports","Complete the knowledge check"]}
  ]},
  {day:38,label:"B2B External Identities",tasks:[
    {id:"d38t1",text:"Configure B2B guest access and cross-tenant settings",cat:"lab",steps:["Go to entra.microsoft.com → External Identities → External collaboration settings","Configure: who can invite guests, allow/block specific domains","Invite a guest user: Users → '+ Invite external user' → use a personal email","The guest authenticates with their OWN identity provider but accesses YOUR resources","Create a CA policy scoped to 'Guest or external users' — e.g., always require MFA for guests"]},
    {id:"d38t2",text:"MS Learn: External identities, B2B collaboration, and cross-tenant access",cat:"study",steps:["Open directly: https://learn.microsoft.com/en-us/entra/external-id/external-identities-overview","Module path: https://learn.microsoft.com/en-us/search/?terms=Explore%20external%20identities%20in%20Microsoft%20Entra%20ID&category=Module","B2B collaboration: invite partners/vendors as guest users. They authenticate with their OWN IdP (Identity Provider — Google, another Entra tenant, etc.) but access YOUR resources under your policies","B2C: customer-facing identity. Users create accounts directly in a separate consumer-grade directory. Used for consumer apps (e.g., a retail store's rewards app), not workforce","Cross-tenant access settings: fine-grained control over which external Entra orgs can collaborate with yours, whether you trust their MFA claims, and what resources they can reach"]}
  ]},
  {day:39,label:"Entitlement Management & Access Reviews",tasks:[
    {id:"d39t1",text:"Create an Access Package in Entitlement Management",cat:"lab",steps:["Go to entra.microsoft.com → Identity Governance → Entitlement management → Access packages → '+ New'","Name: 'Sales Team Access Bundle'","Resources: add SG-Sales-Team group + a SharePoint site or app","Policy: who can request → All members | Require approval → Yes | Approver: a manager user","This creates a self-service portal where users can REQUEST access bundles, managers approve, and it's automatically provisioned. Much better than ad-hoc 'add me to this group' emails"]},
    {id:"d39t2",text:"Create an Access Review",cat:"lab",steps:["Identity Governance → Access reviews → '+ New'","Review: members of SG-Sales-Team | Reviewers: managers | Duration: 7 days | Recurrence: quarterly","When triggered: each manager reviews their team's access and confirms/revokes","This is identity GOVERNANCE — ensuring people only have access they still need. Critical for compliance-heavy environments like law firms"]},
    {id:"d39t3",text:"MS Learn: 'Plan and implement an identity governance strategy' learning path",cat:"study",steps:["Go to SC-300 learning path 'Plan and implement an identity governance strategy' at learn.microsoft.com","Modules cover: entitlement management (access packages), access reviews, Privileged Identity Management (revisited here), terms of use","This is the 'identity hygiene' layer — the proactive cleanup that prevents access sprawl (users accumulating permissions they no longer need)","Interview angle: 'Governance is how you PROVE to auditors that access is appropriate, not just that it was granted by the right person'","Complete the knowledge checks"]}
  ]},
  {day:40,label:"Lifecycle Workflows",tasks:[
    {id:"d40t1",text:"Configure Lifecycle Workflows for onboarding and offboarding",cat:"lab",steps:["Go to Identity Governance → Lifecycle workflows","Create an ONBOARDING workflow: Trigger: employeeHireDate | Tasks: generate TAP, add to department group, enable account, send welcome email to manager","Create an OFFBOARDING workflow: Trigger: employeeLeaveDateTime | Tasks: revoke all sign-in sessions, remove from all groups, disable account","Note: these require the employeeHireDate/LeaveDateTime attributes to be populated on users","Set these on a few dummy users via PowerShell and watch the workflows trigger"]},
    {id:"d40t2",text:"MS Learn: Lifecycle workflows modules",cat:"study",steps:["Open directly: https://learn.microsoft.com/en-us/entra/id-governance/what-are-lifecycle-workflows","Module path: https://learn.microsoft.com/en-us/search/?terms=Plan%20and%20implement%20lifecycle%20workflows&category=Module","Lifecycle workflows AUTOMATE the JML process (Joiner/Mover/Leaver) — historically the most tedious and error-prone admin task","Know cold: the three trigger event types (Joiner — new hire, Mover — role change, Leaver — termination), built-in task templates, how to test with 'execute on-demand', and how to scope via user rules","Requires Entra ID Governance add-on license","Strong interview answer for 'how would you handle identity lifecycle at scale?' — walk through a Leaver workflow: disable account → revoke active sessions → remove group memberships → notify manager → delete after 30 days"]}
  ]},
  {day:41,label:"Sign-In Logs & Audit Investigation",tasks:[
    {id:"d41t1",text:"Deep-dive into sign-in logs and audit logs",cat:"lab",steps:["Go to entra.microsoft.com → Monitoring → Sign-in logs","Filter by: a specific dummy user, a date range, a specific app","Click on a sign-in entry → examine: Location, Device info, CA policies evaluated, MFA details, Risk level","Now go to Audit logs → filter by activity type (e.g., 'Add user', 'Update user', 'Delete group')","Practice: 'A user reports their account was compromised at 2 PM yesterday. Walk me through how you'd investigate.'","Answer: Sign-in logs → filter by user + time → check IP/location → check risk level → check CA evaluation → check if MFA was used → Audit logs for any changes made under that identity"]},
    {id:"d41t2",text:"MS Learn: Entra monitoring, sign-in logs, and audit reporting",cat:"study",steps:["Open directly: https://learn.microsoft.com/en-us/entra/identity/monitoring-health/overview-monitoring-health","Module path: https://learn.microsoft.com/en-us/search/?terms=Monitor%2C%20troubleshoot%2C%20and%20report%20on%20Microsoft%20Entra%20ID&category=Module","Log types to know cold: Sign-in logs (interactive = user typed their password; non-interactive = token refresh in the background; service principal = app-to-app; managed identity = Azure resource-to-resource), Audit logs (who changed what), Provisioning logs (sync from HR/on-prem)","Know how to export logs to Log Analytics / Microsoft Sentinel for long-term retention — Entra only keeps 30 days by default","The INVESTIGATION flow IS the daily workflow of an identity-focused SecOps analyst: suspicious sign-in alert → pivot to sign-in logs → filter by user/IP/app → identify risk signals → confirm compromise → remediate (revoke sessions, reset password, require MFA re-registration)"]}
  ]},
  {day:42,label:"Applied Skills: Entra Credentials",tasks:[
    {id:"d42t1",text:"Take Applied Skills: 'Get started with identities and access using Microsoft Entra'",cat:"cert",steps:["Go to learn.microsoft.com and take the assessment","Covers: user management, group management, authentication configuration, access management","You've been doing all of this — this should be straightforward"]},
    {id:"d42t2",text:"Take Applied Skills: 'Configure secure access by using Microsoft Entra'",cat:"cert",steps:["Take the second Entra assessment","Covers: Conditional Access, MFA, Identity Protection","Add both to LinkedIn immediately upon passing"]}
  ]},
  // Days 43-50: SC-300 completion + advanced topics
  {day:43,label:"Hybrid Identity",tasks:[
    {id:"d43t1",text:"Study: Azure AD Connect / Cloud Sync",cat:"study",steps:["You can't deploy this in your lab (no on-prem AD) but you MUST know it for interviews","Azure AD Connect: syncs on-prem AD to Entra. Supports: password hash sync, pass-through auth, federation with ADFS","Cloud Sync: lighter agent-based alternative, easier for multi-forest, Microsoft's preferred future direction","Know: when to recommend each, and how they relate to GCDS (Google Cloud Directory Sync) in hybrid Google+Microsoft environments"]},
    {id:"d43t2",text:"MS Learn: Hybrid identity — PHS, PTA, and Federation modules",cat:"study",steps:["Open directly: https://learn.microsoft.com/en-us/entra/identity/hybrid/connect/whatis-hybrid-identity","Entra Connect: https://learn.microsoft.com/en-us/entra/identity/hybrid/connect/whatis-azure-ad-connect","Focus on the three sign-in methods:","• PHS = Password Hash Sync. On-prem password hash is synced to the cloud; users sign in against Entra. Simplest, 95% of orgs. No on-prem agents needed.","• PTA = Pass-Through Authentication. User types password in Entra → Entra forwards validation request to on-prem AD via a lightweight agent. Password stays on-prem.","• Federation = ADFS or third-party IdP handles authentication entirely. Legacy, complex, being phased out everywhere.","Know pros/cons and WHICH to recommend: PHS is Microsoft's preferred path; PTA if password hashes legally can't leave on-prem; Federation only if a third-party MFA/identity provider requires it"]}
  ]},
  {day:44,label:"SC-300 Practice + Gap Study",tasks:[
    {id:"d44t1",text:"Run SC-300 practice assessment on MS Learn",cat:"cert",steps:["Go to learn.microsoft.com → search 'SC-300 practice assessment'","Take the full practice exam → note areas below 70%","Common weak spots: B2B/B2C, identity governance, hybrid identity, and monitoring"]},
    {id:"d44t2",text:"Deep-study weak areas from practice exam using MS Learn",cat:"study",steps:["For each weak area from your practice assessment: return to the relevant SC-300 MS Learn module at learn.microsoft.com and retake the knowledge check","If a topic isn't clicking, also search for the Microsoft Docs reference page on that specific feature (e.g., 'Conditional Access what if tool', 'access package assignment policies') — the docs go deeper than the learning path","Pair study with hands-on lab work in your tenant wherever possible","SC-300 is a $165 exam — you can schedule it when ready, or just use your MS Learn progress and practice scores as proof of knowledge for interviews"]}
  ]},
  {day:45,label:"Google Workspace Crash Course",tasks:[
    {id:"d45t1",text:"Study the MS ↔ Google translation table",cat:"study",steps:["Even though this sprint focuses on Microsoft, many jobs want cross-platform knowledge","Key translations: Entra ID = Google Cloud Identity | Conditional Access = Context-Aware Access | GPO = OU-based Chrome policies | Intune = Google Endpoint Management | Graph API = Admin SDK / GAM CLI","You can honestly say: 'My primary depth is in Microsoft Entra and Intune, and I understand the Google Workspace equivalents conceptually, including how the two platforms can be federated together'"]},
    {id:"d45t2",text:"Study GCDS and federation between Google and Microsoft",cat:"study",steps:["GCDS syncs AD to Google (one-way) — used when AD is source of truth for both platforms","Federation: Google as SAML IdP serving Entra as SP, or vice versa","Know: which direction the trust goes and which directory is authoritative"]}
  ]},
  {day:46,label:"Secure Score + Microsoft Defender Deep-Dive",tasks:[
