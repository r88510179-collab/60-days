            <div style={{ background: "#F59E0B10", border: "1px solid #F59E0B30", borderRadius: 7, padding: "8px 11px", fontSize: 11.5, color: "#F59E0B", marginBottom: 12, lineHeight: 1.5 }}>
              ⚠️ This will <strong>replace</strong> any local progress on this device with what's in the gist.
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={useExisting} disabled={!token || !gistId || busy} style={{ ...btn("#10B981", true), opacity: (!token || !gistId || busy) ? 0.5 : 1, flex: 1 }}>
                {busy ? "Connecting..." : "Connect & pull"}
              </button>
              <button onClick={() => setStep("intro")} style={btn("#64748B")}>Back</button>
            </div>
          </>
        )}

        {step === "done-new" && (
          <>
            <p style={{ fontSize: 13, color: "#94A3B8", lineHeight: 1.6, marginBottom: 12 }}>
              Save this <strong style={{ color: "#E5E7EB" }}>Gist ID</strong> — you'll need it to connect your other devices.
            </p>
            <div style={{ background: "#0B1120", border: "1px solid #1E293B", borderRadius: 7, padding: 12, marginBottom: 14 }}>
              <div style={{ fontSize: 10, fontFamily: m, color: "#64748B", letterSpacing: 1, marginBottom: 6, fontWeight: 600 }}>GIST ID</div>
              <div style={{ fontFamily: m, fontSize: 13, color: "#06B6D4", wordBreak: "break-all", marginBottom: 8 }}>{createdId}</div>
              <button onClick={() => navigator.clipboard?.writeText(createdId)} style={btn("#06B6D4", true)}>📋 Copy Gist ID</button>
            </div>
            <button onClick={onClose} style={{ ...btn("#10B981", true), width: "100%" }}>Done</button>
          </>
        )}

        {step === "done-existing" && (
          <>
            <p style={{ fontSize: 13, color: "#94A3B8", lineHeight: 1.6, marginBottom: 14 }}>
              This device is now syncing. Your progress will update automatically.
            </p>
            <button onClick={onClose} style={{ ...btn("#10B981", true), width: "100%" }}>Done</button>
          </>
        )}
      </div>
    </div>
  );
}

function App(){
  const[completed,setCompleted]=useState(()=>LS.get("se-done")||{});
  const[habitLog,setHabitLog]=useState(()=>LS.get("se-hab")||{});
  const[startDate,setStartDate]=useState(()=>LS.get("se-start"));
  const[labRef,setLabRef]=useState(()=>LS.get("se-ref")||{tenantId:"",tenantDomain:"",adminUpn:"",recoveryUsb:""});
  const[selectedDay,setSelectedDay]=useState(null);
  const[view,setView]=useState("today");
  const[expandedTask,setExpandedTask]=useState(null);
  const[expandedHabit,setExpandedHabit]=useState(null);
  const[showRef,setShowRef]=useState(false);
  const[showSync,setShowSync]=useState(false);

  const toggle=useCallback(id=>{setCompleted(p=>{const n={...p,[id]:!p[id]};LS.set("se-done",n);return n;});},[]);
  const todayKey=new Date().toISOString().slice(0,10);
  const toggleHabit=useCallback(id=>{setHabitLog(p=>{const dh=p[todayKey]||{};const n={...p,[todayKey]:{...dh,[id]:!dh[id]}};LS.set("se-hab",n);return n;});},[todayKey]);
  const start=useCallback(()=>{setStartDate(todayKey);LS.set("se-start",todayKey);},[todayKey]);
  const reset=useCallback(()=>{if(!confirm("Reset all progress? This cannot be undone."))return;setCompleted({});setHabitLog({});setStartDate(null);setView("today");LS.del("se-done");LS.del("se-hab");LS.del("se-start");},[]);

  const snapshot = React.useMemo(() => ({ completed, habitLog, startDate, labRef }),
    [completed, habitLog, startDate, labRef]);

  const applyRemote = useCallback((remote) => {
    setCompleted(remote.completed); LS.set("se-done", remote.completed);
    setHabitLog(remote.habitLog); LS.set("se-hab", remote.habitLog);
    if (remote.startDate) { setStartDate(remote.startDate); LS.set("se-start", remote.startDate); }
    if (remote.labRef) { setLabRef(remote.labRef); LS.set("se-ref", remote.labRef); }
  }, []);

  const sync = useGistSync({ snapshot, applyRemote });
  const [showSyncModal, setShowSyncModal] = useState(false);

  const disconnectSync = useCallback(() => {
    if (!confirm("Disconnect this device from cloud sync? Local progress stays. The token is removed from this device only — the gist itself is not deleted.")) return;
    sync.updateCfg(null);
  }, [sync]);

  const updateRef=useCallback((field,value)=>{setLabRef(p=>{const n={...p,[field]:value};LS.set("se-ref",n);return n;});},[]);

  const exportProgress=useCallback(()=>{
    const data={version:1,exported:new Date().toISOString(),completed,habitLog,startDate,labRef};
    const json=JSON.stringify(data,null,2);
    navigator.clipboard.writeText(json).then(()=>{
      alert("Progress copied to clipboard. On your other device: open this same site → Phases → Import Progress → paste.");
    }).catch(()=>{
      prompt("Copy this text and paste it on your other device:",json);
    });
  },[completed,habitLog,startDate,labRef]);

  const importProgress=useCallback(()=>{
    const json=prompt("Paste the progress JSON from your other device:");
    if(!json)return;
    try{
      const data=JSON.parse(json);
      if(!data.completed||typeof data.completed!=="object")throw new Error("Invalid format");
      if(!confirm(`Import progress from ${data.exported||"unknown date"}? This will OVERWRITE your current progress on this device.`))return;
      setCompleted(data.completed||{});LS.set("se-done",data.completed||{});
      setHabitLog(data.habitLog||{});LS.set("se-hab",data.habitLog||{});
      if(data.startDate){setStartDate(data.startDate);LS.set("se-start",data.startDate);}
      if(data.labRef){setLabRef(data.labRef);LS.set("se-ref",data.labRef);}
      alert("Imported successfully.");
    }catch(e){alert("Could not parse that JSON. Make sure you copied the full export.");}
  },[]);

  const dayNum=startDate?Math.max(1,Math.ceil((Date.now()-new Date(startDate+"T00:00:00").getTime())/86400000)):0;
  const totalTasks=DAYS.reduce((s,d)=>s+d.tasks.length,0);
  const doneTasks=DAYS.reduce((s,d)=>s+d.tasks.filter(t=>completed[t.id]).length,0);
  const pct=totalTasks?Math.round(doneTasks/totalTasks*100):0;
  const todayHabits=habitLog[todayKey]||{};
  const habitsDone=HABITS.filter(h=>todayHabits[h.id]).length;

  let streak=0;
  if(startDate){
    const now=new Date();now.setHours(0,0,0,0);
    for(let i=0;i<90;i++){
      const d=new Date(now);d.setDate(d.getDate()-i);
      const k=d.toISOString().slice(0,10);
      if(k<startDate)break;
      const dh=habitLog[k]||{};
      const a=HABITS.every(h=>dh[h.id]);
      if(i===0&&!a)continue;
      if(a)streak++;else break;
    }
  }

  const activeDay=selectedDay||Math.min(dayNum,60);
  const activeDayData=DAYS.find(d=>d.day===activeDay);
  const activePhase=PHASES.find(p=>activeDay>=p.days[0]&&activeDay<=p.days[1]);
  const currentPhaseIdx=dayNum<=5?0:dayNum<=30?1:dayNum<=50?2:3;

  const f="'Outfit',sans-serif";
  const m="'JetBrains Mono',monospace";

  const isCode=s=>/^(\$|Connect-|Get-|New-|Set-|Install-|Remove-|foreach|\}|\)|gam |Import-|Export-)/.test(s);
  const isBullet=s=>s.startsWith("•");
  const isSection=s=>s.startsWith("## ");

  const DiffBadge=({level})=>{
    const colors=["","#10B981","#F59E0B","#EF4444"];
    const dots=[1,2,3].map(i=>(
      <span key={i} style={{display:"inline-block",width:5,height:5,borderRadius:"50%",margin:"0 1px",background:i<=level?colors[level]:"#1E293B"}}/>
    ));
    return(
      <span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"2px 7px",borderRadius:4,background:`${colors[level]}12`,border:`1px solid ${colors[level]}25`}}>
        <span style={{display:"inline-flex",alignItems:"center"}}>{dots}</span>
        <span style={{fontSize:9,fontFamily:m,letterSpacing:0.5,color:colors[level]}}>{DIFF[level]}</span>
      </span>
    );
  };

  const TaskItem = ({ task, accent }) => {
    const done = completed[task.id];
    const c = CAT[task.cat];
    const isExp = expandedTask === task.id;
    const stepCount = task.steps ? task.steps.filter(s => !isSectionLine(s) && !isCodeContinue(s)).length : 0;
    const prereqDone = task.prereq ? completed[task.prereq] : true;
    const groups = task.steps ? groupSteps(task.steps) : [];

    return (
      <div style={{ marginBottom: 8 }}>
        <div style={{
          display: "flex", alignItems: "flex-start", gap: 11, padding: "13px 14px",
          background: done ? `${c.color}0A` : "#151D2E",
          border: done ? `1px solid ${c.color}30` : `1px solid #1E293B`,
          borderLeft: done ? `3px solid ${c.color}` : `3px solid ${c.color}55`,
          borderRadius: isExp ? "10px 10px 0 0" : "10px"
        }}>
          <button onClick={e => { e.stopPropagation(); toggle(task.id); }} style={{
            width: 24, height: 24, borderRadius: 7, display: "flex", alignItems: "center", justifyContent: "center",
            background: done ? c.color : "transparent",
            border: done ? "none" : `2px solid ${c.color}60`,
            fontSize: 13, color: "#fff", flexShrink: 0, marginTop: 1, cursor: "pointer", padding: 0
          }}>{done ? "✓" : ""}</button>

          <button onClick={() => setExpandedTask(isExp ? null : task.id)} style={{ flex: 1, minWidth: 0, background: "none", border: "none", cursor: "pointer", textAlign: "left", padding: 0 }}>
            <div style={{ display: "flex", alignItems: "flex-start", gap: 8 }}>
              {task.icon && <span style={{ fontSize: 18, lineHeight: 1.3, flexShrink: 0 }}>{task.icon}</span>}
              <div style={{ flex: 1, fontSize: 14, color: done ? "#64748B" : "#E5E7EB", fontWeight: 500, textDecoration: done ? "line-through" : "none", lineHeight: 1.45, fontFamily: f }}>{task.text}</div>
            </div>

            <div style={{ display: "flex", alignItems: "center", flexWrap: "wrap", gap: 6, marginTop: 8, marginLeft: task.icon ? 26 : 0 }}>
              <span style={{ padding: "2px 7px", borderRadius: 4, fontSize: 9, fontFamily: m, letterSpacing: 0.5, color: c.color, background: `${c.color}15`, textTransform: "uppercase" }}>{c.label}</span>
              {task.time && <span style={{ padding: "2px 7px", borderRadius: 4, fontSize: 9, fontFamily: m, color: "#94A3B8", background: "#1E293B" }}>⏱ {task.time}</span>}
              {task.diff && <DiffBadge level={task.diff} />}
              {task.prereq && !prereqDone && (
                <span title={`Requires ${task.prereq} complete`} style={{ padding: "2px 7px", borderRadius: 4, fontSize: 9, fontFamily: m, color: "#F59E0B", background: "#F59E0B15", border: "1px solid #F59E0B30" }}>🔒 needs {task.prereq}</span>
              )}
              {task.steps && <span style={{ fontSize: 10, color: "#64748B", fontFamily: m, marginLeft: "auto" }}>{isExp ? "▲ Hide" : `▼ ${stepCount} steps`}</span>}
            </div>
          </button>
        </div>

        {isExp && task.steps && (
          <div style={{ background: "#0D1525", border: "1px solid #1E293B", borderTop: "none", borderRadius: "0 0 10px 10px", padding: "14px 14px 16px" }}>
            {task.prereq && (
              <div style={{ fontSize: 10, fontFamily: m, color: prereqDone ? "#10B981" : "#F59E0B", marginBottom: 12, padding: "6px 10px", background: prereqDone ? "#10B98110" : "#F59E0B10", borderRadius: 6, border: `1px solid ${prereqDone ? "#10B98125" : "#F59E0B25"}` }}>
                {prereqDone ? "✓" : "🔒"} Prerequisite: {task.prereq} {prereqDone ? "complete" : "not yet complete"}
              </div>
            )}
            {(() => {
              let stepNum = 0;
              return groups.map((g, i) => {
                if (g.type === "section") {
                  return (
                    <div key={i} style={{ fontSize: 10, fontFamily: m, color: c.color, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", marginTop: i === 0 ? 0 : 18, marginBottom: 8, paddingBottom: 5, borderBottom: `1px solid ${c.color}25` }}>
                      {g.text}
                    </div>
                  );
                }
                if (g.type === "code") {
                  return <CodeBlock key={i} lines={g.lines} accent={c.color} />;
                }
                if (g.type === "bullet") {
                  return (
                    <div key={i} style={{ display: "flex", gap: 9, marginBottom: 6, marginLeft: 27, alignItems: "flex-start" }}>
                      <span style={{ fontSize: 13, color: "#CBD5E1", lineHeight: 1.6, fontFamily: f, flex: 1 }}>{linkify(g.text, c.color)}</span>
                    </div>
                  );
                }
                // prose
                stepNum++;
                return (
                  <div key={i} style={{ display: "flex", gap: 9, marginBottom: 10, alignItems: "flex-start" }}>
                    <span style={{ fontSize: 10, fontFamily: m, color: c.color, fontWeight: 700, flexShrink: 0, marginTop: 4, minWidth: 18, textAlign: "right" }}>
                      {stepNum}.
                    </span>
                    <span style={{ fontSize: 13, color: "#CBD5E1", lineHeight: 1.65, fontFamily: f, wordBreak: "break-word", flex: 1 }}>{linkify(g.text, c.color)}</span>
                  </div>
                );
              });
            })()}
          </div>
        )}
      </div>
    );
  };

  return(
    <div style={{minHeight:"100dvh",background:"#0B1120",color:"#E2E8F0",fontFamily:f}}>

      {/* HEADER */}
      <div style={{background:"linear-gradient(180deg,#111827,#0B1120)",borderBottom:"1px solid #1E293B",padding:"18px 18px 14px",position:"sticky",top:0,zIndex:10}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{fontSize:10,fontFamily:m,color:"#475569",letterSpacing:3,textTransform:"uppercase",fontWeight:600}}>Mission Control</div>
            <h1 style={{fontSize:20,fontWeight:800,margin:"4px 0 0",background:"linear-gradient(135deg,#06B6D4,#8B5CF6)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",letterSpacing:-0.3}}>Security Engineering Sprint</h1>
            <SyncBadge status={sync.status} cfg={sync.cfg} onClick={() => sync.syncNow()} />
          </div>
          {startDate&&(
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:38,fontWeight:900,fontFamily:m,color:dayNum>60?"#EF4444":"#06B6D4",lineHeight:1,letterSpacing:-1}}>{Math.min(dayNum,60)}</div>
              <div style={{fontSize:9,color:"#475569",fontFamily:m,letterSpacing:2,fontWeight:600}}>/ 60 DAYS</div>
            </div>
          )}
        </div>

        {!startDate?(
          <button onClick={start} style={{width:"100%",padding:"15px",background:"linear-gradient(135deg,#06B6D4,#8B5CF6)",border:"none",borderRadius:11,color:"#fff",fontSize:15,fontWeight:700,fontFamily:f,cursor:"pointer",marginTop:14,boxShadow:"0 4px 12px rgba(6,182,212,0.25)"}}>🔒 Start Security Engineering Sprint</button>
        ):(
          <>
            <div style={{marginTop:14}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                <span style={{fontSize:11,color:"#64748B",fontFamily:m,fontWeight:600}}>{doneTasks} / {totalTasks} tasks</span>
                <span style={{fontSize:12,fontWeight:800,fontFamily:m,color:pct===100?"#10B981":"#06B6D4"}}>{pct}%</span>
              </div>
              <div style={{height:8,background:"#1E293B",borderRadius:4,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${pct}%`,background:pct===100?"#10B981":"linear-gradient(90deg,#06B6D4,#8B5CF6)",borderRadius:4,transition:"width 0.5s"}}/>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginTop:12}}>
              {[
                {l:"Streak",v:`${streak}d`,i:"🔥",c:streak>0?"#F59E0B":"#475569"},
                {l:"Habits",v:`${habitsDone}/3`,i:"✅",c:habitsDone===3?"#10B981":"#475569"},
                {l:"Phase",v:`${currentPhaseIdx+1}/4`,i:PHASES[currentPhaseIdx]?.icon||"🎯",c:PHASES[currentPhaseIdx]?.color||"#06B6D4"}
              ].map((s,i)=>(
                <div key={i} style={{background:"#151D2E",borderRadius:10,padding:"10px 6px",textAlign:"center",border:`1px solid ${s.c}25`}}>
                  <div style={{fontSize:16,marginBottom:2}}>{s.i}</div>
                  <div style={{fontSize:20,fontWeight:800,fontFamily:m,color:s.c,lineHeight:1}}>{s.v}</div>
                  <div style={{fontSize:9,color:"#64748B",fontFamily:m,letterSpacing:1.2,textTransform:"uppercase",marginTop:3,fontWeight:600}}>{s.l}</div>
                </div>
              ))}
            </div>
          </>
        )}
      </div>

      {/* NAV TABS */}
      {startDate&&(
        <div style={{display:"flex",background:"#111827",borderBottom:"1px solid #1E293B",position:"sticky",top:160,zIndex:9}}>
          {[{k:"today",l:"Today"},{k:"calendar",l:"Calendar"},{k:"phases",l:"Phases"}].map(t=>(
            <button key={t.k} onClick={()=>{setView(t.k);if(t.k==="today"){setSelectedDay(null);setExpandedTask(null);}}} style={{
              flex:1,padding:"11px 0",border:"none",cursor:"pointer",fontFamily:m,fontSize:10.5,letterSpacing:2,textTransform:"uppercase",fontWeight:700,
              background:view===t.k?"#0B1120":"transparent",
              color:view===t.k?"#06B6D4":"#475569",
              borderBottom:view===t.k?"2px solid #06B6D4":"2px solid transparent"
            }}>{t.l}</button>
          ))}
        </div>
      )}

      {/* MAIN CONTENT */}
      <div style={{padding:"18px 18px 120px"}}>

        {/* TODAY VIEW */}
        {startDate&&view==="today"&&(()=>{
          const td=DAYS.find(d=>d.day===Math.min(dayNum,60));
          if(!td)return null;
          const ph=PHASES.find(p=>td.day>=p.days[0]&&td.day<=p.days[1]);
          const tdDone=td.tasks.filter(t=>completed[t.id]).length;
          const isDay1NothingDone=td.day===1&&tdDone===0;

          return(
            <>
              {/* Today navigation bar (prev/today/next) */}
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
                <button onClick={()=>{setSelectedDay(Math.max(1,td.day-1));setView("day");setExpandedTask(null);}} disabled={td.day<=1} style={{
                  padding:"8px 12px",background:"#151D2E",border:"1px solid #1E293B",borderRadius:8,
                  color:td.day<=1?"#334155":"#94A3B8",cursor:td.day<=1?"default":"pointer",fontFamily:m,fontSize:12,fontWeight:600,flex:1
                }}>← Day {Math.max(1,td.day-1)}</button>
                <div style={{padding:"8px 14px",background:"#06B6D415",border:"1px solid #06B6D440",borderRadius:8,color:"#06B6D4",fontFamily:m,fontSize:12,fontWeight:700,letterSpacing:0.5}}>TODAY</div>
                <button onClick={()=>{setSelectedDay(Math.min(60,td.day+1));setView("day");setExpandedTask(null);}} disabled={td.day>=60} style={{
                  padding:"8px 12px",background:"#151D2E",border:"1px solid #1E293B",borderRadius:8,
                  color:td.day>=60?"#334155":"#94A3B8",cursor:td.day>=60?"default":"pointer",fontFamily:m,fontSize:12,fontWeight:600,flex:1
                }}>Day {Math.min(60,td.day+1)} →</button>
              </div>

              {/* Lab Reference card (collapsible) */}
              <div style={{marginBottom:18}}>
                <button onClick={()=>setShowRef(!showRef)} style={{
                  width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",
                  padding:"10px 14px",background:"#151D2E",border:"1px solid #1E293B",borderRadius:showRef?"10px 10px 0 0":"10px",
                  color:"#94A3B8",cursor:"pointer",fontFamily:m,fontSize:11,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase"
                }}>
                  <span>🧰 Lab Reference</span>
                  <span>{showRef?"▲":"▼"}</span>
                </button>
                {showRef&&(
                  <div style={{background:"#0D1525",border:"1px solid #1E293B",borderTop:"none",borderRadius:"0 0 10px 10px",padding:"12px 14px"}}>
                    <div style={{fontSize:11,color:"#64748B",marginBottom:10,lineHeight:1.5}}>
                      Stored only on this device. Not in the source code. Safe for identifiers, not passwords or recovery keys.
                    </div>
                    {[
                      {k:"tenantDomain",l:"Tenant domain",ph:"smokkelabs.onmicrosoft.com"},
                      {k:"tenantId",l:"Tenant ID (GUID)",ph:"1a2b3c4d-5678-90ab-cdef-1234567890ab"},
                      {k:"adminUpn",l:"Admin UPN",ph:"admin@smokkelabs.onmicrosoft.com"},
                      {k:"recoveryUsb",l:"W11 Rebuild USB location",ph:"Desk drawer, labeled"}
                    ].map(f=>(
                      <div key={f.k} style={{marginBottom:9}}>
                        <div style={{fontSize:10,fontFamily:m,color:"#64748B",letterSpacing:1,textTransform:"uppercase",marginBottom:3,fontWeight:600}}>{f.l}</div>
                        <div style={{display:"flex",gap:6}}>
                          <input type="text" value={labRef[f.k]||""} onChange={e=>updateRef(f.k,e.target.value)} placeholder={f.ph} style={{
                            flex:1,padding:"7px 10px",background:"#0B1120",border:"1px solid #1E293B",borderRadius:6,
                            color:"#E5E7EB",fontFamily:m,fontSize:12.5,outline:"none"
                          }}/>
                          {labRef[f.k]&&(
                            <button onClick={()=>{navigator.clipboard.writeText(labRef[f.k]).then(()=>{}).catch(()=>{});}} title="Copy to clipboard" style={{
                              padding:"7px 10px",background:"#151D2E",border:"1px solid #1E293B",borderRadius:6,
                              color:"#06B6D4",fontFamily:m,fontSize:11,cursor:"pointer",fontWeight:600
                            }}>📋</button>
                          )}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>

              {/* Start here callout for day 1 */}
              {isDay1NothingDone&&(
                <div style={{
                  background:"linear-gradient(135deg,#06B6D415,#8B5CF615)",
                  border:"1px solid #06B6D440",
                  borderRadius:12,padding:"14px 16px",marginBottom:18,
                  display:"flex",alignItems:"flex-start",gap:12
                }}>
                  <span style={{fontSize:26,flexShrink:0}}>👋</span>
                  <div>
                    <div style={{fontSize:13,fontWeight:700,color:"#06B6D4",marginBottom:3,letterSpacing:0.3}}>Start here</div>
                    <div style={{fontSize:12.5,color:"#CBD5E1",lineHeight:1.55}}>Day 1 sets up your M365 tenant and bookmarks the free MS Learn paths. Tap a task to see step-by-step instructions. Check off habits below — tap a habit to see its guide.</div>
                  </div>
                </div>
              )}

              {/* Daily habits */}
              <div style={{marginBottom:22}}>
                <div style={{fontSize:11,fontFamily:m,color:"#64748B",letterSpacing:2,textTransform:"uppercase",marginBottom:10,fontWeight:700}}>
                  Daily Habits — {new Date().toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric"})}
                </div>
                {HABITS.map(h=>{
                  const done=todayHabits[h.id];
                  const isExp=expandedHabit===h.id;
                  return(
                    <div key={h.id} style={{marginBottom:7}}>
                      <div style={{
                        display:"flex",alignItems:"center",gap:12,padding:"13px 14px",
                        background:done?"rgba(16,185,129,0.08)":"#151D2E",
                        border:done?"1px solid rgba(16,185,129,0.3)":"1px solid #1E293B",
                        borderRadius:isExp?"10px 10px 0 0":"10px"
                      }}>
                        <button onClick={e=>{e.stopPropagation();toggleHabit(h.id);}} style={{
                          width:24,height:24,borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",
                          background:done?"#10B981":"transparent",border:done?"none":"2px solid #374151",
                          fontSize:13,color:"#fff",flexShrink:0,cursor:"pointer",padding:0
                        }}>{done?"✓":""}</button>
                        <button onClick={()=>setExpandedHabit(isExp?null:h.id)} style={{flex:1,minWidth:0,background:"none",border:"none",cursor:"pointer",textAlign:"left",padding:0,display:"flex",alignItems:"center",gap:10}}>
                          <div style={{flex:1,fontSize:14,color:done?"#10B981":"#D1D5DB",fontWeight:500,textDecoration:done?"line-through":"none",fontFamily:f}}>{h.text}</div>
                          <span style={{fontSize:17,flexShrink:0}}>{h.icon}</span>
                          {h.guide&&<span style={{fontSize:10,color:"#64748B",fontFamily:m,flexShrink:0}}>{isExp?"▲":"▼"}</span>}
                        </button>
                      </div>
                      {isExp&&h.guide&&(
                        <div style={{background:"#0D1525",border:"1px solid #1E293B",borderTop:"none",borderRadius:"0 0 10px 10px",padding:"12px 14px 14px"}}>
                          {h.guide.map((line,i)=>{
                            if(line.startsWith("## ")){
                              return(
                                <div key={i} style={{fontSize:10,fontFamily:m,color:"#10B981",fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",marginTop:i===0?0:12,marginBottom:5,paddingBottom:3,borderBottom:"1px solid #10B98125"}}>
                                  {line.slice(3)}
                                </div>
                              );
                            }
                            return(
                              <div key={i} style={{fontSize:13,color:"#CBD5E1",lineHeight:1.6,marginBottom:4,fontFamily:f,paddingLeft:line.startsWith("•")?8:0}}>{linkify(line, "#10B981")}</div>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>

              {/* Today's day card */}
              <div style={{marginBottom:16}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                  <div>
                    <div style={{fontSize:11,fontFamily:m,color:"#64748B",letterSpacing:2,textTransform:"uppercase",marginBottom:4,fontWeight:700}}>
                      Day {td.day}
                    </div>
                    <div style={{fontSize:19,fontWeight:800,color:"#F1F5F9",letterSpacing:-0.2,lineHeight:1.25}}>
                      {td.label}
                    </div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:22,fontWeight:800,fontFamily:m,color:tdDone===td.tasks.length?"#10B981":ph?.color||"#06B6D4",lineHeight:1}}>{tdDone}/{td.tasks.length}</div>
                    <div style={{fontSize:9,color:"#64748B",fontFamily:m,letterSpacing:1,marginTop:2,fontWeight:600}}>DONE</div>
                  </div>
                </div>
                {ph&&(
                  <div style={{display:"inline-block",padding:"5px 11px",borderRadius:6,fontSize:10,fontFamily:m,color:ph.color,background:`${ph.color}12`,border:`1px solid ${ph.color}30`,marginBottom:12,letterSpacing:0.5,fontWeight:600}}>
                    {ph.icon} {ph.title}
                  </div>
                )}
                {!isDay1NothingDone&&(
                  <div style={{background:"#131B2E",border:"1px solid #1E293B",borderRadius:8,padding:"10px 12px",marginBottom:14,fontSize:11.5,color:"#94A3B8",lineHeight:1.6}}>
                    💡 <strong style={{color:"#CBD5E1"}}>Tap any task</strong> to see step-by-step instructions, time estimate, and difficulty.
                  </div>
                )}
                {td.tasks.map(t=><TaskItem key={t.id} task={t} accent={ph?.color}/>)}
              </div>
            </>
          );
        })()}

        {/* CALENDAR VIEW */}
        {startDate&&view==="calendar"&&(
          <>
            <div style={{fontSize:11,fontFamily:m,color:"#64748B",letterSpacing:2,textTransform:"uppercase",marginBottom:10,fontWeight:700}}>60-Day Calendar</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:18}}>
              {["S","M","T","W","T","F","S"].map((d,i)=>(
                <div key={i} style={{textAlign:"center",fontSize:9,fontFamily:m,color:"#475569",padding:"4px 0",fontWeight:700}}>{d}</div>
              ))}
              {(() => {
                const sd=new Date(startDate+"T00:00:00");
                const dow=sd.getDay();
                const cells=[];
                for(let i=0;i<dow;i++)cells.push(<div key={`p${i}`}/>);
                for(let i=1;i<=60;i++){
                  const dd=DAYS.find(d=>d.day===i);
                  const allD=dd?dd.tasks.every(t=>completed[t.id]):false;
                  const someD=dd?dd.tasks.some(t=>completed[t.id]):false;
                  const isCur=i===Math.min(dayNum,60);
                  const ph=PHASES.find(p=>i>=p.days[0]&&i<=p.days[1]);
                  cells.push(
                    <button key={i} onClick={()=>{setSelectedDay(i);setView("day");setExpandedTask(null);}} style={{
                      width:"100%",aspectRatio:"1",borderRadius:8,
                      border:isCur?"2px solid #06B6D4":"1px solid #1E293B",
                      background:allD?`${ph?.color}25`:someD?"#1a2236":"#111827",
                      cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:0
                    }}>
                      <span style={{fontSize:12.5,fontWeight:isCur?800:500,fontFamily:m,color:allD?"#10B981":isCur?"#06B6D4":"#94A3B8"}}>{i}</span>
                      {allD&&<div style={{width:4,height:4,borderRadius:2,background:"#10B981",marginTop:2}}/>}
                      {someD&&!allD&&<div style={{width:4,height:4,borderRadius:2,background:"#F59E0B",marginTop:2}}/>}
                    </button>
                  );
                }
                return cells;
              })()}
            </div>

            <div style={{fontSize:11,fontFamily:m,color:"#64748B",letterSpacing:2,textTransform:"uppercase",marginBottom:8,marginTop:18,fontWeight:700}}>Phase Progress</div>
            {PHASES.map(p=>{
              const pd=DAYS.filter(d=>d.day>=p.days[0]&&d.day<=p.days[1]);
              const dn=pd.reduce((s,d)=>s+d.tasks.filter(t=>completed[t.id]).length,0);
              const tt=pd.reduce((s,d)=>s+d.tasks.length,0);
              const pp=tt?Math.round(dn/tt*100):0;
              return(
                <div key={p.title} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 13px",background:"#151D2E",borderRadius:8,border:"1px solid #1E293B",marginBottom:5}}>
                  <span style={{fontSize:15}}>{p.icon}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,fontWeight:700,color:"#CBD5E1"}}>{p.title}</div>
                    <div style={{fontSize:9,fontFamily:m,color:"#64748B",fontWeight:600}}>Days {p.days[0]}–{p.days[1]}</div>
                  </div>
                  <div style={{width:70}}>
                    <div style={{height:5,background:"#1E293B",borderRadius:3,overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${pp}%`,background:pp===100?"#10B981":p.color,borderRadius:3}}/>
                    </div>
                    <div style={{fontSize:10,fontFamily:m,color:pp===100?"#10B981":"#94A3B8",textAlign:"right",marginTop:3,fontWeight:700}}>{pp}%</div>
                  </div>
                </div>
              );
            })}
          </>
        )}

        {/* SPECIFIC DAY VIEW */}
        {startDate&&view==="day"&&activeDayData&&(
          <>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,gap:10}}>
              <button onClick={()=>{setSelectedDay(Math.max(1,activeDay-1));setExpandedTask(null);}} disabled={activeDay<=1} style={{
                padding:"8px 14px",background:"#151D2E",border:"1px solid #1E293B",borderRadius:8,
                color:activeDay<=1?"#334155":"#94A3B8",cursor:activeDay<=1?"default":"pointer",fontFamily:m,fontSize:13,fontWeight:600
              }}>← Prev</button>
              <div style={{textAlign:"center",flex:1}}>
                <div style={{fontSize:10,fontFamily:m,color:"#64748B",letterSpacing:2,fontWeight:700}}>DAY</div>
                <div style={{fontSize:26,fontWeight:900,fontFamily:m,color:activePhase?.color||"#06B6D4",lineHeight:1.1,letterSpacing:-0.5}}>{activeDay}</div>
                <div style={{fontSize:13,fontWeight:600,color:"#E5E7EB",marginTop:2}}>{activeDayData.label}</div>
              </div>
              <button onClick={()=>{setSelectedDay(Math.min(60,activeDay+1));setExpandedTask(null);}} disabled={activeDay>=60} style={{
                padding:"8px 14px",background:"#151D2E",border:"1px solid #1E293B",borderRadius:8,
                color:activeDay>=60?"#334155":"#94A3B8",cursor:activeDay>=60?"default":"pointer",fontFamily:m,fontSize:13,fontWeight:600
              }}>Next →</button>
            </div>
            {activePhase&&(
              <div style={{display:"inline-block",padding:"5px 11px",borderRadius:6,fontSize:10,fontFamily:m,color:activePhase.color,background:`${activePhase.color}12`,border:`1px solid ${activePhase.color}30`,marginBottom:14,letterSpacing:0.5,fontWeight:600}}>
                {activePhase.icon} {activePhase.title}
              </div>
            )}
            {activeDayData.tasks.map(t=><TaskItem key={t.id} task={t}/>)}

            <button onClick={()=>setView("calendar")} style={{
              width:"100%",padding:"12px",background:"#151D2E",border:"1px solid #334155",borderRadius:9,
              color:"#06B6D4",fontFamily:m,fontSize:12,fontWeight:700,cursor:"pointer",marginTop:16,letterSpacing:0.5
            }}>← Back to Calendar</button>
          </>
        )}

        {/* PHASES VIEW */}
        {startDate&&view==="phases"&&(
          <>
            <div style={{fontSize:11,fontFamily:m,color:"#64748B",letterSpacing:2,textTransform:"uppercase",marginBottom:12,fontWeight:700}}>Four Phases</div>
            {PHASES.map(phase=>{
              const pd=DAYS.filter(d=>d.day>=phase.days[0]&&d.day<=phase.days[1]);
              const dn=pd.reduce((s,d)=>s+d.tasks.filter(t=>completed[t.id]).length,0);
              const tt=pd.reduce((s,d)=>s+d.tasks.length,0);
              const pp=tt?Math.round(dn/tt*100):0;
              return(
                <div key={phase.title} style={{marginBottom:11}}>
                  <div style={{padding:"15px 17px",background:"#151D2E",borderRadius:11,border:`1px solid ${pp===100?"#10B98133":"#1E293B"}`}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                      <div style={{display:"flex",alignItems:"center",gap:10}}>
                        <span style={{fontSize:22}}>{phase.icon}</span>
                        <div>
                          <div style={{fontSize:15,fontWeight:800,color:"#F1F5F9",letterSpacing:-0.2}}>{phase.title}</div>
                          <div style={{fontSize:10,fontFamily:m,color:"#64748B",fontWeight:600}}>Days {phase.days[0]}–{phase.days[1]} · {tt} tasks</div>
                        </div>
                      </div>
                      <span style={{fontSize:15,fontFamily:m,color:pp===100?"#10B981":phase.color,fontWeight:800}}>{pp}%</span>
                    </div>
                    <div style={{height:5,background:"#0B1120",borderRadius:3,overflow:"hidden",marginBottom:11}}>
                      <div style={{height:"100%",width:`${pp}%`,background:pp===100?"#10B981":phase.color,borderRadius:3}}/>
                    </div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                      {pd.map(d=>{
                        const allD=d.tasks.every(t=>completed[t.id]);
                        const someD=d.tasks.some(t=>completed[t.id]);
                        return(
                          <button key={d.day} onClick={()=>{setSelectedDay(d.day);setView("day");setExpandedTask(null);}} style={{
                            padding:"5px 9px",borderRadius:6,
                            border:allD?"1px solid #10B98133":"1px solid #1E293B",
                            background:allD?"#10B98115":someD?"#F59E0B10":"#111827",
                            cursor:"pointer",fontSize:10.5,fontFamily:m,fontWeight:600,
                            color:allD?"#10B981":someD?"#F59E0B":"#94A3B8"
                          }}>D{d.day}</button>
                        );
                      })}
                    </div>
                  </div>
                </div>
              );
            })}
            <div style={{marginTop:18,padding:"14px",background:"#151D2E",border:"1px solid #1E293B",borderRadius:10}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                <div style={{fontSize:11,fontFamily:m,color:"#94A3B8",letterSpacing:1.5,textTransform:"uppercase",fontWeight:700}}>🔄 Cloud Sync</div>
                {sync.cfg?.enabled && <SyncBadge status={sync.status} cfg={sync.cfg} onClick={() => sync.syncNow()} />}
              </div>

              {!sync.cfg?.enabled ? (
                <>
                  <div style={{fontSize:12,color:"#94A3B8",lineHeight:1.55,marginBottom:12}}>
                    Sync your progress automatically across devices via a private GitHub Gist. Free. Token stays on this device.
                  </div>
                  <button onClick={() => setShowSyncModal(true)} style={{
                    width:"100%",padding:"11px",background:"#06B6D4",border:"none",borderRadius:8,
                    color:"#0B1120",fontSize:12.5,fontFamily:m,cursor:"pointer",fontWeight:800,letterSpacing:0.5
                  }}>☁️ Set up cloud sync</button>
                </>
              ) : (
                <>
                  <div style={{fontSize:11,fontFamily:m,color:"#64748B",marginBottom:4,letterSpacing:1,fontWeight:600}}>GIST ID</div>
                  <div style={{display:"flex",gap:6,marginBottom:10}}>
                    <input readOnly value={sync.cfg.gistId} style={{
                      flex:1,padding:"7px 10px",background:"#0B1120",border:"1px solid #1E293B",borderRadius:6,
                      color:"#06B6D4",fontFamily:m,fontSize:11.5,outline:"none"
                    }}/>
                    <button onClick={() => navigator.clipboard?.writeText(sync.cfg.gistId)} style={{
                      padding:"7px 10px",background:"#151D2E",border:"1px solid #1E293B",borderRadius:6,
                      color:"#06B6D4",fontFamily:m,fontSize:11,cursor:"pointer",fontWeight:600
                    }}>📋</button>
                  </div>
                  {sync.status.error && (
                    <div style={{fontSize:11,color:"#EF4444",fontFamily:m,marginBottom:10,padding:"6px 10px",background:"#EF444415",borderRadius:6,wordBreak:"break-word"}}>
                      ⚠️ {sync.status.error}
                    </div>
                  )}
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={() => sync.syncNow()} disabled={sync.status.state === "syncing"} style={{
                      flex:1,padding:"10px",background:"#06B6D415",border:"1px solid #06B6D440",borderRadius:8,
                      color:"#06B6D4",fontSize:11.5,fontFamily:m,cursor:"pointer",fontWeight:700,letterSpacing:0.5,
                      opacity:sync.status.state === "syncing" ? 0.5 : 1
                    }}>{sync.status.state === "syncing" ? "Syncing..." : "🔄 Sync now"}</button>
                    <button onClick={disconnectSync} style={{
                      padding:"10px 14px",background:"transparent",border:"1px solid #EF444433",borderRadius:8,
                      color:"#EF4444",fontSize:11,fontFamily:m,cursor:"pointer",fontWeight:600
                    }}>Disconnect</button>
                  </div>
                </>
              )}
            </div>

            <details style={{marginTop:10}}>
              <summary style={{fontSize:11,fontFamily:m,color:"#64748B",cursor:"pointer",padding:"6px 0",letterSpacing:1,textTransform:"uppercase",fontWeight:600}}>Manual export / import (legacy)</summary>
              <div style={{padding:"10px 0 0"}}>
                <div style={{fontSize:11,color:"#64748B",lineHeight:1.55,marginBottom:8}}>
                  Clipboard-based fallback if you don't want cloud sync.
                </div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={exportProgress} style={{
                    flex:1,padding:"9px",background:"#06B6D410",border:"1px solid #06B6D430",borderRadius:7,
                    color:"#06B6D4",fontSize:11,fontFamily:m,cursor:"pointer",fontWeight:600
                  }}>📤 Export</button>
                  <button onClick={importProgress} style={{
                    flex:1,padding:"9px",background:"#8B5CF610",border:"1px solid #8B5CF630",borderRadius:7,
                    color:"#8B5CF6",fontSize:11,fontFamily:m,cursor:"pointer",fontWeight:600
                  }}>📥 Import</button>
                </div>
              </div>
            </details>
            <button onClick={reset} style={{
              width:"100%",padding:"11px",background:"transparent",border:"1px solid #EF444422",borderRadius:8,
              color:"#EF4444",fontSize:11,fontFamily:m,cursor:"pointer",marginTop:12,fontWeight:600,letterSpacing:0.5
            }}>Reset All Progress</button>
          </>
        )}

        {/* SPLASH (PRE-START) */}
        {!startDate&&(
          <div style={{textAlign:"center",padding:"40px 20px"}}>
            <div style={{fontSize:52,marginBottom:18}}>🔒</div>
            <h2 style={{fontSize:22,fontWeight:800,color:"#F1F5F9",marginBottom:10,letterSpacing:-0.3}}>Security Engineering Sprint</h2>
            <p style={{fontSize:14.5,color:"#94A3B8",lineHeight:1.65,maxWidth:340,margin:"0 auto"}}>
              <strong style={{color:"#E5E7EB"}}>{totalTasks} tasks · 60 days.</strong><br/>
              Real M365 tenant · Surface Pro lab device · MD-102 + SC-300 learning paths. From IT Admin to Security Engineer.
            </p>
            <div style={{display:"flex",flexWrap:"wrap",justifyContent:"center",gap:7,marginTop:22}}>
              {PHASES.map(p=>(
                <div key={p.title} style={{padding:"6px 11px",background:`${p.color}12`,border:`1px solid ${p.color}30`,borderRadius:7,fontSize:10.5,color:p.color,fontFamily:m,fontWeight:600}}>
                  {p.icon} Days {p.days[0]}–{p.days[1]}
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      {showSyncModal && (
        <SyncSetupModal
          snapshot={snapshot}
          onClose={() => setShowSyncModal(false)}
          onSetup={(cfg) => { sync.updateCfg(cfg); }}
        />
      )}
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
